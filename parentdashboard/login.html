<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Little Nest - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Override body background specifically for login page */
        body {
            background-color: #2D1B4E !important; /* Deep Night */
            margin: 0;
            font-family: sans-serif;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #2D1B4E;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background-color: #FF7BAC; /* Soft Glow Pink */
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .login-btn:hover { background-color: #f06a9a; }
        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2 style="margin-bottom: 25px; text-align: center; color: #2D1B4E;">Parent Login</h2>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            
            <button class="login-btn" onclick="handleLogin()">Sign In</button>
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = "Please fill in all fields.";
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Invalid credentials.');

                localStorage.setItem('authToken', data.authToken);
                const userId = data.user; 

                if (userId) {
                    localStorage.setItem('userId', userId);
                    window.location.href = './dashboard.html';
                } else {
                    alert("CRITICAL: API did not return a valid user pointer.");
                }
            } catch (error) {
                errorDiv.textContent = error.message || "Login failed.";
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
