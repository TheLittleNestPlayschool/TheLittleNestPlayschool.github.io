<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .login-card { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); z-index: 1; }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 14px; border: 2px solid #E2E8F0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 15px; background-color: var(--soft-glow); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="swirl-container">
        <div class="swirl swirl-1"></div>
        <div class="swirl swirl-2"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <!-- Brand Header -->
            <div style="text-align: center; margin-bottom: 25px;">
                <h1 style="color: var(--deep-night); margin: 0; font-size: 1.5rem;">The Little Nest Playschool</h1>
                <p style="color: #64748B; margin: 8px 0 0 0; font-weight: 500;">Where Little Success Stories Begin</p>
            </div>

            <h2 style="color: var(--deep-night); font-size: 1.1rem; margin-bottom: 15px; text-align: center;">Parent Login</h2>
            
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address">
            </div>
            
            <div class="form-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            
            <button class="login-btn" onclick="handleLogin()">Sign In</button>
            <div id="errorMessage" style="color:red; text-align:center; margin-top:10px; display:none;"></div>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Invalid credentials.');

                localStorage.setItem('authToken', data.authToken);
                localStorage.setItem('userId', data.user);
                window.location.href = './dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
