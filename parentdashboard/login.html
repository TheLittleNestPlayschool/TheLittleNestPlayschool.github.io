<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-form-wrapper">
        <div class="login-header-curve">
            <div style="padding: 50px 30px; color: white; text-align: center;">
                <h1 style="margin: 0; font-size: 1.6rem;">The Little Nest Playschool</h1>
                <p style="margin: 10px 0 0 0; font-size: 0.9rem; opacity: 0.9;">Where Little Success Stories Begin</p>
            </div>
        </div>

        <div style="padding: 0 40px;">
            <h2 style="font-size: 1.2rem; color: #333; margin-bottom: 20px;">Parent Login</h2>
            
            <input type="email" id="email" class="login-input" placeholder="Email">
            <input type="password" id="password" class="login-input" placeholder="Password">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                <span style="font-size: 1.2rem; font-weight: bold; color: #333;">Sign in</span>
                <button onclick="handleLogin()" style="background: var(--header-purple); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; display: flex; align-items: center; justify-content: center;">→</button>
            </div>
            <div id="errorMessage" style="color: var(--deep-night); text-align: center; margin-top: 15px; font-weight: bold; display: none;"></div>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Invalid credentials.');

                localStorage.setItem('authToken', data.authToken);
                localStorage.setItem('userId', data.user);
                window.location.href = './dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
