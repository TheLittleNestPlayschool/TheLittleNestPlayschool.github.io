<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Little Nest - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <h2 style="margin-bottom: 20px; text-align: center;">Parent Login</h2>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            
            <button class="login-btn" onclick="handleLogin()">Sign In</button>
            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = "Please fill in all fields.";
                errorDiv.style.display = 'block';
                return;
            }

            try {
                // Corrected to use your operational Xano group endpoint
                const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Invalid credentials.');
                }

                // Save both token and user id safely to storage
                localStorage.setItem('authToken', data.authToken);
                
                // Inspect user ID payload structures from Xano standard auth tables
                const userId = data.user?.id || data.userId;
                if (userId) {
                    localStorage.setItem('userId', userId);
                } else {
                    console.warn("User ID not found directly in response object structure root.");
                }

                // Redirect relatively within the parentdashboard folder
                window.location.href = './dashboard.html';

            } catch (error) {
                console.error('Login window error:', error);
                errorDiv.textContent = error.message || "Login failed. Check your email and password.";
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
