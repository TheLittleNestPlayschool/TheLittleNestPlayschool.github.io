<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fluid background blobs -->
    <div class="blob blob-purple"></div>
    <div class="blob blob-yellow"></div>

    <div class="login-form-wrapper">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="color: var(--deep-night); font-size: 1.5rem; margin: 0;">The Little Nest</h1>
            <p style="color: var(--deep-night); opacity: 0.7; font-size: 0.9rem; margin-top: 5px;">Where Little Success Stories Begin</p>
        </div>

        <input type="email" id="email" placeholder="Email" style="width: 100%; padding: 15px; margin-bottom: 15px; border: none; border-radius: 12px; background: rgba(255,255,255,0.8);">
        <input type="password" id="password" placeholder="Password" style="width: 100%; padding: 15px; margin-bottom: 25px; border: none; border-radius: 12px; background: rgba(255,255,255,0.8);">
        
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold; color: var(--deep-night); font-size: 1.1rem;">Sign in</span>
            <button onclick="handleLogin()" style="background: var(--deep-night); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">→</button>
        </div>
        <div id="errorMessage" style="color:#e74c3c; text-align:center; margin-top:15px; font-weight:bold; display:none;"></div>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Invalid credentials.');

                localStorage.setItem('authToken', data.authToken);
                localStorage.setItem('userId', data.user);
                window.location.href = './dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
