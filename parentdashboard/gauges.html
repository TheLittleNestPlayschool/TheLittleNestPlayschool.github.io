<div class="card">
    <h3 style="margin: 0 0 15px 0; font-size: 0.9rem; color: #333;">Development Progress</h3>
    <div class="gauge-row">
        <!-- Reading -->
        <div class="gauge-wrapper" style="text-align: center;">
            <div class="gauge-circle" id="gauge-reading" style="--progress: 0%;"></div>
            <div class="gauge-label">Reading</div>
        </div>
        
        <!-- Writing -->
        <div class="gauge-wrapper" style="text-align: center;">
            <div class="gauge-circle" id="gauge-writing" style="--progress: 0%;"></div>
            <div class="gauge-label">Writing</div>
        </div>
        
        <!-- Alphabet -->
        <div class="gauge-wrapper" style="text-align: center;">
            <div class="gauge-circle" id="gauge-alphabet" style="--progress: 0%;"></div>
            <div class="gauge-label">Alphabet</div>
        </div>
        
        <!-- Numbers -->
        <div class="gauge-wrapper" style="text-align: center;">
            <div class="gauge-circle" id="gauge-numbers" style="--progress: 0%;"></div>
            <div class="gauge-label">Numbers</div>
        </div>
        
        <!-- Manners -->
        <div class="gauge-wrapper" style="text-align: center;">
            <div class="gauge-circle" id="gauge-manners" style="--progress: 0%;"></div>
            <div class="gauge-label">Manners</div>
        </div>
    </div>
</div>
