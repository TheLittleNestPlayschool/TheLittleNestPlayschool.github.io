<div class="module-box">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin: 0; font-size: 0.9rem; color: #333;">Mastery Progress</h3>
        <div id="total-hours-display" style="font-size: 0.8rem; font-weight: bold; color: #666;">
            Total Hours: <span id="total-hours-value">0</span>
        </div>
    </div>
    
    <div class="gauge-row">
        <!-- Reading -->
        <div class="gauge-wrapper">
            <div class="gauge-circle" id="gauge-reading" style="--progress: 0%;"></div>
            <div class="gauge-label">Reading</div>
            <div class="badge-slot" id="badge-reading"></div>
        </div>
        
        <!-- Writing -->
        <div class="gauge-wrapper">
            <div class="gauge-circle" id="gauge-writing" style="--progress: 0%;"></div>
            <div class="gauge-label">Writing</div>
            <div class="badge-slot" id="badge-writing"></div>
        </div>
        
        <!-- Alphabet -->
        <div class="gauge-wrapper">
            <div class="gauge-circle" id="gauge-alphabet" style="--progress: 0%;"></div>
            <div class="gauge-label">Alphabet</div>
            <div class="badge-slot" id="badge-alphabet"></div>
        </div>
        
        <!-- Numbers -->
        <div class="gauge-wrapper">
            <div class="gauge-circle" id="gauge-numbers" style="--progress: 0%;"></div>
            <div class="gauge-label">Numbers</div>
            <div class="badge-slot" id="badge-numbers"></div>
        </div>
        
        <!-- Manners -->
        <div class="gauge-wrapper">
            <div class="gauge-circle" id="gauge-manners" style="--progress: 0%;"></div>
            <div class="gauge-label">Manners</div>
            <div class="badge-slot" id="badge-manners"></div>
        </div>
    </div>
</div>
