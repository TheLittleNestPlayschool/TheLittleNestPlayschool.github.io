<div class="gallery-content">
    <h3 style="margin-bottom: 15px;">Classroom Media</h3>
    
    <!-- This container will hold the dynamically created image cards -->
    <div id="media-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
        <!-- Example structure for an image item (this will be generated by app.js) -->
        <div class="media-item" style="text-align: center;">
            <img src="placeholder.jpg" alt="Student Activity" style="width: 100%; border-radius: 8px; aspect-ratio: 1/1; object-fit: cover;">
            <a href="#" style="display: block; font-size: 0.7rem; margin-top: 5px; color: var(--primary-color);">Download</a>
        </div>
        <!-- Additional items will be appended here -->
    </div>
</div>
