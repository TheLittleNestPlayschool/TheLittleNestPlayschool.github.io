<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parent Dashboard</title>
    <!-- Links to your external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        <header id="header">
            <div id="branch-info">Parent Dashboard</div>
        </header>

        <main id="content-area">
            <!-- Modular content will be injected here by app.js -->
        </main>

        <nav id="bottom-nav">
            <!-- These buttons trigger functions in app.js -->
            <button onclick="loadView('progress')">Progress</button>
            <button onclick="loadView('curriculum')">Curriculum</button>
            <button onclick="loadView('gallery')">Media</button>
        </nav>
    </div>

    <!-- Links to your external JS file -->
    <script src="app.js"></script>
</body>
</html>
