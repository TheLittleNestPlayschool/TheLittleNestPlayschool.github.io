<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard</title>
</head>
<body>

<!-- This is where profile.html content will be injected -->
<div id="profile-target">Loading profile...</div>

<hr>

<h3>Development Progress</h3>
<ul>
    <li>Reading</li>
    <li>Writing</li>
    <li>Alphabet</li>
    <li>Numbers</li>
    <li>Manners</li>
</ul>

<h3>Working on Now</h3>
<p>Lesson: <span id="current-lesson">[Lesson Title]</span></p>

<h3>Coming Up Next</h3>
<p>Lesson: <span id="next-lesson">[Next Lesson Title]</span></p>

<script>
    // 1. Ensure user is logged in
    if (!localStorage.getItem('userId')) {
        window.location.href = './login.html';
    }

    // 2. Fetch and inject profile.html
    document.addEventListener('DOMContentLoaded', () => {
        fetch('./profile.html')
            .then(response => {
                if (!response.ok) throw new Error('Failed to load profile');
                return response.text();
            })
            .then(html => {
                document.getElementById('profile-target').innerHTML = html;
                
                // 3. Find and execute the script inside the injected profile.html
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                const scripts = tempDiv.getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) {
                    const newScript = document.createElement('script');
                    newScript.textContent = scripts[i].textContent;
                    document.body.appendChild(newScript);
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('profile-target').innerHTML = "Error loading profile.";
            });
    });
</script>

</body>
</html>
