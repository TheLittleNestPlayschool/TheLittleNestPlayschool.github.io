<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Little Nest Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div>Parent Dashboard</div>
        </header>

        <main id="content-area">
            <!-- 1. Parent/Student Data -->
            <div class="card" id="profile-section"></div>
            
            <!-- 2. Gauges Section -->
            <div class="card" id="gauges-section"></div>
            
            <!-- 3. Current Session Section -->
            <div class="card" id="current-session-section"></div>
            
            <!-- 4. Upcoming Sessions Section -->
            <div class="card" id="upcoming-session-section"></div>
            
            <!-- 5. Pictures/Media Section -->
            <div class="card" id="gallery-section"></div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
