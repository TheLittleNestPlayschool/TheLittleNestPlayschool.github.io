<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- App Shell Container -->
    <div id="app-container">
        
        <!-- Header: Displays Branch Name and Welcome -->
        <header id="header">
            <div id="branch-info">
                <!-- Loaded via JS: Branch Name -->
            </div>
        </header>

        <!-- Main Content Area: Where components are injected -->
        <main id="content-area">
            <!-- This is where we will inject:
                 1. Progress Gauges
                 2. Weekly Journey (Curriculum)
                 3. Media Gallery
            -->
        </main>

        <!-- Bottom Navigation: Simple toggle between views -->
        <nav id="bottom-nav">
            <button onclick="loadView('progress')">Progress</button>
            <button onclick="loadView('curriculum')">Curriculum</button>
            <button onclick="loadView('gallery')">Media</button>
        </nav>

    </div>

    <script src="app.js"></script>
</body>
</html>
