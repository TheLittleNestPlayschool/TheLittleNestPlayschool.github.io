<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My TLNP</title>
    <link rel="stylesheet" href="/style.css">
   </head>
<body>
    <div id="app-container">
        <!-- Header Banner -->
        <header class="main-header">
            <div class="stats-banner">
                <span class="banner-title">Little Nest Global Network</span>
                <span class="banner-stat"><span class="stat-highlight">50,000+</span> Learning Hours &amp; Counting!</span>
            </div>
            
            <h1 class="main-title">
                <span class="brand-title">THE LITTLE NEST PLAYSCHOOL</span>
                <span class="branch-location" id="franchise-name-display"></span>
            </h1>

            <!-- Student/Parent Info Banner -->
            <div id="student-info-banner">
                <span id="parent-name" style="font-weight: bold;"></span> &bullet; 
                <span id="student-name"></span>
            </div>
        </header>

        <!-- Main Content Area -->
        <div id="content-area">
            <div id="current-container"></div>
            <div id="upcoming-container"></div>
            <div id="gallery-container"></div>
        </div>

        <!-- Sidebar Right -->
        <div class="sidebar-right" id="gauges-container"></div>

        <!-- Footer -->
        <div id="footer-buttons">
            <button onclick="openModal('my-data-modal')">My Data</button>
            <button onclick="openModal('gallery-modal')">My Gallery</button>
            <button onclick="openModal('message-modal')">Message Us</button>
            <button onclick="openModal('badges-modal')">My Badges</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="my-data-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('my-data-modal')">&times;</span>
            <div id="profile-content"></div>
        </div>
    </div>

    <div id="gallery-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('gallery-modal')">&times;</span>
            <div id="gallery-content"></div>
        </div>
    </div>

    <div id="message-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('message-modal')">&times;</span>
            <div id="message-content"></div>
        </div>
    </div>

    <div id="badges-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('badges-modal')">&times;</span>
            <div id="badges-content"></div>
        </div>
    </div>

    <script src="./app.js"></script>
    <script>
        function toggleAccordion(element) {
            const content = element.nextElementSibling;
            content.style.display = (content.style.display === "block") ? "none" : "block";
        }

        function openModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('show');

            if (id === 'my-data-modal') {
                fetch('profile.html')
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById('profile-content').innerHTML = data;
                        if(window.populateUI) populateUI(window.latestDashboardData);
                    })
                    .catch(error => console.error('Error loading profile.html:', error));
            } else if (id === 'gallery-modal') {
                fetch('gallery.html')
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById('gallery-content').innerHTML = data;
                    })
                    .catch(error => console.error('Error loading gallery.html:', error));
            } else if (id === 'message-modal') {
                fetch('message_us.html')
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById('message-content').innerHTML = data;
                    })
                    .catch(error => console.error('Error loading message_us.html:', error));
            } else if (id === 'badges-modal') {
                fetch('badges.html')
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById('badges-content').innerHTML = data;
                    })
                    .catch(error => console.error('Error loading badges.html:', error));
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        // Enable drag-to-scroll on modals
        const modalIds = ['my-data-modal', 'gallery-modal', 'message-modal', 'badges-modal'];
        modalIds.forEach(id => {
            if (typeof enableDragScroll === 'function') {
                enableDragScroll(id);
            }
        });
    </script>
</body>
</html>
