<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard</title>
</head>
<body>

    <!-- Container for all components -->
    <div id="profile-container"></div>
    <div id="gauges-container"></div>
    <div id="current-container"></div>
    <div id="upcoming-container"></div>
    <div id="gallery-container"></div>

<script>
    async function loadDashboard() {
        const userId = localStorage.getItem('userId');
        if (!userId) { 
            window.location.href = './login.html'; 
            return; 
        }

        try {
            // 1. Fetch Data
            const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV/parents?user_id=' + userId);
            const data = await response.json();

            // 2. Define files in order
            const files = [
                { id: 'profile-container', url: './profile.html' },
                { id: 'gauges-container', url: './gauges.html' },
                { id: 'current-container', url: './current.html' },
                { id: 'upcoming-container', url: './upcoming.html' },
                { id: 'gallery-container', url: './gallery.html' }
            ];

            // 3. Load files sequentially
            for (const file of files) {
                const res = await fetch(file.url);
                if (res.ok) {
                    document.getElementById(file.id).innerHTML = await res.text();
                } else {
                    console.error(`Error loading ${file.url}: ${res.status}`);
                }
            }

            // 4. Populate with the fetched data
            populateUI(data);

        } catch (error) {
            console.error("Dashboard Load Error:", error);
        }
    }

    function populateUI(data) {
        // Populate Profile
        const p = data.parent_data;
        if (p) {
            const nameEl = document.getElementById('parent-name');
            if (nameEl) nameEl.innerText = `${p.first_name || ''} ${p.last_name || ''}`;
            
            const emailEl = document.getElementById('parent-email');
            if (emailEl) emailEl.innerText = p.email || 'N/A';
            
            const phoneEl = document.getElementById('parent-phone');
            if (phoneEl) phoneEl.innerText = p.phone || 'N/A';
            
            const addressEl = document.getElementById('parent-address');
            if (addressEl) addressEl.innerText = p.address || 'N/A';
        }

        // Populate Students
        const container = document.getElementById('students-container');
        if (container && Array.isArray(data.student_data)) {
            container.innerHTML = '';
            data.student_data.forEach(student => {
                container.innerHTML += `<p><strong>Name:</strong> ${student.name || 'Unknown'}</p>`;
            });
        }
        
        // Add additional population logic for gauges, current, etc., here
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
</script>

</body>
</html>
