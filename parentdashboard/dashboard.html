<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard</title>
</head>
<body>

    <div class="dashboard-layout">
        <!-- Section Containers where modular UI files are injected -->
        <div id="profile-section"></div>
        <div id="gauges-section"></div>
        <div id="current-session-section"></div>
        <div id="upcoming-session-section"></div>
        <div id="gallery-section"></div>
    </div>

    <script>
        // Global variable to hold our live dashboard data package
        window.dashboardData = null;

        // Function to fetch and inject modular HTML files
        async function loadSection(sectionId, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error(`Could not load ${file}`);
                const html = await response.text();
                document.getElementById(sectionId).innerHTML = html;
            } catch (error) {
                console.error(error);
                document.getElementById(sectionId).innerHTML = "Error loading content.";
            }
        }

        // Initialize dashboard and fetch live data on page load
        document.addEventListener('DOMContentLoaded', async () => {
            // Check for the secure authToken and user_id saved during login
            const token = localStorage.getItem('authToken');
            const userId = localStorage.getItem('userId');

            if (!token || !userId) {
                console.log("Missing auth token or user ID. Redirecting to login...");
                window.location.href = 'login.html';
                return;
            }

            try {
                // Fetch the master data package passing the user_id in the query string
                const apiUrl = `https://x8ki-letl-twmt.n7.xano.io/api:dashboard_data/parents?user_id=${encodeURIComponent(userId)}`;
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server responded status ${response.status}: ${errorText}`);
                }

                // Store the parsed response object (parent, student, franchise data)
                window.dashboardData = await response.json();
                console.log("Dashboard data loaded successfully:", window.dashboardData);

                // Load the UI components sequentially
                await loadSection('profile-section', 'profile.html');
                await loadSection('gauges-section', 'gauges.html');
                await loadSection('current-session-section', 'current.html');
                await loadSection('upcoming-session-section', 'upcoming.html');
                await loadSection('gallery-section', 'gallery.html');

            } catch (error) {
                console.error("Dashboard initialization error:", error);
                // Clear invalid/expired session details and kick back to login
                localStorage.removeItem('authToken');
                localStorage.removeItem('userId');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
