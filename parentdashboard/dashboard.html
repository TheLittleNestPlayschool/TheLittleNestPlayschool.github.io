<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport settings prevent zooming and ensure proper scaling on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parent Dashboard</title>
    <style>
        /* Mobile Reset and Shell Styling */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; background-color: #f4f4f9; }
        
        #header { height: 60px; background: #fff; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #ddd; }
        #content-area { flex: 1; overflow-y: auto; padding: 15px; }
        
        #bottom-nav { height: 70px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; }
        button { padding: 10px; border: none; background: none; font-size: 14px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div id="app-container">
        <header id="header">
            <div id="branch-info">Parent Dashboard</div>
        </header>

        <main id="content-area">
            <!-- Modular content injected here -->
        </main>

        <nav id="bottom-nav">
            <button onclick="loadView('progress')">Progress</button>
            <button onclick="loadView('curriculum')">Curriculum</button>
            <button onclick="loadView('gallery')">Media</button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
