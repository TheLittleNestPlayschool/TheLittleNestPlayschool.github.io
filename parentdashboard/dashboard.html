<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parent Dashboard</title>
</head>
<body>

<div id="profile-target">Loading...</div>

<script>
    // 1. Logic: Get data, store in variables
    async function loadDashboard() {
        const userId = localStorage.getItem('userId');
        if (!userId) { window.location.href = './login.html'; return; }

        try {
            // Get the data
            const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV/parents?user_id=' + userId);
            const data = await response.json();

            // Load the UI template
            const htmlResponse = await fetch('./profile.html');
            document.getElementById('profile-target').innerHTML = await htmlResponse.text();

            // 2. Logic: Display the data
            const p = data.parent_data;
            document.getElementById('parent-name').innerText = `${p.first_name || ''} ${p.last_name || ''}`;
            document.getElementById('parent-email').innerText = p.email || 'N/A';
            document.getElementById('parent-phone').innerText = p.phone || 'N/A';
            document.getElementById('parent-address').innerText = p.address || 'N/A';

            const container = document.getElementById('students-container');
            data.student_data.forEach(student => {
                container.innerHTML += `<p><strong>Name:</strong> ${student.name}</p>`;
            });

        } catch (error) {
            console.error("Failed:", error);
        }
    }

    loadDashboard();
</script>

</body>
</html>
