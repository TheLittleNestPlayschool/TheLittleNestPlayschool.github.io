<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLNP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <div id="header">
            The Little Nest Playschool
        </div>

        <!-- Main Content Area (7/8ths Column) -->
        <div id="content-area">
            <div id="ribbon-container"></div>
            <div id="profile-container"></div>
            <div id="current-container"></div>
            <div id="upcoming-container"></div>
            <div id="gallery-container"></div>
        </div>

        <!-- Sidebar Right (1/8th Column) -->
        <div class="sidebar-right" id="gauges-container">
            <!-- Gauges module injected here -->
            
            <!-- New Button Row -->
            <div class="button-row">
                <button onclick="openModal('my-data-modal')">My Data</button>
                <button>Button One</button>
                <button>Button Two</button>
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div id="my-data-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('my-data-modal')">&times;</span>
            <div id="profile-content">
                <!-- profile.html will be loaded here -->
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
    <script>
        function toggleAccordion(element) {
            const content = element.nextElementSibling;
            content.style.display = (content.style.display === "block") ? "none" : "block";
        }

        // Modal logic fetching external HTML
        function openModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('show');

            if (id === 'my-data-modal') {
                fetch('profile.html')
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById('profile-content').innerHTML = data;
                    })
                    .catch(error => console.error('Error loading profile.html:', error));
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }
    </script>
</body>
</html>
