<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard</title>
</head>
<body>

    <div class="dashboard-layout">
        <div id="profile-section"></div>
        <div id="gauges-section"></div>
        <div id="current-session-section"></div>
        <div id="upcoming-session-section"></div>
        <div id="gallery-section"></div>
    </div>

    <script>
        window.dashboardData = null;

        async function loadSection(sectionId, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error(`Could not load ${file}`);
                const html = await response.text();
                document.getElementById(sectionId).innerHTML = html;
            } catch (error) {
                console.error(error);
                document.getElementById(sectionId).innerHTML = "Error loading content.";
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('authToken');
            const storedUserId = localStorage.getItem('userId');
            const userId = parseInt(storedUserId, 10);

            if (!userId || isNaN(userId)) {
                console.error("CRITICAL ERROR: 'userId' is null or missing.");
                return;
            }

            try {
                const apiUrl = `https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV/parents?user_id=${userId}`;
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error(`Server responded status ${response.status}`);

                window.dashboardData = await response.json();
                
                // Dispatch event so sub-pages know data is ready
                window.dispatchEvent(new CustomEvent('dashboardDataReady'));

                // Load UI components
                await loadSection('profile-section', 'profile.html');
                await loadSection('gauges-section', 'gauges.html');
                await loadSection('current-session-section', 'current.html');
                await loadSection('upcoming-session-section', 'upcoming.html');
                await loadSection('gallery-section', 'gallery.html');

            } catch (error) {
                console.error("Dashboard initialization error:", error);
            }
        });
    </script>
</body>
</html>
