<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard</title>
</head>
<body>

    <div class="dashboard-layout">
        <!-- Section Containers where modular files are injected -->
        <div id="profile-section"></div>
        <div id="gauges-section"></div>
        <div id="current-session-section"></div>
        <div id="upcoming-session-section"></div>
        <div id="gallery-section"></div>
    </div>

    <script>
        // Global variable to hold our live dashboard data package
        window.dashboardData = null;

        // Function to fetch and inject modular HTML files
        async function loadSection(sectionId, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error(`Could not load ${file}`);
                const html = await response.text();
                document.getElementById(sectionId).innerHTML = html;
            } catch (error) {
                console.error(error);
                document.getElementById(sectionId).innerHTML = "Error loading content.";
            }
        }

        // Initialize dashboard and fetch live data on page load
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                // Fetch the master data package from the updated Xano parents endpoint
                const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV/parents/', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch dashboard data');
                }

                // Store the parsed response object (parent, student, franchise data)
                window.dashboardData = await response.json();

                // Load the UI components sequentially
                await loadSection('profile-section', 'profile.html');
                await loadSection('gauges-section', 'gauges.html');
                await loadSection('current-session-section', 'current.html');
                await loadSection('upcoming-session-section', 'upcoming.html');
                await loadSection('gallery-section', 'gallery.html');

            } catch (error) {
                console.error("Dashboard initialization error:", error);
                // Clear token and redirect if the call fails or token expires
                localStorage.removeItem('authToken');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
