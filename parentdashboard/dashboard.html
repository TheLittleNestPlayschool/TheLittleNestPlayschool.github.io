<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLNP</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ensure font-family Gagalin is defined in your style.css */
        @font-face {
            font-family: 'Gagalin';
            src: url('fonts/gagalin.woff2') format('woff2'); /* Adjust path as needed */
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Header Banner -->
        <header class="main-header">
            <h1 style="font-family: 'Gagalin', sans-serif;">
                THE LITTLE NEST PLAYSCHOOL <span id="franchise-name-display"></span>
            </h1>
            <div class="stats-banner">
                <span class="banner-title">Little Nest Global Network</span>
                <span class="banner-stat">50,000+ Learning Hours & Counting!</span>
            </div>
            <!-- Student/Parent Info Banner -->
            <div id="student-info-banner" style="background: rgba(255,255,255,0.1); padding: 10px; margin-top: 10px; border-radius: 10px; text-align: center; color: white;">
                <span id="parent-name" style="font-weight: bold;"></span> &bullet; 
                <span id="student-name"></span>
            </div>
        </header>

        <!-- Main Content Area -->
        <div id="content-area">
            <div id="current-container"></div>
            <div id="upcoming-container"></div>
            <div id="gallery-container"></div>
        </div>

        <!-- Sidebar Right -->
        <div class="sidebar-right" id="gauges-container"></div>

        <!-- Footer -->
        <div id="footer-buttons">
            <button onclick="openModal('my-data-modal')">My Data</button>
            <button onclick="openModal('gallery-modal')">My Gallery</button>
            <button>Button Two</button>
        </div>
    </div>

    <!-- My Data Modal -->
    <div id="my-data-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('my-data-modal')">&times;</span>
            <div id="profile-content"></div>
        </div>
    </div>

    <!-- My Gallery Modal -->
    <div id="gallery-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('gallery-modal')">&times;</span>
            <div id="gallery-content"></div>
        </div>
    </div>

    <script src="./app.js"></script>
    <script>
        function toggleAccordion(element) {
            const content = element.nextElementSibling;
            content.style.display = (content.style.display === "block") ? "none" : "block";
        }

        function openModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('show');

            if (id === 'my-data-modal') {
                fetch('profile.html')
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById('profile-content').innerHTML = data;
                        if(window.populateUI) populateUI(window.latestDashboardData);
                    })
                    .catch(error => console.error('Error loading profile.html:', error));
            } else if (id === 'gallery-modal') {
                fetch('gallery.html')
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById('gallery-content').innerHTML = data;
                    })
                    .catch(error => console.error('Error loading gallery.html:', error));
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }
    </script>
</body>
</html>
