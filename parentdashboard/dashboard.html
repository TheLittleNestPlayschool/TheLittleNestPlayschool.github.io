<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard</title>
</head>
<body>

    <div class="dashboard-layout">
        <div id="profile-section"></div>
        <div id="gauges-section"></div>
        <div id="current-session-section"></div>
        <div id="upcoming-session-section"></div>
        <div id="gallery-section"></div>
    </div>

    <script>
        window.dashboardData = null;

        async function loadSection(sectionId, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error(`Could not load ${file}`);
                const html = await response.text();
                document.getElementById(sectionId).innerHTML = html;
            } catch (error) {
                console.error(error);
                document.getElementById(sectionId).innerHTML = "Error loading content.";
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('authToken');
            if (!token) {
                console.log("No token found in localStorage. Redirecting to login...");
                window.location.href = 'login.html';
                return;
            }

            try {
                // Ensure the URL perfectly matches your Xano instance group route with the trailing slash
                const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV/parents/', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server responded status ${response.status}: ${errorText}`);
                }

                window.dashboardData = await response.json();
                console.log("Dashboard data loaded successfully:", window.dashboardData);

                await loadSection('profile-section', 'profile.html');
                await loadSection('gauges-section', 'gauges.html');
                await loadSection('current-session-section', 'current.html');
                await loadSection('upcoming-session-section', 'upcoming.html');
                await loadSection('gallery-section', 'gallery.html');

            } catch (error) {
                console.error("Dashboard initialization failed:", error);
                // Commenting out the redirect temporarily so you can see the error in your browser console log
                // localStorage.removeItem('authToken');
                // window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
