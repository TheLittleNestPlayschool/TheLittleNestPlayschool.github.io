<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <div id="header">The Little Nest</div>
        <div id="content-area">
            <div id="profile-container"></div>
            <div id="gauges-container"></div>
            <div id="current-container"></div>
            <div id="upcoming-container"></div>
            <div id="gallery-container"></div>
        </div>
    </div>

<script>
    async function loadDashboard() {
        const userId = localStorage.getItem('userId');
        if (!userId) { window.location.href = './login.html'; return; }

        try {
            const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV/parents?user_id=' + userId);
            const data = await response.json();

            const files = [
                { id: 'profile-container', url: './profile.html' },
                { id: 'gauges-container', url: './gauges.html' },
                { id: 'current-container', url: './current.html' },
                { id: 'upcoming-container', url: './upcoming.html' },
                { id: 'gallery-container', url: './gallery.html' }
            ];

            await Promise.all(files.map(async (file) => {
                const res = await fetch(file.url);
                if (res.ok) document.getElementById(file.id).innerHTML = await res.text();
            }));

            // Populate all data once components are injected
            populateUI(data);

            // Fetch and populate session data
            if (data.franchise_data?.session_num) {
                loadSession(data.franchise_data.session_num);
            }
        } catch (error) {
            console.error("Dashboard Load Error:", error);
        }
    }

    async function loadSession(sessionId) {
        try {
            const res = await fetch(`https://x8ki-letl-twmt.n7.xano.io/api:joVisOhQ/session_details/${sessionId}`);
            const session = await res.json();
            if (session) {
                document.getElementById('session-num').innerText = session.session_num || '#';
                document.getElementById('session-plan-name').innerText = session.session_plan_name || 'N/A';
                document.getElementById('theme-color').innerText = session.theme_color || 'N/A';
                document.getElementById('map-icon-url').innerText = session.map_icon_url || 'N/A';
                document.getElementById('session-description').innerText = session.session_description || 'N/A';
                document.getElementById('lesson-1-title').innerText = session.lesson_1_title || 'N/A';
                document.getElementById('lesson-1-cat').innerText = session.lesson_1_cat || 'N/A';
                document.getElementById('lesson-2-title').innerText = session.lesson_2_title || 'N/A';
                document.getElementById('lesson-2-cat').innerText = session.lesson_2_cat || 'N/A';
                document.getElementById('manner-topic').innerText = session.manner_topic || 'N/A';
                document.getElementById('obj-1').innerText = session.obj_text_1 || 'N/A';
                document.getElementById('obj-2').innerText = session.obj_text_2 || 'N/A';
                document.getElementById('obj-3').innerText = session.obj_text_3 || 'N/A';
                document.getElementById('physical-activity').innerText = session.physical_activity || 'N/A';
                document.getElementById('home-time-activity').innerText = session.home_time_activity || 'N/A';
                document.getElementById('worksheet-plan-name').innerText = session.worksheet_plan_name || 'N/A';
                document.getElementById('full-lesson-plan').innerText = session.full_lesson_plan || 'N/A';
            }
        } catch (err) { console.error("Session load error:", err); }
    }

    function populateUI(data) {
        const p = data.parent_data;
        if (p) {
            document.getElementById('parent-name').innerText = `${p.first_name || ''} ${p.last_name || ''}`;
            document.getElementById('parent-email').innerText = p.email || 'N/A';
            document.getElementById('parent-phone').innerText = p.phone || 'N/A';
            document.getElementById('parent-address').innerText = p.address || 'N/A';
        }
        if (data.student_data?.[0]) document.getElementById('student-name').innerText = data.student_data[0].name || 'N/A';
        if (data.franchise_data) document.getElementById('franchise-location').innerText = data.franchise_data.name || 'N/A';
        
        const progress = data.student_progress || {};
        ['reading', 'writing', 'alphabet', 'numbers', 'manners'].forEach(type => {
            const el = document.getElementById(`gauge-${type}`);
            if (el) el.style.setProperty('--progress', `${progress[type] || 0}%`);
        });
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
