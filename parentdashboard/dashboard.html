<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLNP</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Integrating Grid Layout for the modular architecture */
        #app-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            grid-template-rows: auto 1fr;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #header { 
            grid-column: 1 / 3; 
        }

        #content-area {
            grid-column: 1 / 2;
            overflow-y: auto;
            padding: 20px;
        }

        .sidebar-right {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            background: #f8f7ff;
            padding: 20px;
            border-left: 1px solid #ddd;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <div id="header">
            The Little Nest Playschool 
        </div>

        <!-- Main Content Area -->
        <div id="content-area">
            <div id="ribbon-container"></div>
            <div id="profile-container"></div>
            <div id="current-container"></div>
            <div id="upcoming-container"></div>
            <div id="gallery-container"></div>
        </div>

        <!-- Sidebar Right -->
        <div class="sidebar-right" id="gauges-container">
            <!-- Gauges module will be injected here -->
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Ensure the accordion toggle function is globally accessible
        function toggleAccordion(element) {
            const content = element.nextElementSibling;
            content.style.display = (content.style.display === "block") ? "none" : "block";
        }
    </script>
</body>
</html>
