<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NestMind | Franchise Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar { width: 260px; height: 100vh; position: fixed; background: #0f172a; border-right: 1px solid #1e293b; }
        .main-content { margin-left: 260px; min-height: 100vh; background: #f8fafc; }
        .active-tab { background: #0891b2 !important; color: white !important; }
        .hidden { display: none; }
        .profile-label { font-size: 0.55rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .table-head { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; background: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800 font-sans">

    <div class="sidebar p-6 flex flex-col text-slate-400">
        <h1 class="text-2xl font-black italic text-cyan-400 mb-10 tracking-tighter">NestMind</h1>
        <nav class="flex-1 space-y-1">
            <button onclick="switchTab('stats')" id="btn-stats" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 font-bold transition-all">📊 Performance</button>
            <button onclick="switchTab('enrollment')" id="btn-enrollment" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 font-bold transition-all">✨ New Enrollment</button>
            <div class="pt-4 pb-2 px-3 text-[10px] font-black uppercase text-slate-500 tracking-widest">Management</div>
            <button onclick="switchTab('parents')" id="btn-parents" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 font-bold transition-all">👪 Parents</button>
            <button onclick="switchTab('students')" id="btn-students" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 font-bold transition-all">🎒 Students</button>
            <button onclick="switchTab('staff')" id="btn-staff" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 font-bold transition-all">👩‍🏫 Teachers</button>
            <button onclick="switchTab('sessions')" id="btn-sessions" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 font-bold transition-all">🗓️ Sessions</button>
        </nav>
    </div>

    <div class="main-content">
        
        <header class="bg-white border-b p-4 px-8 flex justify-between items-center sticky top-0 z-30 shadow-sm">
            <div>
                <h2 id="view-title" class="text-sm font-black uppercase tracking-widest text-cyan-600">Performance Dashboard</h2>
            </div>
            <div class="flex items-center space-x-4 bg-slate-50 p-2 rounded-lg border border-slate-200">
                <label class="text-[10px] font-black text-slate-400 uppercase">Viewing Franchise:</label>
                <select id="global-franchise-select" onchange="loadFranchiseData()" class="bg-transparent font-bold text-sm text-slate-700 outline-none cursor-pointer">
                    </select>
            </div>
        </header>

        <div class="p-8">
            
            <div id="tab-stats" class="tab-content">
                <div class="grid grid-cols-4 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                        <p class="profile-label">Current Enrollment</p>
                        <p id="stat-total" class="text-4xl font-black text-slate-800">—</p>
                    </div>
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                        <p class="profile-label">24h Growth</p>
                        <p id="stat-change" class="text-4xl font-black text-emerald-500">—</p>
                    </div>
                </div>
            </div>

            <div id="tab-parents" class="tab-content hidden">
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="table-head">
                            <tr><th class="p-4">Name</th><th class="p-4">Phone</th><th class="p-4">Email</th><th class="p-4">Status</th></tr>
                        </thead>
                        <tbody id="parent-list" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-students" class="tab-content hidden">
                <div id="student-grid" class="grid grid-cols-3 gap-6">
                    </div>
            </div>

            <div id="tab-sessions" class="tab-content hidden">
                <div id="session-list" class="space-y-4">
                    </div>
            </div>

            <div id="tab-enrollment" class="tab-content hidden">
                <div class="max-w-3xl mx-auto bg-white border border-slate-200 p-10 rounded-2xl shadow-xl">
                    <h3 class="text-2xl font-black mb-6">New Enrollment Process</h3>
                    <p class="text-slate-500 text-sm mb-10">Select the master franchise at the top to filter available parents and students for this workflow.</p>
                    </div>
            </div>

            <div id="tab-staff" class="tab-content hidden">
                <div id="teacher-grid" class="grid grid-cols-3 gap-6"></div>
            </div>

        </div>
    </div>

    <script>
        // API ENDPOINTS
        const API = {
            FRANCHISE: "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise",
            SNAPSHOTS: "https://x8ki-letl-twmt.n7.xano.io/api:J5YZbOPl/dashboard_snapshots",
            TEACHERS: "https://x8ki-letl-twmt.n7.xano.io/api:xLIeVP2e/teacher",
            PARENTS: "https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/parent",
            STUDENTS: "https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student",
            SESSIONS: "https://x8ki-letl-twmt.n7.xano.io/api:mUsV7Zqx/session"
        };

        // Initialize App
        async function init() {
            const res = await fetch(API.FRANCHISE);
            const franchises = await res.json();
            const select = document.getElementById('global-franchise-select');
            select.innerHTML = franchises.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
            
            // Set first one as default and load
            loadFranchiseData();
            switchTab('stats');
        }

        async function loadFranchiseData() {
            const franId = document.getElementById('global-franchise-select').value;
            
            // 1. Load Snapshots
            const snapRes = await fetch(API.SNAPSHOTS);
            const snaps = await snapRes.json();
            const mySnap = snaps.reverse().find(s => s.franchise_id == franId);
            document.getElementById('stat-total').innerText = mySnap ? mySnap.total_enrollment : '0';
            document.getElementById('stat-change').innerText = mySnap ? (mySnap.todays_change_enrollment >= 0 ? '+' : '') + mySnap.todays_change_enrollment : '0';

            // 2. Load Parents
            const pRes = await fetch(API.PARENTS);
            const parents = await pRes.json();
            const myParents = parents.filter(p => p.franchise_id == franId);
            document.getElementById('parent-list').innerHTML = myParents.map(p => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 font-bold text-slate-700">${p.first_name} ${p.last_name}</td>
                    <td class="p-4 text-slate-500">${p.phone || '---'}</td>
                    <td class="p-4 text-slate-500">${p.email || '---'}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded-full text-[10px] font-bold ${p.is_active ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'} uppercase">${p.is_active ? 'Active' : 'Inactive'}</span></td>
                </tr>
            `).join('');

            // 3. Load Teachers
            const tRes = await fetch(API.TEACHERS);
            const teachers = await tRes.json();
            document.getElementById('teacher-grid').innerHTML = teachers.filter(t => t.franchise_id == franId).map(t => `
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <p class="profile-label mb-1">Teacher</p>
                    <h4 class="font-bold text-lg">${t.first_name} ${t.last_name}</h4>
                    <p class="text-xs text-slate-400 mt-2">📞 ${t.phone || 'No Phone'}</p>
                </div>
            `).join('');

            // 4. Load Students
            const sRes = await fetch(API.STUDENTS);
            const students = await sRes.json();
            document.getElementById('student-grid').innerHTML = students.filter(s => s.franchise_id == franId).map(s => `
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm border-t-4 border-t-cyan-500">
                    <h4 class="font-black text-slate-700">${s.name}</h4>
                    <p class="text-xs text-slate-400 mt-1 uppercase font-bold">${s.gender || '---'}</p>
                </div>
            `).join('');

            // 5. Load Sessions
            const sessRes = await fetch(API.SESSIONS);
            const sessions = await sessRes.json();
            document.getElementById('session-list').innerHTML = sessions.filter(s => s.franchise_id == franId).map(s => `
                <div class="bg-white p-4 rounded-lg border border-slate-200 flex justify-between items-center">
                    <div>
                        <h5 class="font-bold text-slate-700">${s.name}</h5>
                        <p class="text-xs text-slate-400">ID: ${s.id}</p>
                    </div>
                    <span class="text-xs font-black px-3 py-1 bg-slate-100 rounded text-slate-600 uppercase">${s.is_active ? 'Active' : 'Inactive'}</span>
                </div>
            `).join('');
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active-tab'));
            
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('active-tab');
            document.getElementById('view-title').innerText = tabId.replace('-', ' ') + " Management";
        }

        window.onload = init;
    </script>
</body>
</html>
