<div class="max-w-7xl mx-auto space-y-10">
    
    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between gap-6">
        <div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight">Pixify! AI Intelligence</h2>
            <div class="flex gap-3 mt-1">
                <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded font-bold uppercase tracking-wider">Process: 3 Credits</span>
                <span class="text-[10px] bg-[#00d1b2]/10 text-[#00d1b2] px-2 py-1 rounded font-bold uppercase tracking-wider">Download: 6 Credits</span>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="document.getElementById('fileInput').click()" class="bg-slate-100 text-slate-700 px-5 py-3 rounded-xl text-sm font-bold hover:bg-slate-200 transition-colors">
                ➕ Add Photos
            </button>
            
            <button id="go-button" onclick="startUnifiedProcess()" class="hidden bg-[#00d1b2] text-white px-8 py-3 rounded-xl text-sm font-black uppercase tracking-widest shadow-lg hover:scale-105 transition-all">
                🚀 Pixify! [0]
            </button>
        </div>

        <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="handleSelection(event)">
    </div>

    <div class="space-y-4">
        <h4 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Active Workspace</h4>
        <div id="unified-container" class="space-y-4">
            </div>
    </div>
</div>

<script>
    const PIXIFY_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/pixify";
    const DOWNLOAD_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/pixify_download"; 
    const fid = localStorage.getItem('locked_franchise_id');
    
    let fileQueue = []; 

    /**
     * Handles file selection and adds them to the visual queue immediately.
     */
    function handleSelection(event) {
        const files = Array.from(event.target.files);
        if (!files.length) return;

        files.forEach(file => {
            const fileId = 'pix-' + Math.random().toString(36).substr(2, 9);
            const fileData = { id: fileId, file: file };
            
            fileQueue.push(fileData);
            addQueuedCardToWorkspace(fileData);
        });
        
        updateGoButton();
        event.target.value = ''; 
    }

    /**
     * Creates the initial row in the workspace.
     */
    function addQueuedCardToWorkspace(fileData) {
        const workspace = document.getElementById('unified-container');
        const cardId = `row-${fileData.id}`;
        const card = document.createElement('div');
        const originalUrl = URL.createObjectURL(fileData.file);

        card.id = cardId;
        card.className = "flex items-center gap-6 bg-white border border-slate-100 rounded-2xl p-4 shadow-sm animate-fadeInLeft relative";
        card.innerHTML = `
            <div class="w-40 aspect-video bg-slate-50 rounded-lg overflow-hidden border border-slate-100 relative flex-shrink-0">
                <img src="${originalUrl}" class="w-full h-full object-cover">
                <div class="absolute top-1 left-1 bg-black/40 text-[8px] text-white px-1.5 py-0.5 rounded uppercase font-bold">Original</div>
            </div>

            <div id="${cardId}-right" class="w-40 aspect-video bg-slate-50 rounded-lg flex items-center justify-center border-2 border-dashed border-slate-100 relative flex-shrink-0">
                <span class="text-[8px] font-black text-slate-300 uppercase">Ready</span>
            </div>
            
            <div id="${cardId}-meta" class="flex-grow">
                <p class="text-[11px] font-bold text-slate-700 truncate max-w-[200px]">${fileData.file.name}</p>
                <p class="text-[9px] text-[#00d1b2] font-black uppercase tracking-tight">Cost: 3 Credits to Pixify</p>
            </div>

            <div id="${cardId}-actions" class="flex items-center gap-4 border-l border-slate-100 pl-6">
                <button onclick="removeFromWorkspace('${fileData.id}')" class="bg-slate-50 hover:bg-red-50 text-slate-400 hover:text-red-600 text-[10px] font-bold px-3 py-1.5 rounded-lg transition-colors">
                    Del
                </button>
            </div>
        `;
        workspace.prepend(card);
    }

    function removeFromWorkspace(fileId) {
        fileQueue = fileQueue.filter(item => item.id !== fileId);
        const el = document.getElementById(`row-${fileId}`);
        if(el) el.remove();
        updateGoButton();
    }

    function updateGoButton() {
        const btn = document.getElementById('go-button');
        btn.innerText = `🚀 Pixify! [${fileQueue.length}]`;
        btn.classList.toggle('hidden', fileQueue.length === 0);
    }

    /**
     * Loops through the queue and triggers the Xano AI function.
     */
    async function startUnifiedProcess() {
        const activeBatch = [...fileQueue];
        fileQueue = []; // Clear the visual queue to prevent double-processing
        updateGoButton();

        for (let item of activeBatch) {
            const cardId = `row-${item.id}`;
            transformCardToLoading(cardId);
            
            const formData = new FormData();
            formData.append('image', item.file);
            formData.append('franchise_id', fid);
            // In Xano, your 'pixify' function should now deduct 3 credits upon success

            try {
                const res = await fetch(PIXIFY_API, { method: 'POST', body: formData });
                const data = await res.json();
                finalizeCardState(cardId, data.pixar_url);
            } catch (e) {
                document.getElementById(`${cardId}-right`).innerHTML = `<span class="text-[8px] text-red-500 font-bold">Failed</span>`;
            }
        }
    }

    function transformCardToLoading(cardId) {
        const rightBox = document.getElementById(`${cardId}-right`);
        const metaBox = document.getElementById(`${cardId}-meta`);
        const actionsBox = document.getElementById(`${cardId}-actions`);
        
        rightBox.className = "w-40 aspect-video bg-slate-100 rounded-lg overflow-hidden flex items-center justify-center relative border-2 border-dashed border-slate-200";
        rightBox.innerHTML = `<div class="animate-spin h-4 w-4 border-2 border-[#00d1b2] border-t-transparent rounded-full"></div>`;
        
        metaBox.querySelector('p:last-child').innerText = "Deducting 3 Credits...";
        metaBox.querySelector('p:last-child').className = "text-[9px] text-orange-400 font-bold uppercase tracking-tight animate-pulse";
        
        actionsBox.innerHTML = ''; // Lock actions during processing
    }

    function finalizeCardState(cardId, pixarUrl) {
        const rightBox = document.getElementById(`${cardId}-right`);
        const metaBox = document.getElementById(`${cardId}-meta`);
        const actionsBox = document.getElementById(`${cardId}-actions`);

        // Show blurred result to protect the "product" until paid
        rightBox.innerHTML = `
            <img src="${pixarUrl}" class="w-full h-full object-cover blur-md opacity-40 animate-fadeIn">
            <div class="absolute inset-0 flex items-center justify-center">
                <span class="bg-black/60 text-white text-[7px] px-2 py-1 rounded-full font-bold uppercase tracking-widest shadow-xl">Preview</span>
            </div>
        `;
        rightBox.className = "w-40 aspect-video bg-slate-100 rounded-lg overflow-hidden relative";

        metaBox.innerHTML = `
            <p class="text-[11px] font-bold text-slate-700 truncate">Identity Protected</p>
            <p class="text-[9px] text-orange-500 font-black uppercase tracking-tight">Unlock for 6 Credits</p>
        `;

        actionsBox.innerHTML = `
            <button onclick="purchaseDownload('${cardId}', '${pixarUrl}')" class="bg-[#0f172a] text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest hover:scale-105 transition-all">
                Download
            </button>
            <button onclick="document.getElementById('${cardId}').remove()" class="text-slate-300 hover:text-red-500 transition-colors">
                <span class="text-[10px] font-bold px-2">Del</span>
            </button>
        `;
    }

    /**
     * Handles the 6-credit purchase and final file download.
     */
    async function purchaseDownload(cardId, url) {
        const btn = event.currentTarget;
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            const response = await fetch(DOWNLOAD_API, {
                method: 'POST',
                body: JSON.stringify({ franchise_id: fid, image_url: url }),
                headers: { 'Content-Type': 'application/json' }
            });

            if (response.ok) {
                // Trigger Download
                const link = document.createElement('a');
                link.href = url;
                link.download = `Pixify_${Date.now()}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // Reveal image in UI
                const rightBox = document.getElementById(`${cardId}-right`);
                rightBox.querySelector('img').classList.remove('blur-md', 'opacity-40');
                rightBox.querySelector('div').innerHTML = `<span class="bg-[#00d1b2] text-white text-[7px] px-2 py-1 rounded-full font-bold uppercase tracking-widest">Unlocked</span>`;
                
                btn.innerText = "Downloaded";
                btn.className = "bg-slate-100 text-slate-400 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest cursor-default";
                btn.onclick = null;
            } else {
                alert("Insufficient Credits. Please top up your dashboard.");
                btn.disabled = false;
                btn.innerText = "Download";
            }
        } catch (e) {
            console.error(e);
            btn.disabled = false;
            btn.innerText = "Download";
        }
    }
</script>

<style>
    @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fadeInLeft { animation: fadeInLeft 0.3s ease-out forwards; }
    .animate-fadeIn { animation: fadeIn 0.6s ease-in forwards; }
</style>
