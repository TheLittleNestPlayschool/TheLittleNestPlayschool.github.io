<div class="max-w-6xl mx-auto space-y-8">
    <div class="flex justify-between items-end border-b border-slate-200 pb-6">
        <div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight">Pixify! AI Intelligence</h2>
            <p class="text-slate-500 font-medium">Transform classroom photos into privacy-safe Pixar art.</p>
        </div>
        <div class="text-right">
            <span class="bg-[#00d1b2]/10 text-[#00d1b2] px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest">
                Rate: ₱8.00 / Image
            </span>
        </div>
    </div>

    <div id="upload-container" class="relative group border-2 border-dashed border-slate-300 rounded-3xl p-12 transition-all hover:border-[#00d1b2] hover:bg-[#00d1b2]/5 flex flex-col items-center justify-center text-center cursor-pointer" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="handleSelection(event)">
        <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
            <span class="text-3xl">✨</span>
        </div>
        <h3 class="text-lg font-bold text-slate-700">Drop classroom photos here</h3>
        <p class="text-slate-400 text-sm">or click to browse your device (Supports multiple images)</p>
    </div>

    <div id="processing-area" class="hidden space-y-4">
        <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">Active Processing</h4>
        <div id="queue-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <div class="space-y-4">
        <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">Processed Gallery</h4>
        <div id="history-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>
</div>

<script>
    // Configuration
    const PIXIFY_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/pixify"; // Update to your actual endpoint
    const fid = localStorage.getItem('locked_franchise_id');

    async function handleSelection(event) {
        const files = event.target.files;
        if (!files.length) return;

        document.getElementById('processing-area').classList.remove('hidden');
        
        for (let file of files) {
            processImage(file);
        }
    }

    async function processImage(file) {
        const queueGrid = document.getElementById('queue-grid');
        const tempId = 'tmp-' + Math.random().toString(36).substr(2, 9);

        // 1. Create Loading Placeholder
        const placeholder = document.createElement('div');
        placeholder.id = tempId;
        placeholder.className = "bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm animate-pulse";
        placeholder.innerHTML = `
            <div class="aspect-video bg-slate-100 flex items-center justify-center">
                <div class="text-center">
                    <div class="w-8 h-8 border-4 border-[#00d1b2] border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">AI Rendering...</p>
                </div>
            </div>
        `;
        queueGrid.prepend(placeholder);

        // 2. Prepare Data
        const formData = new FormData();
        formData.append('image', file);
        formData.append('franchise_id', fid);

        try {
            // 3. Call Xano
            const res = await fetch(PIXIFY_API, { method: 'POST', body: formData });
            const data = await res.json();

            // 4. Move to Processed Gallery
            placeholder.remove();
            addToGallery(data.original_url, data.pixar_url);
        } catch (e) {
            console.error("Pixify Failed", e);
            placeholder.innerHTML = `<div class="p-4 text-red-500 text-xs font-bold">Error: ${e.message}</div>`;
        }
    }

    function addToGallery(original, pixar) {
        const gallery = document.getElementById('history-grid');
        const card = document.createElement('div');
        card.className = "group bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all";
        card.innerHTML = `
            <div class="relative aspect-video overflow-hidden bg-slate-900">
                <img src="${original}" class="absolute inset-0 w-full h-full object-cover opacity-0 group-hover:opacity-40 transition-opacity duration-300">
                <img src="${pixar}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                
                <div class="absolute bottom-3 left-3">
                    <span class="bg-black/50 backdrop-blur-md text-white text-[10px] px-2 py-1 rounded-md font-bold uppercase tracking-widest">Pixar AI Safe</span>
                </div>
            </div>
            <div class="p-4 flex justify-between items-center">
                <div class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">Classroom Identity Protected</div>
                <a href="${pixar}" download target="_blank" class="text-xs font-bold text-[#00d1b2] hover:underline">Download HD</a>
            </div>
        `;
        gallery.prepend(card);
    }
</script>

<style>
    /* Smooth transition for the gallery cards */
    #history-grid > div {
        animation: slideUp 0.4s ease-out forwards;
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
