<script src="api_config.js"></script>

<div class="max-w-7xl mx-auto space-y-10">
    
    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between gap-6">
        <div class="flex items-center gap-8">
            <div>
                <h2 class="text-3xl font-black text-slate-800 tracking-tight">Pixify! AI</h2>
                <div class="flex gap-3 mt-1.5">
                    <span class="text-[10px] bg-slate-100 text-slate-500 px-2.5 py-1.5 rounded-full font-extrabold uppercase tracking-wider">Render: 3 Credits</span>
                    <span class="text-[10px] bg-[#00d1b2]/10 text-[#00d1b2] px-2.5 py-1.5 rounded-full font-extrabold uppercase tracking-wider">Download: 6 Credits</span>
                </div>
            </div>
 
            <nav class="flex bg-slate-50 p-1.5 rounded-2xl border border-slate-100">
                <button id="nav-create" onclick="switchTab('create')" class="px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all bg-white shadow-sm text-slate-800">Create New</button>
                <button id="nav-saved" onclick="switchTab('saved')" class="px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-600">Pixify Saved!</button>
            </nav>
        </div>
 
        <div id="global-progress-container" class="hidden flex-grow max-w-xs mx-8 text-center">
            <div id="global-progress-text" class="text-[9px] font-black text-[#00d1b2] uppercase mb-2">Processing Batch...</div>
            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                <div id="global-progress-bar" class="bg-[#00d1b2] h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
        
        <div id="create-controls" class="flex items-center gap-4">
            <button id="add-photos-btn" onclick="document.getElementById('fileInput').click()" class="bg-slate-100 text-slate-700 px-5 py-3 rounded-xl text-sm font-bold hover:bg-slate-200 transition-colors flex items-center gap-2">
                ➕ Add Photos
           </button>
            <button id="go-button" onclick="startUnifiedProcess()" class="hidden bg-[#00d1b2] text-white px-8 py-3 rounded-xl text-sm font-black uppercase tracking-widest hover:scale-105 transition-all">
                🚀 Pixify! [0]
           </button>
        </div>
 
        <div id="saved-controls" class="hidden">
            <button id="batch-download-btn" onclick="showDownloadModal()" class="bg-[#0f172a] text-white px-8 py-3 rounded-xl text-sm font-black uppercase tracking-widest hover:scale-105 transition-all">
                📥 Download Selected
           </button>
        </div>
 
        <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="handleSelection(event)">
    </div>
 
    <div class="space-y-4">
        <div class="flex justify-between items-center px-2">
            <h4 id="workspace-title" class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Active Workspace (Max 10)</h4>
            <div id="selection-counter" class="hidden text-[10px] font-bold text-[#00d1b2] uppercase tracking-wider">0 Selected</div>
        </div>
        <div id="unified-container" class="space-y-4">
          </div>
    </div>
</div>
 
<div id="download-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div id="modal-content-wrapper" class="bg-white rounded-3xl p-8 max-w-lg w-full shadow-2xl border border-slate-100 animate-fadeIn">
        <div id="modal-initial-state">
            <h3 class="text-2xl font-black text-slate-800 mb-1.5">Confirm Download</h3>
            <p class="text-slate-500 text-sm mb-6">These items will be added to your monthly bill.</p>
            
            <div id="modal-image-queue" class="flex items-center gap-3 overflow-x-auto pb-4 mb-8 border-b border-slate-100 scroll-smooth">
           </div>
    
            <div class="bg-slate-50 rounded-2xl p-5 space-y-3 mb-8">
               <div class="flex justify-between text-xs font-bold text-slate-400 uppercase tracking-tighter">
               <span>Items to Unlock</span>
               <span id="modal-count">0 Images</span>
           </div>
               <div class="flex justify-between text-xl font-black text-slate-900 border-t border-slate-200 pt-3.5">
               <span>Total Billing</span>
               <span id="modal-cost">0 Credits</span>
           </div>
           </div>
    
            <div class="flex gap-4">
               <button id="modal-cancel-btn" onclick="closeDownloadModal()" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">Cancel</button>
               <button id="modal-confirm-btn" onclick="executeBatchDownload()" class="flex-1 bg-[#00d1b2] text-white py-3 rounded-xl font-black uppercase tracking-widest shadow-lg shadow-[#00d1b2]/20">Confirm & Save</button>
           </div>
        </div>
 
        <div id="modal-finished-state" class="hidden text-center py-10">
            <div class="w-20 h-20 bg-[#00d1b2]/10 text-[#00d1b2] rounded-full flex items-center justify-center mx-auto mb-6">
               <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                   <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
               </svg>
           </div>
            <h3 class="text-3xl font-black text-slate-800 mb-2">Downloads Complete!</h3>
            <p class="text-slate-500 text-sm mb-8">All selected images have been saved to your device.</p>
            <button onclick="closeDownloadModal()" class="w-full bg-[#0f172a] text-white py-4 rounded-xl font-black uppercase tracking-widest hover:scale-[1.02] transition-all">OK</button>
        </div>
    </div>
</div>
 
<script>
    const fid = localStorage.getItem('locked_franchise_id');
    let fileQueue = []; 
    let processedResults = [];
    let currentTab = 'create';
 
    function switchTab(tab) {
        currentTab = tab;
        const createBtn = document.getElementById('nav-create');
        const savedBtn = document.getElementById('nav-saved');
        const createControls = document.getElementById('create-controls');
        const savedControls = document.getElementById('saved-controls');
        const container = document.getElementById('unified-container');
 
        container.innerHTML = '';
        processedResults = [];
        
        if (tab === 'create') {
          createBtn.className = "px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all bg-white shadow-sm text-slate-800";
          savedBtn.className = "px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-600";
          createControls.classList.remove('hidden');
          savedControls.classList.add('hidden');
          document.getElementById('workspace-title').innerText = "Active Workspace (Max 10)";
        } else {
          savedBtn.className = "px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all bg-white shadow-sm text-slate-800";
          createBtn.className = "px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest transition-all text-slate-400 hover:text-slate-600";
          createControls.classList.add('hidden');
          savedControls.classList.remove('hidden');
          document.getElementById('workspace-title').innerText = "Previously Created (Identity Locked)";
          loadSavedImages();
        }
       updateBatchUI();
    }
 
    async function loadSavedImages() {
        const container = document.getElementById('unified-container');
       container.innerHTML = '<div class="text-center p-10 text-slate-400 font-bold animate-pulse">Loading your vault...</div>';
        
        try {
            const res = await fetch(`${NEST_ENDPOINTS.pixify_history.list}?franchise_id=${fid}&is_downloaded=false`);
            const data = await res.json();
           container.innerHTML = '';
            
          if(data.length === 0) {
              container.innerHTML = '<div class="text-center p-20 text-slate-300 font-bold uppercase tracking-widest text-xs">No pending downloads found.</div>';
               return;
            }
 
          data.forEach(item => {
              processedResults.push({ id: item.id, url: item.pixar_url, name: "Saved Image", originalUrl: item.original_url });
              finalizeCardPreview(`row-${item.id}`, item.pixar_url, item.id, item.original_url);
            });
        } catch (e) { console.error(e); }
    }
 
    function handleSelection(event) {
        const files = Array.from(event.target.files);
        const addBtn = document.getElementById('add-photos-btn');
       addBtn.disabled = true;
        const currentCount = document.querySelectorAll('#unified-container > div').length;
        const availableSlots = 10 - currentCount;
        const toProcess = files.slice(0, availableSlots);
 
      toProcess.forEach(file => {
            const fileId = 'pix-' + Math.random().toString(36).substr(2, 9);
          fileQueue.push({ id: fileId, file: file });
          addQueuedCard({ id: fileId, file: file });
        });
        
       updateGoButton();
      event.target.value = '';
        setTimeout(() => { addBtn.disabled = false; }, 500);
    }
 
    function addQueuedCard(fileData) {
        const workspace = document.getElementById('unified-container');
        const cardId = `row-${fileData.id}`;
        const card = document.createElement('div');
        const originalUrl = URL.createObjectURL(fileData.file);
 
        card.id = cardId;
        card.className = "flex items-center gap-6 bg-white border border-slate-100 rounded-2xl p-4 shadow-sm animate-fadeInLeft relative";
        card.innerHTML = `
            <div class="w-40 h-24 flex-shrink-0 bg-slate-50 rounded-lg overflow-hidden border border-slate-100 relative">
               <img src="${originalUrl}" class="w-full h-full object-cover">
               <div class="absolute top-2 left-2 bg-black/40 text-[7px] text-white px-1.5 py-0.5 rounded-md font-black uppercase">Original</div>
          </div>
            <div id="${cardId}-right" class="w-40 h-24 flex-shrink-0 bg-slate-50 rounded-lg flex items-center justify-center border-2 border-dashed border-slate-200 relative overflow-hidden">
              <span class="text-[8px] font-black text-slate-300 uppercase z-10">Awaiting Render</span>
               <div id="${cardId}-progress-bar" class="absolute bottom-0 left-0 h-1 bg-[#00d1b2] transition-all duration-500" style="width: 0%"></div>
          </div>
            <div id="${cardId}-meta" class="flex-grow">
                <p class="text-[11px] font-bold text-slate-700 truncate max-w-[200px]">${fileData.file.name}</p>
                <p id="${cardId}-status-text" class="text-[9px] text-[#00d1b2] font-black uppercase">Render: 3 Credits</p>
          </div>
            <div id="${cardId}-actions" class="flex items-center gap-4 border-l border-slate-100 pl-6 h-full pt-4">
              <button onclick="removeFromWorkspace('${fileData.id}')" class="text-red-400 hover:text-red-600 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              </button>
          </div>
        `;
      workspace.prepend(card);
    }
 
    async function startUnifiedProcess() {
        const activeBatch = [...fileQueue];
        fileQueue = [];
       updateGoButton();
 
        const globalCont = document.getElementById('global-progress-container');
        const globalBar = document.getElementById('global-progress-bar');
        const globalText = document.getElementById('global-progress-text');
       globalCont.classList.remove('hidden');
 
        let completed = 0;
 
        for (let item of activeBatch) {
            const cardId = `row-${item.id}`;
            const rightBox = document.getElementById(`${cardId}-right`);
            const progressBar = document.getElementById(`${cardId}-progress-bar`);
            const statusText = document.getElementById(`${cardId}-status-text`);
            const localOriginal = URL.createObjectURL(item.file);
            
           rightBox.querySelector('span').innerText = "Pixifying... 20%";
          progressBar.style.width = "20%";
          statusText.innerText = "Processing Image...";
            
            const formData = new FormData();
          formData.append('image', item.file);
          formData.append('franchise_id', fid);
 
            try {
                // Modified to use the base franchise.post + _render
                const res = await fetch(`${NEST_ENDPOINTS.franchise.post}_render`, { method: 'POST', body: formData });
               progressBar.style.width = "60%";
               rightBox.querySelector('span').innerText = "Pixifying... 60%";
                
                const data = await res.json();
               progressBar.style.width = "85%";
               rightBox.querySelector('span').innerText = "Finalizing... 85%";
 
                const historyRes = await fetch(NEST_ENDPOINTS.pixify_history.post, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                      franchise_id: fid,
                      pixar_url: data.pixar_url,
                      original_url: data.original_url || localOriginal,
                      is_downloaded: false
                    })
                });
                const historyData = await historyRes.json();
 
              progressBar.style.width = "100%";
              processedResults.push({ id: historyData.id, url: data.pixar_url, name: item.file.name, originalUrl: data.original_url || localOriginal });
              finalizeCardPreview(cardId, data.pixar_url, historyData.id, data.original_url || localOriginal);
            } catch (e) { 
              console.error(e); 
              rightBox.querySelector('span').innerText = "Error";
              progressBar.classList.replace('bg-[#00d1b2]', 'bg-red-400');
            }
 
           completed++;
            let overallPercent = (completed / activeBatch.length) * 100;
           globalBar.style.width = overallPercent + "%";
           globalText.innerText = `Processing Batch... ${Math.round(overallPercent)}%`;
        }
 
        setTimeout(() => { globalCont.classList.add('hidden'); globalBar.style.width = "0%"; }, 2000);
    }
 
    function finalizeCardPreview(cardId, pixarUrl, fileId, originalUrl = "") {
        const container = document.getElementById('unified-container');
        let card = document.getElementById(cardId);
        
        if (!originalUrl) {
            const fallback = processedResults.find(r => r.id == fileId);
           originalUrl = fallback ? fallback.originalUrl : "";
        }
 
        if(!card) {
            card = document.createElement('div');
            card.id = cardId;
          card.className = "flex items-center gap-6 bg-white border border-slate-100 rounded-2xl p-4 shadow-sm animate-fadeInLeft relative";
          container.appendChild(card);
        }
 
        card.innerHTML = `
            <div class="flex items-center gap-2">
               <div class="w-40 h-24 flex-shrink-0 bg-slate-50 rounded-lg overflow-hidden border border-slate-100 shadow-sm">
                  <img src="${originalUrl}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/160x96?text=Original'">
              </div>
               <div class="text-slate-300 font-bold px-2">➜</div>
               <div class="w-40 h-24 flex-shrink-0 bg-slate-100 rounded-lg overflow-hidden relative shadow-inner">
                  <img src="${pixarUrl}" class="w-full h-full object-cover blur-sm opacity-50">
                  <div class="absolute inset-0 flex items-center justify-center transform rotate-[-20deg] pointer-events-none">
                      <span class="text-[7px] font-black text-black/60 uppercase tracking-[0.2em] px-3 py-1.5 border border-dashed border-black/30 rounded-md">Nest Internal</span>
                  </div>
              </div>
           </div>
            <div class="flex-grow ml-4">
                <p class="text-[11px] font-bold text-slate-700">Identity Locked</p>
                <p class="text-[9px] text-slate-400 font-bold uppercase">Ready for Download (6 Credits)</p>
          </div>
            <div class="flex items-center gap-6 border-l border-slate-100 pl-6 h-full">
               <div class="flex flex-col items-center gap-1">
                  <span class="text-[7px] font-black text-slate-300 uppercase tracking-widest">Select</span>
                  <input type="checkbox" value="${fileId}" onchange="updateBatchUI()" class="download-checkbox w-6 h-6 rounded-lg border-slate-300 text-[#00d1b2] cursor-pointer">
              </div>
              <button onclick="document.getElementById('${cardId}').remove(); updateBatchUI();" class="text-red-400 hover:text-red-600 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              </button>
          </div>
        `;
    }
 
    function updateBatchUI() {
        const checked = document.querySelectorAll('.download-checkbox:checked');
        const btn = document.getElementById('batch-download-btn');
        const counter = document.getElementById('selection-counter');
        
      btn.parentElement.classList.toggle('hidden', checked.length === 0);
      counter.classList.toggle('hidden', checked.length === 0);
      counter.innerText = `${checked.length} Selected`;
    }
 
    function showDownloadModal() {
        const checked = document.querySelectorAll('.download-checkbox:checked');
        const imgQueue = document.getElementById('modal-image-queue');
        
        document.getElementById('modal-initial-state').classList.remove('hidden');
        document.getElementById('modal-finished-state').classList.add('hidden');
        document.getElementById('modal-cancel-btn').disabled = false;
        document.getElementById('modal-confirm-btn').disabled = false;
        document.getElementById('modal-confirm-btn').innerText = "Confirm & Save";
        
        imgQueue.innerHTML = '';
        
       checked.forEach(cb => {
            const item = processedResults.find(r => r.id == cb.value);
            const thumb = document.createElement('div');
          thumb.className = "w-28 aspect-video rounded-lg overflow-hidden flex-shrink-0 border border-slate-200 bg-slate-100 relative";
          thumb.innerHTML = `
               <img src="${item.url}" class="w-full h-full object-cover blur-[1.5px] opacity-60">
               <div class="absolute inset-0 flex items-center justify-center transform rotate-[-20deg] pointer-events-none">
                  <span class="text-[5px] font-black text-black/50 uppercase tracking-[0.2em] px-1.5 py-1 border border-dashed border-black/20 rounded-md">Internal</span>
              </div>
            `;
          imgQueue.appendChild(thumb);
        });
 
      document.getElementById('modal-count').innerText = `${checked.length} Images`;
      document.getElementById('modal-cost').innerText = `${checked.length * 6} Credits`;
      document.getElementById('download-modal').classList.remove('hidden');
    }
 
    function closeDownloadModal() {
      document.getElementById('download-modal').classList.add('hidden');
    }
 
    async function executeBatchDownload() {
        const checked = document.querySelectorAll('.download-checkbox:checked');
        const ids = Array.from(checked).map(cb => cb.value);
        const confirmBtn = document.getElementById('modal-confirm-btn');
        const cancelBtn = document.getElementById('modal-cancel-btn');
 
       confirmBtn.disabled = true;
       cancelBtn.disabled = true;
       confirmBtn.innerText = "Processing...";
 
        for (let id of ids) {
            const item = processedResults.find(r => r.id == id);
            const cardId = `row-${id}`;
            const card = document.getElementById(cardId);
            
            if(card) card.style.opacity = "0.5";
 
            try {
                await fetch(NEST_ENDPOINTS.pixify_downloaded.post, {
                  method: 'POST',
                  body: JSON.stringify({ franchise_id: fid, pixify_history_id: id, amount: 6 }),
                  headers: { 'Content-Type': 'application/json' }
                });
 
                await fetch(`${NEST_ENDPOINTS.pixify_history.patch.replace('{pixify_history_id}', id)}`, {
                  method: 'PATCH',
                  body: JSON.stringify({ is_downloaded: true }),
                  headers: { 'Content-Type': 'application/json' }
                });
 
                const link = document.createElement('a');
              link.href = item.url;
              link.download = `Pixify_${id}.jpg`;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
 
              if(card) {
                  card.style.opacity = "1";
                  card.querySelector('.flex-grow').innerHTML = `
                      <p class="text-[11px] font-bold text-[#00d1b2]">✓ Downloaded</p>
                      <p class="text-[9px] text-slate-400 font-bold uppercase">Saved to your device</p>
                    `;
                  const cb = card.querySelector('.download-checkbox');
                  if(cb) cb.remove();
                }
            } catch (err) { console.error(err); }
        }
        
       document.getElementById('modal-initial-state').classList.add('hidden');
       document.getElementById('modal-finished-state').classList.remove('hidden');
       updateBatchUI();
    }
 
    function removeFromWorkspace(id) {
        fileQueue = fileQueue.filter(i => i.id !== id);
      document.getElementById(`row-${id}`).remove();
      updateGoButton();
    }
 
    function updateGoButton() {
        const btn = document.getElementById('go-button');
        btn.innerText = `🚀 Pixify! [${fileQueue.length}]`;
      btn.classList.toggle('hidden', fileQueue.length === 0);
    }
</script>
 
<style>
    @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
   .animate-fadeInLeft { animation: fadeInLeft 0.3s ease-out forwards; }
    .animate-fadeIn { animation: fadeIn 0.4s ease-in forwards; }
  #modal-image-queue::-webkit-scrollbar { height: 4px; }
  #modal-image-queue::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
</style>
