<div class="max-w-7xl mx-auto space-y-10">
    
    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between gap-6">
        <div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight">Pixify! AI Intelligence</h2>
            <p class="text-slate-500 font-medium">Privacy-safe Pixar art for your branch marketing.</p>
        </div>
        
        <div class="flex items-center gap-4">
            <span class="bg-[#00d1b2]/10 text-[#00d1b2] px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest">
                Rate: ₱8.00 / Image
            </span>
            
            <button onclick="document.getElementById('fileInput').click()" class="bg-slate-100 text-slate-700 px-5 py-3 rounded-xl text-sm font-bold hover:bg-slate-200 transition-colors">
                ➕ Add Photos
            </button>
            
            <button id="go-button" onclick="startBatchProcess()" class="hidden bg-[#00d1b2] text-white px-8 py-3 rounded-xl text-sm font-black uppercase tracking-widest shadow-lg hover:scale-105 transition-all animate-pulse">
                🚀 Pixify! [0]
            </button>

            <button id="download-selected" onclick="downloadSelected()" class="hidden bg-[#0f172a] text-white px-6 py-3 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-slate-800 transition-all">
                ⬇️ Download Selected
            </button>
        </div>

        <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="handleSelection(event)">
    </div>

    <div class="grid grid-cols-12 gap-8">
        
        <div class="col-span-3 space-y-4">
            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Input Queue</h4>
            <div id="queue-container" class="space-y-3">
                </div>
        </div>

        <div class="col-span-9 space-y-4 border-l border-slate-200 pl-8">
            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Comparison & Results</h4>
            <div id="compare-container" class="space-y-4">
                </div>
        </div>
    </div>
</div>

<script>
    const PIXIFY_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/pixify";
    const fid = localStorage.getItem('locked_franchise_id');
    let fileQueue = [];

    /**
     * Handles initial file selection.
     */
    function handleSelection(event) {
        const files = Array.from(event.target.files);
        if (!files.length) return;

        files.forEach(file => {
            const fileId = 'file-' + Math.random().toString(36).substr(2, 9);
            const fileData = { id: fileId, file: file };
            fileQueue.push(fileData);
            addQueueItemToUI(fileData);
        });
        updateGoButton();
        event.target.value = ''; // Reset input so same file can be re-selected if deleted
    }

    /**
     * Shows the full picture and a delete button in the queue.
     */
    function addQueueItemToUI(fileData) {
        const queue = document.getElementById('queue-container');
        const item = document.createElement('div');
        const previewUrl = URL.createObjectURL(fileData.file);
        
        item.id = `queue-${fileData.id}`;
        item.className = "bg-white border border-slate-200 rounded-xl p-2 flex items-center gap-3 shadow-sm animate-fadeInLeft group relative";
        item.innerHTML = `
            <div class="w-12 h-12 bg-slate-50 rounded-lg overflow-hidden border border-slate-100 flex-shrink-0">
                <img src="${previewUrl}" class="w-full h-full object-cover">
            </div>
            <div class="overflow-hidden flex-grow">
                <p class="text-[10px] font-bold text-slate-700 truncate pr-6">${fileData.file.name}</p>
                <p class="text-[9px] text-[#00d1b2] font-black uppercase">Ready</p>
            </div>
            <button onclick="removeFromQueue('${fileData.id}')" class="absolute right-2 text-slate-300 hover:text-red-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        `;
        queue.append(item);
    }

    function removeFromQueue(fileId) {
        fileQueue = fileQueue.filter(item => item.id !== fileId);
        document.getElementById(`queue-${fileId}`).remove();
        updateGoButton();
    }

    function updateGoButton() {
        const btn = document.getElementById('go-button');
        btn.innerText = `🚀 Pixify! [${fileQueue.length}]`;
        btn.classList.toggle('hidden', fileQueue.length === 0);
    }

    /**
     * Batch processes the queue.
     */
    async function startBatchProcess() {
        const activeBatch = [...fileQueue];
        fileQueue = [];
        updateGoButton();
        document.getElementById('download-selected').classList.remove('hidden');

        for (let item of activeBatch) {
            const originalPreviewUrl = URL.createObjectURL(item.file);
            const rowId = createResultRow(item.file, originalPreviewUrl);
            
            const formData = new FormData();
            formData.append('image', item.file);
            formData.append('franchise_id', fid);

            try {
                const res = await fetch(PIXIFY_API, { method: 'POST', body: formData });
                const data = await res.json();
                finalizeRow(rowId, data.pixar_url);
            } catch (e) {
                console.error("AI Generation Failed", e);
                document.getElementById(`${rowId}-img-right`).innerHTML = `<span class="text-[8px] text-red-500 font-bold">Error</span>`;
            }
        }
    }

    function createResultRow(file, originalUrl) {
        const container = document.getElementById('compare-container');
        const rowId = 'row-' + Math.random().toString(36).substr(2, 9);
        const row = document.createElement('div');
        row.id = rowId;
        
        row.className = "flex items-center gap-6 bg-white border border-slate-100 rounded-2xl p-4 shadow-sm animate-slideDown";
        row.innerHTML = `
            <div class="w-40 aspect-video bg-slate-50 rounded-lg overflow-hidden border border-slate-100 relative">
                <img src="${originalUrl}" class="w-full h-full object-cover">
                <div class="absolute top-1 left-1 bg-black/40 text-[8px] text-white px-1.5 py-0.5 rounded uppercase font-bold">Original</div>
            </div>

            <div id="${rowId}-img-right" class="w-40 aspect-video bg-slate-100 rounded-lg overflow-hidden flex items-center justify-center relative border-2 border-dashed border-slate-200">
                <div class="animate-spin h-4 w-4 border-2 border-[#00d1b2] border-t-transparent rounded-full"></div>
            </div>
            
            <div class="flex-grow">
                <p class="text-[11px] font-bold text-slate-700 truncate max-w-[150px]">${file.name}</p>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tight">Identity Locked</p>
            </div>

            <div class="flex items-center gap-6 border-l border-slate-100 pl-6">
                <div class="text-center">
                    <p class="text-[8px] font-black text-slate-300 uppercase mb-1">Select</p>
                    <input type="checkbox" data-url="" id="${rowId}-check" disabled class="w-5 h-5 rounded border-slate-300 text-[#00d1b2] cursor-pointer">
                </div>
                
                <button onclick="document.getElementById('${rowId}').remove()" class="text-slate-300 hover:text-red-500 transition-colors pt-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </div>
        `;
        container.prepend(row);
        return rowId;
    }

    function finalizeRow(rowId, pixarUrl) {
        const imgBoxRight = document.getElementById(`${rowId}-img-right`);
        const check = document.getElementById(`${rowId}-check`);
        
        imgBoxRight.innerHTML = `
            <img src="${pixarUrl}" class="w-full h-full object-cover animate-fadeIn">
            <div class="absolute top-2 right-2 bg-[#00d1b2] text-[8px] text-white px-2 py-0.5 rounded uppercase font-bold tracking-widest shadow-lg">Pixar AI</div>
        `;
        imgBoxRight.classList.remove('border-dashed', 'border-2', 'bg-slate-100');
        
        check.disabled = false;
        check.dataset.url = pixarUrl;
    }

    function downloadSelected() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
        if (checkboxes.length === 0) return alert("Please select at least one image to download.");

        checkboxes.forEach((cb, index) => {
            if(cb.dataset.url) {
                setTimeout(() => {
                    const link = document.createElement('a');
                    link.href = cb.dataset.url;
                    link.download = `Pixify_Export_${index}.jpg`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }, index * 300);
            }
        });
    }
</script>

<style>
    @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fadeInLeft { animation: fadeInLeft 0.3s ease-out forwards; }
    .animate-slideDown { animation: slideDown 0.4s ease-out forwards; }
    .animate-fadeIn { animation: fadeIn 0.6s ease-in forwards; }
</style>
