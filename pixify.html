<div class="max-w-7xl mx-auto space-y-10">
    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between gap-6">
        <div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight">Pixify! AI Intelligence</h2>
            <p class="text-slate-500 font-medium">Privacy-safe Pixar art for your branch marketing.</p>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="document.getElementById('fileInput').click()" class="bg-slate-100 text-slate-700 px-5 py-3 rounded-xl text-sm font-bold hover:bg-slate-200 transition-colors">
                ➕ Add Photos
            </button>
            
            <button id="go-button" onclick="startBatchProcess()" class="hidden bg-[#00d1b2] text-white px-8 py-3 rounded-xl text-sm font-black uppercase tracking-widest shadow-lg animate-pulse">
                🚀 Pixify! [0]
            </button>

            <button id="download-selected" onclick="downloadSelected()" class="hidden bg-slate-800 text-white px-6 py-3 rounded-xl text-xs font-bold uppercase tracking-widest">
                ⬇️ Download Selected
            </button>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="handleSelection(event)">
    </div>

    <div class="grid grid-cols-12 gap-8">
        
        <div class="col-span-3 space-y-4">
            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Input Queue</h4>
            <div id="queue-container" class="space-y-3">
                </div>
        </div>

        <div class="col-span-9 space-y-4 border-l border-slate-200 pl-8">
            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Processed Results</h4>
            <div id="compare-container" class="space-y-4">
                </div>
        </div>
    </div>
</div>

<script>
    const PIXIFY_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/pixify";
    const fid = localStorage.getItem('locked_franchise_id');
    let fileQueue = [];
    let selectedForDownload = [];

    function handleSelection(event) {
        const files = event.target.files;
        for (let file of files) {
            fileQueue.push(file);
            addQueueItemToUI(file);
        }
        updateGoButton();
    }

    function addQueueItemToUI(file) {
        const queue = document.getElementById('queue-container');
        const item = document.createElement('div');
        item.className = "bg-white border border-slate-200 rounded-xl p-3 flex items-center gap-3 shadow-sm";
        item.innerHTML = `
            <div class="w-10 h-10 bg-slate-50 rounded-lg flex items-center justify-center text-lg">🖼️</div>
            <div class="overflow-hidden">
                <p class="text-[11px] font-bold text-slate-700 truncate">${file.name}</p>
                <p class="text-[9px] text-[#00d1b2] font-black uppercase">Ready</p>
            </div>
        `;
        queue.append(item);
    }

    function updateGoButton() {
        const btn = document.getElementById('go-button');
        btn.innerText = `🚀 Pixify! [${fileQueue.length}]`;
        btn.classList.toggle('hidden', fileQueue.length === 0);
    }

    async function startBatchProcess() {
        const activeBatch = [...fileQueue];
        fileQueue = [];
        updateGoButton();
        document.getElementById('download-selected').classList.remove('hidden');

        for (let file of activeBatch) {
            const rowId = createResultRow(file);
            const formData = new FormData();
            formData.append('image', file);
            formData.append('franchise_id', fid);

            try {
                const res = await fetch(PIXIFY_API, { method: 'POST', body: formData });
                const data = await res.json();
                finalizeRow(rowId, data.pixar_url);
            } catch (e) { console.error(e); }
        }
    }

    function createResultRow(file) {
        const container = document.getElementById('compare-container');
        const rowId = 'row-' + Math.random().toString(36).substr(2, 9);
        const row = document.createElement('div');
        row.id = rowId;
        row.className = "flex items-center gap-4 bg-white border border-slate-100 rounded-2xl p-2 pr-6 shadow-sm";
        row.innerHTML = `
            <div id="${rowId}-img" class="w-48 aspect-video bg-slate-100 rounded-xl overflow-hidden flex items-center justify-center relative">
                <div class="animate-spin h-5 w-5 border-2 border-[#00d1b2] border-t-transparent rounded-full"></div>
            </div>
            
            <div class="flex-grow">
                <p class="text-xs font-bold text-slate-700">${file.name}</p>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tight">Identity Locked • AI Rendered</p>
            </div>

            <div class="flex items-center gap-3 border-l border-slate-100 pl-6">
                <span class="text-[9px] font-black text-slate-300 uppercase">Select</span>
                <input type="checkbox" data-url="" id="${rowId}-check" disabled class="w-5 h-5 rounded border-slate-300 text-[#00d1b2] focus:ring-[#00d1b2] cursor-pointer">
            </div>
        `;
        container.prepend(row);
        return rowId;
    }

    function finalizeRow(rowId, pixarUrl) {
        const imgBox = document.getElementById(`${rowId}-img`);
        const check = document.getElementById(`${rowId}-check`);
        
        imgBox.innerHTML = `<img src="${pixarUrl}" class="w-full h-full object-cover">`;
        check.disabled = false;
        check.dataset.url = pixarUrl;
    }

    function downloadSelected() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
        checkboxes.forEach(cb => {
            if(cb.dataset.url) {
                const link = document.createElement('a');
                link.href = cb.dataset.url;
                link.download = "Pixify_Export.jpg";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        });
    }
</script>
