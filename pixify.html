<div class="max-w-7xl mx-auto space-y-10">
    
    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between gap-6">
        <div>
            <h2 class="text-3xl font-black text-slate-800 tracking-tight">Pixify! AI Intelligence</h2>
            <p class="text-slate-500 font-medium">Transform classroom photos into privacy-safe Pixar art.</p>
        </div>
        
        <div class="flex items-center gap-4">
            <span class="bg-[#00d1b2]/10 text-[#00d1b2] px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest">
                Rate: ₱8.00 / Image
            </span>
            
            <button onclick="document.getElementById('fileInput').click()" class="bg-slate-100 text-slate-700 px-5 py-3 rounded-xl text-sm font-bold hover:bg-slate-200 transition-colors">
                ➕ Add Photos
            </button>
            
            <button id="go-button" onclick="startUnifiedProcess()" class="hidden bg-[#00d1b2] text-white px-8 py-3 rounded-xl text-sm font-black uppercase tracking-widest shadow-lg hover:scale-105 transition-all animate-pulse">
                🚀 Pixify! [0]
            </button>
        </div>

        <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="handleSelection(event)">
    </div>

    <div class="space-y-4">
        <h4 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Workspace & Results</h4>
        <div id="unified-container" class="space-y-4">
            </div>
    </div>
</div>

<script>
    const PIXIFY_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/pixify";
    const fid = localStorage.getItem('locked_franchise_id');
    
    // Internal state to manage queued vs. processing cards
    let fileQueue = []; 

    function handleSelection(event) {
        const files = Array.from(event.target.files);
        if (!files.length) return;

        files.forEach(file => {
            const fileId = 'pix-' + Math.random().toString(36).substr(2, 9);
            const fileData = { id: fileId, file: file };
            
            // 1. Store the data for processing
            fileQueue.push(fileData);
            
            // 2. Create the "Queued" card immediately
            addQueuedCardToWorkspace(fileData);
        });
        
        updateGoButton();
        event.target.value = ''; // Reset input
    }

    /**
     * Step 1: Creates the initial "Input" row in the main workspace.
     */
    function addQueuedCardToWorkspace(fileData) {
        const workspace = document.getElementById('unified-container');
        const cardId = `row-${fileData.id}`;
        const card = document.createElement('div');
        const originalUrl = URL.createObjectURL(fileData.file);

        card.id = cardId;
        card.className = "flex items-center gap-6 bg-white border border-slate-100 rounded-2xl p-4 shadow-sm animate-fadeInLeft relative";
        card.innerHTML = `
            <div class="w-40 aspect-video bg-slate-50 rounded-lg overflow-hidden border border-slate-100 relative">
                <img src="${originalUrl}" class="w-full h-full object-cover">
                <div class="absolute top-1 left-1 bg-black/40 text-[8px] text-white px-1.5 py-0.5 rounded uppercase font-bold">Original</div>
            </div>

            <div id="${cardId}-right" class="w-40 aspect-video bg-slate-50 rounded-lg flex items-center justify-center border-2 border-dashed border-slate-100 relative">
                <span class="text-[8px] font-black text-slate-300 uppercase">Ready</span>
            </div>
            
            <div id="${cardId}-meta" class="flex-grow">
                <p class="text-[11px] font-bold text-slate-700 truncate max-w-[150px]">${fileData.file.name}</p>
                <p class="text-[9px] text-[#00d1b2] font-black uppercase tracking-tight">Queued for AI</p>
            </div>

            <div id="${cardId}-actions" class="flex items-center gap-4 border-l border-slate-100 pl-6 h-full pt-4">
                <button onclick="removeFromWorkspace('${fileData.id}')" class="text-slate-300 hover:text-red-500 transition-colors pt-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </div>
        `;
        workspace.prepend(card);
    }

    function removeFromWorkspace(fileId) {
        fileQueue = fileQueue.filter(item => item.id !== fileId);
        document.getElementById(`row-${fileId}`).remove();
        updateGoButton();
    }

    function updateGoButton() {
        const btn = document.getElementById('go-button');
        btn.innerText = `🚀 Pixify! [${fileQueue.length}]`;
        btn.classList.toggle('hidden', fileQueue.length === 0);
    }

    /**
     * Step 2: Batch process the queued files.
     */
    async function startUnifiedProcess() {
        const activeBatch = [...fileQueue];
        fileQueue = [];
        updateGoButton();

        for (let item of activeBatch) {
            const cardId = `row-${item.id}`;
            
            // Transform card state: Show spinner on right, update meta
            transformCardToLoading(cardId);
            
            const formData = new FormData();
            formData.append('image', item.file);
            formData.append('franchise_id', fid);

            try {
                const res = await fetch(PIXIFY_API, { method: 'POST', body: formData });
                const data = await res.json();
                
                // Finalize card state: Show result, enable Download button
                finalizeCardState(cardId, data.pixar_url);
            } catch (e) {
                console.error("Unified Process Failed", e);
                document.getElementById(`${cardId}-right`).innerHTML = `<span class="text-[8px] text-red-500 font-bold">Error</span>`;
            }
        }
    }

    function transformCardToLoading(cardId) {
        const rightBox = document.getElementById(`${cardId}-right`);
        const metaBox = document.getElementById(`${cardId}-meta`);
        const actionsBox = document.getElementById(`${cardId}-actions`);
        
        // Show spinner
        rightBox.className = "w-40 aspect-video bg-slate-100 rounded-lg overflow-hidden flex items-center justify-center relative border-2 border-dashed border-slate-200";
        rightBox.innerHTML = `<div class="animate-spin h-4 w-4 border-2 border-[#00d1b2] border-t-transparent rounded-full"></div>`;
        
        // Update Meta
        metaBox.querySelector('p:last-child').innerText = "AI Rendering...";
        metaBox.querySelector('p:last-child').className = "text-[9px] text-slate-400 font-bold uppercase tracking-tight animate-pulse";
        
        // Prep actions area for the new buttons, but keep it empty while processing
        actionsBox.innerHTML = '';
        actionsBox.className = "flex items-center gap-4 border-l border-slate-100 pl-6 h-full";
    }

    function finalizeCardState(cardId, pixarUrl) {
        const rightBox = document.getElementById(`${cardId}-right`);
        const metaBox = document.getElementById(`${cardId}-meta`);
        const actionsBox = document.getElementById(`${cardId}-actions`);

        // Update Right Image Slot with Pixar result
        rightBox.innerHTML = `
            <img src="${pixarUrl}" class="w-full h-full object-cover animate-fadeIn">
            <div class="absolute top-1 right-1 bg-[#00d1b2] text-[8px] text-white px-1.5 py-0.5 rounded uppercase font-bold">Pixar AI</div>
        `;
        rightBox.className = "w-40 aspect-video bg-slate-100 rounded-lg overflow-hidden relative";

        // Update Metadata (Done)
        metaBox.querySelector('p:last-child').innerText = "Identity Locked";
        metaBox.querySelector('p:last-child').className = "text-[9px] text-slate-400 font-bold uppercase tracking-tight";
        metaBox.querySelector('p:last-child').classList.remove('animate-pulse');

        // Inject Final Actions (Download + Delete Result)
        actionsBox.innerHTML = `
            <button onclick="downloadResult('${pixarUrl}')" class="bg-[#0f172a] text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">
                Download
            </button>
            
            <button onclick="document.getElementById('${cardId}').remove()" class="text-slate-300 hover:text-red-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        `;
    }

    function downloadResult(url) {
        const link = document.createElement('a');
        link.href = url;
        link.download = `Pixify_${Date.now()}.jpg`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

<style>
    @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fadeInLeft { animation: fadeInLeft 0.3s ease-out forwards; }
    .animate-fadeIn { animation: fadeIn 0.6s ease-in forwards; }
</style>
