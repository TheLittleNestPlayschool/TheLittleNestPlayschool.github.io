<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Little Nest - Learning Portal</title>
    
    <link rel="stylesheet" href="nest_style.css">
    
    <style>
        /* --- Mobile Layout Device Constraints --- */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center; 
            background-color: var(--nest-border); /* Framed background for desktop previewing */
        }

        .app-wrapper {
            width: 100%;
            max-width: 430px; /* Dimensions locked to standard phone width */
            background-color: var(--nest-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            box-shadow: var(--nest-shadow);
        }

        /* --- Header Configuration --- */
        header {
            background-color: #ffffff;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--nest-border);
        }

        header .nest-header {
            font-size: 1.1rem;
        }

        /* --- Main Work Envelope --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 16px;
            width: 100%;
        }

        /* --- Category Grid Display --- */
        .dashboard-categories {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 8px 0 16px 0;
        }

        /* Big Launch Button Optimization for Mobile Thumbs */
        .launch-btn-space {
            margin-top: 12px;
            width: 100%;
        }

        .launch-btn-space .nest-btn {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            border-radius: var(--nest-radius-lg);
            box-shadow: var(--nest-shadow);
        }

        /* --- Journey Roadmap List Layout --- */
        .roadmap-title-space {
            margin-top: 8px;
            padding-left: 4px;
        }

        .session-road-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .road-node {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #ffffff;
            border: 1px solid var(--nest-border);
            border-radius: var(--nest-radius-lg);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .road-node-active {
            border-left: 6px solid var(--nest-teal);
            box-shadow: var(--nest-shadow);
        }

        .road-node-locked {
            opacity: 0.5;
            background-color: rgba(0, 0, 0, 0.02);
        }

        /* --- Sticky Fixed Footer Navigation --- */
        footer {
            background-color: #ffffff;
            border-top: 1px solid var(--nest-border);
            padding: 12px 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: sticky;
            bottom: 0;
            z-index: 900;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--nest-text-muted);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-item.active {
            color: var(--nest-teal-dark);
        }
    </style>
</head>
<body>

    <div class="app-wrapper">

        <header>
            <div class="nest-header">THE LITTLE NEST</div>
            <div class="nest-badge nest-badge-teal" style="color: var(--nest-teal-dark);" id="level-indicator">LEVEL 1</div>
        </header>

        <main>
            
            <div class="nest-card" style="border-top: 4px solid var(--nest-teal);">
                <span class="nest-label" id="session-number-label">CURRENT MILESTONE</span>
                <h2 class="nest-header" style="font-size: 1.4rem;" id="session-main-title">Session 14</h2>
                
                <p style="font-size: 0.85rem; color: var(--nest-text-muted); margin-top: 12px;">Today's learning categories:</p>
                
                <div class="dashboard-categories" id="category-badge-container">
                    </div>

                <div class="launch-btn-space">
                    <button class="nest-btn nest-btn-teal" onclick="startActiveLesson()">
                        🚀 START LESSON 14
                    </button>
                </div>
            </div>

            <div class="roadmap-title-space">
                <span class="nest-label">Your 60-Session Journey Road</span>
            </div>

            <div class="session-road-list" id="journey-roadmap-container">
                </div>

        </main>

        <footer>
            <a href="#" class="nav-item active">
                <span style="font-size: 1.25rem;">📖</span>
                <span>Stories</span>
            </a>
            <a href="#" class="nav-item">
                <span style="font-size: 1.25rem;">✏️</span>
                <span>Lessons</span>
            </a>
            <a href="#" class="nav-item">
                <span style="font-size: 1.25rem;">👤</span>
                <span>Profile</span>
            </a>
        </footer>

    </div>

    <script>
        // Simulation Profile State representing data fetched from your Xano user record
        const userProgressProfile = {
            currentLevelName: "Level 1 (18-24 Mos)",
            activeSessionIndex: 14,
            totalLevelSessions: 60,
            todayCategories: ["Reading", "Nature", "Logic"]
        };

        function renderDashboardPortal(profile) {
            // 1. Map current milestone identities
            document.getElementById('level-indicator').innerText = profile.currentLevelName.split(' ')[0] + " " + profile.currentLevelName.split(' ')[1];
            document.getElementById('session-main-title').innerText = `Session ${profile.activeSessionIndex}`;
            
            // 2. Clear and build category metrics dynamically
            const badgeContainer = document.getElementById('category-badge-container');
            badgeContainer.innerHTML = '';
            profile.todayCategories.forEach(category => {
                const badge = document.createElement('span');
                badge.className = 'nest-badge';
                badge.style.background = 'var(--nest-border)';
                badge.style.color = 'var(--nest-text-main)';
                badge.style.marginRight = '4px';
                badge.innerText = category;
                badgeContainer.appendChild(badge);
            });

            // 3. Build a sample preview snippet of the roadmap list (Sessions 12 to 17 for testing layout visualization)
            const roadmapContainer = document.getElementById('journey-roadmap-container');
            roadmapContainer.innerHTML = '';

            for (let i = 12; i <= 17; i++) {
                const node = document.createElement('div');
                
                if (i < profile.activeSessionIndex) {
                    // Completed State
                    node.className = 'road-node';
                    node.innerHTML = `<span>Session ${i}</span> <span style="color: var(--nest-success);">✓ Review</span>`;
                } else if (i === profile.activeSessionIndex) {
                    // Active State
                    node.className = 'road-node road-node-active';
                    node.innerHTML = `<span>Session ${i} (Today)</span> <span style="color: var(--nest-teal-dark);">● Ready</span>`;
                } else {
                    // Locked State
                    node.className = 'road-node road-node-locked';
                    node.innerHTML = `<span>Session ${i}</span> <span style="font-size: 0.85rem;">🔒 Locked</span>`;
                }
                
                roadmapContainer.appendChild(node);
            }
        }

        function startActiveLesson() {
            alert("Opening lesson screen data wrapper... This launches the multimedia interface component.");
        }

        // Initialize display configuration layout values
        renderDashboardPortal(userProgressProfile);
    </script>
</body>
</html>
