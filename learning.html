<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Little Nest - Learning Core</title>
    
    <link rel="stylesheet" href="nest_style.css">
    
    <style>
        /* --- Strict Mobile Window Locking --- */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            background-color: var(--nest-border); /* Limits width on desktop viewports */
        }

        .phone-container {
            width: 100%;
            max-width: 430px; /* Locks execution to standard mobile screen width */
            background-color: var(--nest-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            box-shadow: var(--nest-shadow);
        }

        /* --- Header Adjustments --- */
        .app-header {
            background-color: #ffffff;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--nest-border);
        }

        .app-header h1 {
            font-size: 1.05rem;
            margin: 0;
        }

        /* --- Main Content Base --- */
        .content-space {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* --- 16:9 Low-Egress Video Frame --- */
        .video-box-wrapper {
            background-color: var(--nest-dark);
            border-radius: var(--nest-radius-lg);
            overflow: hidden;
            width: 100%;
            aspect-ratio: 16 / 9;
            box-shadow: var(--nest-shadow);
        }

        .video-box-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* --- Category Pill Alignment --- */
        .category-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .category-tag {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 9999px;
            text-transform: uppercase;
            background-color: var(--nest-slate);
            color: #ffffff;
            letter-spacing: 0.025em;
        }

        /* --- Interactive Tapping Pad Layout --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            margin-top: 12px;
        }

        /* Overriding .nest-btn properties for large, low-friction mobile finger touch spaces */
        .game-grid .nest-btn {
            padding: 16px 8px;
            font-size: 1.1rem;
            border-radius: var(--nest-radius-lg);
            border: 2px solid var(--nest-border);
            width: 100%;
            background-color: #ffffff;
            color: var(--nest-text-main);
        }

        /* Immediate touch confirmation feedback native to mobile platforms */
        .game-grid .nest-btn:active {
            background-color: var(--nest-teal);
            color: var(--nest-dark);
            border-color: var(--nest-teal-dark);
        }

        /* --- Success/Feedback Banners --- */
        .feedback-alert {
            display: none;
            padding: 12px;
            border-radius: var(--nest-radius-sm);
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
            margin-top: 8px;
        }
        .alert-success { background-color: rgba(16, 185, 129, 0.15); color: var(--nest-success); }
        .alert-error { background-color: rgba(239, 68, 68, 0.15); color: var(--nest-danger); }

        /* --- Offline Practice Block --- */
        .offline-accent-box {
            border-left: 4px solid var(--nest-success) !important;
        }

        .offline-flex {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        /* --- Footer Alignment --- */
        .app-footer {
            background-color: #ffffff;
            border-top: 1px solid var(--nest-border);
            padding: 12px 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: sticky;
            bottom: 0;
            z-index: 900;
        }

        .footer-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: var(--nest-text-muted);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .footer-tab.active {
            color: var(--nest-teal-dark);
        }
    </style>
</head>
<body>

    <div class="phone-container">

        <header class="app-header">
            <h1 class="nest-header" id="display-session-title">SESSION 1</h1>
            <span class="nest-badge nest-badge-teal" id="display-level-badge" style="color: var(--nest-teal-dark);">LEVEL 1</span>
        </header>

        <main class="content-space">
            
            <div class="video-box-wrapper">
                <video id="session-video-core" controls poster="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='56' viewBox='0 0 100 56'><rect width='100%' height='100%' fill='%230f172a'/></svg>">
                    <source src="" type="video/mp4">
                </video>
            </div>

            <div class="nest-step-container nest-step-active">
                <div class="category-row" id="container-categories">
                    <span class="category-tag">Reading</span>
                    <span class="category-tag">Nature</span>
                    <span class="category-tag">Logic</span>
                </div>

                <span class="nest-label">Screen Activity</span>
                <p style="font-size: 0.9rem; font-weight: 700; line-height: 1.4; margin-bottom: 8px;" id="text-game-prompt">
                    🔊 "Look at the screen! Can you tap the item that matches the sound?"
                </p>

                <div class="game-grid">
                    <button class="nest-btn" onclick="evaluateSelection(1)">⭐</button>
                    <button class="nest-btn" onclick="evaluateSelection(2)">🍎</button>
                    <button class="nest-btn" onclick="evaluateSelection(3)">🚗</button>
                    <button class="nest-btn" onclick="evaluateSelection(4)">🎈</button>
                </div>

                <div id="feedback-success" class="feedback-alert alert-success">✓ Tama! Excellent job!</div>
                <div id="feedback-error" class="feedback-alert alert-error">Let's try again! Listen closely.</div>
            </div>

            <div class="nest-step-container offline-accent-box">
                <span class="nest-label" style="color: var(--nest-success);">Household Challenge</span>
                <div class="offline-flex">
                    <div style="font-size: 1.5rem; line-height: 1;">🏡</div>
                    <p style="font-size: 0.85rem; line-height: 1.45;" id="text-household-instruction">
                        Loading today's physical practice activity...
                    </p>
                </div>
            </div>

        </main>

        <footer class="app-footer">
            <a href="#" class="footer-tab active"><span>📖 Stories</span></a>
            <a href="#" class="footer-tab"><span>✏️ Lessons</span></a>
            <a href="#" class="footer-tab"><span>👤 Profile</span></a>
        </footer>

    </div>

    <script>
        // Production Configuration Mock mapping your spreadsheet scheme arrays
        const sessionSampleRecord = {
            level: "Level 1 (18-24 Months)",
            sessionNumber: 1,
            categories: ["Reading", "Nature", "Logic"],
            promptText: "🔊 \"Listen to Billy Bird! Tap the shape that has 3 stones!\"",
            correctTargetId: 2,
            householdChallenge: "Go search your floor space for 3 small stones or clean bottle caps, and count them safely into Mama's hand!"
        };

        // UI Initialization Function executing spreadsheet parameters to screen templates
        function initializeSessionScreen(data) {
            document.getElementById('display-session-title').innerText = `SESSION ${data.sessionNumber}`;
            document.getElementById('text-game-prompt').innerText = data.promptText;
            document.getElementById('text-household-instruction').innerText = data.householdChallenge;
            
            // Re-render categories cleanly without heavy layout scripts
            const catContainer = document.getElementById('container-categories');
            catContainer.innerHTML = '';
            data.categories.forEach(cat => {
                const tag = document.createElement('span');
                tag.className = 'category-tag';
                tag.innerText = cat;
                catContainer.appendChild(tag);
            });
        }

        // Zero-Egress evaluation routine checking inputs locally
        function evaluateSelection(buttonId) {
            const successBar = document.getElementById('feedback-success');
            const errorBar = document.getElementById('feedback-error');
            
            if(buttonId === sessionSampleRecord.correctTargetId) {
                errorBar.style.display = 'none';
                successBar.style.display = 'block';
            } else {
                successBar.style.display = 'none';
                errorBar.style.display = 'block';
            }
        }

        // Run screen setup on load
        initializeSessionScreen(sessionSampleRecord);
    </script>
</body>
</html>
