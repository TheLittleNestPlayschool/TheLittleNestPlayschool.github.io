<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Little Nest - Learning Portal</title>
    
    <link rel="stylesheet" href="nest_style.css">
    
    <style>
        /* --- Mobile Layout Constraint Overrides --- */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center; /* Centers container on widescreen desktop tests */
            background-color: var(--nest-border); /* Darker split background for desktop framing */
        }

        /* Enforces mobile dimensions on the screen shell */
        .app-wrapper {
            width: 100%;
            max-width: 430px; /* Targets modern smartphone aspect ratio envelopes */
            background-color: var(--nest-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            box-shadow: var(--nest-shadow);
        }

        /* --- Global App Header --- */
        header {
            background-color: #ffffff;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--nest-border);
        }

        header .nest-header {
            font-size: 1.1rem;
        }

        /* --- Main Content Envelope --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 16px;
            width: 100%;
        }

        /* --- 16:9 Video Component Core --- */
        .video-player-box {
            background: #000000;
            border-radius: var(--nest-radius-lg);
            overflow: hidden;
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            box-shadow: var(--nest-shadow);
        }

        .video-player-box video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* --- Zero-Text Tapping Button Grid --- */
        .choice-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            margin-top: 12px;
        }

        /* Customizing your .nest-btn template specifically for large mobile kid touch targets */
        .choice-grid .nest-btn {
            padding: 18px 10px;
            font-size: 1rem;
            border-radius: var(--nest-radius-lg);
            border: 2px solid var(--nest-border);
            width: 100%;
        }

        /* Snappy mobile tap feedback interaction instead of desktop hovers */
        .choice-grid .nest-btn:active {
            transform: scale(0.95);
            background-color: var(--nest-teal-dark);
        }

        /* --- Household Exercise Variant Layout --- */
        .household-accent {
            border-left: 6px solid var(--nest-success) !important;
        }

        .challenge-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .challenge-icon {
            font-size: 1.75rem;
            line-height: 1;
        }

        .challenge-text-space p {
            font-size: 0.85rem;
            line-height: 1.45;
            color: var(--nest-text-main);
        }

        /* --- Sticky Xano Renewal Warning Component --- */
        #renewal-banner {
            display: none; /* Managed dynamically via backend execution states */
            background-color: var(--nest-danger);
            color: #ffffff;
            text-align: center;
            padding: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        #renewal-banner a {
            color: var(--nest-teal);
            text-decoration: underline;
            margin-left: 6px;
        }

        /* --- Fixed Application Footer Navigation --- */
        footer {
            background-color: #ffffff;
            border-top: 1px solid var(--nest-border);
            padding: 12px 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: sticky;
            bottom: 0;
            z-index: 900;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--nest-text-muted);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-item.active {
            color: var(--nest-teal-dark);
        }

        .nav-icon {
            font-size: 1.25rem;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">

        <div id="renewal-banner">
            Subscription ending soon! <a href="#">Renew via GCash</a>
        </div>

        <header>
            <div class="nest-header">THE LITTLE NEST</div>
            <div class="nest-badge nest-badge-teal" style="color: var(--nest-teal-dark);">Level 2</div>
        </header>

        <main>
            
            <div class="video-player-box">
                <video id="main-player" controls poster="https://via.placeholder.com/480x270/0f172a/fff?text=Loading+Lesson...">
                    <source src="" type="video/mp4">
                </video>
            </div>

            <div class="nest-step-container nest-step-active">
                <span class="nest-label">Interactive Game</span>
                <div class="challenge-text-space">
                    <p style="font-weight: 700; font-size: 0.9rem; margin-bottom: 8px;">
                        🔊 "Listen closely... Tap the box that has exactly THREE stones!"
                    </p>
                </div>
                
                <div class="choice-grid">
                    <button class="nest-btn nest-btn-outline" onclick="checkChoice(1)">🔴 1</button>
                    <button class="nest-btn nest-btn-outline" onclick="checkChoice(2)">🔴 2</button>
                    <button class="nest-btn nest-btn-outline" onclick="checkChoice(3)">🔴 3</button>
                    <button class="nest-btn nest-btn-outline" onclick="checkChoice(4)">🔴 4</button>
                </div>
            </div>

            <div class="nest-step-container household-accent">
                <span class="nest-label" style="color: var(--nest-success);">Household Challenge</span>
                <div class="challenge-row">
                    <div class="challenge-icon">🥄</div>
                    <div class="challenge-text-space">
                        <p>Go find 3 spoons in the kitchen area and count them out loud with Mama or Papa!</p>
                    </div>
                </div>
            </div>

        </main>

        <footer>
            <a href="#" class="nav-item active">
                <span class="nav-icon">📖</span>
                <span>Stories</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">✏️</span>
                <span>Lessons</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">👤</span>
                <span>Profile</span>
            </a>
        </footer>

    </div>

    <script>
        // Simple functional verification script verifying active target selection outputs
        function checkChoice(selection) {
            if(selection === 3) {
                alert("✓ Tama! Great job!");
            } else {
                alert("Try again! Let's count together.");
            }
        }
    </script>
</body>
</html>
