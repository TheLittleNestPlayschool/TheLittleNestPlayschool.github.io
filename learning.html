<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Little Nest - Parent Portal</title>
    
    <link rel="stylesheet" href="nest_style.css">
    
    <style>
        /* --- Mobile Device Enclosure Constraints --- */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center; 
            background-color: var(--nest-border); /* Split backdrop framing desktop browser views */
        }

        .app-wrapper {
            width: 100%;
            max-width: 430px; /* Enforces modern smartphone layout boundaries */
            background-color: var(--nest-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            box-shadow: var(--nest-shadow);
        }

        /* --- Header Space --- */
        header {
            background-color: #ffffff;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--nest-border);
        }

        header .nest-header {
            font-size: 1.1rem;
        }

        /* --- Main Content Viewport --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 20px; /* Uniform vertical distribution */
            width: 100%;
        }

        /* --- Element 1: Identity Card Layout --- */
        .identity-card {
            padding: 4px 4px 0 4px;
        }

        .profile-greeting {
            font-size: 1.25rem;
            margin-bottom: 2px;
        }

        .student-sub {
            font-size: 0.9rem;
            color: var(--nest-text-muted);
            font-weight: 600;
        }

        /* --- Element 2: Native Progress Tracker Area --- */
        .progress-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .progress-bar-track {
            width: 100%;
            height: 12px;
            background-color: var(--nest-border);
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--nest-success);
            border-radius: 9999px;
            transition: width 0.4s ease;
        }

        /* --- Element 3: Activation Launch Card --- */
        .session-launch-box {
            border-top: 4px solid var(--nest-teal);
        }

        .category-pill-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 8px 0 18px 0;
        }

        .launch-btn-container {
            width: 100%;
        }

        /* Adapting your master .nest-btn definition for massive thumb action visibility */
        .launch-btn-container .nest-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.05rem;
            border-radius: var(--nest-radius-lg);
            box-shadow: var(--nest-shadow);
        }

        /* --- Sticky Fixed Footer Navigation Bar --- */
        footer {
            background-color: #ffffff;
            border-top: 1px solid var(--nest-border);
            padding: 12px 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: sticky;
            bottom: 0;
            z-index: 900;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--nest-text-muted);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-item.active {
            color: var(--nest-teal-dark);
        }
    </style>
</head>
<body>

    <div class="app-wrapper">

        <header>
            <div class="nest-header">THE LITTLE NEST</div>
            <div class="nest-badge nest-badge-teal" style="color: var(--nest-teal-dark);" id="display-level-badge">LEVEL 1</div>
        </header>

        <main>
            
            <div class="identity-card">
                <h2 class="nest-header profile-greeting" id="parent-greeting-text">Hello, Mommy Angeline!</h2>
                <div class="student-sub">
                    Learning Partner: <span id="student-name-text" style="color: var(--nest-text-main); font-weight: 700;">Noah</span>
                </div>
            </div>

            <div class="progress-block">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="nest-label">Your Course Progress</span>
                    <span style="font-size: 0.75rem; font-weight: 800; color: var(--nest-text-main);" id="progress-numerical-label">Session 14 of 60</span>
                </div>
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progress-bar-fill-indicator" style="width: 23%;"></div>
                </div>
            </div>

            <div class="nest-card session-launch-box">
                <span class="nest-label">NEXT UP FOR LEARNING</span>
                <h3 class="nest-header" style="font-size: 1.3rem; margin-top: 2px;" id="next-session-title">Session 14</h3>
                
                <p style="font-size: 0.8rem; color: var(--nest-text-muted); margin-top: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.025em;">Active Categories:</p>
                
                <div class="category-pill-row" id="dashboard-category-injection-point">
                    </div>

                <div class="launch-btn-container">
                    <button class="nest-btn nest-btn-teal" onclick="triggerSessionLaunch()" id="main-launch-button-label">
                        🚀 START SESSION 14
                    </button>
                </div>
            </div>

        </main>

        <footer>
            <a href="#" class="nav-item active">
                <span style="font-size: 1.25rem;">===</span>
                <span>Portal</span>
            </a>
            <a href="#" class="nav-item">
                <span style="font-size: 1.25rem;">✏️</span>
                <span>Lessons</span>
            </a>
            <a href="#" class="nav-item">
                <span style="font-size: 1.25rem;">👤</span>
                <span>Profile</span>
            </a>
        </footer>

    </div>

    <script>
        // Simulated structural payload representation of data returned from a Xano user schema fetch
        const clientAccountDataRecord = {
            parentFirstName: "Angeline",
            studentFirstName: "Noah",
            levelString: "Level 1 (18-24 Mos)",
            completedCount: 13,
            nextActiveSessionIndex: 14,
            maxLevelSessions: 60,
            sessionCategoriesArray: ["Reading", "Nature", "Logic"]
        };

        // Screen configuration compiler filling layout parameters programmatically
        function compilePortalView(data) {
            // 1. Assign Personal Metadata
            document.getElementById('parent-greeting-text').innerText = `Hello, Mommy ${data.parentFirstName}!`;
            document.getElementById('student-name-text').innerText = data.studentFirstName;
            document.getElementById('display-level-badge').innerText = data.levelString.split(' ')[0].toUpperCase() + " " + data.levelString.split(' ')[1];
            
            // 2. Compute and Apply Metric Progress values
            const progressPercentage = Math.round((data.completedCount / data.maxLevelSessions) * 100);
            document.getElementById('progress-numerical-label').innerText = `Session ${data.nextActiveSessionIndex} of ${data.maxLevelSessions}`;
            document.getElementById('progress-bar-fill-indicator').style.width = `${progressPercentage}%`;
            
            // 3. Populate Action Box Headers
            document.getElementById('next-session-title').innerText = `Session ${data.nextActiveSessionIndex}`;
            document.getElementById('main-launch-button-label').innerHTML = `🚀 START SESSION ${data.nextActiveSessionIndex}`;

            // 4. Handle Category Label Loops safely using standard layout rules
            const bucket = document.getElementById('dashboard-category-injection-point');
            bucket.innerHTML = '';
            data.sessionCategoriesArray.forEach(catName => {
                const badge = document.createElement('span');
                badge.className = 'nest-badge';
                badge.style.background = 'var(--nest-border)';
                badge.style.color = 'var(--nest-text-main)';
                badge.style.marginRight = '4px';
                badge.innerText = catName;
                bucket.appendChild(badge);
            });
        }

        // Action Execution Gateway
        function triggerSessionLaunch() {
            alert("Routing user directly to multimedia interaction workspace interface module...");
        }

        // Initialize template architecture properties on window load
        compilePortalView(clientAccountDataRecord);
    </script>
</body>
</html>
