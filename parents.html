<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
        <h1 class="text-2xl font-black text-emerald-500 uppercase tracking-tight">Parent Directory</h1>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Full Guardian Records • Sariaya Branch</p>
    </div>
    
    <div class="flex flex-wrap gap-2 w-full md:w-auto">
        <input type="text" id="parent-search" placeholder="Search names, phones, or emails..." 
            class="pl-4 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-xs outline-none focus:border-slate-500 shadow-sm w-full md:w-64 transition-all">
        
        <button id="add-parent-btn" class="bg-[#1e293b] hover:bg-black text-white px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase tracking-wider shadow-md">
            + REGISTER PARENT
        </button>
    </div>
</div>

<div id="parent-list-container" class="space-y-6">
    <div class="p-20 text-center text-slate-400 text-xs italic font-bold uppercase tracking-widest animate-pulse">
        Synchronizing NestMind Database...
    </div>
</div>

<div id="parent-modal" class="hidden fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden border border-slate-200">
        <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <div>
                <h2 id="p-modal-title" class="text-sm font-black text-slate-800 uppercase">Guardian Profile</h2>
                <p class="text-[9px] text-emerald-600 font-bold uppercase tracking-widest">Database Schema V1.2</p>
            </div>
            <button id="close-modal-x" class="text-slate-400 hover:text-slate-900 text-3xl font-light">&times;</button>
        </div>
        
        <form id="parent-form" class="p-6">
            <input type="hidden" id="p-edit-id">
            
            <div id="dynamic-fields-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-4 max-h-[60vh] overflow-y-auto pr-4 custom-scrollbar">
                </div>

            <div class="flex gap-3 pt-6 border-t border-slate-100 mt-6">
                <button type="button" id="cancel-modal-btn" class="px-8 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-[10px] uppercase hover:bg-slate-200 transition-all">Discard</button>
                <button type="submit" class="flex-1 py-3 bg-[#1e293b] text-white rounded-xl font-bold text-[10px] uppercase shadow-lg hover:bg-black transition-all">
                    Sync to Xano
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const ParentModule = {
        data: [],
        schema: null,

        async init() {
            if (!window.NEST_SCHEMA) await this.loadScript('/schema_config.js');
            if (!window.NEST_ENDPOINTS) await this.loadScript('/api_config.js');
            
            this.schema = window.NEST_SCHEMA.parent;
            this.buildFormUI(); 
            
            const fid = localStorage.getItem('locked_franchise_id');
            if (!fid) return;

            try {
                const response = await fetch(`${window.NEST_ENDPOINTS.parent.list}?franchise_id=${fid}`);
                this.data = await response.json();
                this.render();
                this.setupListeners();
            } catch (err) {
                console.error("Xano Error:", err);
            }
        },

        buildFormUI() {
            const grid = document.getElementById('dynamic-fields-grid');
            grid.innerHTML = '';
            let currentSection = "";

            this.schema.fields.forEach(f => {
                if (f.id === 'id') return; // Strictly only hide the ID field

                if (f.section && f.section !== currentSection) {
                    currentSection = f.section;
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="col-span-full mt-6 mb-2 border-b border-slate-100 pb-1">
                            <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">${currentSection}</span>
                        </div>
                    `);
                }

                const spanClass = f.width === 'full' || f.type === 'textarea' ? 'col-span-full' : 'col-span-1';
                const readonly = f.readonly ? 'readonly' : '';
                const bgClass = f.readonly ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-50';

                let inputHTML = '';
                if (f.type === 'textarea') {
                    inputHTML = `<textarea id="${f.id}" rows="2" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:ring-2 focus:ring-emerald-500 outline-none transition-all"></textarea>`;
                } else if (f.type === 'bool' || f.type === 'checkbox') {
                    inputHTML = `
                        <div class="flex items-center gap-3 p-3 bg-slate-50 border border-slate-200 rounded-lg">
                            <input type="checkbox" id="${f.id}" class="w-4 h-4 accent-emerald-500">
                            <span class="text-[10px] font-bold text-slate-500 uppercase">Active Status</span>
                        </div>`;
                } else {
                    inputHTML = `<input type="${f.type}" id="${f.id}" ${readonly} class="w-full p-3 ${bgClass} border border-slate-200 rounded-lg text-xs focus:ring-2 focus:ring-emerald-500 outline-none transition-all">`;
                }

                grid.insertAdjacentHTML('beforeend', `
                    <div class="${spanClass}">
                        <label class="text-[9px] text-slate-400 block uppercase font-black mb-1.5 ml-1 tracking-wider">${f.label}</label>
                        ${inputHTML}
                    </div>
                `);
            });
        },

        render() {
            const container = document.getElementById('parent-list-container');
            const search = (document.getElementById('parent-search')?.value || '').toLowerCase();
            
            let filtered = this.data.filter(p => 
                `${p.first_name} ${p.last_name} ${p.email} ${p.phone} ${p.second_parent_full_name}`.toLowerCase().includes(search)
            );

            container.innerHTML = '';
            filtered.forEach(p => {
                const createdDate = p.created_at ? new Date(p.created_at).toLocaleDateString() : '---';

                container.insertAdjacentHTML('beforeend', `
                    <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden hover:border-emerald-300 transition-all">
                        <div class="bg-slate-50/80 p-5 flex flex-wrap items-center justify-between gap-6 border-b border-slate-100">
                            <div class="min-w-[180px]">
                                <span class="text-[9px] text-slate-400 font-black uppercase block tracking-tighter">Primary Guardian</span>
                                <span class="text-sm font-black text-slate-900">${p.first_name} ${p.last_name}</span>
                                <div class="text-[11px] text-slate-500 font-medium">${p.email || 'No Email'}</div>
                                <div class="text-[11px] font-mono text-emerald-600 font-bold">${p.phone || ''}</div>
                            </div>
                            <div class="flex-1 min-w-[250px]">
                                <span class="text-[9px] text-slate-400 font-black uppercase block tracking-tighter">Home Address</span>
                                <span class="text-xs text-slate-600 leading-snug font-medium">${p.address || '---'}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="text-right mr-2">
                                    <span class="text-[8px] text-slate-400 font-black uppercase block">Registration</span>
                                    <span class="text-[10px] font-mono text-slate-500">${createdDate}</span>
                                </div>
                                <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase border ${p.is_active ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-red-50 text-red-600 border-red-100'}">
                                    ${p.is_active ? 'Active' : 'Archived'}
                                </span>
                                <button data-id="${p.id}" class="parent-edit-btn px-4 py-2 bg-white border border-slate-300 rounded-lg shadow-sm text-[10px] font-black hover:text-emerald-600 hover:border-emerald-300 transition-all uppercase">Edit</button>
                                <button data-id="${p.id}" class="parent-delete-btn px-4 py-2 bg-red-50 border border-red-100 rounded-lg text-red-500 text-[10px] font-black hover:bg-red-500 hover:text-white transition-all uppercase">Delete</button>
                            </div>
                        </div>

                        <div class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10 text-[11px] bg-white">
                            <div class="space-y-2">
                                <span class="text-[9px] font-black text-emerald-600 uppercase tracking-widest block border-b border-emerald-50 pb-1.5 mb-2">Secondary Guardian</span>
                                <div class="font-black text-slate-800 text-[10px] uppercase">${p.second_parent_full_name || 'NOT PROVIDED'}</div>
                                <div class="text-slate-500 font-bold uppercase text-[9px] tracking-tighter">${p.second_parent_relationship || ''}</div>
                                <div class="text-slate-600 font-mono font-bold">${p.second_parent_phone_number || ''}</div>
                                <div class="text-[9px] text-slate-400 leading-tight italic mt-2">${p.second_parent_home_address || ''}</div>
                            </div>
                            <div class="space-y-2">
                                <span class="text-[9px] font-black text-orange-500 uppercase tracking-widest block border-b border-orange-50 pb-1.5 mb-2">Emergency Contact 1</span>
                                <div class="font-black text-slate-800 text-[10px] uppercase">${p.emergency_contact_1_name || '---'}</div>
                                <div class="text-slate-500 font-bold text-[9px] uppercase tracking-tighter">${p.emergency_contact_1_relationship || ''}</div>
                                <div class="text-slate-600 font-mono font-black text-xs mt-1">${p.emergency_contact_1_phone_number || ''}</div>
                            </div>
                            <div class="space-y-2">
                                <span class="text-[9px] font-black text-orange-500 uppercase tracking-widest block border-b border-orange-50 pb-1.5 mb-2">Emergency Contact 2</span>
                                <div class="font-black text-slate-800 text-[10px] uppercase">${p.emergency_contact_2_name || '---'}</div>
                                <div class="text-slate-500 font-bold text-[9px] uppercase tracking-tighter">${p.emergency_contact_2_relationship || ''}</div>
                                <div class="text-slate-600 font-mono font-black text-xs mt-1">${p.emergency_contact_2_phone_number || ''}</div>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest block border-b border-slate-200 pb-1.5">Admin Notes</span>
                                <div class="text-[10px] text-slate-600 leading-relaxed font-medium">
                                    ${p.inactivation_reason_comments || 'No internal notes.'}
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            });

            container.querySelectorAll('.parent-edit-btn').forEach(b => {
                b.onclick = () => this.openModal(this.data.find(x => x.id == b.dataset.id));
            });

            container.querySelectorAll('.parent-delete-btn').forEach(b => {
                b.onclick = () => this.deleteRecord(b.dataset.id);
            });
        },

        async deleteRecord(id) {
            if (!confirm("Confirm permanent removal from NestMind database?")) return;
            try {
                const res = await fetch(`${window.NEST_ENDPOINTS.parent.list}/${id}`, { method: 'DELETE' });
                if (res.ok) this.init();
            } catch (err) { console.error("Delete Error:", err); }
        },

        openModal(p = null) {
            document.getElementById('parent-modal').classList.remove('hidden');
            document.getElementById('parent-form').reset();
            document.getElementById('p-edit-id').value = p ? p.id : '';
            document.getElementById('p-modal-title').innerText = p ? 'Edit Guardian' : 'Register Parent';

            this.schema.fields.forEach(f => {
                const el = document.getElementById(f.id);
                if (el) {
                    if (f.type === 'bool' || f.type === 'checkbox') el.checked = p ? !!p[f.id] : (f.default ?? true);
                    else el.value = p ? (p[f.id] || '') : '';
                }
            });
        },

        closeModal() { document.getElementById('parent-modal').classList.add('hidden'); },

        setupListeners() {
            document.getElementById('parent-search').oninput = () => this.render();
            document.getElementById('add-parent-btn').onclick = () => this.openModal();
            document.getElementById('close-modal-x').onclick = () => this.closeModal();
            document.getElementById('cancel-modal-btn').onclick = () => this.closeModal();

            document.getElementById('parent-form').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('p-edit-id').value;
                const payload = { franchise_id: parseInt(localStorage.getItem('locked_franchise_id')) };
                
                this.schema.fields.forEach(f => {
                    const el = document.getElementById(f.id);
                    if (el && f.id !== 'id' && !f.readonly) {
                        payload[f.id] = (f.type === 'bool' || f.type === 'checkbox') ? el.checked : el.value;
                    }
                });

                const url = id ? `${window.NEST_ENDPOINTS.parent.list}/${id}` : window.NEST_ENDPOINTS.parent.list;
                const res = await fetch(url, { 
                    method: id ? 'PATCH' : 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (res.ok) { this.closeModal(); this.init(); }
            };
        },

        async loadScript(src) {
            return new Promise(resolve => {
                const s = document.createElement('script'); s.src = src; s.onload = resolve;
                s.onerror = () => { s.src = src.replace('/', ''); s.onload = resolve; };
                document.head.appendChild(s);
            });
        }
    };

    ParentModule.init();
})();
</script>

<style>
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
</style>
