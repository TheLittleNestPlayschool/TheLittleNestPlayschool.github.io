
<div class="mb-8 flex justify-between items-end">
    <div>
        <h1 class="text-4xl font-black text-slate-800 tracking-tight">Parent Directory</h1>
        <p id="parent-subtitle" class="text-slate-500 font-medium italic">Syncing with NestMind...</p>
    </div>
    <button class="bg-[#00d1b2] hover:bg-[#00bfa5] text-white font-black py-3 px-6 rounded-xl shadow-lg flex items-center gap-2 transition-all active:scale-95">
        <span class="text-xl">+</span> ADD NEW PARENT
    </button>
</div>

<div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-slate-50 border-b border-slate-200">
                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">ID</th>
                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Name</th>
                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Contact Info</th>
                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Home Address</th>
                <th class="px-6 py-4 text-right text-[10px] font-black text-slate-400 uppercase tracking-widest">Management</th>
            </tr>
        </thead>
        <tbody id="parent-table-body">
            <tr><td colspan="5" class="px-6 py-12 text-center text-slate-400 font-bold italic">Initializing Xano handshake...</td></tr>
        </tbody>
    </table>
</div>

<script>
    (async function loadParents() {
        const rawFid = localStorage.getItem('locked_franchise_id');
        const fname = localStorage.getItem('locked_franchise_name');
        const tbody = document.getElementById('parent-table-body');
        
        if (fname) document.getElementById('parent-subtitle').innerText = `Viewing directory for: ${fname}`;

        if (!rawFid) {
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-amber-500 font-bold">Please select a branch in the sidebar.</td></tr>`;
            return;
        }

        try {
            const cleanFid = parseInt(rawFid);
            // UPDATED: Using your verified API group 8Je8Zszx
            const apiUrl = `https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/parent?franchise_id=${cleanFid}`;
            
            const res = await fetch(apiUrl);
            
            if (!res.ok) {
                throw new Error(`Status ${res.status}: Check API group settings.`);
            }

            const data = await res.json();
            tbody.innerHTML = '';
            
            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-slate-400 italic">No parent records found for ${fname}.</td></tr>`;
                return;
            }

            data.forEach(p => {
                const row = document.createElement('tr');
                row.className = "border-b border-slate-100 hover:bg-slate-50 transition-colors";
                row.innerHTML = `
                    <td class="px-6 py-4 text-slate-400 font-bold text-sm">#${p.id}</td>
                    <td class="px-6 py-4 text-slate-800 font-extrabold text-base">${p.first_name} ${p.last_name}</td>
                    <td class="px-6 py-4">
                        <div class="text-[#00d1b2] font-bold text-xs underline decoration-2">${p.email}</div>
                        <div class="text-slate-400 font-medium text-[10px] mt-1">${p.phone || 'No Phone'}</div>
                    </td>
                    <td class="px-6 py-4 text-slate-500 font-medium text-xs italic max-w-[240px] truncate">${p.address || 'No Address'}</td>
                    <td class="px-6 py-4 text-right">
                        <button class="text-[10px] font-black text-slate-300 hover:text-slate-600 uppercase border border-slate-200 px-3 py-1 rounded-md">Edit Profile</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-red-400 font-bold">Xano Sync Failed: ${e.message}</td></tr>`;
        }
    })();
</script>
