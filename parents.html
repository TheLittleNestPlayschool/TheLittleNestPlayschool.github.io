<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Parent Directory</h1>
        <p id="module-subheader" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Full Guardian Records</p>
    </div>
    
    <div class="flex flex-wrap gap-2 w-full md:w-auto">
        <input type="text" id="parent-search" placeholder="Search names, phones, or emails..." 
            class="pl-4 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-xs outline-none focus:border-teal-500 shadow-sm w-full md:w-64 transition-all">
        
        <button id="add-parent-btn" class="bg-teal-500 hover:bg-teal-600 text-white px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase tracking-wider shadow-md">
            + REGISTER PARENT
        </button>
    </div>
</div>

<div id="parent-list-container" class="space-y-6">
    <div class="p-20 text-center text-slate-400 text-xs italic font-bold uppercase tracking-widest animate-pulse">
        Loading Records...
    </div>
</div>

<div id="parent-modal" class="hidden fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden border border-slate-200">
        <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <div>
                <h2 id="p-modal-title" class="text-sm font-black text-slate-800 uppercase">Guardian Profile</h2>
                <p id="modal-branch-label" class="text-[9px] text-teal-600 font-bold uppercase tracking-widest"></p>
            </div>
            <button id="close-modal-x" class="text-slate-400 hover:text-slate-900 text-3xl font-light">&times;</button>
        </div>
        
        <form id="parent-form" class="p-6">
            <input type="hidden" id="p-edit-id">
            <div id="dynamic-fields-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-4 max-h-[60vh] overflow-y-auto pr-4 custom-scrollbar">
            </div>

            <div class="flex gap-3 pt-6 border-t border-slate-100 mt-6">
                <button type="button" id="cancel-modal-btn" class="px-8 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-[10px] uppercase hover:bg-slate-200 transition-all">Discard</button>
                <button type="submit" class="flex-1 py-3 bg-teal-500 text-white rounded-xl font-bold text-[10px] uppercase shadow-lg hover:bg-teal-600 transition-all">
                    Save Record
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const ParentModule = {
        data: [],
        schema: null,

        async init() {
            if (!window.NEST_SCHEMA) await this.loadScript('../schema_config.js');
            if (!window.NEST_ENDPOINTS) await this.loadScript('../api_config.js');
            if (!window.SecurityManager) await this.loadScript('../security.js');
            
            this.schema = window.NEST_SCHEMA.parent;
            this.buildFormUI(); 
            
            const isSuper = SecurityManager.isHeadOffice();
            const branchName = localStorage.getItem('locked_franchise_name') || 'Main';
            
            // Update UI context
            document.getElementById('module-subheader').innerText = isSuper 
                ? "Full Network Records • Master View" 
                : `Full Guardian Records • ${branchName}`;
            
            document.getElementById('modal-branch-label').innerText = isSuper 
                ? "Global Administrator" 
                : `${branchName} Branch`;

            // MASTER LOGIC: getAuthQuery() handles the "pull all" vs "pull matching" logic
            const authQuery = SecurityManager.getAuthQuery();
            const fetchUrl = window.NEST_ENDPOINTS.parent.list + authQuery;

            try {
                const response = await fetch(fetchUrl);
                this.data = await response.json();
                this.render();
                this.setupListeners();
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        },

        buildFormUI() {
            const grid = document.getElementById('dynamic-fields-grid');
            grid.innerHTML = '';
            let currentSection = "";

            this.schema.fields.forEach(f => {
                if (f.id === 'id') return;
                if (f.section && f.section !== currentSection) {
                    currentSection = f.section;
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="col-span-full mt-6 mb-2 border-b border-slate-100 pb-1">
                            <span class="text-[10px] font-black text-teal-600 uppercase tracking-widest">${currentSection}</span>
                        </div>
                    `);
                }
                const spanClass = f.width === 'full' || f.type === 'textarea' ? 'col-span-full' : 'col-span-1';
                const readonly = f.readonly ? 'readonly' : '';
                const bgClass = f.readonly ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-50';
                let inputHTML = (f.type === 'textarea') 
                    ? `<textarea id="${f.id}" rows="2" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none transition-all"></textarea>`
                    : (f.type === 'bool' || f.type === 'checkbox')
                    ? `<div class="flex items-center gap-3 p-3 bg-slate-50 border border-slate-200 rounded-lg"><input type="checkbox" id="${f.id}" class="w-4 h-4 accent-teal-500"><span class="text-[10px] font-bold text-slate-500 uppercase">${f.label} Status</span></div>`
                    : `<input type="${f.type}" id="${f.id}" ${readonly} class="w-full p-3 ${bgClass} border border-slate-200 rounded-lg text-xs outline-none transition-all">`;

                grid.insertAdjacentHTML('beforeend', `<div class="${spanClass}"><label class="text-[9px] text-slate-400 block uppercase font-black mb-1.5 ml-1 tracking-wider">${f.label}</label>${inputHTML}</div>`);
            });
        },

        render() {
            const container = document.getElementById('parent-list-container');
            const search = (document.getElementById('parent-search')?.value || '').toLowerCase();
            const isSuper = SecurityManager.isHeadOffice();
            
            let filtered = this.data.filter(p => 
                `${p.first_name} ${p.last_name} ${p.email} ${p.phone}`.toLowerCase().includes(search)
            );

            container.innerHTML = filtered.length ? '' : '<div class="p-20 text-center text-slate-400 text-xs font-bold uppercase tracking-widest">No records found.</div>';
            
            filtered.forEach(p => {
                const createdDate = p.created_at ? new Date(p.created_at).toLocaleDateString() : '---';
                const branchBadge = isSuper ? `<span class="ml-2 px-2 py-0.5 rounded bg-slate-200 text-slate-600 text-[8px] font-black uppercase">FID: ${p.franchise_id}</span>` : '';

                container.insertAdjacentHTML('beforeend', `
                    <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden hover:border-teal-400 transition-all">
                        <div class="bg-slate-50/80 p-5 flex flex-wrap items-center justify-between gap-6 border-b border-slate-100">
                            <div class="min-w-[180px]">
                                <span class="text-[9px] text-slate-400 font-black uppercase block tracking-tighter">Primary Guardian ${branchBadge}</span>
                                <span class="text-sm font-black text-slate-900">${p.first_name} ${p.last_name}</span>
                                <div class="text-[11px] text-slate-500 font-medium">${p.email || 'No Email'}</div>
                                <div class="text-[11px] font-mono text-teal-600 font-bold">${p.phone || ''}</div>
                            </div>
                            <div class="flex-1 min-w-[250px]">
                                <span class="text-[9px] text-slate-400 font-black uppercase block tracking-tighter">Home Address</span>
                                <span class="text-xs text-slate-600 leading-snug font-medium">${p.address || '---'}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase border ${p.is_active ? 'bg-teal-50 text-teal-600 border-teal-100' : 'bg-red-50 text-red-600 border-red-100'}">
                                    ${p.is_active ? 'Active' : 'Archived'}
                                </span>
                                <button data-id="${p.id}" class="parent-edit-btn px-4 py-2 bg-white border border-slate-300 rounded-lg shadow-sm text-[10px] font-black hover:text-teal-600 uppercase">Edit</button>
                                <button data-id="${p.id}" class="parent-delete-btn px-4 py-2 bg-red-50 border border-red-100 rounded-lg text-red-500 text-[10px] font-black hover:bg-red-500 hover:text-white transition-all uppercase">Delete</button>
                            </div>
                        </div>
                    </div>
                `);
            });

            container.querySelectorAll('.parent-edit-btn').forEach(b => {
                b.onclick = () => this.openModal(this.data.find(x => x.id == b.dataset.id));
            });
            container.querySelectorAll('.parent-delete-btn').forEach(b => {
                b.onclick = () => this.deleteRecord(b.dataset.id);
            });
        },

        async deleteRecord(id) {
            if (!confirm("Confirm permanent removal?")) return;
            const authQuery = SecurityManager.getAuthQuery();
            try {
                const res = await fetch(`${window.NEST_ENDPOINTS.parent.list}/${id}${authQuery}`, { method: 'DELETE' });
                if (res.ok) this.init();
            } catch (err) { console.error("Delete Error:", err); }
        },

        openModal(p = null) {
            document.getElementById('parent-modal').classList.remove('hidden');
            document.getElementById('parent-form').reset();
            document.getElementById('p-edit-id').value = p ? p.id : '';
            this.schema.fields.forEach(f => {
                const el = document.getElementById(f.id);
                if (el) {
                    if (f.type === 'bool' || f.type === 'checkbox') el.checked = p ? !!p[f.id] : (f.default ?? true);
                    else el.value = p ? (p[f.id] || '') : '';
                }
            });
        },

        closeModal() { document.getElementById('parent-modal').classList.add('hidden'); },

        setupListeners() {
            document.getElementById('parent-search').oninput = () => this.render();
            document.getElementById('add-parent-btn').onclick = () => this.openModal();
            document.getElementById('close-modal-x').onclick = () => this.closeModal();
            document.getElementById('cancel-modal-btn').onclick = () => this.closeModal();

            document.getElementById('parent-form').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('p-edit-id').value;
                const authQuery = SecurityManager.getAuthQuery();
                
                const payload = { franchise_id: SecurityManager.isHeadOffice() ? 1 : parseInt(localStorage.getItem('locked_franchise_id')) };
                
                this.schema.fields.forEach(f => {
                    const el = document.getElementById(f.id);
                    if (el && f.id !== 'id' && !f.readonly) {
                        payload[f.id] = (f.type === 'bool' || f.type === 'checkbox') ? el.checked : el.value;
                    }
                });

                const url = id ? `${window.NEST_ENDPOINTS.parent.list}/${id}${authQuery}` : `${window.NEST_ENDPOINTS.parent.list}${authQuery}`;
                const res = await fetch(url, { 
                    method: id ? 'PATCH' : 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (res.ok) { this.closeModal(); this.init(); }
            };
        },

        async loadScript(src) {
            return new Promise(resolve => {
                const s = document.createElement('script'); s.src = src; s.onload = resolve;
                s.onerror = () => { 
                    const fallback = src.replace('../', '');
                    const s2 = document.createElement('script'); s2.src = fallback; s2.onload = resolve;
                    document.head.appendChild(s2);
                };
                document.head.appendChild(s);
            });
        }
    };

    ParentModule.init();
})();
</script>
