<script>
    const PARENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/parent";
    let allParents = [];
    const parentFields = ['first_name', 'last_name', 'email', 'phone', 'address', 'is_active'];

    async function fetchParents() {
        const tbody = document.getElementById('parent-table-body');
        
        // 1. Force clear current memory to prevent "jumping" data or stuck states
        allParents = []; 
        if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-slate-400 text-xs italic">Synchronizing database...</td></tr>';

        const fid = localStorage.getItem('locked_franchise_id');

        if (!fid) {
            if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-red-500 text-xs font-bold uppercase">Branch ID Missing</td></tr>';
            return;
        }

        try {
            // 2. Added cache-busting timestamp to ensure fresh data on every view swap
            const res = await fetch(`${PARENT_API}?franchise_id=${fid}&_t=${Date.now()}`);
            if (res.ok) {
                allParents = await res.json();
                renderParentTable();
            } else {
                throw new Error("API Error");
            }
        } catch (e) {
            if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-red-500 text-xs font-bold uppercase tracking-widest">SYNC ERROR: CHECK CONNECTION</td></tr>';
        }
    }

    function renderParentTable() {
        const tbody = document.getElementById('parent-table-body');
        if (!tbody) return;

        const searchTerm = (document.getElementById('parent-search')?.value || '').toLowerCase();
        const sortVal = document.getElementById('parent-sort')?.value || 'newest';

        let filtered = allParents.filter(p => 
            (p.first_name && p.first_name.toLowerCase().includes(searchTerm)) || 
            (p.last_name && p.last_name.toLowerCase().includes(searchTerm)) ||
            (p.email && p.email.toLowerCase().includes(searchTerm))
        );

        if (sortVal === 'name_asc') {
            filtered.sort((a,b) => (a.first_name || '').localeCompare(b.first_name || ''));
        } else {
            filtered.sort((a,b) => b.id - a.id);
        }

        tbody.innerHTML = '';
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-slate-400 text-xs italic">No parent records found.</td></tr>';
            return;
        }

        filtered.forEach((p, idx) => {
            const bg = idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/30';
            tbody.insertAdjacentHTML('beforeend', `
                <tr class="${bg} border-b border-slate-100 text-xs text-slate-600 hover:bg-slate-50">
                    <td class="p-4 font-bold text-slate-900">${p.first_name} ${p.last_name} [cite: 2026-02-05]</td>
                    <td class="p-4">${p.email || '---'} [cite: 2026-02-05]</td>
                    <td class="p-4">${p.phone || '---'} [cite: 2026-02-05]</td>
                    <td class="p-4 max-w-xs truncate">${p.address || '---'} [cite: 2026-02-05]</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded text-[9px] font-bold uppercase ${p.is_active ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-400'}">
                            ${p.is_active ? 'Active' : 'Inactive'} [cite: 2026-02-05]
                        </span>
                    </td>
                    <td class="p-4 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick='openParentModal(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="px-3 py-1.5 border border-slate-200 rounded text-[9px] font-bold uppercase hover:bg-white shadow-sm">Edit</button>
                        </div>
                    </td>
                </tr>
            `);
        });
    }

    // Initialize
    fetchParents();
</script>
