<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
    <div>
        <h1 class="text-xl font-black text-slate-800 uppercase tracking-tight">Parent Directory</h1>
        <p id="module-subheader" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Syncing Records...</p>
    </div>
    
    <div class="flex flex-wrap gap-2 w-full md:w-auto">
        <input type="text" id="parent-search" placeholder="Search parents..." 
            class="pl-4 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-xs outline-none focus:border-teal-500 shadow-sm w-full md:w-64 transition-all font-bold">
        
        <button id="add-parent-btn" class="bg-teal-500 hover:bg-teal-600 text-white px-5 py-2 rounded-lg font-bold transition-all text-[10px] uppercase tracking-wider shadow-md">
            + ADD NEW PARENT
        </button>
    </div>
</div>

<div class="grid grid-cols-12 px-5 mb-2 text-[8px] font-black text-slate-400 uppercase tracking-widest hidden md:grid">
    <div class="col-span-3">Guardian Info (Sorted A-Z)</div>
    <div class="col-span-2">Contact</div>
    <div class="col-span-4">Home Address</div>
    <div class="col-span-1 text-center">Status</div>
    <div class="col-span-2 text-right">Actions</div>
</div>

<div id="parent-list-container" class="space-y-2">
    <div class="p-10 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest animate-pulse">
        Synchronizing Database...
    </div>
</div>

<div id="parent-modal" class="hidden fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl overflow-hidden border border-slate-200">
        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <div>
                <h2 id="p-modal-title" class="text-xs font-black text-slate-800 uppercase">Guardian Profile</h2>
                <p id="modal-branch-label" class="text-[8px] text-teal-600 font-bold uppercase tracking-widest"></p>
            </div>
            <button id="close-modal-x" class="text-slate-400 hover:text-slate-900 text-2xl">&times;</button>
        </div>
        
        <form id="parent-form" class="p-6">
            <input type="hidden" id="p-edit-id">
            <div id="dynamic-fields-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-3 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
            </div>

            <div class="flex gap-3 pt-6 border-t border-slate-100 mt-6">
                <button type="button" id="cancel-modal-btn" class="px-6 py-2.5 bg-slate-100 text-slate-500 rounded-lg font-bold text-[9px] uppercase hover:bg-slate-200 transition-all">Discard</button>
                <button type="submit" class="flex-1 py-2.5 bg-teal-500 text-white rounded-lg font-bold text-[9px] uppercase shadow-lg hover:bg-teal-600 transition-all">
                    Save Record
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const ParentModule = {
        data: [],
        schema: null,

        async init() {
            if (!window.NEST_SCHEMA) await this.loadScript('../schema_config.js');
            if (!window.NEST_ENDPOINTS) await this.loadScript('../api_config.js');
            if (!window.SecurityManager) await this.loadScript('../security.js');
            
            this.schema = window.NEST_SCHEMA.parent;
            this.buildFormUI(); 
            
            const isSuper = window.SecurityManager.isHeadOffice();
            const branchName = localStorage.getItem('locked_franchise_name') || 'Main';
            const accessKey = window.SecurityManager.getAccessKey();
            
            document.getElementById('module-subheader').innerText = isSuper 
                ? "Full Network Records • Master View" 
                : `Active Guardian Records • ${branchName}`;
            
            document.getElementById('modal-branch-label').innerText = isSuper 
                ? "Global System Master" 
                : `${branchName} Branch`;

            let fetchUrl = window.NEST_ENDPOINTS.parent.list;
            if (isSuper) {
                fetchUrl += `?access_key=${accessKey}`;
            } else {
                const fid = localStorage.getItem('locked_franchise_id');
                fetchUrl += `?franchise_id=${fid}&access_key=${accessKey}`;
            }

            try {
                const response = await fetch(fetchUrl);
                const result = await response.json();
                this.data = Array.isArray(result) ? result : (result.items || []);
                this.render();
                this.setupListeners();
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        },

        buildFormUI() {
            const grid = document.getElementById('dynamic-fields-grid');
            grid.innerHTML = '';
            let currentSection = "";

            this.schema.fields.forEach(f => {
                if (f.id === 'id') return;
                if (f.section && f.section !== currentSection) {
                    currentSection = f.section;
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="col-span-full mt-4 mb-1 border-b border-slate-100 pb-1">
                            <span class="text-[8px] font-black text-teal-600 uppercase tracking-widest">${currentSection}</span>
                        </div>
                    `);
                }
                const spanClass = f.width === 'full' || f.type === 'textarea' ? 'col-span-full' : 'col-span-1';
                let inputHTML = (f.type === 'textarea') 
                    ? `<textarea id="${f.id}" rows="2" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-[11px] outline-none transition-all"></textarea>`
                    : (f.type === 'bool' || f.type === 'checkbox')
                    ? `<div class="flex items-center gap-3 p-2 bg-slate-50 border border-slate-200 rounded-lg"><input type="checkbox" id="${f.id}" class="w-3.5 h-3.5 accent-teal-500"><span class="text-[9px] font-bold text-slate-500 uppercase">${f.label}</span></div>`
                    : `<input type="${f.type}" id="${f.id}" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-[11px] outline-none font-bold">`;

                grid.insertAdjacentHTML('beforeend', `<div class="${spanClass}"><label class="text-[8px] text-slate-400 block uppercase font-black mb-1 ml-1 tracking-wider">${f.label}</label>${inputHTML}</div>`);
            });
        },

        render() {
            const container = document.getElementById('parent-list-container');
            const search = (document.getElementById('parent-search')?.value || '').toLowerCase();
            const isSuper = window.SecurityManager.isHeadOffice();
            
            // Filter and then Sort by Last Name, then First Name
            let filtered = this.data
                .filter(p => `${p.first_name} ${p.last_name} ${p.email} ${p.phone}`.toLowerCase().includes(search))
                .sort((a, b) => {
                    const lnSort = (a.last_name || '').localeCompare(b.last_name || '');
                    if (lnSort !== 0) return lnSort;
                    return (a.first_name || '').localeCompare(b.first_name || '');
                });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-10 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest">No matching records.</div>`;
                return;
            }

            container.innerHTML = '';
            filtered.forEach(p => {
                const branchBadge = isSuper ? `<span class="px-1.5 py-0.5 rounded bg-slate-100 text-slate-500 text-[7px] font-black uppercase ml-1">ID:${p.franchise_id}</span>` : '';

                container.insertAdjacentHTML('beforeend', `
                    <div class="bg-white border border-slate-200 rounded-lg shadow-sm hover:border-teal-400 transition-all px-4 py-2">
                        <div class="grid grid-cols-1 md:grid-cols-12 items-center gap-4">
                            <div class="col-span-3">
                                <div class="text-[11px] font-black text-slate-800 uppercase leading-none">${p.last_name}, ${p.first_name} ${branchBadge}</div>
                                <div class="text-[9px] text-slate-400 font-bold lowercase mt-0.5">${p.email || 'no email'}</div>
                            </div>
                            <div class="col-span-2">
                                <div class="text-[10px] font-mono text-teal-600 font-bold">${p.phone || '---'}</div>
                            </div>
                            <div class="col-span-4">
                                <div class="text-[9px] text-slate-500 font-bold uppercase truncate pr-4">${p.address || '---'}</div>
                            </div>
                            <div class="col-span-1 text-center">
                                <span class="px-2 py-0.5 rounded text-[7px] font-black uppercase border ${p.is_active ? 'bg-teal-50 text-teal-600 border-teal-100' : 'bg-red-50 text-red-600 border-red-100'}">
                                    ${p.is_active ? 'Active' : 'Arch'}
                                </span>
                            </div>
                            <div class="col-span-2 text-right">
                                <button data-id="${p.id}" class="parent-edit-btn px-3 py-1 bg-slate-50 border border-slate-200 rounded text-[8px] font-black text-slate-600 hover:bg-slate-800 hover:text-white hover:border-slate-800 transition-all uppercase">Edit Record</button>
                            </div>
                        </div>
                    </div>
                `);
            });

            container.querySelectorAll('.parent-edit-btn').forEach(b => {
                b.onclick = () => this.openModal(this.data.find(x => x.id == b.dataset.id));
            });
        },

        openModal(p = null) {
            document.getElementById('parent-modal').classList.remove('hidden');
            document.getElementById('parent-form').reset();
            document.getElementById('p-edit-id').value = p ? p.id : '';
            this.schema.fields.forEach(f => {
                const el = document.getElementById(f.id);
                if (el) {
                    if (f.type === 'bool' || f.type === 'checkbox') el.checked = p ? !!p[f.id] : (f.default ?? true);
                    else el.value = p ? (p[f.id] || '') : '';
                }
            });
        },

        closeModal() { document.getElementById('parent-modal').classList.add('hidden'); },

        setupListeners() {
            document.getElementById('parent-search').oninput = () => this.render();
            document.getElementById('add-parent-btn').onclick = () => this.openModal();
            document.getElementById('close-modal-x').onclick = () => this.closeModal();
            document.getElementById('cancel-modal-btn').onclick = () => this.closeModal();

            document.getElementById('parent-form').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('p-edit-id').value;
                const accessKey = window.SecurityManager.getAccessKey();
                const isSuper = window.SecurityManager.isHeadOffice();
                const payload = { franchise_id: isSuper ? 1 : parseInt(localStorage.getItem('locked_franchise_id')) };
                
                this.schema.fields.forEach(f => {
                    const el = document.getElementById(f.id);
                    if (el && f.id !== 'id' && !f.readonly) {
                        payload[f.id] = (f.type === 'bool' || f.type === 'checkbox') ? el.checked : el.value;
                    }
                });

                const url = id ? `${window.NEST_ENDPOINTS.parent.list}/${id}?access_key=${accessKey}` : `${window.NEST_ENDPOINTS.parent.list}?access_key=${accessKey}`;
                const res = await fetch(url, { 
                    method: id ? 'PATCH' : 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (res.ok) { this.closeModal(); this.init(); }
            };
        },

        async loadScript(src) {
            return new Promise(resolve => {
                const s = document.createElement('script'); s.src = src; s.onload = resolve;
                s.onerror = () => { 
                    const fallback = src.replace('../', '');
                    const s2 = document.createElement('script'); s2.src = fallback; s2.onload = resolve;
                    document.head.appendChild(s2);
                };
                document.head.appendChild(s);
            });
        }
    };

    ParentModule.init();
})();
</script>
