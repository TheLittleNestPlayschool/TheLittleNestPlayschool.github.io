<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
        <h1 class="text-2xl font-bold text-slate-800 uppercase tracking-tight">Parent Directory</h1>
        <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Franchise Management System</p>
    </div>
    
    <div class="flex flex-wrap gap-2 w-full md:w-auto">
        <input type="text" id="parent-search" oninput="renderParentTable()" placeholder="Search parents..." 
            class="pl-4 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-xs outline-none focus:border-slate-500 shadow-sm w-full md:w-64">

        <select id="parent-sort" onchange="renderParentTable()" class="bg-white border border-slate-300 px-3 py-2 rounded-lg text-[10px] font-medium text-slate-600 outline-none">
            <option value="newest">Newest First</option>
            <option value="name_asc">Name: A-Z</option>
        </select>
        
        <button onclick="openParentModal()" class="bg-[#1e293b] hover:bg-slate-900 text-white px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase tracking-wider shadow-md">
            + ADD PARENT
        </button>
    </div>
</div>

<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-slate-100 border-b border-slate-200">
                <th class="p-4 text-[10px] font-bold text-slate-500 uppercase">Primary Guardian</th>
                <th class="p-4 text-[10px] font-bold text-slate-500 uppercase">Secondary Guardian</th>
                <th class="p-4 text-[10px] font-bold text-slate-500 uppercase">Emergency Contacts</th>
                <th class="p-4 text-[10px] font-bold text-slate-500 uppercase text-right">Actions</th>
            </tr>
        </thead>
        <tbody id="parent-table-body">
            <tr><td colspan="4" class="p-10 text-center text-slate-400 text-xs italic">Synchronizing database...</td></tr>
        </tbody>
    </table>
</div>

<div id="parent-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl overflow-hidden border border-slate-300">
        <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
            <h2 id="p-modal-title" class="text-sm font-bold text-slate-800 uppercase">Parent Profile</h2>
            <button onclick="closeParentModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
        </div>
        
        <form id="parent-form" class="p-6 space-y-6 max-h-[85vh] overflow-y-auto">
            <input type="hidden" id="p-edit-id">
            <input type="hidden" id="p-franchise-id">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="space-y-4">
                    <p class="text-[10px] font-black text-slate-800 uppercase border-b pb-1">Primary Guardian</p>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[9px] text-slate-500 block">First Name</label><input type="text" id="first_name" required class="w-full p-2 bg-slate-50 border border-slate-300 rounded text-xs"></div>
                        <div><label class="text-[9px] text-slate-500 block">Last Name</label><input type="text" id="last_name" required class="w-full p-2 bg-slate-50 border border-slate-300 rounded text-xs"></div>
                    </div>
                    <div><label class="text-[9px] text-slate-500 block">Email Address</label><input type="email" id="email" required class="w-full p-2 bg-slate-50 border border-slate-300 rounded text-xs"></div>
                    <div><label class="text-[9px] text-slate-500 block">Phone Number</label><input type="text" id="phone" required class="w-full p-2 bg-slate-50 border border-slate-300 rounded text-xs"></div>
                    <div><label class="text-[9px] text-slate-500 block">Home Address</label><textarea id="address" rows="2" class="w-full p-2 bg-slate-50 border border-slate-300 rounded text-xs"></textarea></div>
                    <div class="pt-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="is_active" class="rounded border-slate-300">
                            <span class="text-[10px] font-bold text-slate-600 uppercase">Active Account</span>
                        </label>
                    </div>
                </div>

                <div class="space-y-4">
                    <p class="text-[10px] font-black text-slate-800 uppercase border-b pb-1">Spouse / Secondary</p>
                    <div><label class="text-[9px] text-slate-500 block">Full Name</label><input type="text" id="second_parent_name" class="w-full p-2 bg-slate-50 border border-slate-300 rounded text-xs"></div>
                    <div><label class="text-[9px] text-slate-500 block">Secondary Phone</label><input type="text" id="second_parent_phone" class="w-full p-2 bg-slate-50 border border-slate-300 rounded text-xs"></div>
                    
                    <p class="text-[10px] font-black text-[#e11d48] uppercase border-b pb-1 pt-4">Primary Emergency</p>
                    <div><label class="text-[9px] text-slate-500 block">Contact Name</label><input type="text" id="emergency_contact_1_name" class="w-full p-2 bg-red-50/30 border border-slate-300 rounded text-xs"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[9px] text-slate-500 block">Phone</label><input type="text" id="emergency_contact_1_phone_number" class="w-full p-2 bg-red-50/30 border border-slate-300 rounded text-xs"></div>
                        <div><label class="text-[9px] text-slate-500 block">Relation</label><input type="text" id="emergency_contact_1_relationship" class="w-full p-2 bg-red-50/30 border border-slate-300 rounded text-xs"></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <p class="text-[10px] font-black text-slate-800 uppercase border-b pb-1">Backup Emergency</p>
                    <div><label class="text-[9px] text-slate-500 block">Contact Name</label><input type="text" id="emergency_contact_2_name" class="w-full p-2 bg-slate-50 border border-slate-300 rounded text-xs"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[9px] text-slate-500 block">Phone</label><input type="text" id="emergency_contact_2_phone_number" class="w-full p-2 bg-slate-50 border border-slate-300 rounded text-xs"></div>
                        <div><label class="text-[9px] text-slate-500 block">Relation</label><input type="text" id="emergency_contact_2_relationship" class="w-full p-2 bg-slate-50 border border-slate-300 rounded text-xs"></div>
                    </div>
                    
                    <p class="text-[10px] font-black text-slate-800 uppercase border-b pb-1 pt-4">Admin Notes</p>
                    <div><textarea id="inactivation_reason_comments" rows="3" class="w-full p-2 bg-slate-50 border border-slate-300 rounded text-xs"></textarea></div>
                </div>
            </div>

            <div class="flex gap-3 pt-6">
                <button type="button" onclick="closeParentModal()" class="px-6 py-2 bg-slate-100 text-slate-500 rounded font-bold text-[10px] uppercase">Cancel</button>
                <button type="submit" class="flex-1 py-2 bg-[#1e293b] text-white rounded font-bold text-[10px] uppercase shadow-lg">Save Profile</button>
            </div>
        </form>
    </div>
</div>

<script>
    const PARENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/parent";
    let allParents = [];
    
    // Exact mapping of all fields from the Parent Table
    const parentFields = [
        'first_name', 'last_name', 'email', 'phone', 'address', 'is_active',
        'second_parent_name', 'second_parent_phone', 'emergency_contact_1_name',
        'emergency_contact_1_phone_number', 'emergency_contact_1_relationship',
        'emergency_contact_2_name', 'emergency_contact_2_phone_number',
        'emergency_contact_2_relationship', 'inactivation_reason_comments'
    ];

    async function fetchParents() {
        // Ensure Identity Lock is ready
        const fid = localStorage.getItem('locked_franchise_id');
        const tbody = document.getElementById('parent-table-body');

        if (!fid) {
            tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400 text-xs italic">Branch ID missing. Please re-select from Identity Lock.</td></tr>';
            return;
        }

        try {
            const res = await fetch(`${PARENT_API}?franchise_id=${fid}`);
            if (res.ok) {
                allParents = await res.json();
                renderParentTable();
            } else {
                tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-500 text-xs font-bold uppercase">RELOAD ERROR: Connection Lost</td></tr>';
            }
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-500 text-xs font-bold uppercase">RELOAD ERROR: Connection Lost</td></tr>';
        }
    }

    function renderParentTable() {
        const tbody = document.getElementById('parent-table-body');
        const searchTerm = document.getElementById('parent-search').value.toLowerCase();
        const sortVal = document.getElementById('parent-sort').value;

        let filtered = allParents.filter(p => 
            `${p.first_name} ${p.last_name}`.toLowerCase().includes(searchTerm) || 
            p.email.toLowerCase().includes(searchTerm) || 
            p.phone.includes(searchTerm)
        );

        if (sortVal === 'name_asc') filtered.sort((a,b) => a.first_name.localeCompare(b.first_name));
        else filtered.sort((a,b) => b.id - a.id);

        tbody.innerHTML = '';
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400 text-xs italic">No parent records found for this branch.</td></tr>';
            return;
        }

        filtered.forEach((p, idx) => {
            const bg = idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/30';
            
            tbody.insertAdjacentHTML('beforeend', `
                <tr class="${bg} border-b border-slate-100 text-xs text-slate-600 hover:bg-slate-50 transition-colors">
                    <td class="p-4">
                        <div class="font-bold text-slate-900 text-sm">${p.first_name} ${p.last_name}</div>
                        <div class="text-[10px] text-slate-400 mt-0.5">Email: ${p.email}</div>
                        <div class="text-[10px] text-slate-400">Phone: ${p.phone}</div>
                        <div class="text-[10px] text-slate-400 mt-1 max-w-[250px]">${p.address || ''}</div>
                    </td>
                    <td class="p-4">
                        <div class="font-medium text-slate-800">${p.second_parent_name || '---'}</div>
                        <div class="text-[10px] text-slate-400">${p.second_parent_phone || ''}</div>
                    </td>
                    <td class="p-4">
                        <div class="space-y-2">
                            <div class="bg-red-50 p-1.5 rounded border border-red-100/50">
                                <div class="text-[8px] font-bold text-red-400 uppercase leading-none mb-1">#1 ${p.emergency_contact_1_relationship || 'Emergency'}</div>
                                <div class="font-bold text-slate-700 truncate">${p.emergency_contact_1_name || 'NONE'}</div>
                                <div class="text-[10px] text-slate-500">${p.emergency_contact_1_phone_number || ''}</div>
                            </div>
                            <div class="bg-slate-50 p-1.5 rounded border border-slate-100">
                                <div class="text-[8px] font-bold text-slate-400 uppercase leading-none mb-1">#2 ${p.emergency_contact_2_relationship || 'Backup'}</div>
                                <div class="font-bold text-slate-700 truncate">${p.emergency_contact_2_name || 'NONE'}</div>
                                <div class="text-[10px] text-slate-500">${p.emergency_contact_2_phone_number || ''}</div>
                            </div>
                        </div>
                    </td>
                    <td class="p-4 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick='openParentModal(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="px-3 py-1.5 border border-slate-200 rounded text-[9px] font-bold uppercase hover:bg-white shadow-sm">Edit</button>
                            <button onclick="deleteParent(${p.id})" class="px-3 py-1.5 border border-red-50 text-red-300 rounded text-[9px] font-bold uppercase hover:text-red-500 transition-all">Del</button>
                        </div>
                    </td>
                </tr>
            `);
        });
    }

    function openParentModal(p = null) {
        const modal = document.getElementById('parent-modal');
        const fid = localStorage.getItem('locked_franchise_id');

        modal.classList.remove('hidden');
        document.getElementById('parent-form').reset();

        document.getElementById('p-edit-id').value = p ? p.id : '';
        document.getElementById('p-franchise-id').value = fid;
        document.getElementById('p-modal-title').innerText = p ? 'Update Parent Profile' : 'New Parent Profile';

        if (p) {
            parentFields.forEach(f => {
                const el = document.getElementById(f);
                if (el) {
                    if (el.type === 'checkbox') el.checked = p[f];
                    else el.value = p[f] || '';
                }
            });
        } else {
            document.getElementById('is_active').checked = true;
        }
    }

    function closeParentModal() { document.getElementById('parent-modal').classList.add('hidden'); }

    document.getElementById('parent-form').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('p-edit-id').value;
        const fid = document.getElementById('p-franchise-id').value;
        
        const payload = { franchise_id: parseInt(fid) };
        parentFields.forEach(f => {
            const el = document.getElementById(f);
            if (el) {
                if (el.type === 'checkbox') payload[f] = el.checked;
                else payload[f] = el.value;
            }
        });

        const method = id ? 'PATCH' : 'POST';
        const url = id ? `${PARENT_API}/${id}` : PARENT_API;

        try {
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                closeParentModal();
                fetchParents();
            }
        } catch (err) { alert("Error saving record."); }
    };

    async function deleteParent(id) {
        if (confirm("Delete this record permanently?")) {
            await fetch(`${PARENT_API}/${id}`, { method: 'DELETE' });
            fetchParents();
        }
    }

    // Initial Load
    fetchParents();
</script>
