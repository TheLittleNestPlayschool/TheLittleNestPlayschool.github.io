<link rel="stylesheet" href="../nest_style.css">

<style>
    /* Use the root variables from nest_style.css for any local tweaks */
    .btn-nest-teal { background: var(--nest-teal); color: #fff; }
    .btn-nest-teal:hover { opacity: 0.9; }
    .text-nest-dark { color: var(--nest-dark); }
    .text-nest-teal { color: var(--nest-teal); }
    
    /* Visual guidance for Proper Case */
    input.standardize, textarea.standardize { text-transform: capitalize; }
</style>

<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
    <div>
        <h1 class="text-xl font-black text-nest-dark uppercase tracking-tight">Parent Directory</h1>
        <p id="module-subheader" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Syncing Records...</p>
    </div>
    
    <div class="flex flex-wrap gap-2 w-full md:w-auto">
        <select id="parent-sort" class="pl-3 pr-8 py-2 bg-slate-100 border-none rounded-lg text-[10px] font-black uppercase outline-none focus:ring-2 focus:ring-[var(--nest-teal)] transition-all cursor-pointer">
            <option value="name">Sort: Name (A-Z)</option>
            <option value="franchise">Sort: Branch Location</option>
            <option value="status">Sort: Active Status</option>
        </select>

        <input type="text" id="parent-search" placeholder="Search parents..." 
            class="pl-4 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-xs outline-none focus:border-[var(--nest-teal)] shadow-sm w-full md:w-64 transition-all font-bold">
        
        <button id="add-parent-btn" class="btn-nest-teal px-5 py-2 rounded-lg font-bold transition-all text-[10px] shadow-md">
            + Add New Parent
        </button>
    </div>
</div>

<div class="grid grid-cols-12 px-5 mb-2 text-[8px] font-black text-slate-400 uppercase tracking-widest hidden md:grid">
    <div class="col-span-3">Guardian Info</div>
    <div class="col-span-2">Contact</div>
    <div class="col-span-4">Home Address</div>
    <div class="col-span-1 text-center">Status</div>
    <div class="col-span-2 text-right">Actions</div>
</div>

<div id="parent-list-container" class="space-y-2">
    <div class="p-10 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest animate-pulse">
        Synchronizing Database...
    </div>
</div>

<div id="parent-modal" class="hidden fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl overflow-hidden border border-slate-200">
        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <div>
                <h2 id="p-modal-title" class="text-xs font-black text-nest-dark uppercase">Guardian Profile</h2>
                <p id="modal-branch-label" class="text-[8px] text-nest-teal font-bold uppercase tracking-widest"></p>
            </div>
            <button id="close-modal-x" class="text-slate-400 hover:text-nest-dark text-2xl">&times;</button>
        </div>
        
        <form id="parent-form" class="p-6">
            <input type="hidden" id="p-edit-id">
            <div id="dynamic-fields-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-3 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
            </div>

            <div class="flex gap-3 pt-6 border-t border-slate-100 mt-6">
                <button type="button" id="cancel-modal-btn" class="px-6 py-2.5 bg-slate-100 text-slate-500 rounded-lg font-bold text-[9px] uppercase hover:bg-slate-200 transition-all">Discard</button>
                <button type="submit" class="flex-1 py-2.5 btn-nest-teal rounded-lg font-bold text-[9px] uppercase shadow-lg">
                    Save Record
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const ParentModule = {
        data: [],
        franchises: {},
        schema: null,

        async init() {
            if (!window.NEST_SCHEMA) await this.loadScript('../schema_config.js');
            if (!window.NEST_ENDPOINTS) await this.loadScript('../api_config.js');
            if (!window.SecurityManager) await this.loadScript('../security.js');
            
            this.schema = window.NEST_SCHEMA.parent;
            this.buildFormUI(); 
            
            const isSuper = window.SecurityManager.isHeadOffice();
            const accessKey = window.SecurityManager.getAccessKey();

            if (isSuper) {
                try {
                    const fRes = await fetch(`${window.NEST_ENDPOINTS.franchise.list}?access_key=${accessKey}`);
                    const fData = await fRes.json();
                    const fList = Array.isArray(fData) ? fData : (fData.items || []);
                    fList.forEach(f => { this.franchises[f.id] = f.name; });
                } catch(e) { console.error("Franchise load error", e); }
            }
            
            const branchName = localStorage.getItem('locked_franchise_name') || 'Main';
            document.getElementById('module-subheader').innerText = isSuper 
                ? "Full Network Records • Master View" 
                : `Active Guardian Records • ${branchName}`;
            
            document.getElementById('modal-branch-label').innerText = isSuper 
                ? "Global System Master" 
                : `${branchName} Branch`;

            let fetchUrl = window.NEST_ENDPOINTS.parent.list + `?access_key=${accessKey}`;
            if (!isSuper) {
                const fid = localStorage.getItem('locked_franchise_id');
                fetchUrl += `&franchise_id=${fid}`;
            }

            try {
                const response = await fetch(fetchUrl);
                const result = await response.json();
                this.data = Array.isArray(result) ? result : (result.items || []);
                this.render();
                this.setupListeners();
            } catch (err) { console.error(err); }
        },

        toProperCase(str) {
            if (!str || typeof str !== 'string') return "";
            return str.toLowerCase().replace(/\b\w/g, char => char.toUpperCase());
        },

        buildFormUI() {
            const grid = document.getElementById('dynamic-fields-grid');
            grid.innerHTML = '';
            let currentSection = "";
            this.schema.fields.forEach(f => {
                if (f.id === 'id' || f.id === 'franchise_id' || f.id === 'created_at' || f.label.toLowerCase().includes('date')) return;
                
                if (f.section && f.section !== currentSection) {
                    currentSection = f.section;
                    grid.insertAdjacentHTML('beforeend', `<div class="col-span-full mt-4 mb-1 border-b border-slate-100 pb-1"><span class="text-[8px] font-black text-nest-teal uppercase tracking-widest">${currentSection}</span></div>`);
                }
                const spanClass = f.width === 'full' || f.type === 'textarea' ? 'col-span-full' : 'col-span-1';
                
                const isProperField = f.type === 'text' || f.type === 'textarea';
                const inputClass = isProperField ? "standardize" : "";

                let inputHTML = (f.type === 'textarea') 
                    ? `<textarea id="${f.id}" rows="2" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-[11px] outline-none font-bold ${inputClass}"></textarea>`
                    : (f.type === 'bool' || f.type === 'checkbox')
                    ? `<div class="flex items-center gap-3 p-2 bg-slate-50 border border-slate-200 rounded-lg"><input type="checkbox" id="${f.id}" class="w-3.5 h-3.5 accent-[var(--nest-teal)]"><span class="text-[9px] font-bold text-slate-500 uppercase">${f.label}</span></div>`
                    : `<input type="${f.type}" id="${f.id}" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-[11px] outline-none font-bold ${inputClass}">`;
                
                grid.insertAdjacentHTML('beforeend', `<div class="${spanClass}"><label class="text-[8px] text-slate-400 block uppercase font-black mb-1 ml-1 tracking-wider">${f.label}</label>${inputHTML}</div>`);
            });
        },

        render() {
            const container = document.getElementById('parent-list-container');
            const search = (document.getElementById('parent-search')?.value || '').toLowerCase();
            const sortType = document.getElementById('parent-sort').value;
            const isSuper = window.SecurityManager.isHeadOffice();
            
            let filtered = this.data.filter(p => `${p.first_name} ${p.last_name} ${p.email} ${p.phone}`.toLowerCase().includes(search));

            filtered.sort((a, b) => {
                if (sortType === 'franchise') return (a.franchise_id || 0) - (b.franchise_id || 0) || (a.last_name || '').localeCompare(b.last_name || '');
                if (sortType === 'status') return (b.is_active === a.is_active) ? (a.last_name || '').localeCompare(b.last_name || '') : (b.is_active ? -1 : 1);
                return (a.last_name || '').localeCompare(b.last_name || '') || (a.first_name || '').localeCompare(b.first_name || '');
            });

            container.innerHTML = '';
            filtered.forEach(p => {
                const fName = this.franchises[p.franchise_id] || `ID: ${p.franchise_id}`;
                const branchBadge = isSuper ? `<span class="px-1.5 py-0.5 rounded bg-nest-dark text-white text-[7px] font-black uppercase ml-1" style="background: var(--nest-dark)">${fName}</span>` : '';
                
                container.insertAdjacentHTML('beforeend', `
                    <div class="bg-white border border-slate-200 rounded-lg shadow-sm hover:border-[var(--nest-teal)] transition-all px-4 py-2">
                        <div class="grid grid-cols-1 md:grid-cols-12 items-center gap-4">
                            <div class="col-span-3">
                                <div class="text-[11px] font-black text-nest-dark uppercase leading-none">${p.last_name}, ${p.first_name} ${branchBadge}</div>
                                <div class="text-[9px] text-slate-400 font-bold lowercase mt-0.5">${p.email || 'no email'}</div>
                            </div>
                            <div class="col-span-2"><div class="text-[10px] font-mono text-nest-teal font-bold">${p.phone || '---'}</div></div>
                            <div class="col-span-4"><div class="text-[9px] text-slate-500 font-bold uppercase truncate pr-4">${p.address || '---'}</div></div>
                            <div class="col-span-1 text-center">
                                <span class="px-2 py-0.5 rounded text-[7px] font-black uppercase border ${p.is_active ? 'bg-teal-50 text-nest-teal border-teal-100' : 'bg-red-50 text-red-600 border-red-100'}" ${p.is_active ? 'style="color: var(--nest-teal); border-color: var(--nest-teal); opacity: 0.8;"' : ''}>${p.is_active ? 'Active' : 'Arch'}</span>
                            </div>
                            <div class="col-span-2 text-right flex justify-end gap-2">
                                <button data-id="${p.id}" class="parent-edit-btn px-3 py-1 bg-slate-50 border border-slate-200 rounded text-[8px] font-black text-slate-600 hover:bg-nest-dark hover:text-white transition-all uppercase" onmouseover="this.style.background='var(--nest-dark)'" onmouseout="this.style.background=''">Edit</button>
                                <button data-id="${p.id}" class="parent-delete-btn px-3 py-1 bg-red-50 border border-red-100 rounded text-[8px] font-black text-red-600 hover:bg-red-600 hover:text-white transition-all uppercase">Delete</button>
                            </div>
                        </div>
                    </div>
                `);
            });

            container.querySelectorAll('.parent-edit-btn').forEach(b => { b.onclick = () => this.openModal(this.data.find(x => x.id == b.dataset.id)); });
            container.querySelectorAll('.parent-delete-btn').forEach(b => { b.onclick = () => this.deleteRecord(b.dataset.id); });
        },

        async deleteRecord(id) {
            if (!confirm("Permanently delete parent record?")) return;
            const accessKey = window.SecurityManager.getAccessKey();
            try {
                const res = await fetch(`${window.NEST_ENDPOINTS.parent.list}/${id}?access_key=${accessKey}`, { method: 'DELETE' });
                if (res.ok) this.init();
            } catch (err) { console.error(err); }
        },

        openModal(p = null) {
            document.getElementById('parent-modal').classList.remove('hidden');
            document.getElementById('parent-form').reset();
            document.getElementById('p-edit-id').value = p ? p.id : '';
            this.schema.fields.forEach(f => {
                const el = document.getElementById(f.id);
                if (el) {
                    if (f.type === 'bool' || f.type === 'checkbox') el.checked = p ? !!p[f.id] : (f.default ?? true);
                    else el.value = p ? (p[f.id] || '') : '';
                }
            });
        },

        closeModal() { document.getElementById('parent-modal').classList.add('hidden'); },

        setupListeners() {
            document.getElementById('parent-search').oninput = () => this.render();
            document.getElementById('parent-sort').onchange = () => this.render();
            document.getElementById('add-parent-btn').onclick = () => this.openModal();
            document.getElementById('close-modal-x').onclick = () => this.closeModal();
            document.getElementById('cancel-modal-btn').onclick = () => this.closeModal();

            document.getElementById('parent-form').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('p-edit-id').value;
                const accessKey = window.SecurityManager.getAccessKey();
                const fid = localStorage.getItem('locked_franchise_id');
                const payload = { franchise_id: parseInt(fid) };
                
                this.schema.fields.forEach(f => {
                    const el = document.getElementById(f.id);
                    if (el && f.id !== 'id' && !f.readonly) {
                        let val = (f.type === 'bool' || f.type === 'checkbox') ? el.checked : el.value;
                        
                        // LOGIC: If text field, check if it's empty/spaces.
                        // Send null to database if empty, otherwise Proper Case.
                        if (typeof val === 'string' && f.type !== 'email') {
                            const trimmedVal = val.trim();
                            val = (trimmedVal === "") ? null : this.toProperCase(trimmedVal);
                        }
                        payload[f.id] = val;
                    }
                });
                
                const url = id ? `${window.NEST_ENDPOINTS.parent.list}/${id}?access_key=${accessKey}` : `${window.NEST_ENDPOINTS.parent.list}?access_key=${accessKey}`;
                const res = await fetch(url, { 
                    method: id ? 'PATCH' : 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (res.ok) { this.closeModal(); this.init(); }
            };
        },

        async loadScript(src) {
            return new Promise(resolve => {
                const s = document.createElement('script'); s.src = src; s.onload = resolve;
                s.onerror = () => { 
                    const s2 = document.createElement('script'); s2.src = src.replace('../', ''); s2.onload = resolve;
                    document.head.appendChild(s2);
                };
                document.head.appendChild(s);
            });
        }
    };
    ParentModule.init();
})();
</script>
