<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <h1 class="text-4xl font-black text-slate-800 tracking-tight">Parent Directory</h1>
    
    <div class="flex flex-wrap gap-3 w-full md:w-auto">
        <div class="relative flex-1 md:w-64">
            <input type="text" id="search-input" oninput="renderTable()" placeholder="Search Name, Email, Phone..." 
                class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl font-bold text-xs outline-none focus:ring-2 focus:ring-[#00d1b2] shadow-sm">
        </div>

        <select id="sort-control" onchange="renderTable()" class="bg-white border border-slate-200 px-4 py-3 rounded-xl font-bold text-[10px] text-slate-500 uppercase tracking-widest outline-none shadow-sm">
            <option value="newest">Newest First</option>
            <option value="name_asc">Name: A-Z</option>
        </select>
        
        <button onclick="openParentModal()" class="bg-[#00d1b2] hover:bg-[#00bfa5] text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg flex items-center gap-2 text-xs uppercase tracking-widest">
            <span>+</span> ADD NEW PARENT
        </button>
    </div>
</div>

<div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-slate-50 border-b border-slate-100">
                <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Primary Parent</th>
                <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Second Parent</th>
                <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Emergency Contacts</th>
                <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Management</th>
            </tr>
        </thead>
        <tbody id="parent-table-body">
            <tr><td colspan="4" class="p-20 text-center text-slate-400 italic font-bold">Synchronizing Directory...</td></tr>
        </tbody>
    </table>
</div>

<div id="parent-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-4xl overflow-hidden border border-slate-200">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h2 id="modal-title" class="text-2xl font-black text-slate-800 tracking-tight">Parent Profile</h2>
            <button onclick="closeParentModal()" class="text-slate-400 hover:text-slate-600 font-bold text-2xl">&times;</button>
        </div>
        
        <form id="parent-form" class="p-8 space-y-6 max-h-[80vh] overflow-y-auto">
            <input type="hidden" id="edit-id">
            
            <div class="space-y-4">
                <h3 class="text-xs font-black text-[#00d1b2] uppercase tracking-[0.2em]">Primary Parent</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="first_name" placeholder="First Name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                    <input type="text" id="last_name" placeholder="Last Name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="email" id="email" placeholder="Email Address" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                    <input type="text" id="phone" placeholder="Phone Number" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                </div>
                <textarea id="address" placeholder="Home Address" rows="1" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none"></textarea>
            </div>

            <div class="space-y-4 pt-4 border-t border-slate-100">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Second Parent / Guardian</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="second_parent_full_name" placeholder="Full Name" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                    <input type="text" id="second_parent_relationship" placeholder="Relationship" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="second_parent_phone_number" placeholder="Phone" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                    <input type="email" id="second_parent_email_address" placeholder="Email" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                </div>
                <textarea id="second_parent_home_address" placeholder="Second Parent Address" rows="1" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-8 pt-4 border-t border-slate-100">
                <div class="space-y-3">
                    <h3 class="text-[10px] font-black text-orange-400 uppercase tracking-widest">Emergency Contact 1</h3>
                    <input type="text" id="emergency_contact_1_name" placeholder="Full Name" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none">
                    <input type="text" id="emergency_contact_1_relationship" placeholder="Relationship" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none">
                    <input type="text" id="emergency_contact_1_phone_number" placeholder="Phone" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none">
                </div>
                <div class="space-y-3">
                    <h3 class="text-[10px] font-black text-orange-400 uppercase tracking-widest">Emergency Contact 2</h3>
                    <input type="text" id="emergency_contact_2_name" placeholder="Full Name" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none">
                    <input type="text" id="emergency_contact_2_relationship" placeholder="Relationship" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none">
                    <input type="text" id="emergency_contact_2_phone_number" placeholder="Phone" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none">
                </div>
            </div>

            <div class="space-y-4 pt-4 border-t border-slate-100">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Administrative Notes</h3>
                <textarea id="inactivation_reason_comments" placeholder="Comments or Inactivation Reasons" rows="2" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none"></textarea>
            </div>

            <div class="pt-6 flex gap-3">
                <button type="button" onclick="closeParentModal()" class="flex-1 p-4 bg-slate-100 text-slate-500 rounded-xl font-bold hover:bg-slate-200 transition-all uppercase text-xs">Cancel</button>
                <button type="submit" class="flex-1 p-4 bg-[#00d1b2] text-white rounded-xl font-black hover:bg-[#00bfa5] transition-all uppercase text-xs shadow-lg">Save Record</button>
            </div>
        </form>
    </div>
</div>

<script>
    const PARENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/parent";
    let allParents = [];

    // Fields mapping [cite: 2026-02-05]
    const parentFields = [
        'first_name', 'last_name', 'email', 'phone', 'address',
        'second_parent_full_name', 'second_parent_relationship', 'second_parent_phone_number', 
        'second_parent_email_address', 'second_parent_home_address',
        'emergency_contact_1_name', 'emergency_contact_1_relationship', 'emergency_contact_1_phone_number',
        'emergency_contact_2_name', 'emergency_contact_2_relationship', 'emergency_contact_2_phone_number',
        'inactivation_reason_comments'
    ];

    async function fetchParents() {
        const fid = localStorage.getItem('locked_franchise_id');
        const tbody = document.getElementById('parent-table-body');
        if(!fid) return;

        try {
            const res = await fetch(`${PARENT_API}?franchise_id=${fid}`);
            if (!res.ok) throw new Error("Sync Error");
            allParents = await res.json();
            renderTable();
        } catch (e) { 
            tbody.innerHTML = '<tr><td colspan="4" class="p-20 text-center text-red-500 font-bold uppercase tracking-widest">Error: Xano Connection Failed.</td></tr>'; 
        }
    }

    function renderTable() {
        const tbody = document.getElementById('parent-table-body');
        const searchTerm = document.getElementById('search-input').value.toLowerCase();
        const sortType = document.getElementById('sort-control').value;

        let filtered = allParents.filter(p => {
            return `${p.first_name} ${p.last_name}`.toLowerCase().includes(searchTerm) ||
                   (p.second_parent_full_name || '').toLowerCase().includes(searchTerm) ||
                   (p.phone || '').includes(searchTerm);
        });

        if (sortType === 'newest') filtered.sort((a, b) => b.created_at - a.created_at);
        if (sortType === 'name_asc') filtered.sort((a, b) => `${a.first_name} ${a.last_name}`.localeCompare(`${b.first_name} ${b.last_name}`));

        tbody.innerHTML = '';
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="p-20 text-center text-slate-400 font-bold">No Records Found.</td></tr>';
            return;
        }

        filtered.forEach(p => {
            tbody.insertAdjacentHTML('beforeend', `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td class="p-5">
                        <div class="text-sm font-black text-slate-800">${p.first_name} ${p.last_name}</div>
                        <div class="text-[11px] text-[#00d1b2] font-bold">${p.email}</div>
                        <div class="text-[11px] text-slate-400 font-medium">${p.phone}</div>
                    </td>
                    <td class="p-5">
                        <div class="text-sm font-bold text-slate-700">${p.second_parent_full_name || '---'}</div>
                        <div class="text-[10px] text-slate-400 font-medium">${p.second_parent_relationship || ''}</div>
                    </td>
                    <td class="p-5">
                        <div class="text-[10px] text-slate-800 font-black uppercase">1. ${p.emergency_contact_1_name || 'N/A'}</div>
                        <div class="text-[10px] text-slate-400 mb-1">${p.emergency_contact_1_phone_number || ''}</div>
                        <div class="text-[10px] text-slate-800 font-black uppercase">2. ${p.emergency_contact_2_name || 'N/A'}</div>
                        <div class="text-[10px] text-slate-400">${p.emergency_contact_2_phone_number || ''}</div>
                    </td>
                    <td class="p-5 text-right space-x-2">
                        <button onclick="editParent(${p.id})" class="text-[10px] font-black text-slate-400 hover:text-slate-800 border border-slate-200 px-3 py-1.5 rounded-lg uppercase">Edit</button>
                        <button onclick="deleteParent(${p.id})" class="text-[10px] font-black text-red-400 hover:text-red-600 border border-red-500/10 px-3 py-1.5 rounded-lg uppercase">Del</button>
                    </td>
                </tr>
            `);
        });
    }

    function editParent(id) {
        const p = allParents.find(rec => rec.id === id);
        if (p) openParentModal(p);
    }

    function openParentModal(p = null) {
        document.getElementById('parent-modal').classList.remove('hidden');
        document.getElementById('parent-form').reset();
        document.getElementById('edit-id').value = p ? p.id : '';
        document.getElementById('modal-title').innerText = p ? "Edit Parent Profile" : "Add New Parent";

        if (p) {
            parentFields.forEach(f => {
                const input = document.getElementById(f);
                if(input) input.value = p[f] || '';
            });
        }
    }

    function closeParentModal() { document.getElementById('parent-modal').classList.add('hidden'); }

    document.getElementById('parent-form').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const fid = localStorage.getItem('locked_franchise_id');
        
        const payload = { franchise_id: parseInt(fid), is_active: true };
        parentFields.forEach(f => payload[f] = document.getElementById(f).value);

        const method = id ? 'PATCH' : 'POST';
        const url = id ? `${PARENT_API}/${id}` : PARENT_API;

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if(res.ok) { closeParentModal(); fetchParents(); }
        } catch (e) { alert("Save failed."); }
    };

    async function deleteParent(id) {
        if (confirm("Delete this parent record?")) {
            await fetch(`${PARENT_API}/${id}`, { method: 'DELETE' });
            fetchParents();
        }
    }

    fetchParents();
</script>
