<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
        <h1 class="text-2xl font-bold text-emerald-500 uppercase tracking-tight">Parent Directory</h1>
        <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Full Guardian Records • Sariaya Branch</p>
    </div>
    
    <div class="flex flex-wrap gap-2 w-full md:w-auto">
        <input type="text" id="parent-search" placeholder="Search names, phones, or emails..." 
            class="pl-4 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-xs outline-none focus:border-slate-500 shadow-sm w-full md:w-64">
        
        <button id="add-parent-btn" class="bg-[#1e293b] hover:bg-slate-900 text-white px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase tracking-wider shadow-md">
            + REGISTER NEW PARENT
        </button>
    </div>
</div>

<div id="parent-list-container" class="space-y-6">
    <div class="p-10 text-center text-slate-400 text-xs italic font-medium uppercase tracking-widest animate-pulse">
        Synchronizing NestMind Database...
    </div>
</div>

<div id="parent-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden border border-slate-300">
        <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
            <div>
                <h2 id="p-modal-title" class="text-sm font-bold text-slate-800 uppercase">Parent Profile</h2>
                <p class="text-[9px] text-slate-400 uppercase tracking-tighter">Schema Version 1.2 • Full Field Access</p>
            </div>
            <button id="close-modal-x" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
        </div>
        
        <form id="parent-form" class="p-6">
            <input type="hidden" id="p-edit-id">
            
            <div id="dynamic-fields-grid" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                </div>

            <div class="flex gap-3 pt-6 border-t border-slate-100 mt-6">
                <button type="button" id="cancel-modal-btn" class="px-6 py-2.5 bg-slate-100 text-slate-500 rounded-lg font-bold text-[10px] uppercase hover:bg-slate-200 transition-all">Cancel</button>
                <button type="submit" class="flex-1 py-2.5 bg-[#1e293b] text-white rounded-lg font-bold text-[10px] uppercase shadow-lg hover:bg-black transition-all">
                    Save Record to Xano
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const ParentModule = {
        data: [],
        schema: null,

        async init() {
            if (!window.NEST_SCHEMA) await this.loadScript('/schema_config.js');
            if (!window.NEST_ENDPOINTS) await this.loadScript('/api_config.js');
            
            this.schema = window.NEST_SCHEMA.parent;
            this.buildFormUI(); 
            
            const fid = localStorage.getItem('locked_franchise_id');
            if (!fid) return;

            try {
                const response = await fetch(`${window.NEST_ENDPOINTS.parent.list}?franchise_id=${fid}`);
                this.data = await response.json();
                this.render();
                this.setupListeners();
            } catch (err) {
                console.error("Database Sync Error:", err);
            }
        },

        buildFormUI() {
            const grid = document.getElementById('dynamic-fields-grid');
            grid.innerHTML = '';
            let currentSection = "";

            this.schema.fields.forEach(f => {
                if (f.hidden) return;

                if (f.section && f.section !== currentSection) {
                    currentSection = f.section;
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="col-span-full mt-4 mb-2 border-b border-slate-100 pb-1">
                            <span class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">${currentSection}</span>
                        </div>
                    `);
                }

                const spanClass = f.width === 'full' || f.type === 'textarea' ? 'col-span-full' : 'col-span-1';
                const inputHTML = f.type === 'textarea' 
                    ? `<textarea id="${f.id}" rows="2" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded text-xs outline-none focus:ring-1 focus:ring-emerald-500"></textarea>`
                    : (f.type === 'bool' || f.type === 'checkbox')
                    ? `<div class="flex items-center gap-3 mt-2 bg-slate-50 p-2.5 rounded border border-slate-100">
                        <input type="checkbox" id="${f.id}" class="w-4 h-4 text-emerald-500 rounded border-slate-300">
                        <span class="text-[10px] font-bold text-slate-600 uppercase">Active Status</span>
                       </div>`
                    : `<input type="${f.type}" id="${f.id}" ${f.required ? 'required' : ''} class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded text-xs outline-none focus:ring-1 focus:ring-emerald-500">`;

                grid.insertAdjacentHTML('beforeend', `
                    <div class="${spanClass}">
                        <label class="text-[9px] text-slate-400 block uppercase font-bold mb-1 ml-1">${f.label}</label>
                        ${inputHTML}
                    </div>
                `);
            });
        },

        render() {
            const container = document.getElementById('parent-list-container');
            const search = (document.getElementById('parent-search')?.value || '').toLowerCase();
            
            let filtered = this.data.filter(p => 
                `${p.first_name} ${p.last_name} ${p.email} ${p.phone} ${p.emergency_contact_1_name}`.toLowerCase().includes(search)
            );

            container.innerHTML = '';
            filtered.forEach(p => {
                container.insertAdjacentHTML('beforeend', `
                    <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden hover:border-emerald-400 transition-all">
                        <div class="bg-slate-50 p-4 flex flex-wrap items-center justify-between gap-4 border-b border-slate-100">
                            <div class="flex-1 min-w-[200px]">
                                <span class="text-[9px] text-slate-400 font-bold uppercase block tracking-tighter">Primary Guardian</span>
                                <span class="text-sm font-black text-slate-800">${p.first_name} ${p.last_name}</span>
                                <div class="text-[11px] text-slate-500 font-medium">${p.email || 'No Email'} • <span class="font-mono text-slate-400">${p.phone || ''}</span></div>
                            </div>
                            <div class="flex-1 min-w-[300px]">
                                <span class="text-[9px] text-slate-400 font-bold uppercase block tracking-tighter">Home Address</span>
                                <span class="text-xs text-slate-600 leading-tight">${p.address || '---'}</span>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="px-2.5 py-1 rounded-full text-[9px] font-black uppercase ${p.is_active ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-red-50 text-red-600 border border-red-100'}">
                                    ${p.is_active ? 'Active' : 'Archived'}
                                </span>
                                <button data-id="${p.id}" class="parent-edit-btn px-4 py-2 bg-white border border-slate-300 rounded shadow-sm text-[10px] font-black hover:bg-emerald-50 hover:text-emerald-600 transition-all uppercase">Edit Record</button>
                            </div>
                        </div>

                        <div class="p-5 grid grid-cols-1 md:grid-cols-4 gap-8 text-[11px] bg-white">
                            
                            <div class="space-y-2 border-r border-slate-50 pr-4">
                                <span class="text-[9px] font-black text-emerald-600 uppercase tracking-widest block border-b border-emerald-50 pb-1">Secondary Guardian</span>
                                <div>
                                    <div class="font-bold text-slate-800 uppercase text-[10px]">${p.second_parent_full_name || 'NONE LISTED'}</div>
                                    <div class="text-slate-500 font-medium italic">${p.second_parent_relationship || 'No relation'}</div>
                                </div>
                                <div class="text-slate-600 font-mono">${p.second_parent_phone_number || ''}</div>
                                <div class="text-slate-400 truncate">${p.second_parent_email_address || ''}</div>
                                <div class="text-[9px] text-slate-400 italic">${p.second_parent_home_address || 'Same as primary'}</div>
                            </div>

                            <div class="space-y-2 border-r border-slate-50 pr-4">
                                <span class="text-[9px] font-black text-orange-500 uppercase tracking-widest block border-b border-orange-50 pb-1">Emergency 1</span>
                                <div>
                                    <div class="font-bold text-slate-800 uppercase text-[10px]">${p.emergency_contact_1_name || '---'}</div>
                                    <div class="text-slate-500 italic">${p.emergency_contact_1_relationship || ''}</div>
                                </div>
                                <div class="text-slate-600 font-mono font-bold">${p.emergency_contact_1_phone_number || ''}</div>
                            </div>

                            <div class="space-y-2 border-r border-slate-50 pr-4">
                                <span class="text-[9px] font-black text-orange-500 uppercase tracking-widest block border-b border-orange-50 pb-1">Emergency 2</span>
                                <div>
                                    <div class="font-bold text-slate-800 uppercase text-[10px]">${p.emergency_contact_2_name || '---'}</div>
                                    <div class="text-slate-500 italic">${p.emergency_contact_2_relationship || ''}</div>
                                </div>
                                <div class="text-slate-600 font-mono font-bold">${p.emergency_contact_2_phone_number || ''}</div>
                            </div>

                            <div class="space-y-2 bg-slate-50/50 p-3 rounded-lg border border-slate-100">
                                <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest block border-b border-slate-200 pb-1">Internal Notes</span>
                                <div class="text-[10px] text-slate-600 leading-normal italic">
                                    ${p.inactivation_reason_comments || 'No administrative notes.'}
                                </div>
                                <div class="pt-2 mt-2 border-t border-slate-200 flex justify-between">
                                    <span class="text-[8px] text-slate-400 uppercase font-bold">Created</span>
                                    <span class="text-[9px] text-slate-500 font-mono">${p.created_at ? new Date(p.created_at).toLocaleDateString() : '---'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            });

            container.querySelectorAll('.parent-edit-btn').forEach(b => {
                b.onclick = () => this.openModal(this.data.find(x => x.id == b.dataset.id));
            });
        },

        openModal(p = null) {
            document.getElementById('parent-modal').classList.remove('hidden');
            document.getElementById('parent-form').reset();
            document.getElementById('p-edit-id').value = p ? p.id : '';
            document.getElementById('p-modal-title').innerText = p ? 'Update Guardian Profile' : 'Register New Guardian';

            this.schema.fields.forEach(f => {
                const el = document.getElementById(f.id);
                if (el) {
                    if (f.type === 'bool' || f.type === 'checkbox') el.checked = p ? !!p[f.id] : (f.default ?? true);
                    else el.value = p ? (p[f.id] || '') : '';
                }
            });
        },

        closeModal() { document.getElementById('parent-modal').classList.add('hidden'); },

        setupListeners() {
            document.getElementById('parent-search').oninput = () => this.render();
            document.getElementById('add-parent-btn').onclick = () => this.openModal();
            document.getElementById('close-modal-x').onclick = () => this.closeModal();
            document.getElementById('cancel-modal-btn').onclick = () => this.closeModal();

            document.getElementById('parent-form').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('p-edit-id').value;
                const payload = { franchise_id: parseInt(localStorage.getItem('locked_franchise_id')) };
                
                this.schema.fields.forEach(f => {
                    const el = document.getElementById(f.id);
                    if (el && !f.hidden) payload[f.id] = (f.type === 'bool' || f.type === 'checkbox') ? el.checked : el.value;
                });

                const url = id ? `${window.NEST_ENDPOINTS.parent.list}/${id}` : window.NEST_ENDPOINTS.parent.list;
                const res = await fetch(url, { 
                    method: id ? 'PATCH' : 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (res.ok) {
                    this.closeModal();
                    this.init();
                }
            };
        },

        async loadScript(src) {
            return new Promise(resolve => {
                const s = document.createElement('script'); s.src = src; s.onload = resolve;
                s.onerror = () => { s.src = src.replace('/', ''); s.onload = resolve; };
                document.head.appendChild(s);
            });
        }
    };

    ParentModule.init();
})();
</script>

<style>
.custom-scrollbar::-webkit-scrollbar { width: 4px; }
.custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
.custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
</style>
