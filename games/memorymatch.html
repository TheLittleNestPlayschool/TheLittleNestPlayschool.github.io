<style>
    #memory-wrapper {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
        padding-top: 20px;
    }

    #game-container {
        position: relative;
        width: 100%;
        max-width: 500px;
        background: #F3E5F5;
        border: 10px solid #5D4037;
        border-radius: 25px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    #memory-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        width: 100%;
        margin-top: 20px;
    }

    .card {
        aspect-ratio: 1 / 1;
        background: #8D6E63;
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
        color: transparent;
        transition: transform 0.3s, background-color 0.3s;
        border-bottom: 5px solid #5D4037;
        user-select: none;
    }

    .card.flipped {
        background: white;
        color: initial;
        transform: rotateY(180deg);
        border-bottom: 2px solid #D7CCC8;
    }

    .card.matched {
        background: #C8E6C9;
        color: #2E7D32;
        cursor: default;
        visibility: visible;
        border-bottom: 2px solid #A5D6A7;
    }

    #win-screen {
        display: none;
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.95);
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 50;
        border-radius: 15px;
    }
</style>

<div id="memory-wrapper">
    <div id="game-container">
        <h2 style="color: #5D4037; margin: 0;">Memory Match</h2>
        <p style="color: #8D6E63; margin: 5px 0 0 0; font-size: 14px;">Find the matching pairs!</p>
        
        <div id="memory-grid"></div>

        <div id="win-screen">
            <h1 style="font-size: 60px; margin: 0;">🧠✨</h1>
            <h2 style="color: #5D4037;">Amazing Memory!</h2>
            <button onclick="initMemoryGame()" style="padding: 12px 30px; background: #2E7D32; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold;">Play Again</button>
        </div>
    </div>

    <button onclick="loadFrame('../games/gamesmenu.html', 'Game Center')" 
            style="margin-top: 20px; padding: 10px 20px; border-radius: 10px; border: none; background: #C62828; color: white; cursor: pointer; font-weight: bold;">
        Back to Menu
    </button>
</div>

<script>
(function() {
    const grid = document.getElementById('memory-grid');
    const winScreen = document.getElementById('win-screen');
    const icons = ['🍎', '🐥', '🎨', '🧩', '🌳', '☀️', '🐶', '📚'];
    let cards = [...icons, ...icons];
    let flippedCards = [];
    let matchedCount = 0;
    let lockBoard = false;

    window.initMemoryGame = function() {
        grid.innerHTML = '';
        winScreen.style.display = 'none';
        matchedCount = 0;
        flippedCards = [];
        lockBoard = false;
        
        // Shuffle cards
        cards.sort(() => Math.random() - 0.5);

        cards.forEach((icon, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.icon = icon;
            card.dataset.index = index;
            card.innerText = icon;
            card.onclick = () => flipCard(card);
            grid.appendChild(card);
        });
    };

    function flipCard(card) {
        if (lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;

        card.classList.add('flipped');
        flippedCards.push(card);

        if (flippedCards.length === 2) {
            checkMatch();
        }
    }

    function checkMatch() {
        lockBoard = true;
        const [card1, card2] = flippedCards;

        if (card1.dataset.icon === card2.dataset.icon) {
            card1.classList.add('matched');
            card2.classList.add('matched');
            matchedCount += 2;
            flippedCards = [];
            lockBoard = false;
            
            if (matchedCount === cards.length) {
                setTimeout(() => winScreen.style.display = 'flex', 500);
            }
        } else {
            setTimeout(() => {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                flippedCards = [];
                lockBoard = false;
            }, 1000);
        }
    }

    initMemoryGame();
})();
</script>
