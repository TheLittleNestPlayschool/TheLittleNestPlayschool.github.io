<style>
    #nest-game-wrapper {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', 'Arial', sans-serif;
        padding-top: 20px;
    }

    #game-container {
        position: relative;
        width: 100%;
        max-width: 450px;
        height: 550px;
        background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
        border: 10px solid #5D4037;
        border-radius: 25px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        touch-action: none;
    }

    #score-board {
        position: absolute;
        top: 15px;
        left: 15px;
        font-size: 22px;
        font-weight: 800;
        color: #5D4037;
        z-index: 10;
        background: rgba(255,255,255,0.8);
        padding: 8px 20px;
        border-radius: 50px;
        border: 2px solid #8D6E63;
    }

    /* New Quit Button Style */
    #quit-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        font-size: 14px;
        font-weight: bold;
        color: white;
        background: #C62828;
        border: none;
        padding: 8px 15px;
        border-radius: 50px;
        cursor: pointer;
        z-index: 10;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    #nest {
        position: absolute;
        bottom: 25px;
        left: 50%;
        width: 110px;
        height: 65px;
        background: #8D6E63;
        border-radius: 10px 10px 60px 60px;
        border-bottom: 10px solid #5D4037;
        transform: translateX(-50%);
        z-index: 5;
    }

    .falling-item {
        position: absolute;
        width: 55px;
        height: 55px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 34px;
        font-weight: 900;
        border-radius: 50%;
        user-select: none;
    }

    .target-egg { background: #FFFFFF; color: #2E7D32; border: 4px solid #A5D6A7; }
    .bad-egg { background: #FFEBEE; color: #C62828; border: 4px solid #EF9A9A; }

    #start-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
    }

    .menu-card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        border: 5px solid #8D6E63;
        width: 70%;
    }

    .play-button {
        padding: 12px 35px;
        font-size: 20px;
        background: #2E7D32;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: bold;
    }
</style>

<div id="nest-game-wrapper">
    <div id="game-container">
        <div id="score-board">Discovery: 0</div>
        <button id="quit-btn" onclick="stopGame()" style="display:none;">Quit Game</button>
        
        <div id="start-overlay">
            <div class="menu-card">
                <h2 style="color: #5D4037; margin-top: 0;">Nest Catcher</h2>
                <p>Catch the Letter <strong>A</strong><br>Avoid the Letter <strong>B</strong></p>
                <button class="play-button" id="start-btn">Start Game</button>
            </div>
        </div>

        <div id="nest"></div>
    </div>
</div>

<script>
(function() {
    const container = document.getElementById('game-container');
    const nest = document.getElementById('nest');
    const scoreText = document.getElementById('score-board');
    const overlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const quitBtn = document.getElementById('quit-btn');

    let score = 0;
    let isActive = false;
    let spawnTimer;
    const target = "A";
    const distractor = "B";

    function moveHandler(e) {
        if (!isActive) return;
        const rect = container.getBoundingClientRect();
        let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        let x = clientX - rect.left;
        if (x < 55) x = 55;
        if (x > rect.width - 55) x = rect.width - 55;
        nest.style.left = x + 'px';
    }

    container.addEventListener('mousemove', moveHandler);
    container.addEventListener('touchmove', moveHandler, { passive: false });

    // The STOP Logic
    window.stopGame = function() {
        isActive = false;
        clearInterval(spawnTimer);
        
        // Remove all falling items currently on screen
        const items = document.querySelectorAll('.falling-item');
        items.forEach(item => item.remove());
        
        // Show overlay and hide quit button
        overlay.style.display = 'flex';
        quitBtn.style.display = 'none';
        
        // Reset instructions to show final score
        overlay.querySelector('h2').innerText = "Game Stopped";
        overlay.querySelector('p').innerHTML = "Final Discovery Score: <strong>" + score + "</strong>";
        overlay.querySelector('button').innerText = "Try Again";
    };

    function spawn() {
        if (!isActive) return;
        
        const item = document.createElement('div');
        const isCorrect = Math.random() > 0.4;
        
        item.className = isCorrect ? 'falling-item target-egg' : 'falling-item bad-egg';
        item.innerText = isCorrect ? target : distractor;
        
        const startX = Math.random() * (container.offsetWidth - 100) + 50;
        item.style.left = startX + 'px';
        item.style.top = '-60px';
        container.appendChild(item);

        let y = -60;
        let speed = 3 + (score * 0.15);

        const loop = setInterval(() => {
            if (!isActive) { clearInterval(loop); item.remove(); return; }
            
            y += speed;
            item.style.top = y + 'px';

            const n = nest.getBoundingClientRect();
            const i = item.getBoundingClientRect();

            if (i.bottom >= n.top && i.top <= n.bottom && i.left < n.right && i.right > n.left) {
                if (isCorrect) { score++; } else { score = Math.max(0, score - 1); }
                scoreText.innerText = "Discovery: " + score;
                clearInterval(loop);
                item.remove();
            }

            if (y > 600) { clearInterval(loop); item.remove(); }
        }, 20);
    }

    startBtn.addEventListener('click', () => {
        score = 0;
        isActive = true;
        scoreText.innerText = "Discovery: 0";
        overlay.style.display = 'none';
        quitBtn.style.display = 'block'; // Show quit button when playing
        spawnTimer = setInterval(spawn, 1100);
    });
})();
</script>
