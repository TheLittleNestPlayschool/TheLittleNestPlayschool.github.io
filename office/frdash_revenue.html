<!-- office/frdash_revenue.html -->
<div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-3">
    <!-- Module Header -->
    <div class="flex items-center justify-between border-b border-slate-50 pb-2">
        <div class="flex items-center gap-2">
            <span class="text-base">💳</span>
            <h3 class="text-xs font-black text-slate-700 uppercase tracking-wider">Royalty & Financials</h3>
        </div>
        <span class="text-[9px] font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded-full uppercase tracking-tight">Current Month</span>
    </div>

    <!-- Financial Matrix Stack -->
    <div class="space-y-2 pt-1">
        <!-- Main Stats Split -->
        <div class="grid grid-cols-2 gap-2">
            <div class="p-2.5 bg-slate-50/60 border border-slate-100 rounded-xl">
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Gross Royalty Revenue</p>
                <p id="rev-gross-display" class="text-base font-extrabold text-slate-800 mt-0.5">₱0.00</p>
            </div>
            <div class="p-2.5 bg-slate-50/60 border border-slate-100 rounded-xl">
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Royalty Rate</p>
                <p id="rev-rate-display" class="text-base font-extrabold text-slate-800 mt-0.5">0%</p>
            </div>
        </div>

        <!-- Quick Access Button Link -->
        <button onclick="loadModule('receipt.html', 'Receipts')" class="w-full text-center py-2 bg-slate-50 hover:bg-slate-100/80 border border-slate-200/60 rounded-xl text-[10px] font-bold text-slate-600 uppercase tracking-wider transition-colors block">
            View Invoices & Collections &rarr;
        </button>
    </div>
</div>

<script>
    (function() {
        // Safe context injection from local setup or fallback defaults
        const currentFid = localStorage.getItem('nestmind_f_id');
        const rateEl = document.getElementById('rev-rate-display');
        const grossEl = document.getElementById('rev-gross-display');
        
        // Render illustrative view depending on client state vs head office context
        if (currentFid === 'all') {
            if (rateEl) rateEl.innerText = "HQ View";
            if (grossEl) grossEl.innerText = "Consolidated";
        } else {
            if (rateEl) rateEl.innerText = "10%";
            if (grossEl) grossEl.innerText = "₱45,500";
        }
    })();
</script>
