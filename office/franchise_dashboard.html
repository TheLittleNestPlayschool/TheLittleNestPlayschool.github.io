<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<div class="flex h-screen w-full bg-[#f8fafc] overflow-hidden font-['Inter',_sans-serif]">
    <aside class="w-[240px] bg-[#0f172a] flex-shrink-0 flex flex-col border-r border-[#1e293b] z-50">
        <div class="p-5">
            <h1 class="text-[#00d1b2] text-xl font-black tracking-tighter">NestMind</h1>
        </div>
        
        <div class="px-3 mb-4">
            <div class="bg-[#1e293b] p-3 rounded-xl border border-slate-700/50 text-center shadow-lg">
                <p class="text-[9px] font-black text-[#2dd4bf] uppercase mb-2 tracking-widest opacity-80">Identity Lock</p>
                
                <select id="branch-select" onchange="unlockDashboard()" class="hidden w-full bg-[#0f172a] text-white py-1.5 px-2 rounded-md border border-slate-600 text-[11px] focus:ring-1 focus:ring-[#00d1b2] outline-none cursor-pointer">
                    <option value="">-- Select Branch --</option>
                </select>

                <div id="active-branch-name" class="hidden text-white font-bold text-sm tracking-tight"></div>
                
                <div id="breadcrumb-container" class="hidden mt-2 pt-2 border-t border-slate-700/30">
                    <div class="flex items-center justify-center gap-1.5">
                        <div class="w-1 h-1 rounded-full bg-[#00d1b2] animate-pulse"></div>
                        <span id="breadcrumb-text" class="text-[8px] font-bold text-slate-400 uppercase tracking-widest leading-none">Portal Root</span>
                    </div>
                </div>
            </div>
        </div>

        <nav id="nav-menu" class="hidden px-2 overflow-y-auto space-y-0.5 custom-scrollbar">
            <div class="text-[10px] font-bold text-[#475569] uppercase tracking-[0.1em] px-3 py-2 mt-2">Management</div>
            
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('franchise_performance.html', 'Performance')">
                <span class="text-sm">📈</span> Performance
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('parents.html', 'Parents')">
                <span class="text-sm">👨‍👩‍👧</span> Parents
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('teacher_v2.html', 'Teachers')">
                <span class="text-sm">🧑‍🏫</span> Teachers
            </button>
            
            <div class="text-[10px] font-bold text-[#475569] uppercase tracking-[0.1em] px-3 py-2 mt-2">Academic DNA</div>
            
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('new_enrollment.html', 'New Enrollment')">
                <span class="text-sm">✨</span> Enrollment
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('students.html', 'Students')">
                <span class="text-sm">🏫</span> Students
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('student_assessment.html', 'Assessments')">
                <span class="text-sm">📝</span> Assessments
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('session_display.html', 'Sessions')">
                <span class="text-sm">🗓️</span> Sessions
            </button>

            <div class="text-[10px] font-bold text-[#475569] uppercase tracking-[0.1em] px-3 py-2 mt-2">AI Intelligence</div>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('pixify.html', 'Pixify!')">
                <span class="text-sm">🪄</span> Pixify!
            </button>

            <div class="text-[10px] font-bold text-[#475569] uppercase tracking-[0.1em] px-3 py-2 mt-2">Logistics</div>

            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('session_vault.html', 'Session Vault')">
                <span class="text-sm">📁</span> Session Vault
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('forms_vault.html', 'Forms Vault')">
                <span class="text-sm">📂</span> Forms Vault
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('order_merch.html', 'Order Merch')">
                <span class="text-sm">👕</span> Order Merch
            </button>
        </nav>
    </aside>

    <main id="main-workspace" class="flex-grow overflow-y-auto relative bg-[#f8fafc]">
        <div id="dashboard-home-view" class="flex flex-col items-center justify-center h-full">
            <h1 class="text-7xl font-black text-slate-800 tracking-tighter mb-2">NestMind</h1>
            <p id="status-text" class="text-slate-400 font-medium text-sm italic">Authenticating security key...</p>
        </div>
    </main>
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
</style>

<script>
    const GITHUB_ROOT = "https://thelittlenestplayschool.github.io/";
    const XANO_FRANCHISE_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise";

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const tlnpKey = urlParams.get('tlnp');
        const select = document.getElementById('branch-select');
        const statusText = document.getElementById('status-text');

        try {
            const res = await fetch(XANO_FRANCHISE_API);
            const data = await res.json();
            const franchises = Array.isArray(data) ? data : (data.items || []);

            if (tlnpKey) {
                const matched = franchises.find(f => f.access_key === tlnpKey);
                if (matched) {
                    localStorage.setItem('locked_franchise_id', matched.id);
                    localStorage.setItem('locked_franchise_name', matched.name);
                    finalizeUnlock(matched.name);
                    window.history.replaceState({}, document.title, window.location.pathname);
                } else {
                    statusText.innerText = "Access Denied: Invalid Security Key.";
                    statusText.classList.add('text-red-500');
                }
            } else {
                select.classList.remove('hidden');
                select.innerHTML = '<option value="">-- Select Branch --</option>';
                franchises.forEach(f => {
                    let opt = document.createElement('option');
                    opt.value = f.id; 
                    opt.innerText = f.name;
                    select.appendChild(opt);
                });
                statusText.innerText = "Please select a branch to initialize portal.";
            }
        } catch (e) { 
            console.error("Identity initialization failed", e);
            statusText.innerText = "Connection Error. Please refresh.";
        }
    }

    function finalizeUnlock(fname) {
        const select = document.getElementById('branch-select');
        const branchDisplay = document.getElementById('active-branch-name');
        const breadcrumbBox = document.getElementById('breadcrumb-container');
        const statusText = document.getElementById('status-text');
        
        select.classList.add('hidden');
        branchDisplay.innerText = fname;
        branchDisplay.classList.remove('hidden');
        breadcrumbBox.classList.remove('hidden'); 
        document.getElementById('nav-menu').classList.remove('hidden');
        
        if(statusText) statusText.innerText = "Identity Verified: " + fname;
    }

    function unlockDashboard() {
        const select = document.getElementById('branch-select');
        const fid = select.value;
        if(!fid) return;

        const fname = select.options[select.selectedIndex].text;
        localStorage.setItem('locked_franchise_id', fid);
        localStorage.setItem('locked_franchise_name', fname);
        finalizeUnlock(fname);
    }

    async function loadModule(file, title) {
        const workspace = document.getElementById('main-workspace');
        const breadcrumbText = document.getElementById('breadcrumb-text');
        
        workspace.innerHTML = `<div class="flex items-center justify-center h-full text-slate-400 font-bold italic text-sm animate-pulse">Synchronizing ${title}...</div>`;
        if(breadcrumbText) breadcrumbText.innerText = title;

        try {
            const res = await fetch(GITHUB_ROOT + file + '?v=' + Date.now());
            const html = await res.text();
            workspace.innerHTML = `<div class="p-8">${html}</div>`;
            
            const scripts = workspace.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) newScript.src = oldScript.src;
                else newScript.text = oldScript.text;
                document.head.appendChild(newScript).parentNode.removeChild(newScript);
            });
        } catch (e) { 
            workspace.innerHTML = `<div class="p-10 text-red-500 font-bold">${e.message}</div>`; 
        }
    }

    window.onload = init;
</script>
