<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<div class="flex h-screen w-full bg-[#f8fafc] overflow-hidden font-['Inter',_sans-serif]">
    <aside class="w-[260px] bg-[#0f172a] flex-shrink-0 flex flex-col border-r border-[#1e293b] z-50">
        <div class="p-6">
            <h1 class="text-[#00d1b2] text-xl font-black">NestMind</h1>
        </div>
        
        <div class="px-4 mb-4">
            <div class="bg-[#1e293b] p-4 rounded-xl border border-slate-700 text-center">
                <p class="text-[9px] font-black text-[#2dd4bf] uppercase mb-2">Identity Lock</p>
                <select id="branch-select" onchange="unlockDashboard()" class="w-full bg-[#0f172a] text-white p-2 rounded border border-slate-600 text-xs">
                    <option value="">-- Select Branch --</option>
                </select>
                <div id="active-branch-name" class="hidden text-white font-bold text-sm tracking-wide py-1"></div>
            </div>
        </div>

        <nav id="nav-menu" class="hidden px-2 overflow-y-auto">
            <div class="text-[0.65rem] font-800 text-[#475569] uppercase tracking-widest px-4 py-3">MANAGEMENT</div>
            <div class="cursor-pointer p-3 text-[#94a3b8] text-sm font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg mb-1 flex items-center gap-2" onclick="loadModule('parents.html', 'Parents')">👨‍👩‍👧 Parents</div>
            <div class="cursor-pointer p-3 text-[#94a3b8] text-sm font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg mb-1 flex items-center gap-2" onclick="loadModule('students.html', 'Students')">🏫 Students</div>
            <div class="cursor-pointer p-3 text-[#94a3b8] text-sm font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg mb-1 flex items-center gap-2" onclick="loadModule('teacher_dashboard.html', 'Teachers')">🧑‍🏫 Teachers</div>
            
            <div class="text-[0.65rem] font-800 text-[#475569] uppercase tracking-widest px-4 py-3">ACADEMIC DNA</div>
            <div class="cursor-pointer p-3 text-[#94a3b8] text-sm font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg mb-1 flex items-center gap-2" onclick="loadModule('student_assessment.html', 'Assessments')">📝 Assessments</div>
            <div class="cursor-pointer p-3 text-[#94a3b8] text-sm font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg mb-1 flex items-center gap-2" onclick="loadModule('session.html', 'Sessions')">🗓️ Sessions</div>
        </nav>
    </aside>

    <main id="main-workspace" class="flex-grow overflow-y-auto relative bg-[#f8fafc]">
        <div id="dashboard-home-view" class="flex flex-col items-center justify-center h-full">
            <h1 class="text-8xl font-black text-slate-800 tracking-tighter mb-4">NestMind</h1>
            <p id="status-text" class="text-slate-400 font-medium italic">Please select a branch to initialize.</p>
        </div>
    </main>
</div>

<script>
    const GITHUB_ROOT = "https://thelittlenestplayschool.github.io/";
    const XANO_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise";

    async function init() {
        try {
            const res = await fetch(XANO_API);
            const data = await res.json();
            const select = document.getElementById('branch-select');
            data.forEach(f => {
                let opt = document.createElement('option');
                opt.value = f.id; opt.innerText = f.name;
                select.appendChild(opt);
            });
        } catch (e) { console.error("Identity Lock failed", e); }
    }

    function unlockDashboard() {
        const select = document.getElementById('branch-select');
        const branchDisplay = document.getElementById('active-branch-name');
        const fid = select.value;
        const fname = select.options[select.selectedIndex].text;
        if(!fid) return;
        
        localStorage.setItem('locked_franchise_id', fid);
        localStorage.setItem('locked_franchise_name', fname);
        
        select.classList.add('hidden');
        branchDisplay.innerText = fname;
        branchDisplay.classList.remove('hidden');
        document.getElementById('nav-menu').classList.remove('hidden');
        document.getElementById('status-text').innerText = "Identity Verified.";
    }

    async function loadModule(file, title) {
        const workspace = document.getElementById('main-workspace');
        workspace.innerHTML = `<div class="flex items-center justify-center h-full text-slate-400 font-bold italic">Synchronizing ${title}...</div>`;
        try {
            const res = await fetch(GITHUB_ROOT + file + '?v=' + Date.now());
            const html = await res.text();
            workspace.innerHTML = `<div class="p-12">${html}</div>`;
            const scripts = workspace.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) newScript.src = oldScript.src;
                else newScript.text = oldScript.text;
                document.head.appendChild(newScript).parentNode.removeChild(newScript);
            });
        } catch (e) { workspace.innerHTML = `<div class="p-20 text-red-500 font-bold">${e.message}</div>`; }
    }
    init();
</script>
