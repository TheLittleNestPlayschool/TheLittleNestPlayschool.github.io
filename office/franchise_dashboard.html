<style>

</style>

<script>
    const GITHUB_ROOT = "https://thelittlenestplayschool.github.io/";

    async function loadModule(file, title) {
        // Find workspace in parent if this is an iframe, or locally if standalone
        const workspace = window.parent.document.getElementById('main-workspace') || document.getElementById('main-workspace');
        const breadcrumbText = window.parent.document.getElementById('breadcrumb-text') || document.getElementById('breadcrumb-text');
        
        if (workspace) {
            workspace.innerHTML = `<div class="flex items-center justify-center h-full text-slate-400 font-bold italic text-sm animate-pulse">Synchronizing ${title}...</div>`;
        }
        
        if (breadcrumbText) breadcrumbText.innerText = title;

        try {
            const res = await fetch(GITHUB_ROOT + file + '?v=' + Date.now());
            const html = await res.text();
            
            if (workspace) {
                workspace.innerHTML = `<div class="p-8">${html}</div>`;
                
                // Execute scripts in the fetched HTML
                const scripts = workspace.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) newScript.src = oldScript.src;
                    else newScript.text = oldScript.text;
                    document.head.appendChild(newScript).parentNode.removeChild(newScript);
                });
            } else {
                // Standalone mode fallback
                window.location.href = GITHUB_ROOT + file;
            }
        } catch (e) { 
            if (workspace) workspace.innerHTML = `<div class="p-10 text-red-500 font-bold">${e.message}</div>`; 
            console.error(e);
        }
    }
</script>
