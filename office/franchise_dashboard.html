<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind | Franchise Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <script src="../security.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .nestmind-hero {
            font-size: 15vw; 
            line-height: 1;
            font-weight: 900;
            color: #1e293b; 
            letter-spacing: -0.06em;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .system-pulse-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .pulse-core {
            position: absolute;
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, rgba(0, 209, 178, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            animation: systemPulse 4s ease-in-out infinite;
        }

        @keyframes systemPulse {
            0%, 100% { transform: scale(0.8); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* Clean UI Override */
        #status-text, .system-status-pill { display: none !important; }
    </style>
</head>
<body class="bg-[#f8fafc] font-['Inter',_sans-serif]">

<div class="flex h-screen w-full overflow-hidden">
    <aside class="w-[240px] bg-[#0f172a] flex-shrink-0 flex flex-col border-r border-[#1e293b] z-50">
        <div class="p-5">
            <h1 class="text-[#00d1b2] text-xl font-black tracking-tighter">NestMind</h1>
        </div>
        
        <div class="px-3 mb-4">
            <div class="bg-[#1e293b] p-3 rounded-xl border border-slate-700/50 text-center">
                <p class="text-[9px] font-black text-[#2dd4bf] uppercase mb-1 tracking-widest">Identity Lock</p>
                <select id="branch-select" onchange="unlockDashboard()" class="hidden w-full bg-[#0f172a] text-white py-1 rounded border border-slate-600 text-[10px]">
                    <option value="">-- Select Branch --</option>
                </select>
                <div id="active-branch-name" class="hidden text-white font-bold text-xs uppercase tracking-tight"></div>
            </div>
        </div>

        <nav id="nav-menu" class="hidden px-2 overflow-y-auto space-y-0.5 custom-scrollbar pb-10">
            <div class="text-[10px] font-bold text-[#475569] uppercase px-3 py-2">Management</div>
            <button class="w-full text-left p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-colors" onclick="loadModule('franchise_performance.html', 'Performance')">📈 Performance</button>
            <button class="w-full text-left p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-colors" onclick="loadModule('parents.html', 'Parents')">👨‍👩‍👧 Parents</button>
            <button class="w-full text-left p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-colors" onclick="loadModule('students.html', 'Students')">🏫 Students</button>
            <button class="w-full text-left p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-colors" onclick="loadModule('teacher_v2.html', 'Teachers')">🧑‍🏫 Teachers</button>
            
            <div class="text-[10px] font-bold text-[#475569] uppercase px-3 py-2">Academic DNA</div>
            <button class="w-full text-left p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-colors" onclick="loadModule('new_enrollment.html', 'Enrollment')">✨ Enrollment</button>
            <button class="w-full text-left p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-colors" onclick="loadModule('student_assessment.html', 'Assessments')">📝 Assessments</button>
            <button class="w-full text-left p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-colors" onclick="loadModule('session_display.html', 'Sessions')">🗓️ Sessions</button>

            <div class="text-[10px] font-bold text-[#475569] uppercase px-3 py-2">Logistics</div>
            <button class="w-full text-left p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-colors" onclick="loadModule('forms_vault.html', 'Forms Vault')">📂 Forms Vault</button>
        </nav>
    </aside>

    <main id="main-workspace" class="flex-grow overflow-y-auto relative bg-[#f8fafc]">
        <div id="view-container" class="h-full">
            <div id="dashboard-home-view" class="flex flex-col items-center justify-center h-full">
                <div class="system-pulse-container"><div class="pulse-core"></div></div>
                <h1 class="nestmind-hero select-none">NestMind</h1>
            </div>
        </div>
    </main>
</div>

<script>
    const GITHUB_ROOT = "https://thelittlenestplayschool.github.io/";
    let currentController = null;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const tlnpKey = urlParams.get('tlnp');
        const select = document.getElementById('branch-select');

        if (tlnpKey === 'TLNP624163') {
            localStorage.setItem('is_head_office', 'true');
            finalizeUnlock("HEAD OFFICE");
            return; 
        }

        try {
            const res = await fetch(window.NEST_ENDPOINTS.franchise.list);
            const data = await res.json();
            const franchises = Array.isArray(data) ? data : (data.items || []);

            if (tlnpKey) {
                const matched = franchises.find(f => f.access_key === tlnpKey);
                if (matched) {
                    localStorage.setItem('locked_franchise_id', matched.id);
                    localStorage.setItem('locked_franchise_name', matched.name);
                    finalizeUnlock(matched.name);
                }
            } else {
                select.classList.remove('hidden');
                franchises.forEach(f => {
                    let opt = document.createElement('option');
                    opt.value = f.id; opt.innerText = f.name;
                    select.appendChild(opt);
                });
            }
        } catch (e) { console.error("Auth Error", e); }
    }

    function finalizeUnlock(fname) {
        document.getElementById('branch-select').classList.add('hidden');
        const branchDisplay = document.getElementById('active-branch-name');
        branchDisplay.innerText = fname;
        branchDisplay.classList.remove('hidden');
        document.getElementById('nav-menu').classList.remove('hidden');
    }

    function unlockDashboard() {
        const select = document.getElementById('branch-select');
        if(!select.value) return;
        localStorage.setItem('locked_franchise_id', select.value);
        finalizeUnlock(select.options[select.selectedIndex].text);
    }

    async function loadModule(file, title) {
        // 1. Kill any existing request to prevent stacking
        if (currentController) currentController.abort();
        currentController = new AbortController();

        const container = document.getElementById('view-container');
        container.innerHTML = `<div class="flex items-center justify-center h-full text-slate-400 font-bold italic animate-pulse">Loading ${title}...</div>`;

        try {
            const authParams = SecurityManager.getAuthQuery();
            const response = await fetch(`${GITHUB_ROOT}${file}${authParams}&v=${Date.now()}`, { signal: currentController.signal });
            const html = await response.text();
            
            // 2. HARD RESET: Wipe everything before injecting new HTML
            container.innerHTML = `<div class="p-8">${html}</div>`;

            // 3. Script Execution
            const scripts = container.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) newScript.src = oldScript.src;
                else newScript.text = oldScript.text;
                document.head.appendChild(newScript).parentNode.removeChild(newScript);
            });
        } catch (e) { if (e.name !== 'AbortError') container.innerHTML = `<div class="p-10 text-red-500">Sync Error: ${e.message}</div>`; }
    }

    window.onload = init;
</script>
</body>
</html>
