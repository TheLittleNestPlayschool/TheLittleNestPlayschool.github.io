<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
    /* Prevent the menu from moving or the page from scrolling */
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: #f8fafc; 
        margin: 0; 
        padding: 0;
        display: flex; 
        height: 100vh; 
        width: 100vw;
        overflow: hidden; 
    }

    /* Fixed Sidebar: flex-shrink-0 ensures it stays exactly 260px */
    aside { 
        width: 260px; 
        background: #0f172a; 
        flex-shrink: 0; 
        display: flex; 
        flex-direction: column; 
        border-right: 1px solid #1e293b;
        height: 100vh;
    }

    /* Main Workspace: Independent scroll area */
    main { 
        flex-grow: 1; 
        height: 100vh;
        overflow-y: auto; 
        background-color: #f8fafc;
    }

    .sidebar-link { cursor: pointer; padding: 10px 16px; color: #94a3b8; font-size: 0.85rem; font-weight: 600; border-radius: 8px; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
    .sidebar-link:hover { background: #1e293b; color: #00d1b2; }
    
    .section-label { font-size: 0.65rem; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; padding: 20px 16px 10px; }
    .hidden { display: none !important; }
</style>

<aside>
    <div class="p-6">
        <h1 class="text-[#00d1b2] text-xl font-black">NestMind</h1>
    </div>
    
    <div class="px-4 mb-4">
        <div class="bg-[#1e293b] p-4 rounded-xl border border-slate-700 text-center">
            <p class="text-[9px] font-black text-[#2dd4bf] uppercase mb-2">Identity Lock</p>
            
            <select id="branch-select" onchange="unlockDashboard()" class="w-full bg-[#0f172a] text-white p-2 rounded border border-slate-600 text-xs">
                <option value="">-- Select Branch --</option>
            </select>

            <div id="active-branch-name" class="hidden text-white font-bold text-sm tracking-wide py-1"></div>
        </div>
    </div>

    <nav id="nav-menu" class="hidden px-2 overflow-y-auto">
        <div class="section-label">MANAGEMENT</div>
        <div class="sidebar-link" onclick="loadModule('parents.html', 'Parents')">👨‍👩‍👧 Parents</div>
        <div class="sidebar-link" onclick="loadModule('students.html', 'Students')">🏫 Students</div>
        <div class="sidebar-link" onclick="loadModule('teacher_dashboard.html', 'Teachers')">🧑‍🏫 Teachers</div>
        
        <div class="section-label">ACADEMIC DNA</div>
        <div class="sidebar-link" onclick="loadModule('student_assessment.html', 'Assessments')">📝 Assessments</div>
        <div class="sidebar-link" onclick="loadModule('session.html', 'Sessions')">🗓️ Sessions</div>
    </nav>
</aside>

<main id="main-workspace" class="p-10">
    <div id="dashboard-home-view">
        <div class="mb-10">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">NestMind</h1>
            <p id="branch-display" class="text-slate-500 font-medium italic">Please select a branch to access the directory.</p>
        </div>
        </div>
</main>

<script>
    const GITHUB_ROOT = "https://thelittlenestplayschool.github.io/";
    const XANO_FRAN = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise";

    // Initial load of branches into the dropdown [cite: 2026-02-05]
    async function init() {
        try {
            const res = await fetch(XANO_FRAN);
            const data = await res.json();
            const select = document.getElementById('branch-select');
            data.forEach(f => {
                let opt = document.createElement('option');
                opt.value = f.id;
                opt.innerText = f.name;
                select.appendChild(opt);
            });
        } catch (e) { 
            console.error("Franchise load failed", e); 
        }
    }

    // Handles the Identity Lock logic
    function unlockDashboard() {
        const select = document.getElementById('branch-select');
        const branchDisplay = document.getElementById('active-branch-name');
        const fid = select.value;
        const fname = select.options[select.selectedIndex].text;
        
        if(!fid) return;
        
        // Save session data
        localStorage.setItem('locked_franchise_id', fid);
        localStorage.setItem('locked_franchise_name', fname);
        
        // UI Swap: Hide dropdown, show static name
        select.classList.add('hidden');
        branchDisplay.innerText = fname;
        branchDisplay.classList.remove('hidden');
        
        // Show the menu and update workspace header
        document.getElementById('nav-menu').classList.remove('hidden');
        document.getElementById('branch-display').innerText = "Management Portal: " + fname;
    }

    // Loads external modules into the main workspace
    async function loadModule(file, title) {
        const workspace = document.getElementById('main-workspace');
        workspace.innerHTML = `<div class="p-10 text-slate-400 font-bold italic text-center">Loading ${title}...</div>`;

        try {
            // Force fetch fresh copy [cite: 2026-03-21]
            const res = await fetch(GITHUB_ROOT + file + '?v=' + Date.now());
            if (!res.ok) throw new Error(`Could not find ${file}`);
            
            const html = await res.text();
            workspace.innerHTML = html;

            // Execute scripts within the loaded module [cite: 2025-12-29]
            const scripts = workspace.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) newScript.src = oldScript.src;
                else newScript.text = oldScript.text;
                document.head.appendChild(newScript).parentNode.removeChild(newScript);
            });
            
            // Wake up module-specific functions
            if(window.loadParents) window.loadParents();
            if(window.init) window.init();
        } catch (e) {
            workspace.innerHTML = `<div class="p-10 text-red-500 font-bold text-center">Error: ${e.message}</div>`;
        }
    }

    window.onload = init;
</script>
