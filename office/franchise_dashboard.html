<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind | Franchise Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <script src="../security.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .nestmind-hero {
            font-size: 12vw;
            line-height: 1;
            background: linear-gradient(180deg, #0f172a 0%, #334155 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
        }

        .hero-glow {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(0, 209, 178, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: breathe 8s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

        .system-status-pill {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 6px 12px;
            border-radius: 99px;
            display: flex;
            align-items: center; gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="bg-[#f8fafc] font-['Inter',_sans-serif]">

<div class="flex h-screen w-full overflow-hidden">
    <aside class="w-[240px] bg-[#0f172a] flex-shrink-0 flex flex-col border-r border-[#1e293b] z-50">
        <div class="p-5">
            <h1 class="text-[#00d1b2] text-xl font-black tracking-tighter">NestMind</h1>
        </div>
        
        <div class="px-3 mb-4">
            <div class="bg-[#1e293b] p-3 rounded-xl border border-slate-700/50 text-center shadow-lg">
                <p class="text-[9px] font-black text-[#2dd4bf] uppercase mb-2 tracking-widest opacity-80">Identity Lock</p>
                
                <select id="branch-select" onchange="unlockDashboard()" class="hidden w-full bg-[#0f172a] text-white py-1.5 px-2 rounded-md border border-slate-600 text-[11px] focus:ring-1 focus:ring-[#00d1b2] outline-none cursor-pointer">
                    <option value="">-- Select Branch --</option>
                </select>

                <div id="active-branch-name" class="hidden text-white font-bold text-sm tracking-tight uppercase"></div>
                
                <div id="breadcrumb-container" class="hidden mt-2 pt-2 border-t border-slate-700/30">
                    <div class="flex items-center justify-center gap-1.5">
                        <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-[#00d1b2] animate-pulse"></div>
                        <span id="breadcrumb-text" class="text-[8px] font-bold text-slate-400 uppercase tracking-widest leading-none">Portal Root</span>
                    </div>
                </div>
            </div>
        </div>

        <nav id="nav-menu" class="hidden px-2 overflow-y-auto space-y-0.5 custom-scrollbar pb-10">
            <div class="text-[10px] font-bold text-[#475569] uppercase tracking-[0.1em] px-3 py-2 mt-2">Management</div>
            <button id="menu-performance" class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('franchise_performance.html', 'Performance')">
                <span class="text-sm">📈</span> Performance
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('parents.html', 'Parents')">
                <span class="text-sm">👨‍👩‍👧</span> Parents
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('students.html', 'Students')">
                <span class="text-sm">🏫</span> Students
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('receipt.html', 'Receipts')">
                <span class="text-sm">🧾</span> Receipts
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('teacher_v2.html', 'Teachers')">
                <span class="text-sm">🧑‍🏫</span> Teachers
            </button>
            
            <div class="text-[10px] font-bold text-[#475569] uppercase tracking-[0.1em] px-3 py-2 mt-2">Academic DNA</div>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('new_enrollment.html', 'Enrollment')">
                <span class="text-sm">✨</span> Enrollment
            </button>
            <button id="menu-assessments" class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('student_assessment.html', 'Assessments')">
                <span class="text-sm">📝</span> Assessments
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('session.html', 'Sessions')">
                <span class="text-sm">🗓️</span> Sessions
            </button>

            <div class="text-[10px] font-bold text-[#475569] uppercase tracking-[0.1em] px-3 py-2 mt-2">Logistics</div>
            <button id="menu-pixify" class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('pixify.html', 'Pixify!')">
                <span class="text-sm">📸</span> Pixify!
            </button>
            <button class="w-full group cursor-pointer p-2 text-[#94a3b8] text-xs font-semibold hover:bg-[#1e293b] hover:text-[#00d1b2] rounded-lg transition-all flex items-center gap-2.5" onclick="loadModule('session_vault.html', 'Downloads')">
                <span class="text-sm">📁</span> Downloads
            </button>
        </nav>
    </aside>

    <main id="main-workspace" class="flex-grow overflow-y-auto relative bg-[#f8fafc]">
        <div id="dashboard-home-view" class="flex flex-col items-center justify-center h-full relative">
            <div class="hero-glow"></div>
            <h1 class="nestmind-hero font-black tracking-tighter select-none">NestMind</h1>
            <div id="system-status-container" class="system-status-pill">
                <div class="w-2 h-2 rounded-full bg-teal-500 animate-pulse"></div>
                <p id="status-text" class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Awaiting Identity...</p>
            </div>
        </div>
    </main>
</div>

<script>
    const GITHUB_ROOT = "https://thelittlenestplayschool.github.io/";

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const tlnpKey = urlParams.get('tlnp');
        const statusText = document.getElementById('status-text');

        if (!tlnpKey) return;

        localStorage.setItem('nestmind_access_key', tlnpKey);

        try {
            const res = await fetch(window.NEST_ENDPOINTS.franchise.list);
            const data = await res.json();
            const franchises = Array.isArray(data) ? data : (data.items || []);

            if (tlnpKey === 'TLNP624163') {
                localStorage.setItem('is_head_office', 'true');
                localStorage.setItem('locked_franchise_id', 'all');
                localStorage.setItem('locked_franchise_name', 'HEAD OFFICE');
                localStorage.setItem('nestmind_f_id', 'all');
                localStorage.setItem('nestmind_f_name', 'HEAD OFFICE');
                finalizeUnlock("HEAD OFFICE");
            } else {
                const matched = franchises.find(f => f.access_key === tlnpKey);
                if (matched) {
                    localStorage.setItem('is_head_office', 'false');
                    localStorage.setItem('locked_franchise_id', matched.id);
                    localStorage.setItem('locked_franchise_name', matched.name);
                    localStorage.setItem('nestmind_f_id', matched.id);
                    localStorage.setItem('nestmind_f_name', matched.name);
                    finalizeUnlock(matched.name);
                } else {
                    statusText.innerText = "Access Denied.";
                }
            }
            window.history.replaceState({}, document.title, window.location.pathname);
        } catch (e) { console.error("Identity Sync Failed", e); }
    }

    function finalizeUnlock(fname) {
        const branchDisplay = document.getElementById('active-branch-name');
        const navMenu = document.getElementById('nav-menu');
        const isHO = localStorage.getItem('is_head_office') === 'true';

        document.getElementById('branch-select').classList.add('hidden');
        branchDisplay.innerText = fname;
        branchDisplay.classList.remove('hidden');
        document.getElementById('breadcrumb-container').classList.remove('hidden'); 
        navMenu.classList.remove('hidden');
        
        setTimeout(() => {
            // Updated logic to hide performance for EVERYONE (including HO) based on your request
            const perfBtn = document.getElementById('menu-performance');
            const assessmentBtn = document.getElementById('menu-assessments');
            const pixifyBtn = document.getElementById('menu-pixify');

            // This hides Performance regardless of login type
            if (perfBtn) perfBtn.style.setProperty('display', 'none', 'important');

            // Keep the standard behavior for these two
            if (!isHO) {
                if (assessmentBtn) assessmentBtn.style.setProperty('display', 'none', 'important');
                if (pixifyBtn) pixifyBtn.style.setProperty('display', 'none', 'important');
            }
        }, 50);

        if(document.getElementById('status-text')) {
            document.getElementById('status-text').innerText = "Verified: " + fname;
        }
    }

    function unlockDashboard() {
        const select = document.getElementById('branch-select');
        const fid = select.value;
        if(!fid) return;
        const fname = select.options[select.selectedIndex].text;
        
        localStorage.setItem('is_head_office', 'false');
        localStorage.setItem('locked_franchise_id', fid);
        localStorage.setItem('locked_franchise_name', fname);
        localStorage.setItem('nestmind_f_id', fid);
        localStorage.setItem('nestmind_f_name', fname);
        
        finalizeUnlock(fname);
    }

    async function loadModule(file, title) {
        const workspace = document.getElementById('main-workspace');
        const breadcrumbText = document.getElementById('breadcrumb-text');
        
        workspace.innerHTML = `<div class="flex items-center justify-center h-full text-slate-400 font-bold italic text-sm animate-pulse">Syncing ${title}...</div>`;
        if(breadcrumbText) breadcrumbText.innerText = title;

        const authParams = SecurityManager.getAuthQuery();
        const secureUrl = GITHUB_ROOT + file + authParams;

        try {
            const res = await fetch(secureUrl + (secureUrl.includes('?') ? '&' : '?') + 'v=' + Date.now());
            const html = await res.text();
            workspace.innerHTML = `<div class="p-8">${html}</div>`;
            
            const scripts = workspace.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) newScript.src = oldScript.src;
                else newScript.text = oldScript.text;
                document.head.appendChild(newScript).parentNode.removeChild(newScript);
            });
        } catch (e) { 
            workspace.innerHTML = `<div class="p-10 text-red-500 font-bold">Sync Error: ${e.message}</div>`; 
        }
    }

    window.onload = init;
</script>
</body>
</html>
