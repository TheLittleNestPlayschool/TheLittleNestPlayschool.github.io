<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind | Franchise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-item:hover { background-color: #1e293b; color: #00d1b2; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] overflow-hidden">

<div class="flex h-screen w-full">
    <aside class="w-[260px] bg-[#0f172a] flex-shrink-0 flex flex-col border-r border-[#1e293b] z-50">
        <div class="p-8">
            <h1 class="text-[#00d1b2] text-2xl font-black tracking-tighter">NestMind</h1>
        </div>
        
        <div class="px-4 mb-6">
            <div class="bg-[#1e293b] p-5 rounded-2xl border border-slate-700 text-center shadow-xl">
                <p class="text-[10px] font-black text-[#2dd4bf] uppercase mb-3 tracking-widest">Identity Lock</p>
                <select id="branch-select" onchange="unlockDashboard()" class="w-full bg-[#0f172a] text-white p-2.5 rounded-lg border border-slate-600 text-xs focus:ring-2 focus:ring-[#00d1b2] outline-none cursor-pointer">
                    <option value="">-- Select Branch --</option>
                </select>
                <div id="active-branch-name" class="hidden text-white font-extrabold text-base tracking-tight py-1 uppercase"></div>
            </div>
        </div>

        <nav id="nav-menu" class="hidden px-3 overflow-y-auto space-y-1">
            <div class="text-[0.65rem] font-800 text-[#475569] uppercase tracking-widest px-4 py-3">Management</div>
            
            <div class="sidebar-item cursor-pointer p-3 text-[#94a3b8] text-sm font-semibold rounded-xl transition-all flex items-center gap-3" onclick="loadModule('franchise_performance.html', 'Performance')">
                <span>📈</span> Performance
            </div>
            
            <div class="sidebar-item cursor-pointer p-3 text-[#94a3b8] text-sm font-semibold rounded-xl transition-all flex items-center gap-3" onclick="loadModule('parents.html', 'Parents')">
                <span>👨‍👩‍👧</span> Parents
            </div>
            
            <div class="sidebar-item cursor-pointer p-3 text-[#94a3b8] text-sm font-semibold rounded-xl transition-all flex items-center gap-3" onclick="loadModule('students.html', 'Students')">
                <span>🏫</span> Students
            </div>
            
            <div class="sidebar-item cursor-pointer p-3 text-[#94a3b8] text-sm font-semibold rounded-xl transition-all flex items-center gap-3" onclick="loadModule('teacher_dashboard.html', 'Teachers')">
                <span>🧑‍🏫</span> Teachers
            </div>
            
            <div class="text-[0.65rem] font-800 text-[#475569] uppercase tracking-widest px-4 py-3">Academic DNA</div>
            
            <div class="sidebar-item cursor-pointer p-3 text-[#94a3b8] text-sm font-semibold rounded-xl transition-all flex items-center gap-3" onclick="loadModule('student_assessment.html', 'Assessments')">
                <span>📝</span> Assessments
            </div>
            
            <div class="sidebar-item cursor-pointer p-3 text-[#94a3b8] text-sm font-semibold rounded-xl transition-all flex items-center gap-3" onclick="loadModule('session.html', 'Sessions')">
                <span>🗓️</span> Sessions
            </div>
        </nav>
    </aside>

    <main id="main-workspace" class="flex-grow overflow-y-auto relative bg-[#f8fafc]">
        <div id="dashboard-home-view" class="flex flex-col items-center justify-center h-full">
            <h1 class="text-8xl font-black text-slate-800 tracking-tighter mb-4">NestMind</h1>
            <p id="status-text" class="text-slate-400 font-medium text-lg italic">Please select a branch to initialize portal.</p>
        </div>
    </main>
</div>

<script>
    const GITHUB_ROOT = "https://thelittlenestplayschool.github.io/";
    // Reverted to working Franchise endpoint group
    const XANO_FRANCHISE_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise";

    async function init() {
        try {
            const res = await fetch(XANO_FRANCHISE_API);
            const data = await res.json();
            const select = document.getElementById('branch-select');
            data.forEach(f => {
                let opt = document.createElement('option');
                opt.value = f.id; 
                opt.innerText = f.name;
                select.appendChild(opt);
            });
        } catch (e) { 
            console.error("Identity Lock failed to sync branches", e);
            document.getElementById('status-text').innerText = "Sync Error: API Group mXEfdJlg connection failed.";
        }
    }

    function unlockDashboard() {
        const select = document.getElementById('branch-select');
        const branchDisplay = document.getElementById('active-branch-name');
        const fid = select.value;
        const fname = select.options[select.selectedIndex].text;
        
        if(!fid) return;
        
        localStorage.setItem('locked_franchise_id', fid);
        localStorage.setItem('locked_franchise_name', fname);
        
        select.classList.add('hidden');
        branchDisplay.innerText = fname;
        branchDisplay.classList.remove('hidden');
        document.getElementById('nav-menu').classList.remove('hidden');
        document.getElementById('status-text').innerText = "Identity Verified.";
    }

    async function loadModule(file, title) {
        const workspace = document.getElementById('main-workspace');
        workspace.innerHTML = `
            <div class="flex items-center justify-center h-full">
                <p class="text-slate-400 font-bold italic animate-pulse">Synchronizing ${title}...</p>
            </div>`;
            
        try {
            const res = await fetch(GITHUB_ROOT + file + '?v=' + Date.now());
            if (!res.ok) throw new Error(`Module ${file} not found on GitHub.`);
            const html = await res.text();
            workspace.innerHTML = `<div class="p-12">${html}</div>`;
            
            // Re-run scripts in loaded modules
            const scripts = workspace.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) newScript.src = oldScript.src;
                else newScript.text = oldScript.text;
                document.head.appendChild(newScript).parentNode.removeChild(newScript);
            });
        } catch (e) { 
            workspace.innerHTML = `
                <div class="p-20 text-center">
                    <p class="text-red-500 font-black text-xl mb-2">Sync Failed</p>
                    <p class="text-slate-500 font-medium">${e.message}</p>
                </div>`;
        }
    }

    init();
</script>

</body>
</html>
