<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind | Franchise Director</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .nav-item:hover { background-color: #f1f5f9; cursor: pointer; }
        .nav-active { background-color: #f1f5f9; border-left: 4px solid #0f172a; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0">
            <div class="p-6 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white font-black text-xl italic">N</div>
                    <div>
                        <h1 class="text-sm font-black uppercase tracking-tighter leading-none">NestMind</h1>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Franchise OS</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto p-4 space-y-1">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-2">Core Operations</p>
                
                <div id="nav-sessions-vault" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all">
                    <span class="text-lg">📚</span>
                    <span class="text-xs font-bold text-slate-600 uppercase tracking-wide">Curriculum</span>
                </div>

                <div id="nav-forms-vault" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all">
                    <span class="text-lg">📁</span>
                    <span class="text-xs font-bold text-slate-600 uppercase tracking-wide">Forms Vault</span>
                </div>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col bg-[#f8fafc] overflow-hidden">
            <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-teal-500 rounded-full animate-pulse"></span>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Live Sync</p>
                </div>
            </header>

            <div id="main-content-area" class="flex-1 overflow-y-auto p-8"></div>
        </main>
    </div>

    <script>
        // Restoring your exact original loadModule logic
        async function loadModule(moduleName) {
            const container = document.getElementById('main-content-area');
            const response = await fetch(`${moduleName}.html`);
            const html = await response.text();
            container.innerHTML = html;

            const scripts = container.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }

        // NAVIGATION LISTENERS
        document.getElementById('nav-sessions-vault').onclick = () => loadModule('sessions_vault');
        
        // THE ONLY OTHER CHANGE: ADDED LISTENER FOR FORMS
        document.getElementById('nav-forms-vault').onclick = () => loadModule('forms_vault');

        window.onload = () => loadModule('sessions_vault');
    </script>
</body>
</html>
