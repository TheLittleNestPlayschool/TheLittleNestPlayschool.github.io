<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NestMind | Franchise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <script src="../security.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdfbf7; /* Warm Option B background */
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        /* Mobile Bottom Nav Active Style */
        .nav-active {
            color: #00bfa5 !important;
            font-weight: 700;
        }
        /* Loading Overlay Custom Glass */
        #sync-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .sync-box {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 85%;
            max-width: 320px;
            border: 1px solid #e2e8f0;
        }
        .sync-loader-track {
            width: 100%;
            height: 6px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 1.25rem;
        }
        .sync-loader-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00d1b2, #00bfa5);
            transition: width 0.2s ease;
        }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- Loading / Sync Overlay -->
    <div id="sync-overlay">
        <div class="sync-box">
            <div class="text-3xl mb-1 animate-bounce">⚡</div>
            <h3 id="sync-title" class="text-xs font-black text-slate-800 uppercase tracking-wider">NestMind Sync</h3>
            <p id="sync-subtitle" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Connecting...</p>
            <div class="sync-loader-track">
                <div id="sync-fill" class="sync-loader-fill"></div>
            </div>
        </div>
    </div>

    <!-- Top Identity Header Bar (Mobile Optimized) -->
    <header class="bg-[#0f172a] text-white px-4 py-3 flex items-center justify-between shadow-md z-40 flex-shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-xl">🪺</span>
            <div>
                <h1 class="text-[#00d1b2] text-sm font-black tracking-tighter uppercase leading-none">NestMind</h1>
                <p class="text-[8px] text-slate-400 uppercase tracking-widest mt-0.5 font-bold">Franchise Portal</p>
            </div>
        </div>
        
        <!-- Identity Lock Display -->
        <div class="bg-slate-800/80 px-3 py-1.5 rounded-lg border border-slate-700 max-w-[180px] text-right">
            <select id="branch-select" onchange="unlockDashboard()" class="hidden w-full bg-transparent text-white text-[11px] font-bold focus:outline-none cursor-pointer">
                <option value="">-- Select Branch --</option>
            </select>
            <div id="active-branch-name" class="hidden text-white font-black text-[11px] tracking-tight uppercase truncate">Awaiting...</div>
            <div id="breadcrumb-container" class="hidden flex items-center justify-end gap-1 mt-0.5">
                <div id="status-dot" class="w-1 h-1 rounded-full bg-[#00d1b2] animate-pulse"></div>
                <span id="breadcrumb-text" class="text-[7px] font-bold text-slate-400 uppercase tracking-widest leading-none">Root</span>
            </div>
        </div>
    </header>

    <!-- Main Workspace Area -->
    <main id="main-workspace" class="flex-grow overflow-y-auto custom-scrollbar pb-24 bg-[#fdfbf7] p-4 space-y-4">
        <!-- Default Awaiting Identity State -->
        <div id="dashboard-home-view" class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
            <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center text-2xl mb-4 shadow-inner border border-slate-200">🔒</div>
            <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wider">Identity Lock Active</h2>
            <p id="status-text" class="text-xs text-slate-400 mt-1 max-w-[240px]">Please complete authentication with your secure franchise key...</p>
        </div>
    </main>

    <!-- Bottom Navigation Bar (Mobile First Framework) -->
    <nav id="nav-menu" class="hidden fixed bottom-0 inset-x-0 bg-white/95 backdrop-blur-md border-t border-slate-200 shadow-xl flex justify-around items-center py-2 px-1 z-50 flex-shrink-0">
        <button onclick="loadDashboardHome()" id="nav-home" class="flex flex-col items-center justify-center flex-1 py-1 text-slate-400 nav-active transition-all">
            <span class="text-xl mb-0.5">🏠</span>
            <span class="text-[9px] font-bold tracking-tight">Dashboard</span>
        </button>
        <button onclick="loadModule('parents.html', 'Parents')" id="nav-parents" class="flex flex-col items-center justify-center flex-1 py-1 text-slate-400 transition-all">
            <span class="text-xl mb-0.5">👨‍👩‍👧</span>
            <span class="text-[9px] font-bold tracking-tight">Parents</span>
        </button>
        <button onclick="loadModule('students.html', 'Students')" id="nav-students" class="flex flex-col items-center justify-center flex-1 py-1 text-slate-400 transition-all">
            <span class="text-xl mb-0.5">🏫</span>
            <span class="text-[9px] font-bold tracking-tight">Students</span>
        </button>
        <button onclick="loadModule('session.html', 'Sessions')" id="nav-sessions" class="flex flex-col items-center justify-center flex-1 py-1 text-slate-400 transition-all">
            <span class="text-xl mb-0.5">🗓️</span>
            <span class="text-[9px] font-bold tracking-tight">Sessions</span>
        </button>
        <button onclick="toggleMoreMenu()" id="nav-more" class="flex flex-col items-center justify-center flex-1 py-1 text-slate-400 relative transition-all">
            <span class="text-xl mb-0.5">✨</span>
            <span class="text-[9px] font-bold tracking-tight">More</span>
            
            <!-- Quick Actions Panel / Submenu Overlay -->
            <div id="more-menu-dropdown" class="hidden absolute bottom-14 right-2 w-48 bg-white rounded-xl shadow-2xl border border-slate-200 py-2 flex flex-col text-left text-slate-700 animate-fade-in z-50">
                <div class="px-3 py-1 text-[8px] font-bold uppercase tracking-widest text-slate-400 border-b border-slate-100 mb-1">Academic DNA</div>
                <button onclick="loadModule('new_enrollment.html', 'Enrollment')" class="px-4 py-2 hover:bg-slate-50 text-left text-xs flex items-center gap-2 font-medium"><span>✨</span> Enrollment</button>
                <button id="menu-assessments" onclick="loadModule('student_assessment.html', 'Assessments')" class="px-4 py-2 hover:bg-slate-50 text-left text-xs flex items-center gap-2 font-medium"><span>📝</span> Assessments</button>
                
                <div class="px-3 py-1 text-[8px] font-bold uppercase tracking-widest text-slate-400 border-b border-slate-100 mt-2 mb-1">Logistics & Performance</div>
                <button onclick="loadModule('franchise_performance.html', 'Performance')" class="px-4 py-2 hover:bg-slate-50 text-left text-xs flex items-center gap-2 font-medium"><span>📈</span> Performance</button>
                <button id="menu-pixify" onclick="loadModule('pixify.html', 'Pixify!')" class="px-4 py-2 hover:bg-slate-50 text-left text-xs flex items-center gap-2 font-medium"><span>📸</span> Pixify!</button>
                <button onclick="loadModule('session_vault.html', 'Downloads')" class="px-4 py-2 hover:bg-slate-50 text-left text-xs flex items-center gap-2 font-medium"><span>📁</span> Downloads</button>
                <button onclick="loadModule('teacher_v2.html', 'Teachers')" class="px-4 py-2 hover:bg-slate-50 text-left text-xs flex items-center gap-2 font-medium"><span>🧑‍🏫</span> Teachers</button>
                <button onclick="loadModule('receipt.html', 'Receipts')" class="px-4 py-2 hover:bg-slate-50 text-left text-xs flex items-center gap-2 font-medium"><span>🧾</span> Receipts</button>
                <button onclick="loadModule('office/franchise_help.html', 'Help Center')" class="px-4 py-2 hover:bg-slate-50 text-left text-xs flex items-center gap-2 font-medium"><span>📖</span> Help Center</button>
            </div>
        </button>
    </nav>

    <script>
        const GITHUB_ROOT = "https://thelittlenestplayschool.github.io/";
        
        // Modules that form the dynamic vertical stack of the core dashboard dashboard view
        const DASHBOARD_MODULE_FILES = [
            'frdash_header.html',
            'frdash_health.html',
            'frdash_alerts.html',
            'frdash_snapshot.html',
            'frdash_sessions.html',
            'frdash_marketing.html',
            'frdash_growth.html',
            'frdash_revenue.html',
            'frdash_actions.html'
        ];

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const tlnpKey = urlParams.get('tlnp');
            const statusText = document.getElementById('status-text');
            if (!tlnpKey) return;
            
            localStorage.setItem('nestmind_access_key', tlnpKey);
            
            try {
                const res = await fetch(window.NEST_ENDPOINTS.franchise.list);
                const data = await res.json();
                const franchises = Array.isArray(data) ? data : (data.items || []);
                
                if (tlnpKey === 'TLNP624163') {
                    localStorage.setItem('is_head_office', 'true');
                    localStorage.setItem('locked_franchise_id', 'all');
                    localStorage.setItem('locked_franchise_name', 'HEAD OFFICE');
                    localStorage.setItem('nestmind_f_id', 'all');
                    localStorage.setItem('nestmind_f_name', 'HEAD OFFICE');
                    finalizeUnlock("HEAD OFFICE");
                } else {
                    const matched = franchises.find(f => f.access_key === tlnpKey);
                    if (matched) {
                        localStorage.setItem('is_head_office', 'false');
                        localStorage.setItem('locked_franchise_id', matched.id);
                        localStorage.setItem('locked_franchise_name', matched.name);
                        localStorage.setItem('nestmind_f_id', matched.id);
                        localStorage.setItem('nestmind_f_name', matched.name);
                        finalizeUnlock(matched.name);
                    } else {
                        if (statusText) statusText.innerText = "Access Denied.";
                    }
                }
                window.history.replaceState({}, document.title, window.location.pathname);
            } catch (e) {
                console.error("Identity Sync Failed", e);
            }
        }

        function finalizeUnlock(fname) {
            const branchDisplay = document.getElementById('active-branch-name');
            const navMenu = document.getElementById('nav-menu');
            const isHO = localStorage.getItem('is_head_office') === 'true';
            
            document.getElementById('branch-select').classList.add('hidden');
            if (branchDisplay) {
                branchDisplay.innerText = fname;
                branchDisplay.classList.remove('hidden');
            }
            document.getElementById('breadcrumb-container').classList.remove('hidden');
            if (navMenu) navMenu.classList.remove('hidden');
            
            setTimeout(() => {
                if (!isHO) {
                    const assessmentBtn = document.getElementById('menu-assessments');
                    const pixifyBtn = document.getElementById('menu-pixify');
                    if (assessmentBtn) assessmentBtn.style.setProperty('display', 'none', 'important');
                    if (pixifyBtn) pixifyBtn.style.setProperty('display', 'none', 'important');
                }
            }, 50);
            
            if (document.getElementById('status-text')) {
                document.getElementById('status-text').innerText = "Verified: " + fname;
            }
            
            // Automatically launch the dynamic dashboard layout upon identity unlock
            loadDashboardHome();
        }

        function unlockDashboard() {
            const select = document.getElementById('branch-select');
            const fid = select.value;
            if(!fid) return;
            const fname = select.options[select.selectedIndex].text;
            
            localStorage.setItem('is_head_office', 'false');
            localStorage.setItem('locked_franchise_id', fid);
            localStorage.setItem('locked_franchise_name', fname);
            localStorage.setItem('nestmind_f_id', fid);
            localStorage.setItem('nestmind_f_name', fname);
            finalizeUnlock(fname);
        }

        // Framework Loader for the Dynamic Unified Dashboard view stitched from modular parts
        async function loadDashboardHome() {
            updateActiveNav('nav-home');
            const workspace = document.getElementById('main-workspace');
            const breadcrumbText = document.getElementById('breadcrumb-text');
            const overlay = document.getElementById('sync-overlay');
            const fill = document.getElementById('sync-fill');
            const sub = document.getElementById('sync-subtitle');
            
            if (breadcrumbText) breadcrumbText.innerText = "Dashboard";
            
            overlay.style.display = 'flex';
            fill.style.width = '10%';
            sub.innerText = "Initializing Dashboard modules...";
            
            // Clear prior workspace blocks and lay down containers for each module to stitch neatly
            workspace.innerHTML = '';
            
            const authParams = SecurityManager.getAuthQuery();
            
            for (let i = 0; i < DASHBOARD_MODULE_FILES.length; i++) {
                const file = DASHBOARD_MODULE_FILES[i];
                const pct = Math.floor(10 + ((i + 1) / DASHBOARD_MODULE_FILES.length) * 80);
                fill.style.width = pct + '%';
                sub.innerText = `Stitching ${file}...`;
                
                // Create clean atomic section shell
                const sectionContainer = document.createElement('div');
                sectionContainer.id = `container-${file.replace('.html', '')}`;
                sectionContainer.className = 'w-full min-h-[40px] transition-all duration-300';
                sectionContainer.innerHTML = `<div class="p-3 text-slate-300 text-[10px] uppercase font-bold tracking-widest animate-pulse bg-white/60 rounded-xl border border-slate-100">Loading ${file}...</div>`;
                workspace.appendChild(sectionContainer);
                
                const secureUrl = GITHUB_ROOT + 'office/' + file + authParams;
                
                try {
                    const res = await fetch(secureUrl + (secureUrl.includes('?') ? '&' : '?') + 'v=' + Date.now());
                    if (res.ok) {
                        const html = await res.text();
                        sectionContainer.innerHTML = html;
                        
                        // Execute scripts safely embedded within the module
                        const scripts = sectionContainer.querySelectorAll('script');
                        scripts.forEach(oldScript => {
                            const newScript = document.createElement('script');
                            if (oldScript.src) newScript.src = oldScript.src;
                            else newScript.text = oldScript.text;
                            document.head.appendChild(newScript).parentNode.removeChild(newScript);
                        });
                    } else {
                        // Silently minimize unused or empty module blocks without ruining full controller chain
                        sectionContainer.style.display = 'none';
                    }
                } catch (err) {
                    console.error(`Error loading module components: ${file}`, err);
                    sectionContainer.style.display = 'none';
                }
            }
            
            fill.style.width = '100%';
            sub.innerText = "Secure Dashboard Ready.";
            setTimeout(() => {
                overlay.style.display = 'none';
                fill.style.width = '0%';
            }, 400);
        }

        // Framework Loader for Standalone System Sub-pages (Parents, Students, etc.)
        async function loadModule(file, title) {
            closeMoreMenu();
            const navId = file.includes('parents') ? 'nav-parents' : (file.includes('student') ? 'nav-students' : (file.includes('session') ? 'nav-sessions' : 'nav-more'));
            updateActiveNav(navId);
            
            const workspace = document.getElementById('main-workspace');
            const breadcrumbText = document.getElementById('breadcrumb-text');
            const overlay = document.getElementById('sync-overlay');
            const fill = document.getElementById('sync-fill');
            const sub = document.getElementById('sync-subtitle');
            
            overlay.style.display = 'flex';
            fill.style.width = '20%';
            sub.innerText = `Connecting ${title}...`;
            
            workspace.innerHTML = `<div class="flex items-center justify-center min-h-[40vh] text-slate-400 font-bold italic text-xs animate-pulse">Syncing ${title}...</div>`;
            if (breadcrumbText) breadcrumbText.innerText = title;
            
            const authParams = SecurityManager.getAuthQuery();
            const prefix = file.includes('/') ? '' : 'office/';
            const secureUrl = GITHUB_ROOT + prefix + file + authParams;
            
            try {
                fill.style.width = '50%';
                sub.innerText = `Fetching ${file}...`;
                
                const res = await fetch(secureUrl + (secureUrl.includes('?') ? '&' : '?') + 'v=' + Date.now());
                const html = await res.text();
                
                fill.style.width = '85%';
                sub.innerText = "Processing scripts...";
                
                workspace.innerHTML = `<div class="w-full space-y-4 animate-fade-in">${html}</div>`;
                
                const scripts = workspace.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) newScript.src = oldScript.src;
                    else newScript.text = oldScript.text;
                    document.head.appendChild(newScript).parentNode.removeChild(newScript);
                });
                
                fill.style.width = '100%';
                sub.innerText = "Secured.";
                setTimeout(() => {
                    overlay.style.display = 'none';
                    fill.style.width = '0%';
                }, 500);
            } catch (e) {
                workspace.innerHTML = `<div class="p-6 bg-red-50 border border-red-200 rounded-xl text-red-600 font-bold text-xs">Sync Error: ${e.message}</div>`;
                sub.innerText = "Sync Failed.";
                fill.style.backgroundColor = "#ef4444";
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 1500);
            }
        }

        function updateActiveNav(activeId) {
            const navs = ['nav-home', 'nav-parents', 'nav-students', 'nav-sessions', 'nav-more'];
            navs.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    if (id === activeId) {
                        el.classList.add('nav-active');
                    } else {
                        el.classList.remove('nav-active');
                    }
                }
            });
        }

        function toggleMoreMenu() {
            const dropdown = document.getElementById('more-menu-dropdown');
            if (dropdown) {
                dropdown.classList.toggle('hidden');
            }
        }

        function closeMoreMenu() {
            const dropdown = document.getElementById('more-menu-dropdown');
            if (dropdown) {
                dropdown.classList.add('hidden');
            }
        }

        // Close submenu when tapping empty space outside
        document.addEventListener('click', function(e) {
            const moreBtn = document.getElementById('nav-more');
            if (moreBtn && !moreBtn.contains(e.target)) {
                closeMoreMenu();
            }
        });

        window.onload = init;
    </script>
</body>
</html>
