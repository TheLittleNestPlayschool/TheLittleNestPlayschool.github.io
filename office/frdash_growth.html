<div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-3">
    <!-- Module Header -->
    <div class="flex items-center justify-between border-b border-slate-50 pb-2">
        <div class="flex items-center gap-2">
            <span class="text-base">🚀</span>
            <h3 class="text-xs font-black text-slate-700 uppercase tracking-wider">Enrollment Growth</h3>
        </div>
        <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Net Movement</span>
    </div>

    <!-- Growth Metrics Grid Stack -->
    <div class="space-y-2 pt-1">

        <div class="grid grid-cols-2 gap-2">
            <div class="bg-slate-50/60 p-3 rounded-xl border border-slate-100/70 flex justify-between items-center">

                <span class="text-sm font-extrabold text-teal-600">+1</span>
            </div>
            <div class="bg-slate-50/60 p-3 rounded-xl border border-slate-100/70 flex justify-between items-center">

                <span class="text-sm font-extrabold text-teal-600">+2</span>
            </div>

        <!-- This Week & This Month Rows -->
        <div class="bg-slate-50/60 p-3 rounded-xl border border-slate-100/70 flex justify-between items-center">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">This Week</span>
            <span class="text-sm font-extrabold text-teal-600">+4</span>
        </div>

        <div class="bg-slate-50/60 p-3 rounded-xl border border-slate-100/70 flex justify-between items-center">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">This Month</span>
            <span class="text-sm font-extrabold text-teal-600">+12</span>
        </div>
    </div>
