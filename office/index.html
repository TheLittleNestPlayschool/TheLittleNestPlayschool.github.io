<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind | Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .sidebar-link { display: flex; align-items: center; padding: 10px 16px; color: #94a3b8; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; border-radius: 8px; margin-bottom: 4px; cursor: pointer; }
        .sidebar-link:hover { background: #1e293b; color: #00d1b2; }
        .sidebar-link.active { background: #1e293b; color: #00d1b2; }
        .section-label { font-size: 0.65rem; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; padding: 20px 16px 10px; }
        iframe { border: none; width: 100%; height: 100vh; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex">

    <aside class="w-64 bg-[#0f172a] h-screen flex flex-col shrink-0 overflow-y-auto border-r border-slate-800">
        <div class="p-6">
            <h1 class="text-[#00d1b2] text-2xl font-black tracking-tight">NestMind</h1>
        </div>

        <div class="px-4 mb-6">
            <button onclick="loadPage('franchise_dashboard.html', 'Home')" class="w-full bg-[#00d1b2] text-[#0f172a] py-3 rounded-lg font-black text-[11px] uppercase tracking-wider flex items-center justify-center shadow-lg shadow-teal-500/20">
                🏠 Dashboard Home
            </button>
        </div>

        <div class="px-4 mb-4" id="sidebar-gatekeeper">
            <div class="bg-slate-800/80 border border-slate-700 p-4 rounded-xl shadow-inner">
                <p class="text-[9px] font-black text-teal-400 uppercase mb-2 tracking-widest text-center">Identity Lock</p>
                <select id="sidebar-franchise-select" onchange="confirmFranchiseSelection()" class="w-full bg-slate-900 text-white font-bold text-xs p-3 rounded-lg border border-slate-600 outline-none focus:border-teal-500 transition-colors">
                    <option value="">-- Choose Branch --</option>
                </select>
                <p class="text-[8px] text-slate-500 mt-2 text-center italic">Select location to unlock menu</p>
            </div>
        </div>

        <div id="sidebar-profile" class="px-4 mb-4 hidden">
            <div class="bg-slate-800/50 border border-slate-700 p-3 rounded-lg text-center">
                <p class="text-[9px] font-black text-slate-500 uppercase">Session Profile</p>
                <p class="text-white font-bold text-sm">Dave</p>
            </div>
            <div class="mt-2 bg-blue-900/30 border border-blue-800/50 p-3 rounded-lg text-center">
                <p class="text-[9px] font-black text-blue-400 uppercase">Viewing Screen</p>
                <p id="current-screen-name" class="text-[#00d1b2] font-black text-xs uppercase">Home</p>
            </div>
        </div>

        <nav id="management-menu" class="flex-1 px-2 hidden">
            <div class="section-label">Management</div>
            <div onclick="loadPage('performance.html', 'Performance')" class="sidebar-link">📊 Performance</div>
            <div onclick="loadPage('new_enrollment.html', 'New Enrollment')" class="sidebar-link">✨ New Enrollment</div>
            <div onclick="loadPage('parents.html', 'Parents')" class="sidebar-link">👨‍👩‍👧 Parents</div>
            <div onclick="loadPage('students.html', 'Students')" class="sidebar-link">🏫 Students</div>
            <div onclick="loadPage('teachers.html', 'Teachers')" class="sidebar-link">👩‍🏫 Teachers</div>
            <div onclick="loadPage('sessions.html', 'Sessions')" class="sidebar-link">🗓️ Sessions</div>

            <div class="section-label">CRM & Leads</div>
            <div onclick="loadPage('message_raw.html', 'Raw Message Log')" class="sidebar-link">💬 Raw Message Log</div>
            <div onclick="loadPage('lead_profile.html', 'Lead Profiles')" class="sidebar-link">👤 Lead Profiles</div>
        </nav>
    </aside>

    <main class="flex-1 h-screen relative bg-white overflow-hidden">
        <iframe id="content-frame" src="franchise_dashboard.html"></iframe>
    </main>

    <script>
        const FRAN_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise";

        async function initSidebar() {
            try {
                const res = await fetch(FRAN_API);
                const data = await res.json();
                const select = document.getElementById('sidebar-franchise-select');
                
                data.forEach(f => {
                    let opt = document.createElement('option');
                    opt.value = f.id;
                    opt.innerText = f.name;
                    select.appendChild(opt);
                });

                // Auto-load if already saved
                const savedId = localStorage.getItem('locked_franchise_id');
                if (savedId) {
                    select.value = savedId;
                    unlockMenu();
                }
            } catch (err) { console.error("Sidebar Load Error:", err); }
        }

        function confirmFranchiseSelection() {
            const select = document.getElementById('sidebar-franchise-select');
            const id = select.value;
            const name = select.options[select.selectedIndex].text;

            if (!id) return;

            localStorage.setItem('locked_franchise_id', id);
            localStorage.setItem('locked_franchise_name', name);
            
            unlockMenu();

            // Refresh the iframe to show content for the selected franchise
            document.getElementById('content-frame').contentWindow.location.reload();
        }

        function unlockMenu() {
            document.getElementById('sidebar-profile').classList.remove('hidden');
            document.getElementById('management-menu').classList.remove('hidden');
        }

        function loadPage(url, title = 'Home') {
            const frame = document.getElementById('content-frame');
            frame.src = url;
            document.getElementById('current-screen-name').innerText = title;
            
            // UI Visual Feedback
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.classList.remove('active');
                if(link.innerText.includes(title)) link.classList.add('active');
            });
        }

        window.onload = initSidebar;
    </script>
</body>
</html>
