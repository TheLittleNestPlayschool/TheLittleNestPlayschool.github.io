<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind | Management Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-link { display: flex; align-items: center; padding: 10px 16px; color: #94a3b8; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; border-radius: 8px; margin-bottom: 4px; }
        .sidebar-link:hover { background: #1e293b; color: #00d1b2; }
        .sidebar-link.active { background: #1e293b; color: #00d1b2; }
        .section-label { font-size: 0.65rem; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; padding: 20px 16px 10px; }
        
        /* Sidebar Hidden by Default [cite: 2026-03-21] */
        #main-sidebar { display: none; }
        
        iframe { border: none; width: 100%; height: 100vh; }
    </style>
</head>
<body class="flex">

    <aside id="main-sidebar" class="w-64 bg-[#0f172a] h-screen flex flex-col shrink-0 overflow-y-auto">
        <div class="p-6">
            <h1 class="text-[#00d1b2] text-2xl font-black tracking-tight">NestMind</h1>
        </div>

        <div class="px-4 mb-6">
            <button onclick="loadPage('franchise_dashboard.html')" class="w-full bg-[#00d1b2] text-[#0f172a] py-3 rounded-lg font-black text-[11px] uppercase tracking-wider flex items-center justify-center shadow-lg shadow-teal-500/20">
                🏠 Dashboard Home
            </button>
        </div>

        <div class="px-4 mb-4">
            <div class="bg-slate-800/50 border border-slate-700 p-3 rounded-lg text-center">
                <p class="text-[9px] font-black text-slate-500 uppercase">Session Profile</p>
                <p class="text-white font-bold text-sm">Dave</p>
            </div>
            <div class="mt-2 bg-blue-900/30 border border-blue-800/50 p-3 rounded-lg text-center">
                <p class="text-[9px] font-black text-blue-400 uppercase">Viewing Screen</p>
                <p id="current-screen-name" class="text-[#00d1b2] font-black text-xs uppercase">Home</p>
            </div>
        </div>

        <nav class="flex-1 px-2">
            <div class="section-label">Management</div>
            <a href="#" onclick="loadPage('performance.html', 'Performance')" class="sidebar-link">📊 Performance</a>
            <a href="#" onclick="loadPage('new_enrollment.html', 'New Enrollment')" class="sidebar-link">✨ New Enrollment</a>
            <a href="#" onclick="loadPage('parents.html', 'Parents')" class="sidebar-link">👨‍👩‍👧 Parents</a>
            <a href="#" onclick="loadPage('students.html', 'Students')" class="sidebar-link">🏫 Students</a>
            <a href="#" onclick="loadPage('teachers.html', 'Teachers')" class="sidebar-link">👩‍🏫 Teachers</a>
            <a href="#" onclick="loadPage('sessions.html', 'Sessions')" class="sidebar-link">🗓️ Sessions</a>

            <div class="section-label">CRM & Leads</div>
            <a href="#" onclick="loadPage('message_raw.html', 'Raw Message Log')" class="sidebar-link">💬 Raw Message Log</a>
            <a href="#" onclick="loadPage('lead_profile.html', 'Lead Profiles')" class="sidebar-link">👤 Lead Profiles</a>
        </nav>
    </aside>

    <main class="flex-1 h-screen relative bg-white overflow-hidden">
        <iframe id="content-frame" src="franchise_dashboard.html"></iframe>
    </main>

    <script>
        // Page Loader Logic
        function loadPage(url, title = 'Home') {
            document.getElementById('content-frame').src = url;
            document.getElementById('current-screen-name').innerText = title;
            
            // Update active state in sidebar
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.classList.remove('active');
                if(link.innerText.includes(title)) link.classList.add('active');
            });
        }

        // ACCESS CONTROL SYSTEM [cite: 2026-03-21]
        function checkGlobalAccess() {
            const lockedName = localStorage.getItem('locked_franchise_name');
            const sidebar = document.getElementById('main-sidebar');
            
            if (lockedName) {
                sidebar.style.display = 'flex';
                console.log("Access Verified: " + lockedName);
            } else {
                sidebar.style.display = 'none';
                console.log("Waiting for Franchise Selection...");
            }
        }

        // External trigger called by franchise_dashboard.html [cite: 2026-03-21]
        window.revealFullSidebar = function(name) {
            document.getElementById('main-sidebar').style.display = 'flex';
            checkGlobalAccess();
        };

        // Run on load
        window.onload = checkGlobalAccess;
    </script>
</body>
</html>
