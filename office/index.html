
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franchisee Dashboard</title>
</head>
<body style="margin: 0; padding: 0; background: #f4f4f4; overflow-x: hidden;">

<div style="display: flex; min-height: 100vh; width: 100vw; overflow: hidden; font-family: sans-serif;">
    <nav style="width: 250px; min-width: 250px; height: 100vh; background: #1a1a1a; position: fixed; left: 0; top: 0; z-index: 1000; overflow-y: auto; border-right: 1px solid #333;">
        <div style="padding: 10px 0;">
            <div style="padding: 0 15px 15px 15px; border-bottom: 1px solid #333; margin-bottom: 10px;">
                <div style="padding: 10px 5px; margin-bottom: 10px;">
                    <span style="color: #00d1b2; font-size: 1.4rem; font-weight: 900; italic; letter-spacing: -0.5px;">NestMind</span>
                </div>
                
                <button onclick="resetDashboard()" style="width: 100%; background: #00d1b2; color: #1a1a1a; border: none; padding: 8px; border-radius: 4px; font-weight: 900; cursor: pointer; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 10px;">
                    🏠 DASHBOARD HOME
                </button>
                <div style="padding: 6px; background: #222; border: 1px dashed #444; border-radius: 4px; text-align: center; margin-bottom: 6px;">
                    <span style="color: #666; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 2px;">Session Profile</span>
                    <span style="color: #fff; font-size: 0.75rem; font-weight: bold;">Dave</span>
                </div>
                <div id="active-screen-indicator" style="padding: 8px; background: #1a365d; border: 1px solid #2a4a7d; border-radius: 4px; text-align: center;">
                    <span style="color: #94a3b8; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px;">Viewing Screen</span>
                    <span id="screen-name" style="color: #00d1b2; font-size: 0.75rem; font-weight: 900; text-transform: uppercase;">Home</span>
                </div>
            </div>

            <span style="color: #555; font-size: 0.6rem; font-weight: 800; padding: 0 15px; letter-spacing: 1px;">MANAGEMENT</span>
            <ul style="list-style: none; padding: 0; margin: 4px 0 12px 0;">
                <li style="padding: 3px 20px;"><a href="javascript:void(0)" onclick="loadFrame('franchise_dashboard.html', 'Performance')" style="color: #00d1b2; font-weight:bold; text-decoration: none; font-size: 0.8rem;">📊 Performance</a></li>
                <li style="padding: 3px 20px;"><a href="javascript:void(0)" onclick="remoteSwitchTab('enrollment')" style="color: #ccc; text-decoration: none; font-size: 0.8rem;">✨ New Enrollment</a></li>
                <li style="padding: 3px 20px;"><a href="javascript:void(0)" onclick="loadFrame('parents.html', 'Parents')" style="color: #ccc; text-decoration: none; font-size: 0.8rem;">👪 Parents</a></li>
                <li style="padding: 3px 20px;"><a href="javascript:void(0)" onclick="loadFrame('student.html', 'Students')" style="color: #ccc; text-decoration: none; font-size: 0.8rem;">🏠 Students</a></li>
                <li style="padding: 3px 20px;"><a href="javascript:void(0)" onclick="loadFrame('teacher_v2.html', 'Teachers')" style="color: #ccc; text-decoration: none; font-size: 0.8rem;">🏫 Teachers</a></li>
                <li style="padding: 3px 20px;"><a href="javascript:void(0)" onclick="loadFrame('session.html', 'Sessions')" style="color: #ccc; text-decoration: none; font-size: 0.8rem;">🗓️ Sessions</a></li>
            </ul>

            <span style="color: #555; font-size: 0.6rem; font-weight: 800; padding: 0 15px; letter-spacing: 1px;">CRM & LEADS</span>
            <ul style="list-style: none; padding: 0; margin: 4px 0 12px 0;">
                <li style="padding: 3px 20px;"><a href="javascript:void(0)" onclick="loadFrame('message_raw.html', 'Raw Messages')" style="color: #ccc; text-decoration: none; font-size: 0.8rem;">Raw Message Log</a></li>
                <li style="padding: 3px 20px;"><a href="javascript:void(0)" onclick="loadFrame('lead_profile.html', 'Lead Profiles')" style="color: #ccc; text-decoration: none; font-size: 0.8rem;">Lead Profiles</a></li>
            </ul>
        </div>
    </nav>

    <main id="dashboard-content" style="margin-left: 250px; flex-grow: 1; padding: 30px; background: #fff; min-height: 100vh; width: calc(100vw - 250px); box-sizing: border-box; overflow-y: auto;">
        <div id="content-inner" style="text-align: center; margin-top: 20vh;">
            <h1 style="font-family: Georgia, serif; color: #1a365d; font-size: 2.2rem;">Franchisee Dashboard</h1>
            <p style="color: #666;">Select a management module from the sidebar to begin.</p>
        </div>
    </main>
</div>

<script>
let currentLoadController = null;
let debounceTimer = null;

function resetDashboard() {
    clearTimeout(debounceTimer);
    if (currentLoadController) currentLoadController.abort();
    document.getElementById('screen-name').textContent = 'Home';
    document.getElementById('dashboard-content').innerHTML = `
        <div id="content-inner" style="text-align: center; margin-top: 20vh;">
            <h1 style="font-family: Georgia, serif; color: #1a365d; font-size: 2.2rem;">Franchisee Dashboard</h1>
        </div>
    `;
}

function remoteSwitchTab(tabId) {
    if (typeof switchTab === 'function') {
        switchTab(tabId);
    } else {
        loadFrame('franchise_dashboard.html', 'New Enrollment').then(() => {
            setTimeout(() => { if(typeof switchTab === 'function') switchTab(tabId); }, 600);
        });
    }
}

async function loadFrame(url, name) {
    clearTimeout(debounceTimer);
    const indicator = document.getElementById('screen-name');
    indicator.textContent = "Syncing..."; 

    return new Promise((resolve) => {
        debounceTimer = setTimeout(async () => {
            const container = document.getElementById('dashboard-content');
            if (currentLoadController) currentLoadController.abort();
            
            currentLoadController = new AbortController();
            const { signal } = currentLoadController;

            indicator.textContent = name;
            container.innerHTML = '<div style="padding:20px; font-size:0.8rem; color:#666;">Loading ' + name + '...</div>';

            try {
                const response = await fetch(url + '?v=' + Math.floor(Math.random() * 999999), { signal });
                const html = await response.text();
                container.innerHTML = html;
                
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.text = oldScript.text;
                    document.head.appendChild(newScript).parentNode.removeChild(newScript);
                });
                resolve();
            } catch (e) {
                if (e.name === 'AbortError') return; 
                container.innerHTML = '<h2 style="color:red; padding:20px;">Error loading module.</h2>';
            }
        }, 250);
    });
}
</script>
</body>
</html>
