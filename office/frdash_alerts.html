<!-- office/frdash_alerts.html -->
<div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-3">
    <!-- Module Header -->
    <div class="flex items-center justify-between border-b border-slate-50 pb-2">
        <div class="flex items-center gap-2">
            <span class="text-base">⚠️</span>
            <h3 class="text-xs font-black text-slate-700 uppercase tracking-wider">Action Required</h3>
        </div>
        <span id="alert-count-pill" class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full uppercase tracking-tight">2 Pending</span>
    </div>

    <!-- Alert List Stack -->
    <div class="space-y-2 pt-1">
        <!-- Alert Item 1 -->
        <div class="flex items-start gap-3 p-2.5 bg-rose-50/40 border border-rose-100 rounded-xl">
            <span class="text-base mt-0.5">📋</span>
            <div class="flex-1">
                <p class="text-xs font-bold text-slate-800">EOD Submission Missing</p>
                <p class="text-[10px] text-slate-500 font-medium mt-0.5">Yesterday's end-of-day report has not been uploaded yet.</p>
                <button onclick="loadModule('upload_eod.html', 'Upload EOD')" class="text-[9px] font-bold text-rose-600 uppercase tracking-wider mt-2 bg-white px-2 py-1 rounded-md border border-rose-200 shadow-sm block">
                    Upload Now &rarr;
                </button>
            </div>
        </div>

        <!-- Alert Item 2 -->
        <div class="flex items-start gap-3 p-2.5 bg-amber-50/40 border border-amber-100 rounded-xl">
            <span class="text-base mt-0.5">💰</span>
            <div class="flex-1">
                <p class="text-xs font-bold text-slate-800">Pending Receipt Verification</p>
                <p class="text-[10px] text-slate-500 font-medium mt-0.5">1 enrollment payment requires manual approval loop checking.</p>
                <button onclick="loadModule('receipt.html', 'Receipts')" class="text-[9px] font-bold text-amber-700 uppercase tracking-wider mt-2 bg-white px-2 py-1 rounded-md border border-amber-200 shadow-sm block">
                    Review Queue &rarr;
                </button>
            </div>
        </div>
    </div>
</div>
