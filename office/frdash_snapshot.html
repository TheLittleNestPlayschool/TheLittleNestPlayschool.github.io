<div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-3">
    <!-- Module Header -->

    <!-- Stats Grid Grid -->
    <div class="grid grid-cols-2 gap-2 pt-1">

        <div class="bg-slate-50/60 p-3 rounded-xl border border-slate-100 flex items-center gap-3">
            <div class="text-xl">👨‍🎓</div>

            </div>

        <!-- Net Movement Growth Counter -->
        <div class="bg-slate-50/60 p-3 rounded-xl border border-slate-100 flex items-center gap-3">
            <div class="text-xl">📈</div>

                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Net Today</p>
                <p class="text-base font-extrabold text-teal-600 mt-0.5">+2</p>
            </div>
        </div>

        <!-- Attendance Counter -->
        <div class="bg-slate-50/60 p-3 rounded-xl border border-slate-100 flex items-center gap-3">
            <div class="text-xl">✅</div>
            <div>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Present</p>
                <p class="text-base font-extrabold text-slate-800 mt-0.5">92%</p>
            </div>
