<!-- office/frdash_actions.html -->
<div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-3">
    <!-- Module Header -->
    <div class="flex items-center justify-between border-b border-slate-50 pb-2">
        <div class="flex items-center gap-2">
            <span class="text-base">⚡</span>
            <h3 class="text-xs font-black text-slate-700 uppercase tracking-wider">Quick Commands</h3>
        </div>
        <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Instant Launch</span>
    </div>

    <!-- Quick Actions Control Matrix -->
    <div class="grid grid-cols-2 gap-2 pt-1">
        <!-- Action 1: Add New Enrollment -->
        <button onclick="loadModule('new_enrollment.html', 'Enrollment')" class="p-3 bg-slate-50/60 hover:bg-slate-100/80 active:scale-[0.98] border border-slate-100 rounded-xl text-left transition-all flex flex-col justify-between min-h-[72px]">
            <span class="text-xl">✨</span>
            <span class="text-[10px] font-bold text-slate-700 uppercase tracking-tight leading-tight mt-2">New Enrollment</span>
        </button>

        <!-- Action 2: Mark Attendance / Sessions -->
        <button onclick="loadModule('session.html', 'Sessions')" class="p-3 bg-slate-50/60 hover:bg-slate-100/80 active:scale-[0.98] border border-slate-100 rounded-xl text-left transition-all flex flex-col justify-between min-h-[72px]">
            <span class="text-xl">📝</span>
            <span class="text-[10px] font-bold text-slate-700 uppercase tracking-tight leading-tight mt-2">Take Attendance</span>
        </button>

        <!-- Action 3: Upload Media Vault / Pixify -->
        <button onclick="loadModule('session_vault.html', 'Downloads')" class="p-3 bg-slate-50/60 hover:bg-slate-100/80 active:scale-[0.98] border border-slate-100 rounded-xl text-left transition-all flex flex-col justify-between min-h-[72px]">
            <span class="text-xl">📁</span>
            <span class="text-[10px] font-bold text-slate-700 uppercase tracking-tight leading-tight mt-2">Lesson Vault</span>
        </button>

        <!-- Action 4: Help Center / Standard Docs -->
        <button onclick="loadModule('office/franchise_help.html', 'Help Center')" class="p-3 bg-slate-50/60 hover:bg-slate-100/80 active:scale-[0.98] border border-slate-100 rounded-xl text-left transition-all flex flex-col justify-between min-h-[72px]">
            <span class="text-xl">📖</span>
            <span class="text-[10px] font-bold text-slate-700 uppercase tracking-tight leading-tight mt-2">Help Guide</span>
        </button>
    </div>
</div>
