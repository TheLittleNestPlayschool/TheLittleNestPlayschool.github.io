<!-- office/frdash_actions.html -->
<div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-3">
    <!-- Module Header -->
    <div class="flex items-center justify-between border-b border-slate-50 pb-2">
        <div class="flex items-center gap-2">
            <span class="text-base">⚡</span>
            <h3 class="text-xs font-black text-slate-700 uppercase tracking-wider">Quick Actions</h3>
        </div>
        <span class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Controls</span>
    </div>

    <!-- Quick Actions Control Matrix -->
    <div class="grid grid-cols-2 gap-2 pt-1">
        <!-- Action 1: Upload Receipt -->
        <button onclick="loadModule('receipt.html', 'Receipts')" class="p-4 bg-slate-50 hover:bg-slate-100/80 active:scale-[0.98] border border-slate-200/60 rounded-xl text-center transition-all flex flex-col items-center justify-center min-h-[85px] gap-1.5 shadow-sm">
            <span class="text-2xl">📷</span>
            <span class="text-[10px] font-black text-slate-700 uppercase tracking-tight leading-none">Upload Receipt</span>
        </button>

        <!-- Action 2: New Student -->
        <button onclick="loadModule('new_enrollment.html', 'Enrollment')" class="p-4 bg-slate-50 hover:bg-slate-100/80 active:scale-[0.98] border border-slate-200/60 rounded-xl text-center transition-all flex flex-col items-center justify-center min-h-[85px] gap-1.5 shadow-sm">
            <span class="text-2xl">👨‍🎓</span>
            <span class="text-[10px] font-black text-slate-700 uppercase tracking-tight leading-none">New Student</span>
        </button>

        <!-- Action 3: Sessions -->
        <button onclick="loadModule('session.html', 'Sessions')" class="p-4 bg-slate-50 hover:bg-slate-100/80 active:scale-[0.98] border border-slate-200/60 rounded-xl text-center transition-all flex flex-col items-center justify-center min-h-[85px] gap-1.5 shadow-sm">
            <span class="text-2xl">📚</span>
            <span class="text-[10px] font-black text-slate-700 uppercase tracking-tight leading-none">Sessions</span>
        </button>

        <!-- Action 4: Parents -->
        <button onclick="loadModule('parents.html', 'Parents')" class="p-4 bg-slate-50 hover:bg-slate-100/80 active:scale-[0.98] border border-slate-200/60 rounded-xl text-center transition-all flex flex-col items-center justify-center min-h-[85px] gap-1.5 shadow-sm">
            <span class="text-2xl">👨‍👩‍👧</span>
            <span class="text-[10px] font-black text-slate-700 uppercase tracking-tight leading-none">Parents</span>
        </button>
    </div>
</div>
