<link rel="stylesheet" href="../nest_style.css">
<script src="../api_config.js"></script>
<script src="../security.js"></script>

<div id="step-parent" class="step-container step-active">
    <h2 class="nest-header"><span class="badge-step">1</span> Parent Profile</h2>
    
    <div id="parent-profile-view" style="display:none;" class="profile-display mb-4">
        <button class="edit-pill" onclick="unlockStep('step-parent', 'parent-profile-view')">Modify</button>
        <div class="profile-item"><div class="profile-label">Name</div><div id="disp-p-name" class="profile-value font-bold"></div></div>
        <div class="profile-item"><div class="profile-label">Phone</div><div id="disp-p-phone" class="profile-value font-bold"></div></div>
        <div class="profile-item"><div class="profile-label">Email</div><div id="disp-p-email" class="profile-value font-bold"></div></div>
    </div>

    <div class="step-content">
        <div id="parent-select-mode">
            <label>Search Existing Records</label>
            <input type="text" id="p_search" placeholder="Type name to filter..." onkeyup="filterParents()" class="mb-2">
            <select id="p_select_id" size="5" class="mt-2 outline-none font-bold uppercase"></select>
        </div>

        <div id="parent-create-mode" style="display:none;">
            <div class="grid grid-cols-2 gap-4">
                <div><label>First Name</label><input type="text" id="p_fn"></div>
                <div><label>Last Name</label><input type="text" id="p_ln"></div>
            </div>
            <label>Phone Number</label><input type="text" id="p_phone">
            <label>Email Address</label><input type="email" id="p_email">
            <label>Home Address</label><input type="text" id="p_address">
        </div>

        <button class="bg-slate-500 hover:bg-slate-600 text-white px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase tracking-wider shadow-md mt-4" onclick="toggleParentMode()">Toggle New/Existing</button>
        <button onclick="processParentStep()" class="btn-teal">Confirm Parent Data</button>
    </div>
</div>

<script>
// Logic to initialize using the Master's state
window.initParentStep = async () => {
    // Accessing the state defined in new_enrollment.html
    const masterState = window.state; 
    const auth = `?access_key=${SecurityManager.getAccessKey()}&franchise_id=${masterState.currentFranchiseId}`;
    
    try {
        const res = await fetch(`${window.NEST_ENDPOINTS.parent.list}${auth}`);
        const data = await res.json();
        const raw = Array.isArray(data) ? data : (data.items || []);
        
        // Update the Master's shared state
        masterState.allParents = raw.filter(p => p.franchise_id === masterState.currentFranchiseId);
        renderParentList(masterState.allParents);
    } catch(e) { console.error("Parent Fragment Init Error", e); }
};

window.filterParents = () => {
    const t = document.getElementById('p_search').value.toLowerCase();
    renderParentList(window.state.allParents.filter(p => `${p.first_name} ${p.last_name}`.toLowerCase().includes(t)));
};

function renderParentList(list) {
    const sel = document.getElementById('p_select_id'); 
    if(!sel) return;
    sel.innerHTML = '';
    list.forEach(p => { 
        sel.innerHTML += `<option value="${p.id}">${p.first_name} ${p.last_name} — ${p.phone || 'N/A'}</option>`; 
    });
}

window.processParentStep = async () => {
    const isNew = document.getElementById('parent-create-mode').style.display === 'block';
    const accessKey = SecurityManager.getAccessKey();
    const masterState = window.state;

    if (isNew) {
        const res = await fetch(`${window.NEST_ENDPOINTS.parent.list}?access_key=${accessKey}`, {
            method: 'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                first_name: document.getElementById('p_fn').value,
                last_name: document.getElementById('p_ln').value,
                phone: document.getElementById('p_phone').value,
                email: document.getElementById('p_email').value,
                address: document.getElementById('p_address').value,
                franchise_id: masterState.currentFranchiseId,
                is_active: true
            })
        });
        const data = await res.json();
        masterState.currentParentId = data.id;
        updateParentSummary(data);
    } else {
        masterState.currentParentId = parseInt(document.getElementById('p_select_id').value);
        if(!masterState.currentParentId) return alert("Select a parent");
        const selected = masterState.allParents.find(x => x.id === masterState.currentParentId);
        updateParentSummary(selected);
    }
    
    // Call the student prep logic sitting in the Master file
    if(window.prepStudentStep) window.prepStudentStep();
    
    // Call the navigation logic sitting in the Master file
    moveToStep('step-parent', 'step-student', 2);
};

function updateParentSummary(p) {
    if(!p) return;
    document.getElementById('disp-p-name').innerText = `${p.first_name || ''} ${p.last_name || ''}`;
    document.getElementById('disp-p-phone').innerText = p.phone || 'N/A';
    document.getElementById('disp-p-email').innerText = p.email || 'N/A';
    document.getElementById('parent-profile-view').style.display = 'grid';
}

window.toggleParentMode = () => {
    const s = document.getElementById('parent-select-mode'), c = document.getElementById('parent-create-mode');
    s.style.display = s.style.display === 'none' ? 'block' : 'none';
    c.style.display = c.style.display === 'none' ? 'block' : 'none';
};
</script>
