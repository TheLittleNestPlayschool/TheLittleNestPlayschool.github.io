<div id="step-parent" class="step-container step-active">
    <h2 class="nest-header"><span class="badge-step">1</span> Parent Profile</h2>
    
    <div id="parent-profile-view" style="display:none;" class="profile-display mb-4 p-4 border rounded relative bg-slate-50">
        <button class="edit-pill" onclick="unlockStep('step-parent', 'parent-profile-view'); document.getElementById('parent-form-content').style.display='block'">Modify</button>
        <div class="profile-item">
            <div class="profile-label">Name</div>
            <div id="disp-p-name" class="profile-value font-bold text-slate-800"></div>
        </div>
        <div class="profile-item">
            <div class="profile-label">Phone</div>
            <div id="disp-p-phone" class="profile-value font-bold text-slate-800"></div>
        </div>
        <div class="profile-item">
            <div class="profile-label">Email</div>
            <div id="disp-p-email" class="profile-value font-bold text-slate-800"></div>
        </div>
    </div>

    <div id="parent-form-content" class="step-content">
        <div id="parent-select-mode">
            <label>Search Existing Records</label>
            <input type="text" id="p_search" placeholder="Search names, phones, or emails..." onkeyup="window.filterParents()" class="w-full border p-2 rounded text-xs mb-2 mt-1">
            <select id="p_select_id" size="5" class="w-full border rounded p-2 text-xs font-bold uppercase outline-none bg-white"></select>
        </div>

        <div id="parent-create-mode" style="display:none;">
            <div class="grid grid-cols-2 gap-4">
                <div><label>First Name</label><input type="text" id="p_fn" class="w-full border p-2 rounded bg-white"></div>
                <div><label>Last Name</label><input type="text" id="p_ln" class="w-full border p-2 rounded bg-white"></div>
            </div>
            <label>Phone Number</label><input type="text" id="p_phone" class="w-full border p-2 rounded bg-white">
            <label>Email Address</label><input type="email" id="p_email" class="w-full border p-2 rounded bg-white">
            <label>Home Address</label><input type="text" id="p_address" class="w-full border p-2 rounded bg-white">
        </div>

        <button class="bg-slate-500 hover:bg-slate-600 text-white px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase mt-4 shadow-md" onclick="window.toggleParentMode()">Toggle New/Existing</button>
        <button onclick="window.processParentStep()" class="btn-teal">Confirm Parent Data</button>
    </div>
</div>

<script>
(function() {
    // 1. DATA FETCHING (Using franchise_id parameter)
    window.initParentStep = async () => {
        if (!window.NEST_ENDPOINTS) await loadParentScript('../api_config.js');
        if (!window.SecurityManager) await loadParentScript('../security.js');

        const accessKey = window.SecurityManager.getAccessKey();
        const fid = window.state.currentFranchiseId || localStorage.getItem('locked_franchise_id');
        
        // CONSTRUCT URL MATCHING PARENTS.HTML
        const fetchUrl = `${window.NEST_ENDPOINTS.parent.list}?franchise_id=${fid}&access_key=${accessKey}`;
        
        try {
            const res = await fetch(fetchUrl);
            const result = await res.json();
            // Store results to global state for filtering
            window.state.allParents = Array.isArray(result) ? result : (result.items || []);
            renderParentList(window.state.allParents);
        } catch(e) { 
            console.error("Xano Parent Fetch Failed:", e); 
        }
    };

    // 2. FILTERING
    window.filterParents = () => {
        const term = document.getElementById('p_search').value.toLowerCase();
        const filtered = window.state.allParents.filter(p => 
            `${p.first_name} ${p.last_name} ${p.phone} ${p.email}`.toLowerCase().includes(term)
        );
        renderParentList(filtered);
    };

    function renderParentList(list) {
        const sel = document.getElementById('p_select_id');
        if(!sel) return;
        sel.innerHTML = '';
        list.forEach(p => { 
            sel.innerHTML += `<option value="${p.id}">${p.first_name} ${p.last_name} — ${p.phone || 'N/A'}</option>`; 
        });
    }

    // 3. UI TOGGLE
    window.toggleParentMode = () => {
        const s = document.getElementById('parent-select-mode'), c = document.getElementById('parent-create-mode');
        if (s.style.display === 'none') {
            s.style.display = 'block';
            c.style.display = 'none';
        } else {
            s.style.display = 'none';
            c.style.display = 'block';
        }
    };

    // 4. SUBMISSION
    window.processParentStep = async () => {
        const isNew = document.getElementById('parent-create-mode').style.display === 'block';
        const accessKey = SecurityManager.getAccessKey();

        if (isNew) {
            const res = await fetch(`${window.NEST_ENDPOINTS.parent.list}?access_key=${accessKey}`, {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    first_name: document.getElementById('p_fn').value,
                    last_name: document.getElementById('p_ln').value,
                    phone: document.getElementById('p_phone').value,
                    email: document.getElementById('p_email').value,
                    address: document.getElementById('p_address').value,
                    franchise_id: window.state.currentFranchiseId,
                    is_active: true
                })
            });
            const data = await res.json();
            window.state.currentParentId = data.id;
            updateParentSummary(data);
        } else {
            window.state.currentParentId = parseInt(document.getElementById('p_select_id').value);
            if(!window.state.currentParentId) return alert("Select a parent record.");
            const selected = window.state.allParents.find(x => x.id === window.state.currentParentId);
            updateParentSummary(selected);
        }
        
        document.getElementById('parent-form-content').style.display = 'none';
        document.getElementById('parent-profile-view').style.display = 'grid';

        if(window.prepStudentStep) window.prepStudentStep();
        window.moveToStep('step-parent', 'step-student', 2);
    };

    function updateParentSummary(p) {
        if(!p) return;
        document.getElementById('disp-p-name').innerText = `${p.first_name || ''} ${p.last_name || ''}`;
        document.getElementById('disp-p-phone').innerText = p.phone || 'N/A';
        document.getElementById('disp-p-email').innerText = p.email || 'N/A';
    }

    async function loadParentScript(src) {
        return new Promise(resolve => {
            const s = document.createElement('script'); s.src = src; s.onload = resolve;
            s.onerror = () => { 
                const fallback = src.replace('../', '');
                const s2 = document.createElement('script'); s2.src = fallback; s2.onload = resolve;
                document.head.appendChild(s2);
            };
            document.head.appendChild(s);
        });
    }
})();
</script>
