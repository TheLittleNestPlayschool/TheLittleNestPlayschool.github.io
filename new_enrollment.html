<style>
    .enrollment-wrapper { width: 100%; margin: 0; padding: 20px; box-sizing: border-box; background: #f8fafc; min-height: 100vh; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .nest-header { color: #334155; font-weight: 700; }
    
    .profile-display { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; background: #fff; padding: 18px; border-radius: 4px; border: 1px solid #e2e8f0; margin-top: 10px; width: 100%; }
    .profile-item { display: flex; flex-direction: column; }
    .profile-label { font-size: 0.55rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 2px; letter-spacing: 0.5px; }
    .profile-value { font-size: 0.85rem; color: #334155; font-weight: 600; }

    .step-container { background: white; border: 1px solid #e2e8f0; border-radius: 4px; padding: 25px; margin-bottom: 20px; transition: all 0.2s ease; }
    .step-locked { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
    .step-active { border-left: 6px solid #00d1b2; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .step-saved { border-left: 6px solid #cbd5e1; background: #ffffff; }
    .step-saved .step-content { display: none; }
    
    label { display: block; font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 6px; }
    input, select, textarea { width: 100%; border: 1px solid #e2e8f0; padding: 12px; border-radius: 4px; font-size: 0.9rem; background: #fff; color: #334155; box-sizing: border-box; }
    
    .btn-teal { background-color: #00d1b2; color: #ffffff !important; padding: 14px 28px; border-radius: 4px; font-weight: 700; border: none; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; margin-top: 15px; transition: background 0.2s; }
    .btn-teal:hover { background-color: #00b89c; }
    
    .badge-step { background: #334155; color: white; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.8rem; margin-right: 12px; font-weight: bold; }
    .success-check { color: #00d1b2; font-weight: bold; font-size: 0.85rem; margin-left: 10px; }
    
    /* Finished State */
    #completion-screen { display: none; text-align: center; padding: 100px 20px; background: #f8fafc; min-height: 100vh; }
</style>

<div id="enrollment-ui" class="enrollment-wrapper">
    <div id="enrollment-progress" style="text-align: right; font-size: 0.7rem; font-weight: 800; color: #94a3b8; margin-bottom: 15px;">PROGRESS: STEP 1 OF 6</div>

    <div id="step-parent" class="step-container step-active">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 class="nest-header" style="margin:0;"><span class="badge-step">1</span> Parent Profile</h2>
            <span id="parent-success" class="success-check" style="display:none;">✓ CONFIRMED</span>
        </div>
        <div id="parent-profile-view" style="display:none;" class="profile-display">
            <div class="profile-item"><div class="profile-label">Full Name</div><div id="disp-p-name" class="profile-value"></div></div>
            <div class="profile-item"><div class="profile-label">Email</div><div id="disp-p-email" class="profile-value"></div></div>
            <div class="profile-item"><div class="profile-label">Phone</div><div id="disp-p-phone" class="profile-value"></div></div>
            <div class="profile-item"><div class="profile-label">Franchise</div><div id="disp-p-fran" class="profile-value"></div></div>
        </div>
        <div class="step-content" style="margin-top:20px;">
            <div id="parent-select-mode"><label>Existing Parent Search</label><select id="p_select_id"></select></div>
            <div id="parent-create-mode" style="display:none;">
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
                    <div><label>First Name</label><input type="text" id="p_fn"></div>
                    <div><label>Last Name</label><input type="text" id="p_ln"></div>
                    <div><label>Assign Franchise</label><select id="p_fran_id"></select></div>
                </div>
            </div>
            <button class="btn-teal" style="background:#64748b;" onclick="toggleParentMode()">Toggle New/Existing</button>
            <button onclick="processParentStep()" class="btn-teal">Confirm Parent Details</button>
        </div>
    </div>

    <div id="step-student" class="step-container step-locked">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 class="nest-header" style="margin:0;"><span class="badge-step">2</span> Student Profile</h2>
            <span id="student-success" class="success-check" style="display:none;">✓ CONFIRMED</span>
        </div>
        <div id="student-profile-view" style="display:none;" class="profile-display">
            <div class="profile-item"><div class="profile-label">Student Name</div><div id="disp-s-name" class="profile-value"></div></div>
            <div class="profile-item"><div class="profile-label">Birthday</div><div id="disp-s-dob" class="profile-value"></div></div>
            <div class="profile-item"><div class="profile-label">Franchise</div><div id="disp-s-fran" class="profile-value"></div></div>
        </div>
        <div class="step-content" style="margin-top:20px;">
            <div id="student-select-mode"><label>Attached Students</label><select id="s_select_id"></select></div>
            <div id="student-create-mode" style="display:none;">
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
                    <div><label>Full Name</label><input type="text" id="s_name_new"></div>
                    <div><label>Date of Birth</label><input type="date" id="s_dob_new"></div>
                </div>
            </div>
            <button class="btn-teal" style="background:#64748b;" onclick="toggleStudentMode()">Toggle New/Existing</button>
            <button onclick="processStudentStep()" class="btn-teal">Confirm Student Details</button>
        </div>
    </div>

    <div id="step-assessment" class="step-container step-locked">
        <h2 class="nest-header" style="margin:0;"><span class="badge-step">3</span> Initial Assessment</h2>
        <div class="step-content" style="margin-top:20px;">
            <form id="assessmentForm">
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
                    <div><label>Teacher</label><select id="a_teacher_id"></select></div>
                    <div><label>Date</label><input type="date" id="a_assessment_date"></div>
                    <div><label>Type</label><input type="text" id="a_assessment_type" value="Initial Assessment"></div>
                </div>
                <div id="assessment-qa-grid" style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px 25px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;"></div>
                <button type="submit" class="btn-teal">Save Assessment & Continue</button>
            </form>
        </div>
    </div>

    <div id="step-session" class="step-container step-locked">
        <h2 class="nest-header" style="margin:0;"><span class="badge-step">4</span> Select Session</h2>
        <div class="step-content" style="margin-top:20px;">
            <label>Available Sessions</label>
            <select id="enrollment_session_id"></select>
            <div id="session-preview" style="margin-top:15px; font-size:0.8rem; color:#64748b;"></div>
            <button onclick="processSessionStep()" class="btn-teal">Confirm Session</button>
        </div>
    </div>

    <div id="step-pickup" class="step-container step-locked">
        <h2 class="nest-header" style="margin:0;"><span class="badge-step">5</span> Authorized Pickup</h2>
        <div class="step-content" style="margin-top:20px;">
            <div id="pickup-entry-list" style="margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
            <div style="background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 4px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
                    <div><label>Name</label><input type="text" id="pu_name"></div>
                    <div><label>Relationship</label><input type="text" id="pu_rel"></div>
                    <div><label>Phone</label><input type="text" id="pu_phone"></div>
                </div>
                <button onclick="addPickupLocal()" class="btn-teal" style="background:#334155; margin-top:10px;">+ Add Contact</button>
            </div>
            <button onclick="finalizePickups()" class="btn-teal">Confirm All Pickups & Continue</button>
        </div>
    </div>

    <div id="step-final" class="step-container step-locked">
        <h2 class="nest-header" style="margin:0;"><span class="badge-step">6</span> Finalize Enrollment</h2>
        <div class="step-content" style="margin-top:20px; text-align: center;">
            <div style="background: #f0fdfa; border: 2px dashed #00d1b2; padding: 40px; border-radius: 8px;">
                <button onclick="submitFinalEnrollment()" class="btn-teal" style="width: 320px;">Generate Enrollment Record</button>
            </div>
        </div>
    </div>
</div>

<div id="completion-screen">
    <h1 class="nest-header" style="font-size: 2rem;">✓ Enrollment Complete</h1>
    <p style="color: #64748b;">Redirecting to Dashboard Home...</p>
</div>

<script>
(function() {
    const PARENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/parent";
    const STUDENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student";
    const FRANCHISE_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise";
    const TEACHER_API = "https://x8ki-letl-twmt.n7.xano.io/api:xLIeVP2e/teacher";
    const QUESTIONS_API = "https://x8ki-letl-twmt.n7.xano.io/api:ptE37CdX/student_assessment_questions";
    const SINGLE_QUESTION_API = "https://x8ki-letl-twmt.n7.xano.io/api:ptE37CdX/student_assessment_questions/";
    const SAVE_ASSESSMENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student_assessment";
    const PICKUP_API = "https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student_authorized_pickup";
    const ENROLLMENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/enrollment";
    const SESSION_API = "https://x8ki-letl-twmt.n7.xano.io/api:mUsV7Zqx/session";

    let currentParentId = null, currentStudentId = null, currentFranchiseId = null, selectedSessionId = null;
    let parentMode = 'select', studentMode = 'select', allStudents = [], allParents = [], allFranchises = [], allTeachers = [], pickupContacts = [], allSessions = [];

    function unwrap(d) { return Array.isArray(d) ? d : (d.result1 || d.items || []); }

    window.toggleParentMode = () => {
        parentMode = (parentMode === 'select') ? 'create' : 'select';
        document.getElementById('parent-select-mode').style.display = (parentMode === 'select') ? 'block' : 'none';
        document.getElementById('parent-create-mode').style.display = (parentMode === 'create') ? 'block' : 'none';
    };

    window.toggleStudentMode = () => {
        studentMode = (studentMode === 'select') ? 'create' : 'select';
        document.getElementById('student-select-mode').style.display = (studentMode === 'select') ? 'block' : 'none';
        document.getElementById('student-create-mode').style.display = (studentMode === 'create') ? 'block' : 'none';
    };

    window.handleQuestionChange = async (index) => {
        const questionId = document.getElementById(`q_select_${index}`).value;
        const ansDropdown = document.getElementById(`a_ans_${index}`);
        if (!questionId) return;
        try {
            const res = await fetch(SINGLE_QUESTION_API + questionId);
            const q = await res.json();
            const data = q.result1 || q;
            ansDropdown.innerHTML = '<option value="">-- Choose Answer --</option>';
            for (let i = 1; i <= 6; i++) {
                const val = data[`answer_${i}`];
                if (val && val.trim() !== "") ansDropdown.innerHTML += `<option value="${val.trim()}">${val.trim()}</option>`;
            }
        } catch (e) { console.error(e); }
    };

    window.processParentStep = async () => {
        let pData = {};
        if (parentMode === 'create') {
            currentFranchiseId = parseInt(document.getElementById('p_fran_id').value);
            pData = { first_name: document.getElementById('p_fn').value, last_name: document.getElementById('p_ln').value, franchise_id: currentFranchiseId, is_active: true };
            const res = await fetch(PARENT_API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(pData) });
            const data = await res.json();
            currentParentId = data.id;
        } else {
            currentParentId = document.getElementById('p_select_id').value;
            pData = allParents.find(p => p.id == currentParentId);
            currentFranchiseId = pData.franchise_id;
        }
        document.getElementById('disp-p-name').innerText = `${pData.first_name} ${pData.last_name}`;
        document.getElementById('disp-p-fran').innerText = (allFranchises.find(f => f.id == currentFranchiseId) || {}).name || 'Sariaya';
        document.getElementById('parent-profile-view').style.display = 'grid';
        document.getElementById('step-parent').className = 'step-container step-saved';
        document.getElementById('parent-success').style.display = 'inline';
        
        const fs = allStudents.filter(s => s.parent_id == currentParentId);
        document.getElementById('s_select_id').innerHTML = '<option value="">-- Student --</option>' + fs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        document.getElementById('step-student').className = 'step-container step-active';
        document.getElementById('enrollment-progress').innerText = "PROGRESS: STEP 2 OF 6";
    };

    window.processStudentStep = async () => {
        let sData = {};
        if (studentMode === 'create') {
            sData = { parent_id: currentParentId, name: document.getElementById('s_name_new').value, date_of_birth: document.getElementById('s_dob_new').value, franchise_id: currentFranchiseId, is_active: true };
            const res = await fetch(STUDENT_API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(sData) });
            const data = await res.json();
            currentStudentId = data.id;
        } else {
            currentStudentId = document.getElementById('s_select_id').value;
            sData = allStudents.find(s => s.id == currentStudentId);
        }
        document.getElementById('disp-s-name').innerText = sData.name;
        document.getElementById('disp-s-dob').innerText = sData.date_of_birth;
        document.getElementById('disp-s-fran').innerText = (allFranchises.find(f => f.id == currentFranchiseId) || {}).name;
        document.getElementById('student-profile-view').style.display = 'grid';
        document.getElementById('step-student').className = 'step-container step-saved';
        document.getElementById('student-success').style.display = 'inline';
        
        const ft = allTeachers.filter(t => t.franchise_id == currentFranchiseId);
        document.getElementById('a_teacher_id').innerHTML = '<option value="">-- Teacher --</option>' + ft.map(t => `<option value="${t.id}">${t.first_name} ${t.last_name}</option>`).join('');
        document.getElementById('step-assessment').className = 'step-container step-active';
        document.getElementById('enrollment-progress').innerText = "PROGRESS: STEP 3 OF 6";
    };

    document.getElementById('assessmentForm').onsubmit = async (e) => {
        e.preventDefault();
        const tSel = document.getElementById('a_teacher_id');
        let payload = { student_id: parseInt(currentStudentId), teacher_id: parseInt(tSel.value) || null, assessment_date: document.getElementById('a_assessment_date').value || null, assessment_type: document.getElementById('a_assessment_type').value };
        for(let i=1; i<=10; i++) {
            payload[`question_${i}_id`] = parseInt(document.getElementById(`q_select_${i}`).value) || null;
            payload[`recorded_answer_${i}`] = document.getElementById(`a_ans_${i}`).value || "";
        }
        await fetch(SAVE_ASSESSMENT_API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        document.getElementById('step-assessment').className = 'step-container step-saved';
        
        // Populate and activate Session step
        const sessionDropdown = document.getElementById('enrollment_session_id');
        const franchiseSessions = allSessions.filter(s => s.franchise_id == currentFranchiseId && s.is_active);
        sessionDropdown.innerHTML = '<option value="">-- Choose Session --</option>' + 
            franchiseSessions.map(s => `<option value="${s.id}">${s.name} (${s.start_time_text} - ${s.end_time_text})</option>`).join('');
        
        document.getElementById('step-session').className = 'step-container step-active';
        document.getElementById('enrollment-progress').innerText = "PROGRESS: STEP 4 OF 6";
    };

    window.processSessionStep = () => {
        selectedSessionId = document.getElementById('enrollment_session_id').value;
        if(!selectedSessionId) { alert("Please select a session."); return; }
        
        document.getElementById('step-session').className = 'step-container step-saved';
        document.getElementById('step-pickup').className = 'step-container step-active';
        document.getElementById('enrollment-progress').innerText = "PROGRESS: STEP 5 OF 6";
    };

    window.addPickupLocal = () => {
        const c = { name: document.getElementById('pu_name').value, relationship: document.getElementById('pu_rel').value, phone: document.getElementById('pu_phone').value };
        pickupContacts.push(c);
        document.getElementById('pickup-entry-list').innerHTML += `<div style="padding:6px 12px; background:#f0fdfa; border:1px solid #00d1b2; border-radius:15px; font-size:0.7rem; color:#00b89c;">${c.name}</div>`;
        document.getElementById('pu_name').value = ''; document.getElementById('pu_rel').value = ''; document.getElementById('pu_phone').value = '';
    };

    window.finalizePickups = async () => {
        for(const c of pickupContacts) { await fetch(PICKUP_API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ student_id: currentStudentId, name: c.name, relationship: c.relationship, phone: c.phone, is_active: true }) }); }
        document.getElementById('step-pickup').className = 'step-container step-saved';
        document.getElementById('step-final').className = 'step-container step-active';
        document.getElementById('enrollment-progress').innerText = "PROGRESS: STEP 6 OF 6";
    };

    window.submitFinalEnrollment = async () => {
        // Updated payload to include session_id
        const payload = { 
            student_id: currentStudentId, 
            franchise_id: currentFranchiseId, 
            session_id: parseInt(selectedSessionId),
            enrollment_date: new Date().getTime(), 
            status: 'active' 
        };
        const res = await fetch(ENROLLMENT_API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        
        if(res.ok) {
            document.getElementById('enrollment-ui').style.display = 'none';
            document.getElementById('completion-screen').style.display = 'block';
            setTimeout(() => { window.location.href = "index.html"; }, 2500);
        } else {
            alert("Enrollment Error. Please check Xano records.");
        }
    };

    async function init() {
        const [fR, pR, sR, tR, qR, sessR] = await Promise.all([
            fetch(FRANCHISE_API), 
            fetch(PARENT_API + '?t=' + Date.now()), 
            fetch(STUDENT_API + '?t=' + Date.now()), 
            fetch(TEACHER_API), 
            fetch(QUESTIONS_API),
            fetch(SESSION_API)
        ]);
        
        allFranchises = unwrap(await fR.json()); 
        allParents = unwrap(await pR.json()); 
        allStudents = unwrap(await sR.json()); 
        allTeachers = unwrap(await tR.json()); 
        allSessions = unwrap(await sessR.json());
        const qu = unwrap(await qR.json());

        document.getElementById('p_fran_id').innerHTML = '<option value="">-- Franchise --</option>' + allFranchises.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
        document.getElementById('p_select_id').innerHTML = '<option value="">-- Parent --</option>' + allParents.map(p => `<option value="${p.id}">${p.first_name} ${p.last_name}</option>`).join('');
        
        const grid = document.getElementById('assessment-qa-grid');
        for(let i=1; i<=10; i++) grid.innerHTML += `<div><select id="q_select_${i}" onchange="handleQuestionChange(${i})"><option value="">-- Q${i} --</option>${qu.map(q => `<option value="${q.id}">${q.the_question}</option>`).join('')}</select></div><div><select id="a_ans_${i}"><option value="">Select answer...</option></select></div>`;
    }
    init();
})();
</script>
