<style>
    .enrollment-wrapper { width: 100%; margin: 0; padding: 20px; box-sizing: border-box; background: #f8fafc; min-height: 100vh; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .nest-header { color: #334155; font-weight: 700; margin-bottom: 5px; }
    
    .profile-display { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; background: #fff; padding: 18px; border-radius: 4px; border: 1px solid #e2e8f0; margin-top: 10px; width: 100%; }
    .profile-item { display: flex; flex-direction: column; }
    .profile-label { font-size: 0.55rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 2px; letter-spacing: 0.5px; }
    .profile-value { font-size: 0.85rem; color: #334155; font-weight: 600; }

    .step-container { background: white; border: 1px solid #e2e8f0; border-radius: 4px; padding: 25px; margin-bottom: 20px; transition: all 0.2s ease; position: relative; }
    .step-locked { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
    .step-active { border-left: 6px solid #00d1b2; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .step-saved { border-left: 6px solid #cbd5e1; background: #ffffff; }
    .step-saved .step-content { display: none; }
    
    label { display: block; font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 6px; }
    input, select, textarea { width: 100%; border: 1px solid #e2e8f0; padding: 12px; border-radius: 4px; font-size: 0.9rem; background: #fff; color: #334155; box-sizing: border-box; transition: border-color 0.2s; }
    input:focus, select:focus { border-color: #00d1b2; outline: none; }
    
    .btn-teal { background-color: #00d1b2; color: #ffffff !important; padding: 14px 28px; border-radius: 4px; font-weight: 700; border: none; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; margin-top: 15px; transition: all 0.2s; }
    .btn-teal:hover { background-color: #00b89c; transform: translateY(-1px); }
    
    .badge-step { background: #334155; color: white; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.8rem; margin-right: 12px; font-weight: bold; }
    
    .review-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
    .review-table td { padding: 10px; border-bottom: 1px solid #f1f5f9; }
    .review-table .rev-label { font-weight: 800; color: #64748b; width: 40%; text-transform: uppercase; font-size: 0.6rem; }
    .review-table .rev-val { color: #334155; font-weight: 600; }
    
    .loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 10; justify-content: center; align-items: center; font-size: 0.7rem; font-weight: 800; color: #00d1b2; }

    .pickup-badge { background: #e2e8f0; padding: 5px 10px; border-radius: 15px; font-size: 0.75rem; margin-right: 5px; display: inline-block; }
</style>

<div id="enrollment-ui" class="enrollment-wrapper">
    <div id="enrollment-progress" style="text-align: right; font-size: 0.7rem; font-weight: 800; color: #94a3b8; margin-bottom: 15px;">PROGRESS: STEP 1 OF 6</div>

    <div id="step-parent" class="step-container step-active">
        <div class="loading-overlay" id="loader-parent">SYNCING DATA...</div>
        <h2 class="nest-header"><span class="badge-step">1</span> Parent Profile</h2>
        <div id="parent-profile-view" style="display:none;" class="profile-display">
            <div class="profile-item"><div class="profile-label">Primary Parent</div><div id="disp-p-name" class="profile-value"></div></div>
            <div class="profile-item"><div class="profile-label">Email</div><div id="disp-p-email" class="profile-value"></div></div>
            <div class="profile-item"><div class="profile-label">Phone</div><div id="disp-p-phone" class="profile-value"></div></div>
            <div class="profile-item"><div class="profile-label">Franchise ID</div><div id="disp-p-fran" class="profile-value"></div></div>
        </div>
        <div class="step-content" style="margin-top:20px;">
            <div id="parent-select-mode" style="display:block;">
                <label>Search Existing Database</label>
                <select id="p_select_id"></select>
            </div>
            <div id="parent-create-mode" style="display:none;">
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                    <div><label>First Name</label><input type="text" id="p_fn"></div>
                    <div><label>Last Name</label><input type="text" id="p_ln"></div>
                    <div><label>Email</label><input type="email" id="p_email"></div>
                    <div><label>Phone</label><input type="text" id="p_phone"></div>
                    <div style="grid-column: span 2;"><label>Home Address</label><input type="text" id="p_address"></div>
                    <div style="grid-column: span 2;"><label>Branch Franchise ID</label><input type="text" id="p_fran_id" readonly style="background:#f1f5f9; cursor:not-allowed;"></div>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-teal" style="background:#64748b;" onclick="toggleParentMode()">New / Existing Toggle</button>
                <button id="btn-p-confirm" onclick="processParentStep()" class="btn-teal">Confirm Parent Details</button>
            </div>
        </div>
    </div>

    <div id="step-student" class="step-container step-locked">
        <div class="loading-overlay" id="loader-student">CHECKING RECORDS...</div>
        <h2 class="nest-header"><span class="badge-step">2</span> Student Profile</h2>
        <div id="student-profile-view" style="display:none;" class="profile-display">
            <div class="profile-item"><div class="profile-label">Student Name</div><div id="disp-s-name" class="profile-value"></div></div>
            <div class="profile-item"><div class="profile-label">Birthday</div><div id="disp-s-dob" class="profile-value"></div></div>
        </div>
        <div class="step-content" style="margin-top:20px;">
            <div id="student-select-mode" style="display:block;"><label>Registered Children</label><select id="s_select_id"></select></div>
            <div id="student-create-mode" style="display:none;">
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                    <div style="grid-column: span 2;"><label>Full Name</label><input type="text" id="s_name_new"></div>
                    <div><label>Preferred Name</label><input type="text" id="s_pref_new"></div>
                    <div><label>Date of Birth</label><input type="date" id="s_dob_new"></div>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-teal" style="background:#64748b;" onclick="toggleStudentMode()">New / Existing Toggle</button>
                <button onclick="processStudentStep()" class="btn-teal">Confirm Student Profile</button>
            </div>
        </div>
    </div>

    <div id="step-assessment" class="step-container step-locked">
        <h2 class="nest-header"><span class="badge-step">3</span> Initial Assessment</h2>
        <div class="step-content" style="margin-top:20px;">
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom:20px;">
                <div><label>Teacher</label><select id="a_teacher_id"></select></div>
                <div><label>Date</label><input type="date" id="a_assessment_date"></div>
            </div>
            <div id="assessment-qa-grid" style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px 25px;"></div>
            <button onclick="processAssessmentStep()" class="btn-teal">Save Assessment</button>
        </div>
    </div>

    <div id="step-session" class="step-container step-locked">
        <h2 class="nest-header"><span class="badge-step">4</span> Select Session</h2>
        <div class="step-content" style="margin-top:20px;">
            <label>Available Sessions</label>
            <select id="enrollment_session_id"></select>
            <button onclick="processSessionStep()" class="btn-teal">Confirm Session</button>
        </div>
    </div>

    <div id="step-pickup" class="step-container step-locked">
        <h2 class="nest-header"><span class="badge-step">5</span> Authorized Pickup</h2>
        <div class="step-content" style="margin-top:20px;">
            <div id="pickup-entry-list" style="margin-bottom:15px;"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <input type="text" id="pu_name" placeholder="Name">
                <input type="text" id="pu_rel" placeholder="Relationship">
                <input type="text" id="pu_phone" placeholder="Phone">
            </div>
            <button onclick="addPickupLocal()" class="btn-teal" style="background:#334155; margin-top:10px;">+ Add Contact</button>
            <button onclick="finalizePickups()" class="btn-teal">Confirm All Pickups</button>
        </div>
    </div>

    <div id="step-final" class="step-container step-locked">
        <h2 class="nest-header"><span class="badge-step">6</span> Finalize Enrollment</h2>
        <div class="step-content" style="margin-top:20px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                <div><label>Enrollment Date</label><input type="date" id="final_enrolled_date"></div>
                <div><label>Start Date</label><input type="date" id="final_start_date"></div>
            </div>
            <div id="review-content" style="background: #f8fafc; padding: 20px; border-radius: 4px;"></div>
            <button onclick="submitFinalEnrollment()" class="btn-teal" style="background: #0f766e; width: 100%;">GENERATE RECORDS & CLOSE</button>
        </div>
    </div>
</div>

<script>
(function() {
    const PARENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/parent";
    const STUDENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student";
    const FRANCHISE_API = "https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise";
    const TEACHER_API = "https://x8ki-letl-twmt.n7.xano.io/api:xLIeVP2e/teacher";
    const QUESTIONS_API = "https://x8ki-letl-twmt.n7.xano.io/api:ptE37CdX/student_assessment_questions";
    const ASSESSMENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:e7P6emQg/student_assessment_filled";
    const PICKUP_API = "https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student_authorized_pickup";
    const ENROLLMENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:IwtDgUwD/session_enrollment";
    const SESSION_API = "https://x8ki-letl-twmt.n7.xano.io/api:mUsV7Zqx/session";

    let state = {
        currentParentId: null,
        currentStudentId: null,
        currentFranchiseId: 3, // Set Sariaya Local ID [cite: 2025-12-29]
        currentTeacherId: null,
        selectedSessionId: null,
        pickupContacts: [],
        allParents: [],
        allFranchises: []
    };

    function showLoader(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

    function moveToStep(currId, nextId, stepNum) {
        document.getElementById(currId).classList.replace('step-active', 'step-saved');
        const next = document.getElementById(nextId);
        next.classList.remove('step-locked');
        next.classList.add('step-active');
        document.getElementById('enrollment-progress').innerText = `PROGRESS: STEP ${stepNum} OF 6`;
    }

    // INITIAL LOAD
    async function init() {
        // Apply the local franchise ID to the hidden/readonly field immediately [cite: 2026-02-05]
        document.getElementById('p_fran_id').value = state.currentFranchiseId;

        const [pRes, fRes, tRes, qRes, sRes] = await Promise.all([
            fetch(PARENT_API).then(r => r.json()),
            fetch(FRANCHISE_API).then(r => r.json()),
            fetch(TEACHER_API).then(r => r.json()),
            fetch(QUESTIONS_API).then(r => r.json()),
            fetch(SESSION_API).then(r => r.json())
        ]);

        state.allParents = pRes;
        state.allFranchises = fRes;

        const pSel = document.getElementById('p_select_id');
        pRes.forEach(p => pSel.innerHTML += `<option value="${p.id}">${p.first_name} ${p.last_name}</option>`);

        const tSel = document.getElementById('a_teacher_id');
        tRes.forEach(t => tSel.innerHTML += `<option value="${t.id}">${t.first_name}</option>`);

        const sSel = document.getElementById('enrollment_session_id');
        sRes.forEach(s => sSel.innerHTML += `<option value="${s.id}">${s.name}</option>`);

        const qGrid = document.getElementById('assessment-qa-grid');
        qRes.forEach((q, i) => {
            qGrid.innerHTML += `<div><label>${q.question_text}</label></div>
                               <div><select id="q_ans_${i}"><option value="Yes">Yes</option><option value="No">No</option><option value="N/A">N/A</option></select></div>`;
        });
    }

    window.toggleParentMode = () => {
        const s = document.getElementById('parent-select-mode');
        const c = document.getElementById('parent-create-mode');
        if (s.style.display === 'none') { s.style.display = 'block'; c.style.display = 'none'; }
        else { s.style.display = 'none'; c.style.display = 'block'; }
    };

    window.toggleStudentMode = () => {
        const s = document.getElementById('student-select-mode');
        const c = document.getElementById('student-create-mode');
        if (s.style.display === 'none') { s.style.display = 'block'; c.style.display = 'none'; }
        else { s.style.display = 'none'; c.style.display = 'block'; }
    };

    window.processParentStep = async () => {
        const isCreate = document.getElementById('parent-create-mode').style.display === 'block';
        showLoader('loader-parent', true);
        try {
            if (isCreate) {
                const payload = {
                    first_name: document.getElementById('p_fn').value,
                    last_name: document.getElementById('p_ln').value,
                    email: document.getElementById('p_email').value,
                    phone: document.getElementById('p_phone').value,
                    address: document.getElementById('p_address').value,
                    franchise_id: state.currentFranchiseId, // Always use local ID [cite: 2026-02-05]
                    is_active: true
                };
                const res = await fetch(PARENT_API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
                const data = await res.json();
                state.currentParentId = data.id;
            } else {
                state.currentParentId = parseInt(document.getElementById('p_select_id').value);
                const p = state.allParents.find(x => x.id === state.currentParentId);
                state.currentFranchiseId = p.franchise_id;
            }

            // Populate Profile View
            document.getElementById('disp-p-fran').innerText = state.currentFranchiseId;
            document.getElementById('parent-profile-view').style.display = 'grid';

            // Filter Student List
            const sRes = await fetch(STUDENT_API + "?parent_id=" + state.currentParentId).then(r => r.json());
            const sSel = document.getElementById('s_select_id');
            sSel.innerHTML = '<option value="">-- Select --</option>';
            sRes.forEach(s => sSel.innerHTML += `<option value="${s.id}">${s.name}</option>`);

            moveToStep('step-parent', 'step-student', 2);
        } catch(e) { alert(e.message); }
        showLoader('loader-parent', false);
    };

    window.processStudentStep = async () => {
        const isCreate = document.getElementById('student-create-mode').style.display === 'block';
        showLoader('loader-student', true);
        try {
            if (isCreate) {
                const payload = {
                    parent_id: state.currentParentId,
                    name: document.getElementById('s_name_new').value,
                    date_of_birth: document.getElementById('s_dob_new').value,
                    franchise_id: state.currentFranchiseId,
                    is_active: true
                };
                const res = await fetch(STUDENT_API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
                const data = await res.json();
                state.currentStudentId = data.id;
            } else {
                state.currentStudentId = parseInt(document.getElementById('s_select_id').value);
            }
            moveToStep('step-student', 'step-assessment', 3);
        } catch(e) { alert(e.message); }
        showLoader('loader-student', false);
    };

    window.processAssessmentStep = async () => {
        moveToStep('step-assessment', 'step-session', 4);
    };

    window.processSessionStep = () => {
        state.selectedSessionId = parseInt(document.getElementById('enrollment_session_id').value);
        moveToStep('step-session', 'step-pickup', 5);
    };

    window.addPickupLocal = () => {
        const p = {
            student_id: state.currentStudentId,
            name: document.getElementById('pu_name').value,
            relationship: document.getElementById('pu_rel').value,
            phone: document.getElementById('pu_phone').value
        };
        state.pickupContacts.push(p);
        document.getElementById('pickup-entry-list').innerHTML += `<span class="pickup-badge">${p.name} (${p.relationship})</span>`;
        document.getElementById('pu_name').value = '';
    };

    window.finalizePickups = () => moveToStep('step-pickup', 'step-final', 6);

    window.submitFinalEnrollment = async () => {
        try {
            await fetch(ENROLLMENT_API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    student_id: state.currentStudentId,
                    session_id: state.selectedSessionId,
                    enrollment_date: document.getElementById('final_enrolled_date').value,
                    start_date: document.getElementById('final_start_date').value
                })
            });

            for (let contact of state.pickupContacts) {
                await fetch(PICKUP_API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(contact)});
            }

            alert("Master Enrollment Complete!");
            location.reload();
        } catch(e) { alert(e.message); }
    };

    init();
})();
</script>
