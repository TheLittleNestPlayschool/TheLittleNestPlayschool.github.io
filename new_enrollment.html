<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind Enrollment Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <script src="../security.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --nest-teal: #00d1b2; --nest-dark: #1e293b; --nest-bg: #f1f5f9; --nest-border: #e2e8f0; }
        body { background: var(--nest-bg); font-family: 'Inter', sans-serif; color: var(--nest-dark); margin: 0; padding: 10px; }
        
        .enrollment-wrapper { width: 100%; max-width: 1200px; margin: 0 auto; }
        .nest-header { color: var(--nest-dark); font-weight: 800; font-size: 0.95rem; letter-spacing: -0.5px; display: flex; align-items: center; margin-bottom: 4px; }
        .progress-bar { text-align: right; font-size: 0.6rem; font-weight: 800; color: #64748b; margin-bottom: 6px; text-transform: uppercase; }
        
        /* Grid Layout */
        .step-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: start; }
        .full-row { grid-column: span 2; }

        .step-container { background: white; border: 1px solid var(--nest-border); border-radius: 6px; padding: 10px 15px; margin-bottom: 8px; position: relative; transition: all 0.3s ease; }
        .step-locked { opacity: 0.35; pointer-events: none; filter: grayscale(1); }
        .step-active { border-top: 3px solid var(--nest-teal); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .step-saved { border-left: 3px solid #cbd5e1; background: #f8fafc; padding: 6px 15px; }
        .step-saved .step-content { display: none; }
        .step-saved .nest-header { font-size: 0.75rem; margin-bottom: 0; opacity: 0.7; }
        
        .profile-display { display: flex; flex-wrap: wrap; gap: 12px; padding: 4px 0; border-top: 1px solid #e2e8f0; margin-top: 4px; }
        .profile-item { display: flex; align-items: center; gap: 4px; }
        .profile-label { font-size: 0.5rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .profile-value { font-size: 0.65rem; color: #334155; font-weight: 700; }

        label { display: block; font-size: 0.5rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 1px; margin-top: 3px; }
        input, select { width: 100%; border: 1px solid #cbd5e1; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; background: #f8fafc; font-weight: 700; text-transform: uppercase; }
        
        .btn-teal { background: var(--nest-teal); color: #fff; padding: 6px 12px; border-radius: 4px; font-weight: 700; border: none; cursor: pointer; font-size: 0.65rem; text-transform: uppercase; width: 100%; margin-top: 8px; }
        .badge-step { background: var(--nest-dark); color: white; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.55rem; margin-right: 6px; }
        
        #assessment-qa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; border: 1px solid #f1f5f9; padding: 6px; border-radius: 4px; max-height: 220px; overflow-y: auto; }
        .qa-row { display: grid; grid-template-columns: 20px 1fr 80px; gap: 4px; align-items: center; padding: 3px; border-bottom: 1px solid #f8fafc; }
        .qa-row.selected { background: #f0fdfa; border-radius: 4px; }

        .edit-pill { position: absolute; top: 6px; right: 10px; background: #fff; color: #64748b; border: 1px solid var(--nest-border); padding: 2px 6px; border-radius: 3px; font-size: 0.5rem; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        
        .nest-modal-overlay { position: fixed; inset: 0; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-card { background: white; width: 100%; max-width: 400px; border-radius: 12px; padding: 25px; text-align: center; }
        .summary-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin: 15px 0; text-align: left; }
    </style>
</head>
<body>

<div id="enrollment-ui" class="enrollment-wrapper">
    <div id="enrollment-progress" class="progress-bar">Step 0 of 6</div>

    <div class="step-grid">
        <div id="step-location" class="step-container step-active full-row">
            <h2 class="nest-header"><span class="badge-step">0</span> Select Branch</h2>
            <div class="step-content flex gap-3">
                <select id="ho_franchise_selector" class="bg-slate-50"></select>
                <button id="init-btn" onclick="lockLocation()" class="btn-teal !mt-0 !w-48">Initialize</button>
            </div>
        </div>

        <div id="step-parent" class="step-container step-locked">
            <h2 class="nest-header"><span class="badge-step">1</span> Parent Profile</h2>
            <button class="edit-pill" onclick="unlockStep('step-parent', 'parent-profile-view'); document.getElementById('parent-form-content').style.display='block'">Modify</button>
            <div id="parent-profile-view" style="display:none;" class="profile-display">
                <div class="profile-item"><div class="profile-label">Name:</div><div id="disp-p-name" class="profile-value"></div></div>
                <div class="profile-item"><div class="profile-label">PH:</div><div id="disp-p-phone" class="profile-value"></div></div>
            </div>
            <div id="parent-form-content" class="step-content">
                <div id="parent-create-mode" style="display:block;">
                    <div class="grid grid-cols-2 gap-2">
                        <div><label>First Name</label><input type="text" id="p_fn"></div>
                        <div><label>Last Name</label><input type="text" id="p_ln"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label>Phone</label><input type="text" id="p_phone"></div>
                        <div><label>Email</label><input type="email" id="p_email"></div>
                    </div>
                    <label>Address</label><input type="text" id="p_address">
                </div>
                <div id="parent-select-mode" style="display:none;">
                    <label>Search Parents</label>
                    <input type="text" id="p_search" placeholder="..." onkeyup="filterParents()" class="mb-1">
                    <select id="p_select_id" size="4"></select>
                </div>
                <div class="flex gap-2">
                    <button class="bg-slate-500 text-white px-2 py-1 rounded font-bold text-[8px] uppercase mt-2" onclick="toggleParentMode()">Toggle Search</button>
                    <button onclick="processParentStep()" class="btn-teal">Confirm Parent</button>
                </div>
            </div>
        </div>

        <div id="step-student" class="step-container step-locked">
            <h2 class="nest-header"><span class="badge-step">2</span> Student Profile</h2>
            <button class="edit-pill" onclick="unlockStep('step-student', 'student-profile-view')">Modify</button>
            <div id="student-profile-view" style="display:none;" class="profile-display">
                <div class="profile-item"><div class="profile-label">Name:</div><div id="disp-s-name" class="profile-value"></div></div>
                <div class="profile-item"><div class="profile-label">DOB:</div><div id="disp-s-dob" class="profile-value"></div></div>
            </div>
            <div class="step-content">
                <div id="student-create-mode" style="display:block;">
                    <label>Full Legal Name</label><input type="text" id="s_name_new">
                    <div class="grid grid-cols-2 gap-2">
                        <div><label>Date of Birth</label><input type="date" id="s_dob_new"></div>
                        <div><label>Gender</label><input type="text" id="s_gender"></div>
                    </div>
                </div>
                <div id="student-select-mode" style="display:none;">
                    <label>Linked Students</label>
                    <select id="s_select_id" class="font-bold uppercase"></select>
                </div>
                <div class="flex gap-2">
                    <button class="bg-slate-500 text-white px-2 py-1 rounded font-bold text-[8px] uppercase mt-2" onclick="toggleStudentMode()">Toggle Search</button>
                    <button onclick="processStudentStep()" class="btn-teal">Confirm Student</button>
                </div>
            </div>
        </div>

        <div id="step-assessment" class="step-container step-locked full-row">
            <h2 class="nest-header"><span class="badge-step">3</span> Nest Assessment</h2>
            <button class="edit-pill" onclick="unlockStep('step-assessment', 'assessment-summary-view')">Modify</button>
            <div id="assessment-summary-view" style="display:none;" class="profile-display">
                <div class="profile-item"><div class="profile-label">Assessed By:</div><div id="disp-a-teacher" class="profile-value"></div></div>
            </div>
            <div class="step-content">
                <div class="grid grid-cols-3 gap-4 items-end mb-2">
                    <div><label>Teacher</label><select id="a_teacher_id"></select></div>
                    <div><label>Date</label><input type="date" id="a_assessment_date"></div>
                    <div id="selection-counter" class="text-[8px] font-black text-teal-600 uppercase pb-2">Items: 0 / 10</div>
                </div>
                <div id="assessment-qa-grid"></div>
                <button onclick="processAssessmentStep()" class="btn-teal">Save Evaluation</button>
            </div>
        </div>

        <div id="step-session" class="step-container step-locked">
            <h2 class="nest-header"><span class="badge-step">4</span> Academic Session</h2>
            <button class="edit-pill" onclick="unlockStep('step-session', 'session-profile-view')">Modify</button>
            <div id="session-profile-view" style="display:none;" class="profile-display">
                <div class="profile-item"><div class="profile-label">Slot:</div><div id="disp-sess-name" class="profile-value"></div></div>
            </div>
            <div class="step-content">
                <label>Select Session Slot</label>
                <select id="enrollment_session_id"></select>
                <button onclick="processSessionStep()" class="btn-teal">Lock Session</button>
            </div>
        </div>

        <div id="step-pickup" class="step-container step-locked">
            <h2 class="nest-header"><span class="badge-step">5</span> Pickup Security</h2>
            <div class="step-content">
                <div id="pickup-entry-list" class="mb-1 space-y-1"></div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="pu_name" placeholder="NAME">
                    <input type="text" id="pu_phone" placeholder="PHONE">
                </div>
                <button onclick="addPickupLocal()" class="btn-teal !bg-slate-600">+ Add Person</button>
                <button onclick="finalizePickups()" class="btn-teal">Finalize List</button>
            </div>
        </div>

        <div id="step-final" class="step-container step-locked full-row">
            <h2 class="nest-header"><span class="badge-step">6</span> Finalize Registration</h2>
            <div class="step-content flex gap-4 items-end">
                <div class="flex-1"><label>Enrollment Date</label><input type="date" id="final_enroll_date"></div>
                <div class="flex-1"><label>School Start Date</label><input type="date" id="final_start_date"></div>
                <button onclick="submitFinalEnrollment()" class="btn-teal !mt-0 !h-8 !bg-slate-800 font-black">Generate & Enroll</button>
            </div>
        </div>
    </div>
</div>

<div id="processing-modal" class="nest-modal-overlay">
    <div class="modal-card">
        <h2 class="text-lg font-black uppercase">Syncing Database</h2>
        <p id="processing-status" class="text-[9px] text-slate-500 font-bold mt-1">Initializing...</p>
        <div class="loader-track"><div id="loader-fill" class="loader-fill"></div></div>
    </div>
</div>

<div id="success-modal" class="nest-modal-overlay">
    <div class="modal-card">
        <h2 class="text-xl font-black uppercase">Registration Success</h2>
        <div class="summary-box">
            <div class="mb-2"><div class="text-[7px] font-black uppercase text-slate-400">Parent</div><div id="modal-disp-parent" class="text-[10px] font-bold">---</div></div>
            <div class="mb-2"><div class="text-[7px] font-black uppercase text-slate-400">Student</div><div id="modal-disp-child" class="text-[10px] font-bold">---</div></div>
            <div><div class="text-[7px] font-black uppercase text-slate-400">Session</div><div id="modal-disp-session" class="text-[10px] font-bold">---</div></div>
        </div>
        <button onclick="exitToDashboard()" class="btn-teal !h-12 !text-[10px]">Registration Complete</button>
    </div>
</div>

<script>
(function() {
    window.state = { currentParentId: null, currentStudentId: null, currentFranchiseId: null, pickupContacts: [], allParents: [], selectedQuestionCount: 0 };

    async function init() {
        const isHeadOffice = localStorage.getItem('is_head_office') === 'true';
        const lockedId = localStorage.getItem('locked_franchise_id');
        if (!isHeadOffice && lockedId) {
            window.state.currentFranchiseId = parseInt(lockedId);
            document.getElementById('step-location').style.display = 'none';
            window.lockLocation(); 
        } else {
            try {
                const res = await fetch(`${window.NEST_ENDPOINTS.franchise.list}?access_key=${SecurityManager.getAccessKey()}`);
                const data = await res.json();
                const list = Array.isArray(data) ? data : (data.items || []);
                const sel = document.getElementById('ho_franchise_selector');
                sel.innerHTML = '<option value="">-- Choose Branch --</option>';
                list.sort((a,b) => a.name.localeCompare(b.name)).forEach(f => {
                    sel.innerHTML += `<option value="${f.id}">${f.name}</option>`;
                });
            } catch(e) { console.error(e); }
        }
    }

    window.lockLocation = async () => {
        const sel = document.getElementById('ho_franchise_selector');
        if(!window.state.currentFranchiseId && sel.value) window.state.currentFranchiseId = parseInt(sel.value);
        if(!window.state.currentFranchiseId) return;
        window.moveToStep('step-location', 'step-parent', 1);
        const auth = `?access_key=${SecurityManager.getAccessKey()}&franchise_id=${window.state.currentFranchiseId}`;
        try {
            const pRes = await fetch(`${window.NEST_ENDPOINTS.parent.list}${auth}`);
            const pData = await pRes.json();
            window.state.allParents = Array.isArray(pData) ? pData : (pData.items || []);
            renderParentList(window.state.allParents);
            fetchOtherBranchData();
        } catch(e) { console.error(e); }
    };

    function renderParentList(list) {
        const sel = document.getElementById('p_select_id');
        if(!sel) return; sel.innerHTML = '';
        list.forEach(p => { sel.innerHTML += `<option value="${p.id}">${p.first_name} ${p.last_name}</option>`; });
    }

    window.filterParents = () => {
        const term = document.getElementById('p_search').value.toLowerCase();
        renderParentList(window.state.allParents.filter(p => `${p.first_name} ${p.last_name}`.toLowerCase().includes(term)));
    };

    window.processParentStep = async () => {
        // FIX: Detect mode based on container visibility
        const isNew = document.getElementById('parent-create-mode').style.display !== 'none';
        const auth = `?access_key=${SecurityManager.getAccessKey()}`;
        
        if (isNew) {
            const fn = document.getElementById('p_fn').value;
            const ln = document.getElementById('p_ln').value;
            if(!fn || !ln) return alert("Enter Parent Name");
            
            const res = await fetch(`${window.NEST_ENDPOINTS.parent.list}${auth}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ first_name: fn, last_name: ln, phone: document.getElementById('p_phone').value, email: document.getElementById('p_email').value, address: document.getElementById('p_address').value, franchise_id: window.state.currentFranchiseId, is_active: true })
            });
            const data = await res.json(); 
            window.state.currentParentId = data.id;
        } else {
            window.state.currentParentId = parseInt(document.getElementById('p_select_id').value);
        }
        
        if(!window.state.currentParentId) return alert("Select Parent");
        
        const p = isNew ? { first_name: document.getElementById('p_fn').value, last_name: document.getElementById('p_ln').value, phone: document.getElementById('p_phone').value } : window.state.allParents.find(x => x.id === window.state.currentParentId);
        
        document.getElementById('disp-p-name').innerText = `${p.first_name} ${p.last_name}`;
        document.getElementById('disp-p-phone').innerText = p.phone || 'N/A';
        document.getElementById('parent-profile-view').style.display = 'flex';
        document.getElementById('parent-form-content').style.display = 'none';
        window.prepStudentStep();
        window.moveToStep('step-parent', 'step-student', 2);
    };

    async function fetchOtherBranchData() {
        const auth = `?access_key=${SecurityManager.getAccessKey()}&franchise_id=${window.state.currentFranchiseId}`;
        try {
            const [tRes, sRes, qRes] = await Promise.all([ 
                fetch(`${window.NEST_ENDPOINTS.teacher.list}${auth}`), 
                fetch(`${window.NEST_ENDPOINTS.session.list}${auth}`), 
                fetch(`${window.NEST_ENDPOINTS.student_assessment_question.list}${auth}`) 
            ]);
            const tData = await tRes.json();
            const tSel = document.getElementById('a_teacher_id');
            tSel.innerHTML = '<option value="">-- TEACHER --</option>';
            (Array.isArray(tData) ? tData : tData.items || []).forEach(t => { if(t.is_active) tSel.innerHTML += `<option value="${t.id}">${t.first_name} ${t.last_name}</option>`; });
            
            const sData = await sRes.json();
            const sessSel = document.getElementById('enrollment_session_id');
            sessSel.innerHTML = '<option value="">-- SELECT SLOT --</option>';
            (Array.isArray(sData) ? sData : sData.items || []).forEach(s => { sessSel.innerHTML += `<option value="${s.id}">${s.name}</option>`; });
            
            const qData = await qRes.json();
            const qGrid = document.getElementById('assessment-qa-grid');
            qGrid.innerHTML = '';
            (Array.isArray(qData) ? qData : qData.items || []).forEach(q => {
                const opts = [q.answer_1, q.answer_2, q.answer_3, q.answer_4].filter(a => a);
                let optHtml = opts.map(o => `<option value="${o}">${o}</option>`).join('');
                qGrid.innerHTML += `<div class="qa-row" data-qid="${q.id}"> <input type="checkbox" data-qid="${q.id}" onchange="handleQS(this)"> <div class="text-[8px] font-bold">${q.the_question}</div> <div class="q-select-ans"><select class="text-[8px] !p-1">${optHtml}</select></div> </div>`;
            });
        } catch(e) { console.error(e); }
    }

    window.prepStudentStep = async () => {
        const auth = `?access_key=${SecurityManager.getAccessKey()}&parent_id=${window.state.currentParentId}`;
        const res = await fetch(`${window.NEST_ENDPOINTS.student.list}${auth}`);
        const kids = await res.json();
        const sSel = document.getElementById('s_select_id');
        sSel.innerHTML = '<option value="">-- Select Child --</option>';
        (Array.isArray(kids) ? kids : (kids.items || [])).forEach(k => { sSel.innerHTML += `<option value="${k.id}">${k.name}</option>`; });
    };

    window.processStudentStep = async () => {
        // FIX: Detect mode based on container visibility
        const isNew = document.getElementById('student-create-mode').style.display !== 'none';
        const auth = `?access_key=${SecurityManager.getAccessKey()}`;
        
        if (isNew) {
            const name = document.getElementById('s_name_new').value;
            const dob = document.getElementById('s_dob_new').value;
            if(!name || !dob) return alert("Enter Student Info");
            
            const res = await fetch(`${window.NEST_ENDPOINTS.student.list}${auth}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ parent_id: window.state.currentParentId, name: name, date_of_birth: dob, franchise_id: window.state.currentFranchiseId, is_active: true })
            });
            const data = await res.json(); 
            window.state.currentStudentId = data.id;
        } else {
            window.state.currentStudentId = parseInt(document.getElementById('s_select_id').value);
        }
        
        if(!window.state.currentStudentId) return alert("Select Student");
        
        const sRes = await fetch(`${window.NEST_ENDPOINTS.student.list}/${window.state.currentStudentId}${auth}`);
        const student = await sRes.json();
        document.getElementById('disp-s-name').innerText = student.name;
        document.getElementById('disp-s-dob').innerText = student.date_of_birth;
        document.getElementById('student-profile-view').style.display = 'flex';
        window.moveToStep('step-student', 'step-assessment', 3);
    };

    window.processAssessmentStep = async () => {
        const tId = document.getElementById('a_teacher_id').value;
        const date = document.getElementById('a_assessment_date').value;
        const auth = `?access_key=${SecurityManager.getAccessKey()}`;
        const selected = document.querySelectorAll('.qa-row.selected');
        for(let row of selected) {
            await fetch(`${window.NEST_ENDPOINTS.student_assessment_filled.list}${auth}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ student_id: window.state.currentStudentId, teacher_id: parseInt(tId), student_assessment_question_id: parseInt(row.querySelector('input').dataset.qid), answer_text: row.querySelector('select').value, assessment_date: date })
            });
        }
        document.getElementById('disp-a-teacher').innerText = document.getElementById('a_teacher_id').options[document.getElementById('a_teacher_id').selectedIndex].text;
        document.getElementById('assessment-summary-view').style.display = 'flex';
        window.moveToStep('step-assessment', 'step-session', 4);
    };

    window.processSessionStep = () => {
        const s = document.getElementById('enrollment_session_id');
        document.getElementById('disp-sess-name').innerText = s.options[s.selectedIndex].text;
        document.getElementById('session-profile-view').style.display = 'flex';
        window.moveToStep('step-session', 'step-pickup', 5);
    };

    window.addPickupLocal = () => {
        const c = { student_id: window.state.currentStudentId, name: document.getElementById('pu_name').value, phone: document.getElementById('pu_phone').value, is_active: true };
        window.state.pickupContacts.push(c);
        document.getElementById('pickup-entry-list').innerHTML += `<div class="p-1 bg-white border rounded text-[8px] font-bold">${c.name} — ${c.phone}</div>`;
        document.getElementById('pu_name').value = ''; document.getElementById('pu_phone').value = '';
    };

    window.finalizePickups = () => { window.moveToStep('step-pickup', 'step-final', 6); };

    window.updateProgress = (percent, status) => {
        document.getElementById('loader-fill').style.width = percent + '%';
        document.getElementById('processing-status').innerText = status;
    };

    window.submitFinalEnrollment = async () => {
        document.getElementById('processing-modal').style.display = 'flex';
        const auth = `?access_key=${SecurityManager.getAccessKey()}`;
        const sessId = parseInt(document.getElementById('enrollment_session_id').value);
        const eDate = document.getElementById('final_enroll_date').value;
        const sDate = document.getElementById('final_start_date').value;
        try {
            updateProgress(30, "Updating Student...");
            await fetch(`${window.NEST_ENDPOINTS.student.list}/${window.state.currentStudentId}${auth}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ session_enrolled: sessId }) });
            updateProgress(60, "Creating Enrollment...");
            await fetch(`${window.NEST_ENDPOINTS.session_enrollment.list}${auth}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ student_id: window.state.currentStudentId, session_id: sessId, franchise_id: window.state.currentFranchiseId, enrollment_date: eDate, start_date: sDate }) });
            updateProgress(90, "Registering Security...");
            for (let c of window.state.pickupContacts) { await fetch(`${window.NEST_ENDPOINTS.uploader.register}${auth}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(c) }); }
            updateProgress(100, "Complete.");
            setTimeout(() => {
                document.getElementById('processing-modal').style.display = 'none';
                document.getElementById('modal-disp-parent').innerText = document.getElementById('disp-p-name').innerText;
                document.getElementById('modal-disp-child').innerText = document.getElementById('disp-s-name').innerText;
                document.getElementById('modal-disp-session').innerText = document.getElementById('disp-sess-name').innerText;
                document.getElementById('success-modal').style.display = 'flex';
            }, 500);
        } catch(e) { console.error(e); }
    };

    window.exitToDashboard = () => {
        const key = localStorage.getItem('nestmind_access_key');
        window.location.href = 'franchise_dashboard.html?tlnp=' + key;
    };

    window.handleQS = (cb) => {
        const row = cb.closest('.qa-row');
        cb.checked ? (window.state.selectedQuestionCount++, row.classList.add('selected')) : (window.state.selectedQuestionCount--, row.classList.remove('selected'));
        document.getElementById('selection-counter').innerText = `Items: ${window.state.selectedQuestionCount} / 10`;
    };

    window.toggleParentMode = () => {
        const s = document.getElementById('parent-select-mode'), c = document.getElementById('parent-create-mode');
        if (s.style.display === 'none') { s.style.display = 'block'; c.style.display = 'none'; }
        else { s.style.display = 'none'; c.style.display = 'block'; }
    };

    window.toggleStudentMode = () => {
        const s = document.getElementById('student-select-mode'), c = document.getElementById('student-create-mode');
        if (s.style.display === 'none') { s.style.display = 'block'; c.style.display = 'none'; }
        else { s.style.display = 'none'; c.style.display = 'block'; }
    };

    window.unlockStep = (sId, vId) => {
        document.getElementById(sId).classList.replace('step-saved', 'step-active');
        document.getElementById(vId).style.display = 'none';
    };

    window.moveToStep = (c, n, num) => {
        const cEl = document.getElementById(c); const nEl = document.getElementById(n);
        if(cEl) cEl.classList.replace('step-active', 'step-saved');
        if(nEl) { nEl.classList.remove('step-locked'); nEl.classList.add('step-active'); }
        document.getElementById('enrollment-progress').innerText = `Step ${num} of 6`;
    };

    init();
})();
</script>
</body>
</html>
