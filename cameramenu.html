<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind | Video Intelligence</title>
    
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>

    <style>
        body { background: var(--bg-soft); margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* Sidebar Architecture */
        .sidebar { width: 280px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; shrink-0; }
        .main-content { flex-grow: 1; padding: 20px; overflow-y: auto; }
        
        /* Video Grid Architecture */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .camera-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .video-wrapper { aspect-ratio: 16 / 9; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        
        .cam-header { padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .cam-name { font-weight: 600; color: #1e293b; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Navigation & History */
        .nav-section { padding: 15px; border-bottom: 1px solid var(--border); }
        .nav-title { font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        
        .segment-item { 
            padding: 10px; border-radius: 8px; margin-bottom: 5px; cursor: pointer; 
            border: 1px solid transparent; transition: all 0.2s; font-size: 0.85rem;
        }
        .segment-item:hover { background: var(--bg-soft); border-color: var(--nest-blue); }
        .segment-item.active { background: #eef6ff; border-color: var(--nest-blue); color: var(--nest-blue); }

        /* Configuration Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="p-6 border-b border-slate-50">
            <h1 style="color: var(--nest-blue); margin: 0; font-size: 1.2rem;">NestMind <span style="font-weight: 300; color: #64748b;">Video</span></h1>
        </div>

        <div class="nav-section">
            <div class="nav-title">Franchise Context</div>
            <div id="franchise-display" class="font-bold text-slate-700">District: Sariaya</div>
            <div id="key-display" class="text-xs text-slate-400 mt-1 uppercase font-mono">Key: TLNP****</div>
        </div>

        <div class="nav-section">
            <div class="nav-title">Playback History</div>
            <input type="date" id="history-date" class="nest-input" style="width: 100%; margin-bottom: 10px;">
            <div id="segment-list" style="max-height: 300px; overflow-y: auto;">
                <div class="segment-item">
                    <div style="font-weight: 600;">14:00 - 14:15</div>
                    <div style="font-size: 0.7rem; color: #94a3b8;">STORED ARCHIVE</div>
                </div>
            </div>
        </div>

        <div class="mt-auto p-4 border-t border-slate-100">
            <button onclick="openSetup()" class="nest-btn-secondary" style="width: 100%; font-size: 0.75rem; padding: 10px;">
                ⚙️ SYSTEM SETUP
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="video-grid">
            <div class="camera-card">
                <div class="cam-header">
                    <span id="label-cam1" class="cam-name">Entrance</span>
                    <span class="text-xs text-green-500 font-bold">● LIVE</span>
                </div>
                <div class="video-wrapper">
                    <span class="text-slate-500 text-sm italic">Encrypted Stream...</span>
                </div>
            </div>

            <div class="camera-card">
                <div class="cam-header">
                    <span id="label-cam2" class="cam-name">Classroom</span>
                    <span class="text-xs text-green-500 font-bold">● LIVE</span>
                </div>
                <div class="video-wrapper">
                    <span class="text-slate-500 text-sm italic">Encrypted Stream...</span>
                </div>
            </div>

            <div class="camera-card">
                <div class="cam-header">
                    <span id="label-cam3" class="cam-name">Office Side</span>
                    <span class="text-xs text-green-500 font-bold">● LIVE</span>
                </div>
                <div class="video-wrapper">
                    <span class="text-slate-500 text-sm italic">Encrypted Stream...</span>
                </div>
            </div>
        </div>
    </main>

    <div id="setup-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color: #1e293b;">Camera Labels</h3>
            
            <div style="margin-bottom: 15px;">
                <label class="nav-title">Cam 01</label>
                <input type="text" id="input-cam1" class="nest-input" style="width: 100%;" value="Entrance">
            </div>

            <div style="margin-bottom: 15px;">
                <label class="nav-title">Cam 02</label>
                <input type="text" id="input-cam2" class="nest-input" style="width: 100%;" value="Classroom">
            </div>

            <div style="margin-bottom: 15px;">
                <label class="nav-title">Cam 03</label>
                <input type="text" id="input-cam3" class="nest-input" style="width: 100%;" value="Office Side">
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="saveSetup()" class="nest-btn-primary" style="flex: 1;">Save</button>
                <button onclick="closeSetup()" class="nest-btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        function openSetup() { document.getElementById('setup-modal').style.display = 'flex'; }
        function closeSetup() { document.getElementById('setup-modal').style.display = 'none'; }

        function saveSetup() {
            document.getElementById('label-cam1').innerText = document.getElementById('input-cam1').value;
            document.getElementById('label-cam2').innerText = document.getElementById('input-cam2').value;
            document.getElementById('label-cam3').innerText = document.getElementById('input-cam3').value;
            closeSetup();
        }
    </script>
</body>
</html>
