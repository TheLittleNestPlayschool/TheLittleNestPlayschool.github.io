<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <!-- Header Section -->
            <h1 class="login-title">The Little Nest Playschool</h1>
            <p class="login-subtitle">Where Little Success Stories Begin</p>

            <!-- Form Section -->
            <h2 class="form-section-title">Login</h2>
            
            <div class="login-input-group">
                <input type="email" id="email" class="login-input" placeholder="Email">
                <input type="password" id="password" class="login-input" placeholder="Password">
            </div>
            
            <div class="login-action-row">
                <span class="sign-in-text">Sign in</span>
                <button type="button" onclick="handleLogin()" class="btn-submit">→</button>
            </div>

            <div id="errorMessage" style="color: red; margin-top: 10px;"></div>
            
            <!-- Visible Debug Box with Pause Button -->
            <div id="debugScreen" style="margin-top: 15px; padding: 10px; background: #fff3f3; border: 1px solid #ff9999; font-size: 0.8rem; text-align: left; word-break: break-all; display: none;">
                <strong>Debug Data (Paused):</strong>
                <div id="debugContent"></div>
                <button type="button" onclick="resumeRedirect()" style="margin-top: 10px; padding: 5px 10px; background: #333; color: #fff; border: none; cursor: pointer;">Continue to Portal</button>
            </div>
        </div>
    </div>

    <script>
        const XANO_BASE_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV';
        let savedNextUrl = '';

        async function handleLogin() {
            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const debugScreen = document.getElementById('debugScreen');
            const debugContent = document.getElementById('debugContent');
            
            errorDiv.textContent = '';
            debugScreen.style.display = 'none';

            if (!emailInput || !passwordInput) {
                errorDiv.textContent = 'Please fill out all fields.';
                return;
            }

            try {
                const response = await fetch(`${XANO_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput, password: passwordInput })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.message || 'Invalid credentials.');

                // Store auth token, user ID, admin type, and teacher ID in local storage
                localStorage.setItem('authToken', data.authToken);
                localStorage.setItem('userId', data.user);
                localStorage.setItem('admin_type_id', data.admin_type_id);
                localStorage.setItem('teacher_id', data.teacher_id);

                // Determine routing path
                if (data.admin_type_id === 10) {
                    savedNextUrl = './parentdashboard/dashboard.html';
                } else if (data.admin_type_id === 4) {
                    savedNextUrl = './uploader/uploadermenu.html';
                } else {
                    throw new Error('Login Invalid');
                }

                // Explicitly show raw response and PAUSE redirection
                debugContent.innerHTML = `
                    Response Status: ${response.status}<br>
                    teacher_id: <b>${data.teacher_id}</b><br>
                    admin_type_id: <b>${data.admin_type_id}</b><br>
                    Full JSON: ${JSON.stringify(data)}
                `;
                debugScreen.style.display = 'block';

            } catch (error) {
                errorDiv.textContent = error.message;
            }
        }

        function resumeRedirect() {
            if (savedNextUrl) {
                window.location.href = savedNextUrl;
            }
        }
    </script>
</body>
</html>
