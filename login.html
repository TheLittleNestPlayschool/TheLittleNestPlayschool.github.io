<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest - Login</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <!-- Header Section -->
            <h1 class="login-title">The Little Nest Playschool</h1>
            <p class="login-subtitle">Where Little Success Stories Begin</p>

            <!-- Form Section -->
            <h2 class="form-section-title">Parent Login</h2>
            
            <div class="login-input-group">
                <input type="email" id="email" class="login-input" placeholder="Email">
                <input type="password" id="password" class="login-input" placeholder="Password">
            </div>
            
            <div class="login-action-row">
                <span class="sign-in-text">Sign in</span>
                <button onclick="handleLogin()" class="btn-submit">→</button>
            </div>

            <div id="errorMessage"></div>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Invalid credentials.');

                localStorage.setItem('authToken', data.authToken);
                localStorage.setItem('userId', data.user);
                window.location.href = './parentdashboard/dashboard.html'';
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
