<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <!-- Header Section -->
            <h1 class="login-title">The Little Nest Playschool</h1>
            <p class="login-subtitle">Where Little Success Stories Begin</p>

            <!-- Form Section -->
            <h2 class="form-section-title">Login</h2>
            
            <div class="login-input-group">
                <input type="email" id="email" class="login-input" placeholder="Email">
                <input type="password" id="password" class="login-input" placeholder="Password">
            </div>
            
            <div class="login-action-row">
                <span class="sign-in-text">Sign in</span>
                <button type="button" onclick="handleLogin()" class="btn-submit">→</button>
            </div>

            <div id="errorMessage" style="color: red; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        // Clear out all stale session data the moment the login page loads
        localStorage.clear();

        const XANO_BASE_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV';

        async function handleLogin() {
            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.textContent = '';

            if (!emailInput || !passwordInput) {
                errorDiv.textContent = 'Please fill out all fields.';
                return;
            }

            try {
                const response = await fetch(`${XANO_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput, password: passwordInput })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Invalid credentials.');

                // DEBUG: Inspect full login response payload
                console.log("FULL LOGIN RESPONSE DATA:", data);

                const teacherId = data.teacher_id || data.teacherId || data.id || (data.user && data.user.teacher_id) || '';
                const franchiseId = data.franchise_id || (data.user && data.user.franchise_id) || '';
                const franchiseName = data.franchise_name || (data.user && data.user.franchise_name) || '';

                localStorage.setItem('authToken', data.authToken);
                localStorage.setItem('userId', data.user);
                localStorage.setItem('admin_type_id', data.admin_type_id);
                localStorage.setItem('teacher_id', teacherId);
                localStorage.setItem('nestmind_f_id', franchiseId);
                localStorage.setItem('nestmind_f_name', franchiseName);
                localStorage.setItem('franchise_id', franchiseId); 

                // Force fetch using the resolved franchiseId
                const targetFranchiseId = franchiseId || 18;
                const franchiseUrl = `https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise/${targetFranchiseId}`;
                
                console.log("FETCHING NOW FROM URL:", franchiseUrl);
                
                const franchiseResp = await fetch(franchiseUrl);
                console.log("RESPONSE STATUS:", franchiseResp.status);
                
                if (franchiseResp.ok) {
                    const franchiseData = await franchiseResp.json();
                    console.log("FRANCHISE DATA BODY:", franchiseData);
                    localStorage.setItem('current_session', franchiseData.current_session || '');
                } else {
                    console.error("FRANCHISE FETCH FAILED WITH STATUS:", franchiseResp.status);
                    localStorage.setItem('current_session', '');
                }

                // Routing based on admin_type_id
                if (data.admin_type_id === 10) {
                    window.location.href = './parentdashboard/dashboard.html';
                } else if (data.admin_type_id === 4) {
                    window.location.href = './uploader/uploadermenu.html';
                } else {
                    throw new Error('Login Invalid');
                }

            } catch (error) {
                console.error("CAUGHT ERROR:", error);
                errorDiv.textContent = error.message;
            }
        }
    </script>
</body>
</html>
