<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<div class="bg-transparent p-4 font-['Inter',_sans-serif]">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Session Catalog</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Active Academic Schedules</p>
        </div>
        <div class="bg-slate-100 px-3 py-1.5 rounded-lg text-[10px] font-extrabold text-slate-500 uppercase tracking-widest border border-slate-200">
            View Only Mode
        </div>
    </div>

    <div id="session-list-container" class="space-y-4">
        <div class="p-20 text-center text-slate-400 text-xs italic font-bold uppercase tracking-widest animate-pulse">
            Synchronizing Session Data...
        </div>
    </div>
</div>

<script>
(function() {
    const SessionModule = {
        data: [],

        async init() {
            if (!window.NEST_ENDPOINTS) await this.loadScript('/api_config.js');
            
            const fid = localStorage.getItem('locked_franchise_id');
            if (!fid) return;

            try {
                const url = `${window.NEST_ENDPOINTS.session.list}?franchise_id=${fid}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error("Fetch failed");
                
                this.data = await response.json();
                this.render();
            } catch (err) {
                console.error("Session Sync Error:", err);
                document.getElementById('session-list-container').innerHTML = `
                    <div class="p-10 text-center bg-red-50 border border-red-100 rounded-2xl">
                        <p class="text-red-500 font-black text-[10px] uppercase tracking-widest">Sync Failed • Check Connection</p>
                    </div>`;
            }
        },

        async loadScript(src) {
            return new Promise(resolve => {
                const s = document.createElement('script'); 
                s.src = src; 
                s.onload = resolve;
                s.onerror = () => { 
                    s.src = src.replace('/', ''); 
                    s.onload = resolve; 
                };
                document.head.appendChild(s);
            });
        },

        render() {
            const container = document.getElementById('session-list-container');
            
            // --- THE FIX: FILTER OUT HIDDEN SESSIONS ---
            // This strictly keeps only records where display is true.
            const visibleSessions = (this.data || []).filter(s => s.display === true);

            if (visibleSessions.length === 0) {
                container.innerHTML = `<div class="p-20 text-center text-slate-400 text-xs font-bold uppercase border-2 border-dashed border-slate-100 rounded-2xl italic">No sessions found</div>`;
                return;
            }

            container.innerHTML = visibleSessions.map(s => `
                <div class="bg-white border border-slate-200 rounded-2xl p-5 flex items-center hover:border-teal-400 transition-all cursor-default">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <h3 class="text-sm font-black text-slate-800 uppercase tracking-tight">${s.name}</h3>
                            <span class="text-[8px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-400 font-bold uppercase">#${s.id}</span>
                        </div>
                        <p class="text-[11px] text-slate-500 font-medium leading-relaxed">${s.description || 'Academic Session'}</p>
                    </div>
                    <div class="flex items-center gap-12 ml-auto text-right">
                        <div>
                            <p class="text-[8px] font-black text-slate-300 uppercase tracking-widest mb-1">Schedule</p>
                            <p class="text-[10px] font-extrabold text-slate-600 uppercase italic">
                                ${s.start_time_text || '--:--'} <span class="text-slate-300 mx-1">TO</span> ${s.end_time_text || '--:--'}
                            </p>
                        </div>
                        <div class="flex items-center gap-2.5 pl-8 border-l border-slate-100 min-w-[100px] justify-end">
                            <div class="w-2 h-2 rounded-full ${s.is_active ? 'bg-teal-500' : 'bg-slate-300'}"></div>
                            <span class="text-[9px] font-black uppercase tracking-widest ${s.is_active ? 'text-teal-600' : 'text-slate-400'}">
                                ${s.is_active ? 'Active' : 'Offline'}
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    };

    SessionModule.init();
})();
</script>
