<script src="api_config.js"></script>
<script src="schema_config.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<div class="bg-transparent p-4 font-['Inter',_sans-serif]">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black tracking-tighter text-slate-900">Session Catalog</h1>
        <div class="bg-slate-100 px-3 py-1.5 rounded-lg text-[10px] font-extrabold text-slate-500 uppercase tracking-widest border border-slate-200">
            View Only Mode
        </div>
    </div>

    <div id="session-container" class="space-y-3">
        <div class="text-center py-20 bg-white border-2 border-dashed border-slate-200 rounded-2xl">
            <div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-teal-500 rounded-full mb-4" role="status"></div>
            <p class="text-slate-400 font-bold italic tracking-tight">Synchronizing session data...</p>
        </div>
    </div>
</div>

<script>
(function() {
    // ERROR LOGGER HELPER
    const logError = (msg) => {
        const container = document.getElementById('session-container');
        if(!container) return;
        container.innerHTML = `
            <div class="bg-red-50 border-2 border-red-100 p-8 rounded-2xl text-center">
                <div class="text-3xl mb-2">⚠️</div>
                <p class="text-red-600 font-black uppercase text-xs tracking-widest mb-1">Sync Failed</p>
                <p class="text-red-500 font-medium text-sm">${msg}</p>
                <button onclick="window.loadSessions()" class="mt-4 px-4 py-2 bg-red-600 text-white text-[10px] font-black rounded-lg uppercase transition-transform active:scale-95">Retry Connection</button>
            </div>`;
    };

    window.loadSessions = async () => {
        const container = document.getElementById('session-container');
        if(!container) return;
        
        // 1. Check if Config is loaded
        if (typeof window.NEST_API === 'undefined') {
            logError("Configuration file (api_config.js) not found or failed to load.");
            return;
        }

        // 2. Check Identity Lock
        const lockedId = localStorage.getItem('locked_franchise_id');
        const lockedName = localStorage.getItem('locked_franchise_name') || "this branch";
        
        if (!lockedId) {
            container.innerHTML = `
                <div class="bg-amber-50 border-2 border-amber-100 p-8 rounded-2xl text-center">
                    <p class="text-amber-700 font-black uppercase text-xs tracking-widest mb-1">Identity Lock Required</p>
                    <p class="text-amber-600 font-medium text-sm">Please select a branch in the sidebar to view local sessions.</p>
                </div>`;
            return;
        }
        
        try {
            // 3. Attempt Fetch
            const response = await fetch(`${window.NEST_API.sessions}?t=${Date.now()}`);
            
            if (!response.ok) throw new Error(`Xano responded with ${response.status}: ${response.statusText}`);
            
            const data = await response.json();
            let list = Array.isArray(data) ? data : (data.items || []);
            
            // 4. Filter by Franchise
            list = list.filter(s => s.franchise_id.toString() === lockedId);

            if (list.length === 0) {
                container.innerHTML = `
                    <div class="bg-white border-2 border-dashed border-slate-200 p-12 rounded-2xl text-center">
                        <p class="text-slate-400 font-bold italic text-sm">No active sessions found for ${lockedName}.</p>
                    </div>`;
                return;
            }

            // 5. Render
            container.innerHTML = list.map(s => {
                const statusColor = s.is_active ? 'text-teal-500' : 'text-slate-400';
                const statusBg = s.is_active ? 'bg-teal-500' : 'bg-slate-400';
                const days = Array.isArray(s.scheduled_days) ? s.scheduled_days.join(', ') : s.scheduled_days;

                return `
                <div class="bg-white border border-slate-200 rounded-2xl p-5 flex items-center hover:border-teal-400 transition-all shadow-sm group">
                    <div class="flex-1">
                        <h3 class="text-lg font-extrabold text-slate-800 group-hover:text-teal-600 transition-colors">${s.name}</h3>
                        <p class="text-xs text-slate-500 font-medium mt-1 leading-relaxed max-w-md">
                            ${s.description || 'No course description provided for this session.'}
                        </p>
                    </div>

                    <div class="flex items-center gap-8 ml-auto">
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Schedule</p>
                            <p class="text-xs font-bold text-slate-700">${days || 'TBD'}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Time</p>
                            <p class="text-xs font-bold text-slate-700">${s.start_time_text} - ${s.end_time_text}</p>
                        </div>
                        <div class="text-right w-16">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Capacity</p>
                            <p class="text-xs font-bold text-slate-700">${s.max_students} Slots</p>
                        </div>
                        
                        <div class="flex items-center gap-2 pl-6 border-l border-slate-100 min-w-[90px] justify-end">
                            <div class="w-2 h-2 rounded-full ${statusBg} ${s.is_active ? 'animate-pulse' : ''}"></div>
                            <span class="text-[10px] font-black uppercase tracking-tighter ${statusColor}">
                                ${s.is_active ? 'Active' : 'Paused'}
                            </span>
                        </div>
                    </div>
                </div>`;
            }).join('');

        } catch(e) { 
            console.error("Sync Error:", e);
            logError(e.message);
        }
    };

    // Initialize
    window.loadSessions();
})();
</script>
