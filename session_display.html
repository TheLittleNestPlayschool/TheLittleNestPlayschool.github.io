<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<script src="api_config.js"></script>
<script src="schema_config.js"></script>

<div class="bg-transparent p-4 font-['Inter',_sans-serif]">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black tracking-tighter text-slate-900">Session Catalog</h1>
        <div class="bg-slate-100 px-3 py-1.5 rounded-lg text-[10px] font-extrabold text-slate-500 uppercase tracking-widest border border-slate-200">
            View Only Mode
        </div>
    </div>

    <div id="session-container" class="space-y-3">
        <div id="sync-status" class="text-center py-20 bg-white border-2 border-dashed border-slate-200 rounded-2xl">
            <div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-teal-500 rounded-full mb-4"></div>
            <p class="text-slate-400 font-bold italic tracking-tight">Initializing NestMind Engine...</p>
        </div>
    </div>
</div>

<script>
(function() {
    let retryCount = 0;

    window.loadSessions = async () => {
        const container = document.getElementById('session-container');
        const statusText = document.getElementById('sync-status');
        
        // 1. RECURSIVE CHECK: If api_config isn't ready yet, wait 100ms and try again
        if (typeof window.NEST_API === 'undefined' || !window.NEST_API.sessions) {
            if (retryCount < 50) { // Try for 5 seconds total
                retryCount++;
                setTimeout(window.loadSessions, 100);
                return;
            } else {
                container.innerHTML = `<div class="p-8 text-center bg-red-50 text-red-500 rounded-xl font-bold">CRITICAL: api_config.js failed to initialize.</div>`;
                return;
            }
        }

        const lockedId = localStorage.getItem('locked_franchise_id');
        if (!lockedId) {
            container.innerHTML = `<div class="p-8 text-center bg-amber-50 text-amber-700 rounded-xl font-bold italic">Identity Lock Required: Please select a branch.</div>`;
            return;
        }
        
        try {
            const response = await fetch(`${window.NEST_API.sessions}?t=${Date.now()}`);
            if (!response.ok) throw new Error("Connection Refused");
            
            const data = await response.json();
            let list = Array.isArray(data) ? data : (data.items || []);
            
            // Filter by the Locked Branch
            list = list.filter(s => s.franchise_id.toString() === lockedId);

            if (list.length === 0) {
                container.innerHTML = `<div class="p-12 text-center text-slate-400 font-bold border-2 border-dashed border-slate-100 rounded-2xl">No sessions found for this branch.</div>`;
                return;
            }

            container.innerHTML = list.map(s => `
                <div class="bg-white border border-slate-200 rounded-2xl p-5 flex items-center hover:shadow-md transition-shadow">
                    <div class="flex-1">
                        <h3 class="text-lg font-black text-slate-800">${s.name}</h3>
                        <p class="text-xs text-slate-500 mt-1">${s.description || 'NestMind Session Record'}</p>
                    </div>
                    <div class="flex items-center gap-8 ml-auto">
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase">Schedule</p>
                            <p class="text-xs font-bold text-slate-700">${s.start_time_text} - ${s.end_time_text}</p>
                        </div>
                        <div class="flex items-center gap-2 pl-6 border-l border-slate-100">
                            <div class="w-2 h-2 rounded-full ${s.is_active ? 'bg-teal-500' : 'bg-slate-300'}"></div>
                            <span class="text-[10px] font-black uppercase ${s.is_active ? 'text-teal-500' : 'text-slate-400'}">
                                ${s.is_active ? 'Active' : 'Closed'}
                            </span>
                        </div>
                    </div>
                </div>`).join('');

        } catch(e) { 
            container.innerHTML = `<div class="p-8 text-center bg-red-50 text-red-500 rounded-xl font-bold">Sync Failed: Cloud Connection Error</div>`;
        }
    };

    // Kick off the smart loader
    window.loadSessions();
})();
</script>
