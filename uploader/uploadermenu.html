<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NestMind Vault Dashboard</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --nest-blue: #009dff; --nest-dark: #2d3748; --nest-bg: #f0f4f8; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--nest-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            align-items: center; 
        }
        
        .dashboard { 
            width: 100%; 
            max-width: 450px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: #fff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
        }

        .header { 
            background: var(--nest-blue); 
            color: white; 
            padding: 12px; 
            text-align: center; 
        }
        .header h2 { 
            margin: 0; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 800;
        }
        .header p { 
            margin: 2px 0 0; 
            font-size: 10px; 
            opacity: 0.9; 
            font-weight: 600;
        }

        .branch-bar { 
            padding: 8px 15px; 
            border-bottom: 1px solid #eee; 
            background: #fff; 
        }
        .branch-bar label { 
            display: block;
            font-size: 9px; 
            font-weight: 800; 
            color: #a0aec0; 
            text-transform: uppercase; 
            margin-bottom: 2px;
        }
        .branch-bar select { 
            width: 100%; 
            border: 1px solid #cbd5e0; 
            border-radius: 6px; 
            padding: 8px; 
            font-weight: 700; 
            font-size: 14px; 
            color: var(--nest-dark);
            outline: none;
            background-color: white;
        }

        .menu-nav { 
            display: flex; 
            padding: 10px; 
            gap: 8px; 
            background: #f8fafc; 
            border-bottom: 1px solid #e2e8f0; 
        }
        .nav-item { 
            flex: 1; 
            text-align: center; 
            padding: 10px 0; 
            border: 2px solid #edf2f7; 
            border-radius: 12px; 
            cursor: pointer; 
            background: #fff; 
            transition: all 0.2s ease;
        }
        .nav-item.active { 
            border-color: var(--nest-blue); 
            background: #ebf8ff; 
        }
        .nav-item span { 
            display: block; 
            font-size: 22px; 
            margin-bottom: 4px; 
        }
        .nav-item label { 
            font-size: 9px; 
            font-weight: 800; 
            text-transform: uppercase; 
            display: block; 
            color: var(--nest-dark); 
            cursor: pointer;
        }

        #module-frame { 
            flex-grow: 1; 
            border: none; 
            width: 100%; 
            background: var(--nest-bg); 
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h2>NESTMIND VAULT</h2>
        <p id="sub-header">Select Location & Category</p>
    </div>

    <div class="branch-bar" id="branch-container">
        <label>Current School Location</label>
        <select id="f-select" onchange="saveSelection(this)">
            <option value="">Loading Schools...</option>
        </select>
    </div>

    <div class="menu-nav">
        <div class="nav-item" onclick="loadModule('upload_student_pictures.html', this)">
            <span>👦</span><label>Students</label>
        </div>
        <div class="nav-item" id="nav-eod" onclick="loadModule('upload_eod.html', this)">
            <span>📝</span><label>End of Day</label>
        </div>
        <div class="nav-item" onclick="loadModule('upload_receipt.html', this)">
            <span>🧾</span><label>Receipts</label>
        </div>
    </div>

    <iframe id="module-frame" name="module-frame" src="about:blank"></iframe>
</div>

<script>
    async function loadFranchises() {
        const drop = document.getElementById('f-select');
        const branchBar = document.getElementById('branch-container');
        const subHeader = document.getElementById('sub-header');
        
        // 1. Extract the 'tlnp' key from URL
        const urlParams = new URLSearchParams(window.location.search);
        const tlnpKey = urlParams.get('tlnp');

        try {
            const response = await fetch(NEST_ENDPOINTS.franchise.list);
            const data = await response.json();
            
            drop.innerHTML = '<option value="">Select Location...</option>';
            let matchedFranchise = null;

            data.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                const slug = f.name ? f.name.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g, '') : 'unknown';
                opt.dataset.slug = slug;
                opt.textContent = f.name;
                
                // 2. Check if this branch key matches the URL key
                if (tlnpKey && f.access_key === tlnpKey) {
                    matchedFranchise = opt;
                }
                
                drop.appendChild(opt);
            });

            // 3. Stealth Lock Logic
            if (matchedFranchise) {
                drop.value = matchedFranchise.value;
                saveSelection(drop);
                
                // Hide the dropdown bar
                branchBar.style.display = 'none';
                subHeader.innerText = matchedFranchise.textContent + " Vault";
                
                // Wipe key from URL for security
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                // Normal mode: check local storage
                const savedId = localStorage.getItem('nestmind_f_id');
                if (savedId) drop.value = savedId;
            }
            
        } catch (err) {
            console.error("Dashboard Load Error:", err);
            drop.innerHTML = '<option>Error Connection</option>';
        }
    }

    function saveSelection(select) {
        const selected = select.selectedOptions[0];
        if (select.value && selected) {
            localStorage.setItem('nestmind_f_id', select.value);
            localStorage.setItem('nestmind_f_slug', selected.dataset.slug);
            localStorage.setItem('nestmind_f_name', selected.textContent);
            
            const frame = document.getElementById('module-frame');
            if(frame.src !== "about:blank") frame.contentWindow.location.reload();
        }
    }

    function loadModule(url, el) {
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('module-frame').src = url;
    }

    window.onload = loadFranchises;
</script>

</body>
</html>
