<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind Vault Menu</title>
    <style>
        :root {
            --primary-blue: #4a90e2;
            --deep-blue: #357abd;
            --text-main: #2d3748;
            --text-muted: #718096;
            --bg-light: #f8fafc;
            --border-color: #cbd5e0;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #edf2f7; 
            margin: 0; 
            padding: 20px 10px; 
            display: flex;
            justify-content: center;
        }
        
        .menu-container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .header {
            background: linear-gradient(135deg, var(--primary-blue), var(--deep-blue));
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .menu-list {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 20px;
            background: var(--bg-light);
            border: 2px solid var(--border-color);
            border-radius: 18px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .menu-item:active {
            transform: scale(0.98);
            background: #eef6ff;
            border-color: var(--primary-blue);
        }

        .icon-box {
            font-size: 32px;
            margin-right: 20px;
            background: white;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .text-box strong {
            display: block;
            font-size: 18px;
            margin-bottom: 2px;
        }

        .text-box span {
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="menu-container">
    <div class="header">
        <h2 style="margin:0; letter-spacing: 1px; text-transform: uppercase;">NestMind Vault</h2>
        <p style="margin:8px 0 0; font-size: 14px; opacity: 0.9;">Select Upload Category</p>
    </div>

    <div class="menu-list">
        <a href="upload_student_pictures.html" class="menu-item">
            <div class="icon-box">👦</div>
            <div class="text-box">
                <strong>Student Pictures</strong>
                <span>Photos & Progress Sheets</span>
            </div>
        </a>

        <a href="upload_eod.html" class="menu-item">
            <div class="icon-box">📝</div>
            <div class="text-box">
                <strong>End of Day</strong>
                <span>Daily Branch Reports</span>
            </div>
        </a>

        <a href="upload_receipt.html" class="menu-item">
            <div class="icon-box">🧾</div>
            <div class="text-box">
                <strong>Receipts</strong>
                <span>Expenses & Purchases</span>
            </div>
        </a>
    </div>
    
    <div style="text-align: center; padding-bottom: 20px; font-size: 11px; color: #cbd5e0;">
        NestMind Central Intelligence v1.0
    </div>
</div>

</body>
</html>
