<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NestLoad</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --nest-blue: #009dff; --nest-dark: #2d3748; --nest-bg: #f0f4f8; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #fff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            align-items: center; 
        }
        
        .dashboard { 
            width: 100%; 
            max-width: 450px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: #fff; 
        }

        #main-header, #module-frame, #lock-screen { 
            display: none; 
        }

        .header { 
            background: var(--nest-blue); 
            color: white; 
            padding: 15px; 
            text-align: center; 
        }
        .header h2 { margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }

        #module-frame { flex-grow: 1; border: none; width: 100%; background: var(--nest-bg); }

        #lock-screen { 
            flex-grow: 1; 
            display: none; 
            align-items: center; 
            justify-content: center; 
        }
        #lock-screen h1 { color: #cbd5e0; font-weight: 400; font-size: 24px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header" id="main-header">
        <h2 id="main-title">NestLoad</h2>
    </div>

    <div id="lock-screen">
        <h1>Access Denied</h1>
    </div>

    <iframe id="module-frame" name="module-frame" src="about:blank"></iframe>
</div>

<script>
    async function authenticateAndLoad() {
        const lockScreen = document.getElementById('lock-screen');
        const mainHeader = document.getElementById('main-header');
        const frame = document.getElementById('module-frame');
        const title = document.getElementById('main-title');
        
        const urlParams = new URLSearchParams(window.location.search);
        const tlnpKey = urlParams.get('tlnp');

        if (!tlnpKey) {
            lockScreen.style.display = 'flex';
            return;
        }

        try {
            const response = await fetch(NEST_ENDPOINTS.franchise.list);
            const data = await response.json();
            const matched = data.find(f => f.access_key === tlnpKey);

            if (matched) {
                const slug = matched.name.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g, '');
                
                localStorage.setItem('nestmind_f_id', matched.id);
                localStorage.setItem('nestmind_f_slug', slug);
                localStorage.setItem('nestmind_f_name', matched.name);
                
                mainHeader.style.display = 'block';
                frame.style.display = 'block';
                title.innerText = matched.name.toUpperCase() + " UPLOADER";
                
                frame.src = 'upload_eod.html?v=' + Date.now();
                
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                lockScreen.style.display = 'flex';
            }
        } catch (err) {
            console.error(err);
            lockScreen.style.display = 'flex';
        }
    }

    window.onload = authenticateAndLoad;
</script>

</body>
</html>
