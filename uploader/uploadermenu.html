<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind Vault Menu</title>
    <link rel="stylesheet" href="nest_style.css">
    <script src="api_config.js"></script>
    
    <style>
        /* Keeping layout-specific spacing, but using Nest Variables */
        body { 
            padding: 20px 10px; 
            display: flex;
            justify-content: center;
        }
        
        .menu-container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            background: linear-gradient(135deg, var(--nest-teal), var(--nest-teal-dark));
            color: var(--nest-dark);
            padding: 40px 20px;
            text-align: center;
            border-radius: var(--nest-radius-lg) var(--nest-radius-lg) 0 0;
        }

        .menu-list {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Swapping to Nest card and interactive styles */
        .menu-item {
            display: flex;
            align-items: center;
            padding: 20px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .menu-item:active {
            transform: scale(0.98);
            border-color: var(--nest-teal);
        }

        .icon-box {
            font-size: 32px;
            margin-right: 20px;
            background: var(--nest-bg);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--nest-radius-sm);
        }
    </style>
</head>
<body>

<div class="menu-container nest-card" style="padding:0;">
    <div class="header">
        <h2 class="nest-header" style="margin:0; text-transform: uppercase;">NestMind Vault</h2>
        <p style="margin:8px 0 0; font-size: 14px; opacity: 0.9;">Select Location & Category</p>
    </div>

    <div style="padding: 20px 25px 0 25px;">
        <label class="nest-label">Current School Location</label>
        <select id="f-select" class="nest-select" onchange="saveSelection(this)">
            <option value="">Loading Schools...</option>
        </select>
    </div>

    <div class="menu-list">
        <a href="upload_student_pictures.html" class="menu-item nest-card" style="padding:20px;">
            <div class="icon-box">👦</div>
            <div class="text-box">
                <strong class="nest-text-main" style="display:block; font-size:18px;">Student Pictures</strong>
                <span class="nest-text-muted" style="font-size:13px;">Photos & Progress Sheets</span>
            </div>
        </a>

        <a href="upload_eod.html" class="menu-item nest-card" style="padding:20px;">
            <div class="icon-box">📝</div>
            <div class="text-box">
                <strong class="nest-text-main" style="display:block; font-size:18px;">End of Day</strong>
                <span class="nest-text-muted" style="font-size:13px;">Daily Branch Reports</span>
            </div>
        </a>

        <a href="upload_receipt.html" class="menu-item nest-card" style="padding:20px;">
            <div class="icon-box">🧾</div>
            <div class="text-box">
                <strong class="nest-text-main" style="display:block; font-size:18px;">Receipts</strong>
                <span class="nest-text-muted" style="font-size:13px;">Expenses & Purchases</span>
            </div>
        </a>
    </div>
</div>

<script>
    // Now using NEST_ENDPOINTS from api_config.js
    window.onload = async () => {
        try {
            const res = await fetch(NEST_ENDPOINTS.franchise.list);
            const data = await res.json();
            const drop = document.getElementById('f-select');
            drop.innerHTML = '<option value="">Select Location...</option>';
            
            data.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.dataset.slug = f.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                opt.textContent = f.name;
                drop.appendChild(opt);
            });

            const savedId = localStorage.getItem('nestmind_f_id');
            if (savedId) drop.value = savedId;
        } catch (e) { console.error("Load error", e); }
    };

    function saveSelection(select) {
        const selected = select.selectedOptions[0];
        if (select.value) {
            localStorage.setItem('nestmind_f_id', select.value);
            localStorage.setItem('nestmind_f_slug', selected.dataset.slug);
            localStorage.setItem('nestmind_f_name', selected.textContent);
        } else {
            localStorage.removeItem('nestmind_f_id');
            localStorage.removeItem('nestmind_f_slug');
            localStorage.removeItem('nestmind_f_name');
        }
    }
</script>

</body>
</html>
