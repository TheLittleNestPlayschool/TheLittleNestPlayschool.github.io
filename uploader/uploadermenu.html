<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NestMind Vault</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --nest-blue: #009dff; --nest-dark: #2d3748; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; align-items: center; }
        
        /* Dashboard Container - Locks the width */
        .dashboard { width: 100%; max-width: 450px; display: flex; flex-direction: column; height: 100vh; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.1); }

        .header { background: var(--nest-blue); color: white; padding: 10px; text-align: center; }
        .header h2 { margin: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

        .branch-bar { padding: 8px 15px; border-bottom: 1px solid #eee; background: #fff; }
        .branch-bar label { font-size: 9px; font-weight: 800; color: #a0aec0; text-transform: uppercase; }
        .branch-bar select { width: 100%; border: 1px solid #cbd5e0; border-radius: 5px; padding: 6px; font-weight: 700; font-size: 13px; outline: none; }

        /* The 3 Choices - Tight Row */
        .menu-nav { display: flex; padding: 10px; gap: 8px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .nav-item { 
            flex: 1; text-align: center; padding: 8px 0; border: 2px solid #edf2f7; 
            border-radius: 10px; cursor: pointer; background: #fff; transition: 0.2s;
        }
        .nav-item.active { border-color: var(--nest-blue); background: #f0f9ff; }
        .nav-item span { display: block; font-size: 18px; margin-bottom: 2px; }
        .nav-item label { font-size: 9px; font-weight: 800; text-transform: uppercase; display: block; color: var(--nest-dark); }

        /* Content window where the EOD page loads */
        #module-frame { flex-grow: 1; border: none; width: 100%; background: #f0f4f8; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h2>NESTMIND VAULT</h2>
    </div>

    <div class="branch-bar">
        <label>School Location</label>
        <select id="f-select" onchange="saveSelection(this)">
            <option value="">Loading...</option>
        </select>
    </div>

    <div class="menu-nav">
        <div class="nav-item" onclick="loadModule('upload_student_pictures.html', this)">
            <span>👦</span><label>Students</label>
        </div>
        <div class="nav-item" onclick="loadModule('upload_eod.html', this)">
            <span>📝</span><label>End of Day</label>
        </div>
        <div class="nav-item" onclick="loadModule('upload_receipt.html', this)">
            <span>🧾</span><label>Receipts</label>
        </div>
    </div>

    <iframe id="module-frame" src="about:blank"></iframe>
</div>

<script>
    async function loadFranchises() {
        const drop = document.getElementById('f-select');
        try {
            const response = await fetch(NEST_ENDPOINTS.franchise.list);
            const data = await response.json();
            drop.innerHTML = '<option value="">Select Location...</option>';
            data.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.dataset.slug = f.name ? f.name.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g, '') : 'unknown';
                opt.textContent = f.name || 'Unnamed Branch';
                drop.appendChild(opt);
            });
            const savedId = localStorage.getItem('nestmind_f_id');
            if (savedId) drop.value = savedId;
        } catch (err) { console.error(err); }
    }

    function saveSelection(select) {
        const selected = select.selectedOptions[0];
        if (select.value && selected) {
            localStorage.setItem('nestmind_f_id', select.value);
            localStorage.setItem('nestmind_f_slug', selected.dataset.slug);
            localStorage.setItem('nestmind_f_name', selected.textContent);
            const frame = document.getElementById('module-frame');
            if(frame.src !== "about:blank") frame.contentWindow.location.reload();
        }
    }

    function loadModule(url, el) {
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('module-frame').src = url;
    }

    window.onload = loadFranchises;
</script>
</body>
</html>
