<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLNP Teacher Upload</title>
    <link rel="stylesheet" href="../styleup.css">
</head>
<body>

    <div id="app-container">
        <!-- Header Section -->
        <header class="main-header">
            <div class="stats-banner">
                <span class="banner-title">Little Nest Global Network</span>
                <span class="banner-stat"><span class="stat-highlight">50,000+</span> Learning Hours &amp; Counting!</span>
            </div>
            
            <div class="main-title">
                <div id="teacherLocationDisplay" class="branch-location"></div>
                <h1 class="brand-title" style="font-size: clamp(1.2rem, 3.5vw, 1.8rem); margin-top: 4px;">TLNP Teacher Upload Portal</h1>
                <div id="teacherNameDisplay" style="font-size: 0.9rem; font-weight: 600; margin-top: 4px; color: var(--text-body);"></div>
            </div>
        </header>

        <!-- Content Area -->
        <div id="content-area">
            <div class="module-box">
                <p style="font-size: 0.85rem; margin-bottom: 20px; font-weight: 600;">Please select an action below:</p>
            
                <!-- Menu Buttons -->
                <div style="display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%;">
                    <button onclick="window.location.href='/uploader/upload_eod.html'" class="btn-submit" style="width: 100%; max-width: 220px; height: auto; padding: 12px 20px; border-radius: 20px; font-size: 0.9rem;">Upload Receipt</button>
                    <button onclick="window.location.href='/uploader/attendance.html'" class="btn-submit" style="width: 100%; max-width: 220px; height: auto; padding: 12px 20px; border-radius: 20px; font-size: 0.9rem;">Upload Attendance</button>
                </div>
            </div>
        </div>

        <div id="footer-buttons">
            <button onclick="window.location.href='../index.html'">Logout</button>
        </div>
    </div>

    <script>
        const XANO_BASE_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV';

        async function loadTeacherHeader() {
            const authToken = localStorage.getItem('authToken');
            const teacherId = localStorage.getItem('teacher_id');

            if (!authToken || !teacherId) {
                window.location.href = '../index.html';
                return;
            }

            try {
                // Clear out legacy duplicate keys to ensure clean local storage
                localStorage.removeItem('nestmind_f_id');
                localStorage.removeItem('nestmind_f_name');
                localStorage.removeItem('locked_franchise_id');
                localStorage.removeItem('locked_franchise_name');

                const response = await fetch(`${XANO_BASE_URL}/get_teacher_details?teacher_id=${teacherId}`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) throw new Error('Failed to fetch teacher details.');
                
                const teacher = await response.json();

                if (teacher) {
                    // Extract from teacher_info object structure returned by Xano
                    const teacherData = teacher.teacher_info || teacher;
                    const firstName = teacherData.first_name || '';
                    const lastName = teacherData.last_name || '';
                    const fullName = `${firstName} ${lastName}`.trim();
                    
                    document.getElementById('teacherNameDisplay').textContent = fullName ? `Teacher ${fullName}` : 'Teacher';

                    // Extract ID and name cleanly from the endpoint response
                    const franchiseId = teacher.franchise_id || (teacher.franchise && teacher.franchise.id) || '';
                    const franchiseName = teacher.franchise_name || (teacher.franchise && teacher.franchise.name) || '';

                    // Save single source of truth variables to local storage
                    localStorage.setItem('franchise_id', franchiseId);
                    localStorage.setItem('franchise_name', franchiseName);

                    // Display the franchise name in the header banner
                    document.getElementById('teacherLocationDisplay').textContent = franchiseName ? franchiseName.toUpperCase() : '';
                }

            } catch (error) {
                console.error('Error loading header info:', error);
            }
        }

        loadTeacherHeader();
    </script>
</body>
</html>
