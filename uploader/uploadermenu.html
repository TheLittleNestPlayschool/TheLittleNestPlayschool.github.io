<div class="nestmind-uploader">
    <style>
        :root { --primary: #4a90e2; --success: #4caf50; --danger: #e74c3c; --text-dark: #2d3748; }
        .nestmind-uploader { font-family: 'Segoe UI', system-ui, sans-serif; max-width: 600px; margin: 30px auto; background: white; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); overflow: hidden; color: var(--text-dark); }
        .uploader-header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; border-bottom: 4px solid rgba(0,0,0,0.1); }
        .uploader-header h2 { margin: 0; font-size: 26px; text-transform: uppercase; font-weight: 800; }
        .uploader-setup { padding: 25px; border-bottom: 1px solid #edf2f7; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #fafbfc; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 11px; text-transform: uppercase; color: #718096; font-weight: 700; }
        .uploader-setup select { padding: 14px; border: 2px solid #cbd5e0; border-radius: 10px; font-size: 15px; background: white; outline: none; }
        .capture-area { padding: 50px 25px; text-align: center; }
        .photo-trigger { border: 3px dashed #cbd5e0; border-radius: 20px; padding: 60px 20px; cursor: pointer; background: white; }
        #preview-section { display: none; padding: 25px; }
        .img-container { width: 100%; background: #1a202c; border-radius: 12px; overflow: hidden; }
        #preview-img { width: 100%; max-height: 450px; object-fit: contain; }
        .action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn-ui { padding: 18px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .btn-confirm { background: var(--primary); color: white; }
        .btn-cancel { background: #edf2f7; color: #4a5568; }
        .upload-progress { margin-top: 25px; display: none; }
        .bar-outer { height: 12px; background: #edf2f7; border-radius: 50px; overflow: hidden; }
        .bar-inner { width: 0%; height: 100%; background: var(--success); transition: width 0.4s ease; }
        .status-msg { font-size: 14px; margin-top: 10px; font-weight: 600; }
    </style>

    <div class="uploader-header">
        <h2>NESTMIND VAULT</h2>
        <p>Direct-to-S3 Debug Mode</p>
    </div>

    <div class="uploader-setup">
        <div class="input-group">
            <label>Location</label>
            <select id="franchise-dropdown" onchange="loadStudents(this.value)">
                <option value="">Fetching Locations...</option>
            </select>
        </div>
        <div class="input-group">
            <label>Student</label>
            <select id="student-dropdown" disabled>
                <option value="">Select Location First</option>
            </select>
        </div>
    </div>

    <div id="init-stage" class="capture-area">
        <div class="photo-trigger" onclick="document.getElementById('camera-file').click()">
            <span style="font-size: 50px;">📸</span><br>
            <strong>Tap to Capture Work</strong>
            <input type="file" id="camera-file" hidden accept="image/*" capture="environment" onchange="handleCapture(this)">
        </div>
    </div>

    <div id="preview-section">
        <div class="img-container"><img id="preview-img" src=""></div>
        <div class="upload-progress" id="progress-ui">
            <div class="bar-outer"><div class="bar-inner" id="progress-fill"></div></div>
            <div class="status-msg" id="status-label">Ready...</div>
        </div>
        <div class="action-bar">
            <button class="btn-ui btn-cancel" onclick="resetApp()">Retake</button>
            <button class="btn-ui btn-confirm" id="sync-btn" onclick="syncToVault()">Sync to Vault</button>
        </div>
    </div>
</div>

<script>
// --- DEBUG CONFIG ---
const API_ROUTES = {
    franchise: 'https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise',
    student: 'https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student',
    // TO FIX THE 404: Paste your FULL get_upload_url address from the Xano endpoint page here:
    handshake: 'PASTE_YOUR_FULL_URL_HERE' 
};

let activeImage = null;

// 1. Load Franchises
window.onload = async () => {
    console.log("Debug: Fetching Franchises...");
    try {
        const res = await fetch(API_ROUTES.franchise);
        const data = await res.json();
        const fMenu = document.getElementById('franchise-dropdown');
        fMenu.innerHTML = '<option value="">Select Location...</option>';
        data.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.id;
            opt.dataset.slug = item.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            opt.textContent = item.name;
            fMenu.appendChild(opt);
        });
        console.log("Debug: Franchises loaded", data);
    } catch (e) { console.error("Debug Error: Franchise Load Failed", e); }
};

// 2. Load Students
async function loadStudents(fId) {
    console.log("Debug: Fetching Students for Franchise ID:", fId);
    const sMenu = document.getElementById('student-dropdown');
    if (!fId) { sMenu.disabled = true; return; }
    sMenu.disabled = false;
    sMenu.innerHTML = '<option>Loading...</option>';
    try {
        const res = await fetch(`${API_ROUTES.student}?franchise_id=${fId}`);
        const data = await res.json();
        sMenu.innerHTML = '<option value="">Select Student...</option>';
        data.forEach(item => {
            sMenu.innerHTML += `<option value="${item.id}">${item.name}</option>`;
        });
        console.log("Debug: Students loaded", data);
    } catch (e) { console.error("Debug Error: Student Load Failed", e); }
}

function handleCapture(input) {
    if (input.files && input.files[0]) {
        activeImage = input.files[0];
        console.log("Debug: Photo Captured", activeImage.name, activeImage.type);
        document.getElementById('preview-img').src = URL.createObjectURL(activeImage);
        document.getElementById('init-stage').style.display = 'none';
        document.getElementById('preview-section').style.display = 'block';
    }
}

async function syncToVault() {
    console.log("Debug: Starting Sync Process...");
    const fBox = document.getElementById('franchise-dropdown');
    const sId = document.getElementById('student-dropdown').value;
    const fSlug = fBox.selectedOptions[0].dataset.slug;
    
    if (API_ROUTES.handshake === 'PASTE_YOUR_FULL_URL_HERE') {
        alert("STOP: You must paste your Xano API URL into the script first.");
        return;
    }

    const btn = document.getElementById('sync-btn');
    const bar = document.getElementById('progress-fill');
    const label = document.getElementById('status-label');
    document.getElementById('progress-ui').style.display = 'block';
    btn.disabled = true;
    
    try {
        const filePath = `${fSlug}/student-${sId}/${Date.now()}-${activeImage.name}`;
        console.log("Debug: Target S3 Path:", filePath);

        // Handshake
        label.innerText = "Step 1: Handshake with Xano...";
        bar.style.width = "25%";
        
        const authRequest = await fetch(API_ROUTES.handshake, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_path: filePath, content_type: activeImage.type })
        });

        console.log("Debug: Handshake Response Status:", authRequest.status);
        if (!authRequest.ok) throw new Error(`Handshake Failed (${authRequest.status})`);
        
        const { upload_url } = await authRequest.json();
        console.log("Debug: Received Signed URL:", upload_url);

        // Upload
        label.innerText = "Step 2: Pushing to S3...";
        bar.style.width = "65%";
        
        const s3Push = await fetch(upload_url, {
            method: 'PUT',
            headers: { 'Content-Type': activeImage.type },
            body: activeImage
        });

        console.log("Debug: S3 Response Status:", s3Push.status);
        if (s3Push.ok) {
            bar.style.width = "100%";
            label.innerText = "Sync Successful!";
            console.log("Debug: SUCCESS");
        } else { throw new Error(`S3 Rejected Upload (${s3Push.status})`); }

    } catch (err) {
        console.error("Debug: SYNC FAILED", err);
        label.innerText = "FAILED: " + err.message;
        btn.disabled = false;
    }
}

function resetApp() {
    activeImage = null;
    document.getElementById('init-stage').style.display = 'block';
    document.getElementById('preview-section').style.display = 'none';
    document.getElementById('progress-ui').style.display = 'none';
    document.getElementById('sync-btn').disabled = false;
}
</script>
