<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NestMind Vault Dashboard</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --nest-blue: #009dff; --nest-dark: #2d3748; --nest-bg: #f0f4f8; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--nest-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            align-items: center; 
        }
        
        /* Dashboard Container: Locks width for mobile feel */
        .dashboard { 
            width: 100%; 
            max-width: 450px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: #fff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
        }

        /* Compact Blue Header */
        .header { 
            background: var(--nest-blue); 
            color: white; 
            padding: 12px; 
            text-align: center; 
        }
        .header h2 { 
            margin: 0; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 800;
        }
        .header p { 
            margin: 2px 0 0; 
            font-size: 10px; 
            opacity: 0.9; 
            font-weight: 600;
        }

        /* School Selection Strip */
        .branch-bar { 
            padding: 8px 15px; 
            border-bottom: 1px solid #eee; 
            background: #fff; 
        }
        .branch-bar label { 
            display: block;
            font-size: 9px; 
            font-weight: 800; 
            color: #a0aec0; 
            text-transform: uppercase; 
            margin-bottom: 2px;
        }
        .branch-bar select { 
            width: 100%; 
            border: 1px solid #cbd5e0; 
            border-radius: 6px; 
            padding: 8px; 
            font-weight: 700; 
            font-size: 14px; 
            color: var(--nest-dark);
            outline: none;
            background-color: white;
        }

        /* Horizontal Navigation Row */
        .menu-nav { 
            display: flex; 
            padding: 10px; 
            gap: 8px; 
            background: #f8fafc; 
            border-bottom: 1px solid #e2e8f0; 
        }
        .nav-item { 
            flex: 1; 
            text-align: center; 
            padding: 10px 0; 
            border: 2px solid #edf2f7; 
            border-radius: 12px; 
            cursor: pointer; 
            background: #fff; 
            transition: all 0.2s ease;
        }
        .nav-item.active { 
            border-color: var(--nest-blue); 
            background: #ebf8ff; 
            box-shadow: inset 0 0 0 1px var(--nest-blue);
        }
        .nav-item span { 
            display: block; 
            font-size: 22px; 
            margin-bottom: 4px; 
        }
        .nav-item label { 
            font-size: 9px; 
            font-weight: 800; 
            text-transform: uppercase; 
            display: block; 
            color: var(--nest-dark); 
            cursor: pointer;
        }

        /* Iframe Content Window */
        #module-frame { 
            flex-grow: 1; 
            border: none; 
            width: 100%; 
            background: var(--nest-bg); 
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h2>NESTMIND VAULT</h2>
        <p>Select Location & Category</p>
    </div>

    <div class="branch-bar">
        <label>Current School Location</label>
        <select id="f-select" onchange="saveSelection(this)">
            <option value="">Loading Schools...</option>
        </select>
    </div>

    <div class="menu-nav">
        <div class="nav-item" onclick="loadModule('upload_student_pictures.html', this)">
            <span>👦</span><label>Students</label>
        </div>
        <div class="nav-item" id="nav-eod" onclick="loadModule('upload_eod.html', this)">
            <span>📝</span><label>End of Day</label>
        </div>
        <div class="nav-item" onclick="loadModule('upload_receipt.html', this)">
            <span>🧾</span><label>Receipts</label>
        </div>
    </div>

    <iframe id="module-frame" name="module-frame" src="about:blank"></iframe>
</div>

<script>
    // 1. Load Locations from Xano
    async function loadFranchises() {
        const drop = document.getElementById('f-select');
        try {
            const response = await fetch(NEST_ENDPOINTS.franchise.list);
            const data = await response.json();
            
            drop.innerHTML = '<option value="">Select Location...</option>';
            data.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                // Generate slug for folder naming (e.g., "Sariaya Branch" -> "sariaya")
                opt.dataset.slug = f.name ? f.name.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g, '') : 'unknown';
                opt.textContent = f.name || 'Unnamed Branch';
                drop.appendChild(opt);
            });

            // Restore last used branch
            const savedId = localStorage.getItem('nestmind_f_id');
            if (savedId) drop.value = savedId;
            
        } catch (err) {
            console.error("Failed to load branches:", err);
            drop.innerHTML = '<option>Error loading list</option>';
        }
    }

    // 2. Save Branch Info for the Modules to use
    function saveSelection(select) {
        const selected = select.selectedOptions[0];
        if (select.value && selected) {
            localStorage.setItem('nestmind_f_id', select.value);
            localStorage.setItem('nestmind_f_slug', selected.dataset.slug);
            localStorage.setItem('nestmind_f_name', selected.textContent);
            
            // If a module is already open, refresh it so it gets the new location info
            const frame = document.getElementById('module-frame');
            if(frame.src !== "about:blank") {
                frame.contentWindow.location.reload();
            }
        }
    }

    // 3. Swap Modules without leaving the page
    function loadModule(url, el) {
        // Highlight active button
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        
        // Push the target URL into the frame
        document.getElementById('module-frame').src = url;
    }

    window.onload = loadFranchises;
</script>

</body>
</html>
