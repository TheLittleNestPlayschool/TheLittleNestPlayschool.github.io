<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NestLoad</title>
    <link rel="stylesheet" href="styles.css">
    <script src="../api_config.js"></script>
</head>
<body>
    <div id="app-container">
        <!-- Header Banner matching global theme -->
        <header class="main-header" id="main-header">
            <div class="stats-banner">
                <span class="banner-title">Little Nest Global Network</span>
                <span class="banner-stat"><span class="stat-highlight">50,000+</span> Learning Hours &amp; Counting!</span>
            </div>
            
            <h1 class="main-title">
                <span class="brand-title">THE LITTLE NEST PLAYSCHOOL</span>
                <span class="branch-location" id="main-title">NESTLOAD</span>
            </h1>

            <div id="student-info-banner">
                <span id="parent-name" style="font-weight: bold;">UPLOADER PORTAL</span>
            </div>
        </header>

        <!-- Main Content Menu -->
        <div id="content-area" class="uploader-content">
            <button class="uploader-btn" onclick="navigateTo('upload_eod.html')">Upload EOD</button>
            <button class="uploader-btn" onclick="navigateTo('upload_attendance.html')">Upload Attendance</button>
        </div>
    </div>

    <script>
        function initializePortal() {
            const urlParams = new URLSearchParams(window.location.search);
            const tlnpKey = urlParams.get('tlnp');

            if (tlnpKey) {
                fetch(NEST_ENDPOINTS.franchise.list)
                    .then(response => response.json())
                    .then(data => {
                        const matched = data.find(f => f.access_key === tlnpKey);
                        if (matched) {
                            const slug = matched.name.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g, '');
                            localStorage.setItem('nestmind_f_id', matched.id);
                            localStorage.setItem('nestmind_f_slug', slug);
                            localStorage.setItem('nestmind_f_name', matched.name);
                            document.getElementById('main-title').innerText = matched.name.toUpperCase() + " UPLOADER";
                            window.history.replaceState({}, document.title, window.location.pathname);
                        }
                    })
                    .catch(err => console.error(err));
            }
        }

        function navigateTo(page) {
            window.location.href = page + window.location.search;
        }

        window.onload = initializePortal;
    </script>
</body>
</html>
