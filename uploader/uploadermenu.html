<div class="card">
    <div id="menuView" class="form-body">
        <h4 style="border-bottom:2px solid #00d1b2; padding-bottom:5px; margin-top:0; color:#1a1a1a; font-family: sans-serif; font-size: 0.9rem; text-transform: uppercase;">Select Activity</h4>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
            <button onclick="showVault()" class="btn-action" style="font-size:0.75rem; padding:15px 20px;">Upload Photos</button>
            <button onclick="showEod()" class="btn-action" style="font-size:0.75rem; padding:15px 20px;">Upload EOD Reports</button>
            <button disabled style="background:#eee; color:#999; border:none; padding:15px 20px; cursor:not-allowed; font-weight:bold; border-radius:4px; text-transform:uppercase; font-size:0.75rem; width:100%;">Expansion Module</button>
            <button disabled style="background:#eee; color:#999; border:none; padding:15px 20px; cursor:not-allowed; font-weight:bold; border-radius:4px; text-transform:uppercase; font-size:0.75rem; width:100%;">Expansion Module</button>
        </div>
    </div>

    <div id="vaultView" style="display:none;">
        <div id="setupForm" class="form-body">
            <h4 style="border-bottom:2px solid #00d1b2; padding-bottom:5px; margin-top:0; color:#1a1a1a; font-size: 0.9rem; text-transform: uppercase;">1. Vault Setup</h4>
            <label style="margin-top:10px;">School Location</label>
            <select id="franchiseSelect" onchange="syncVaultData()"><option value="">-- Select Location --</option></select>
            <label>Teacher Name</label>
            <select id="teacherSelect" disabled><option value="">-- Choose Teacher --</option></select>
            <label>3. Select Photos (Up to 10)</label>
            <div style="padding: 30px; border: 2px dashed #00d1b2; border-radius: 4px; text-align: center; background: #f9f9f9; position: relative; cursor: pointer;">
                <input type="file" id="fileInput" accept="image/*,video/*" multiple onchange="startBatch()" style="position:absolute; width:100%; height:100%; top:0; left:0; opacity:0; cursor:pointer;">
                <span style="color: #1a1a1a; font-weight: bold; font-size:0.75rem;">Tap to select batch</span>
            </div>
            <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:#666; cursor:pointer; font-weight:bold; font-size:0.7rem; width:100%; text-transform:uppercase;">← Back to Menu</button>
        </div>
        <div id="taggingUI" style="display:none;">
            <div class="preview-area" id="previewContainer"></div>
            <div class="form-body">
                <div id="taggingControls">
                    <label>Who is in this photo?</label>
                    <select id="studentSelect"><option value="">-- Identify Student --</option></select>
                </div>
                <button id="nextBtn" onclick="processUpload()" class="btn-action">Secure & Next</button>
                <div id="status-bar" style="margin-top:10px; text-align:center; font-size:0.7rem; font-weight:bold; color:#1a1a1a;">Ready.</div>
            </div>
        </div>
    </div>

    <div id="eodView" style="display:none;">
        <div id="eodSetupForm" class="form-body">
            <h4 style="border-bottom:2px solid #00d1b2; padding-bottom:5px; margin-top:0; color:#1a1a1a; font-size: 0.9rem; text-transform: uppercase;">EOD Report Setup</h4>
            <label style="margin-top:10px;">School Location</label>
            <select id="eodFranchiseSelect" onchange="syncEodTeachers()"><option value="">-- Select Location --</option></select>
            <label>Teacher Name</label>
            <select id="eodTeacherSelect" disabled><option value="">-- Choose Teacher --</option></select>
            <label>Select Report Photos</label>
            <div style="padding: 30px; border: 2px dashed #00d1b2; border-radius: 4px; text-align: center; background: #f9f9f9; position: relative; cursor: pointer;">
                <input type="file" id="eodFileInput" accept="image/*" multiple onchange="startEodBatch()" style="position:absolute; width:100%; height:100%; top:0; left:0; opacity:0; cursor:pointer;">
                <span style="color: #1a1a1a; font-weight: bold; font-size:0.75rem;">Tap to select report photos</span>
            </div>
            <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:#666; cursor:pointer; font-weight:bold; font-size:0.7rem; width:100%; text-transform:uppercase;">← Back to Menu</button>
        </div>
        <div id="eodUploadUI" style="display:none;">
            <div class="preview-area" id="eodPreviewContainer"></div>
            <div class="form-body">
                <button id="eodUploadBtn" onclick="processEodUpload()" class="btn-action">Upload Report</button>
                <div id="eod-status-bar" style="margin-top:10px; text-align:center; font-size:0.7rem; font-weight:bold; color:#1a1a1a;">Ready.</div>
            </div>
        </div>
    </div>
</div>

<script>
    const X_API = 'https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL';
    const PARENT_API = 'https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx';
    const W_URL = 's3.ap-southeast-1.wasabisys.com';
    const BKT = 'the-little-nest-media';
    const AK = 'P7GI5LQMI4OX2SPAV1YA';
    const SK = 'NVDSvPLB6HeLROD9piOwBjeUl45Reeb5zrhPKiLY';

    let files = [];
    let idx = 0;
    const s3 = new AWS.S3({ endpoint: W_URL, accessKeyId: AK, secretAccessKey: SK, s3ForcePathStyle: true, signatureVersion: 'v4' });

    function showVault() { document.getElementById('menuView').style.display='none'; document.getElementById('vaultView').style.display='block'; }
    function showEod() { document.getElementById('menuView').style.display='none'; document.getElementById('eodView').style.display='block'; }

    async function init() {
        try {
            const r = await fetch(`${X_API}/uploader_get_franchises`);
            const data = await r.json();
            const sel = document.getElementById('franchiseSelect');
            const eodSel = document.getElementById('eodFranchiseSelect');
            data.forEach(f => { 
                const opt = `<option value="${f.id}">${f.name}</option>`;
                sel.innerHTML += opt;
                eodSel.innerHTML += opt;
            });
        } catch (e) { console.error("Init failed", e); }
    }

    async function syncVaultData() {
        const fid = document.getElementById('franchiseSelect').value; if (!fid) return;
        try {
            const [t, s] = await Promise.all([
                fetch(`${X_API}/uploader_get_teachers?franchise_id=${fid}`).then(res => res.json()),
                fetch(`${X_API}/uploader_get_students?franchise_id=${fid}`).then(res => res.json())
            ]);

            const tSel = document.getElementById('teacherSelect'); 
            tSel.innerHTML = '<option value="">-- Choose Teacher --</option>';
            t.forEach(item => tSel.innerHTML += `<option value="${item.id}">${item.first_name}</option>`); 
            tSel.disabled = false;
            
            const sSel = document.getElementById('studentSelect'); 
            sSel.innerHTML = '<option value="">-- Identify Student --</option>';
            
            for (const student of s) {
                const opt = document.createElement('option');
                opt.value = student.id;
                opt.text = student.name;
                
                // Fetch parent details immediately using parent_id
                if (student.parent_id) {
                    try {
                        const pResp = await fetch(`${PARENT_API}/parent/${student.parent_id}`);
                        const parent = await pResp.json();
                        // Combine names for the dataset
                        opt.dataset.parent = `${parent.first_name}_${parent.last_name}`;
                    } catch (err) { opt.dataset.parent = "Unknown_Parent"; }
                } else {
                    opt.dataset.parent = "Unknown_Parent";
                }
                sSel.appendChild(opt);
            }
        } catch (e) { console.error("Sync Error", e); }
    }

    async function syncEodTeachers() {
        const fid = document.getElementById('eodFranchiseSelect').value; if (!fid) return;
        const t = await fetch(`${X_API}/uploader_get_teachers?franchise_id=${fid}`).then(res => res.json());
        const tSel = document.getElementById('eodTeacherSelect'); tSel.innerHTML = '<option value="">-- Choose Teacher --</option>';
        t.forEach(item => tSel.innerHTML += `<option value="${item.id}">${item.first_name}</option>`); tSel.disabled = false;
    }

    function startBatch() {
        const fInput = document.getElementById('fileInput').files; if (!document.getElementById('teacherSelect').value || fInput.length === 0) return;
        files = Array.from(fInput).slice(0, 10); idx = 0;
        document.getElementById('setupForm').style.display = 'none'; document.getElementById('taggingUI').style.display = 'block';
        loadPhoto();
    }

    function loadPhoto() {
        const file = files[idx]; const container = document.getElementById('previewContainer');
        const reader = new FileReader();
        reader.onload = (e) => container.innerHTML = `<div class="counter-badge">PHOTO ${idx + 1} OF ${files.length}</div><img src="${e.target.result}" style="max-width:100%; max-height:100%; object-fit:contain;">`;
        reader.readAsDataURL(file); document.getElementById('status-bar').innerText = `Ready.`;
    }

    async function processUpload() {
        let file = files[idx]; 
        const sSel = document.getElementById('studentSelect');
        const tSel = document.getElementById('teacherSelect');
        const sid = sSel.value; const tid = tSel.value; const fid = document.getElementById('franchiseSelect').value;

        if (!sid) return alert("Select student.");
        document.getElementById('nextBtn').disabled = true;

        try {
            document.getElementById('status-bar').innerText = "Uploading to S3...";
            const dateStr = new Date().toISOString().split('T')[0];
            const timestamp = Date.now();
            
            // Gather names for folder/file structure
            const studentName = sSel.options[sSel.selectedIndex].text.replace(/\s+/g, '_');
            const parentName = (sSel.options[sSel.selectedIndex].dataset.parent).replace(/\s+/g, '_');
            const teacherName = tSel.options[tSel.selectedIndex].text.replace(/\s+/g, '_');

            // Naming: ParentName_StudentName_TeacherName_Date_Timestamp_OriginalName
            const fileName = `${parentName}_${studentName}_${teacherName}_${dateStr}_${timestamp}_${file.name}`;
            
            // Folder: vault/ParentName/
            const key = `vault/${parentName}/${fileName}`;

            const upResult = await s3.upload({ Bucket: BKT, Key: key, Body: file, ContentType: file.type, ACL: 'public-read' }).promise();
            
            await fetch(`${X_API}/uploader_register`, { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ franchise_id: parseInt(fid), student_id: parseInt(sid), teacher_id: parseInt(tid), file_url: upResult.Location, file_type: 'image', file_name: fileName, file_size: file.size })
            });
            
            idx++; 
            if (idx < files.length) { 
                loadPhoto(); document.getElementById('nextBtn').disabled = false; 
            } else { 
                document.getElementById('previewContainer').innerHTML = `<div style="padding:40px; text-align:center; color:white;"><h3>Upload Successful!</h3><p>Your photos have been securely saved.</p></div>`;
                document.getElementById('taggingControls').style.display = 'none';
                document.getElementById('status-bar').style.display = 'none';
                const btn = document.getElementById('nextBtn');
                btn.innerText = "Finish & Clear"; btn.disabled = false; btn.onclick = () => location.reload();
            }
        } catch (e) { 
            console.error(e); document.getElementById('nextBtn').disabled = false; 
            document.getElementById('status-bar').innerText = "Error: " + e.message;
        }
    }

    function startEodBatch() {
        const fInput = document.getElementById('eodFileInput').files; if (!document.getElementById('eodTeacherSelect').value || fInput.length === 0) return;
        files = Array.from(fInput).slice(0, 10); idx = 0;
        document.getElementById('eodSetupForm').style.display = 'none'; document.getElementById('eodUploadUI').style.display = 'block';
        loadEodPhoto();
    }

    function loadEodPhoto() {
        const file = files[idx]; const container = document.getElementById('eodPreviewContainer');
        const reader = new FileReader();
        reader.onload = (e) => container.innerHTML = `<div class="counter-badge">REPORT ${idx + 1} OF ${files.length}</div><img src="${e.target.result}" style="max-width:100%; max-height:100%; object-fit:contain;">`;
        reader.readAsDataURL(file);
    }

    async function processEodUpload() {
        let file = files[idx]; 
        const fSel = document.getElementById('eodFranchiseSelect');
        const tSel = document.getElementById('eodTeacherSelect');
        const fid = fSel.value; const tid = tSel.value;
        const fName = fSel.options[fSel.selectedIndex].text.replace(/\s+/g, '_');
        const tName = tSel.options[tSel.selectedIndex].text.replace(/\s+/g, '_');

        document.getElementById('eodUploadBtn').disabled = true;
        try {
            document.getElementById('eod-status-bar').innerText = "Uploading Report...";
            const dateStr = new Date().toISOString().split('T')[0];
            const fileName = `${fName}_${tName}_${dateStr}_${file.name}`;
            const key = `reports/${fName}/${fileName}`;
            const upResult = await s3.upload({ Bucket: BKT, Key: key, Body: file, ContentType: file.type, ACL: 'public-read' }).promise();
            
            await fetch(`${X_API}/uploader_register`, { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ franchise_id: parseInt(fid), teacher_id: parseInt(tid), file_url: upResult.Location, file_type: 'image', file_name: fileName, file_size: file.size })
            });
            idx++; 
            if (idx < files.length) { loadEodPhoto(); document.getElementById('eodUploadBtn').disabled = false; } 
            else { 
                document.getElementById('eodPreviewContainer').innerHTML = `<div style="padding:40px; text-align:center; color:white;"><h3>Report Uploaded!</h3><p>Successfully archived.</p></div>`;
                document.getElementById('eod-status-bar').style.display = 'none';
                const btn = document.getElementById('eodUploadBtn');
                btn.innerText = "Done"; btn.disabled = false; btn.onclick = () => location.reload();
            }
        } catch (e) { 
            console.error(e); document.getElementById('eodUploadBtn').disabled = false; 
            document.getElementById('eod-status-bar').innerText = "Error: " + e.message;
        }
    }
    init();
</script>
