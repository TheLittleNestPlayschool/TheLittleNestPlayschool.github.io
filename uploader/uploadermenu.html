<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLNP Teacher Upload</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card" style="text-align: center;">
            <!-- Header Section -->
            <p style="font-size: 0.8rem; margin-bottom: 5px;">Little Nest Global Network 50,000+ Learning Hours & Counting!</p>
            <h1 class="login-title" style="font-size: 1.5rem; margin-bottom: 2px;">THE LITTLE NEST PLAYSCHOOL</h1>
            <div id="teacherLocationDisplay" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 2px;">NestLoad</div>
            <div id="teacherNameDisplay" style="font-size: 0.9rem; margin-bottom: 20px;">Teacher Upload Portal</div>

            <!-- Menu Buttons -->
            <div style="display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 20px;">
                <button onclick="window.location.href='./uploader/index.html'" class="btn-submit" style="width: 200px; border-radius: 20px; font-size: 0.9rem;">Upload Receipt</button>
                <button onclick="window.location.href='./attendance.html'" class="btn-submit" style="width: 200px; border-radius: 20px; font-size: 0.9rem;">Upload Attendance</button>
            </div>
        </div>
    </div>

    <script>
        const XANO_BASE_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:wtEDiEuV';

        async function loadTeacherHeader() {
            const authToken = localStorage.getItem('authToken');
            const teacherId = localStorage.getItem('teacher_id');

            if (!authToken || !teacherId) {
                window.location.href = '../index.html';
                return;
            }

            try {
                const response = await fetch(`${XANO_BASE_URL}/get_teacher_details?teacher_id=${teacherId}`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (!response.ok) throw new Error('Failed to fetch teacher details.');
                
                // Read the response directly as the teacher object
                const teacher = await response.json();

                if (teacher) {
                    const firstName = teacher.first_name || '';
                    const lastName = teacher.last_name || '';
                    const fullName = `${firstName} ${lastName}`.trim();
                    
                    document.getElementById('teacherNameDisplay').textContent = fullName || 'Teacher';

                    if (teacher.franchise_id) {
                        document.getElementById('teacherLocationDisplay').textContent = String(teacher.franchise_id).toUpperCase();
                    }
                }

            } catch (error) {
                console.error('Error loading header info:', error);
            }
        }

        loadTeacherHeader();
    </script>
</body>
</html>
