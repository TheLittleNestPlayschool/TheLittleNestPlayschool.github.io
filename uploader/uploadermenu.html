<div class="nestmind-vault-system">
    <style>
        :root {
            --primary-blue: #4a90e2;
            --deep-blue: #357abd;
            --success-green: #4caf50;
            --error-red: #e74c3c;
            --text-main: #2d3748;
            --text-muted: #718096;
            --bg-light: #f8fafc;
            --border-color: #cbd5e0;
        }

        .nestmind-vault-system {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            width: 100%;
            max-width: 650px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            overflow: hidden;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
        }

        .vault-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--deep-blue) 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .vault-header h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .vault-header p {
            margin: 10px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .vault-selectors {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            padding: 30px;
            background: var(--bg-light);
            border-bottom: 1px solid #edf2f7;
        }
        .select-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .select-group label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
        .vault-selectors select {
            appearance: none;
            background-color: #ffffff;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23718096%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 18px;
        }
        .vault-selectors select:focus { border-color: var(--primary-blue); }
        .vault-selectors select:disabled { background-color: #e2e8f0; opacity: 0.6; }

        .capture-container { padding: 60px 30px; text-align: center; }
        .camera-trigger {
            border: 4px dashed var(--border-color);
            border-radius: 25px;
            padding: 70px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #ffffff;
        }
        .camera-trigger:hover { border-color: var(--primary-blue); background: #f0f7ff; }
        .camera-trigger .icon { font-size: 70px; display: block; margin-bottom: 20px; }
        .camera-trigger span { display: block; font-size: 20px; font-weight: 700; }

        #vault-preview-wrap { display: none; padding: 30px; }
        .media-holder {
            width: 100%;
            background: #1a202c;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        #preview-display { width: 100%; max-height: 500px; display: block; object-fit: contain; }

        .vault-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .vault-btn {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-sync { background: var(--primary-blue); color: white; }
        .btn-reset { background: #edf2f7; color: #4a5568; }
        .vault-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .progress-box { margin-bottom: 25px; display: none; }
        .bar-bg { height: 14px; background: #edf2f7; border-radius: 50px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: var(--success-green); transition: width 0.4s ease; }
        .status-msg { margin-top: 12px; font-size: 15px; font-weight: 700; text-align: left; }

        @media (max-width: 550px) {
            .vault-selectors { grid-template-columns: 1fr; }
            .vault-actions { grid-template-columns: 1fr; }
        }
    </style>

    <div class="vault-header">
        <h2>NestMind Vault</h2>
        <p>Direct-to-S3 Media Management</p>
    </div>

    <div class="vault-selectors">
        <div class="select-group">
            <label>1. School</label>
            <select id="f-select" onchange="filterStudentsLocal(this.value)">
                <option value="">Loading Schools...</option>
            </select>
        </div>
        <div class="select-group">
            <label>2. Student</label>
            <select id="s-select" disabled onchange="debugStudentSelection(this.value)">
                <option value="">Select School First</option>
            </select>
        </div>
    </div>

    <div id="capture-stage" class="capture-container">
        <div class="camera-trigger" onclick="document.getElementById('input-cam').click()">
            <span class="icon">📸</span>
            <span>Take Student Photo</span>
            <input type="file" id="input-cam" hidden accept="image/*" capture="environment" onchange="handleFileSelect(this)">
        </div>
    </div>

    <div id="vault-preview-wrap">
        <div class="media-holder">
            <img id="preview-display" src="" alt="S3 Preview">
        </div>

        <div class="progress-box" id="ui-progress">
            <div class="bar-bg"><div class="bar-fill" id="ui-bar"></div></div>
            <div class="status-msg" id="ui-status">Initialised.</div>
        </div>

        <div class="vault-actions">
            <button class="vault-btn btn-reset" onclick="resetVault()">Retake</button>
            <button class="vault-btn btn-sync" id="sync-trigger" onclick="runS3Sync()">Sync to Vault</button>
        </div>
    </div>
</div>

<script>
const API_ENDPOINTS = {
    franchise: 'https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise',
    student: 'https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student',
    parent: 'https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/parent',
    handshake: 'https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/get_upload_url'
};

let vaultFile = null;
let allStudentsRaw = [];
let allParentsRaw = [];

window.addEventListener('DOMContentLoaded', async () => {
    const fDropdown = document.getElementById('f-select');
    try {
        const fRes = await fetch(API_ENDPOINTS.franchise);
        const fData = await fRes.json();
        fDropdown.innerHTML = '<option value="">Select Location...</option>';
        fData.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.id;
            opt.dataset.slug = item.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            opt.textContent = item.name;
            fDropdown.appendChild(opt);
        });

        const [sRes, pRes] = await Promise.all([
            fetch(API_ENDPOINTS.student),
            fetch(API_ENDPOINTS.parent)
        ]);
        
        allStudentsRaw = await sRes.json();
        allParentsRaw = await pRes.json();
        
        alert(`BOOT COMPLETE:\nSchools: ${fData.length}\nStudents: ${allStudentsRaw.length}\nParents: ${allParentsRaw.length}`);
    } catch (err) {
        fDropdown.innerHTML = '<option>Error loading system</option>';
    }
});

function filterStudentsLocal(franchiseId) {
    const sDropdown = document.getElementById('s-select');
    if (!franchiseId || franchiseId === "") { 
        sDropdown.disabled = true; 
        sDropdown.innerHTML = '<option value="">Select School First</option>';
        return; 
    }

    sDropdown.disabled = false;
    sDropdown.innerHTML = '<option value="">Filtering...</option>';

    const filtered = allStudentsRaw.filter(s => 
        String(s.franchise_id) === String(franchiseId) && s.is_active === true
    );

    alert(`FILTER:\nMatches Found: ${filtered.length}`);

    if (filtered.length === 0) {
        sDropdown.innerHTML = '<option value="">No Active Students Found</option>';
    } else {
        sDropdown.innerHTML = '<option value="">Select Student...</option>';
        filtered.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.name;
            sDropdown.appendChild(opt);
        });
    }
}

function debugStudentSelection(studentId) {
    if (!studentId) return;
    const student = allStudentsRaw.find(s => String(s.id) === String(studentId));
    const parent = allParentsRaw.find(p => String(p.id) === String(student.parent_id));
    const pName = parent ? `${parent.first_name} ${parent.last_name}` : "MISSING PARENT";
    alert(`SELECTION:\nStudent: ${student.name}\nParent: ${pName}`);
}

function handleFileSelect(input) {
    if (input.files && input.files[0]) {
        vaultFile = input.files[0];
        document.getElementById('preview-display').src = URL.createObjectURL(vaultFile);
        document.getElementById('capture-stage').style.display = 'none';
        document.getElementById('vault-preview-wrap').style.display = 'block';
    }
}

async function runS3Sync() {
    const fSelect = document.getElementById('f-select');
    const sDropdown = document.getElementById('s-select');
    const btn = document.getElementById('sync-trigger');
    const bar = document.getElementById('ui-bar');
    const status = document.getElementById('ui-status');
    const ui = document.getElementById('ui-progress');

    const studentId = sDropdown.value;
    const studentData = allStudentsRaw.find(s => String(s.id) === String(studentId));
    const parentData = allParentsRaw.find(p => String(p.id) === String(studentData.parent_id));
    const franchiseSlug = fSelect.selectedOptions[0].dataset.slug;

    let pFolderName = "unassigned-parent";
    if (parentData) {
        pFolderName = `${parentData.first_name}-${parentData.last_name}`.replace(/\s+/g, '-').toLowerCase();
    }

    // Clean filename to prevent signature mismatch
    const safeName = vaultFile.name.replace(/[^a-z0-9.]/gi, '_').toLowerCase();

    btn.disabled = true;
    ui.style.display = 'block';
    
    try {
        const timestamp = new Date().getTime();
        const fullS3Path = `${franchiseSlug}/${pFolderName}/${timestamp}-${safeName}`;
        
        status.innerText = "Authorizing...";
        bar.style.width = "25%";

        const handshakeResponse = await fetch(API_ENDPOINTS.handshake, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_path: fullS3Path, content_type: vaultFile.type })
        });

        const { upload_url } = await handshakeResponse.json();
        
        // SHOW SIGNED URL AND PATH
        alert(`DEBUG - HANDSHAKE SUCCESS:\n\nS3 KEY:\n${fullS3Path}\n\nSIGNED URL:\n${upload_url}`);

        bar.style.width = "65%";
        status.innerText = "Syncing Media...";
        
        const s3Response = await fetch(upload_url, {
            method: 'PUT',
            headers: { 'Content-Type': vaultFile.type },
            body: vaultFile
        });

        if (s3Response.ok) {
            bar.style.width = "100%";
            status.innerText = "Sync Successful!";
            setTimeout(resetVault, 2000);
        } else {
            throw new Error(`S3 Error: ${s3Response.status}`);
        }
    } catch (err) {
        status.innerText = "Sync Failed: " + err.message;
        btn.disabled = false;
    }
}

function resetVault() {
    vaultFile = null;
    document.getElementById('input-cam').value = '';
    document.getElementById('capture-stage').style.display = 'block';
    document.getElementById('vault-preview-wrap').style.display = 'none';
    document.getElementById('ui-progress').style.display = 'none';
    document.getElementById('sync-trigger').disabled = false;
}
</script>
