<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NestMind Vault</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --nest-blue: #009dff; --nest-dark: #2d3748; --nest-bg: #f0f4f8; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--nest-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            align-items: center; 
        }
        
        .dashboard { 
            width: 100%; 
            max-width: 450px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: #fff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
        }

        /* All UI elements hidden by default */
        .header, .menu-nav, #module-frame, #lock-screen { 
            display: none; 
        }

        .header { 
            background: var(--nest-blue); 
            color: white; 
            padding: 15px; 
            text-align: center; 
        }
        .header h2 { margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }

        .menu-nav { 
            padding: 10px; 
            gap: 8px; 
            background: #f8fafc; 
            border-bottom: 1px solid #e2e8f0; 
        }
        
        .nav-item { 
            flex: 1; 
            text-align: center; 
            padding: 12px 0; 
            border: 2px solid #edf2f7; 
            border-radius: 12px; 
            cursor: pointer; 
            background: #fff; 
        }
        .nav-item.active { border-color: var(--nest-blue); background: #ebf8ff; }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; }
        .nav-item label { font-size: 10px; font-weight: 800; text-transform: uppercase; display: block; color: var(--nest-dark); }

        #module-frame { flex-grow: 1; border: none; width: 100%; background: var(--nest-bg); }

        #lock-screen { 
            flex-grow: 1; 
            display: none; /* Hidden by default */
            align-items: center; 
            justify-content: center; 
            background: #fff;
        }
        #lock-screen h1 { color: #cbd5e0; font-weight: 400; font-size: 24px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header" id="main-header">
        <h2 id="main-title">NESTMIND VAULT</h2>
    </div>

    <div id="lock-screen">
        <h1>Access Denied</h1>
    </div>

    <div class="menu-nav" id="main-nav">
        <div class="nav-item" onclick="loadModule('upload_student_pictures.html', this)">
            <span>👦</span><label>Students</label>
        </div>
        <div class="nav-item" onclick="loadModule('upload_eod.html', this)">
            <span>📝</span><label>End of Day</label>
        </div>
        <div class="nav-item" onclick="loadModule('upload_receipt.html', this)">
            <span>🧾</span><label>Receipts</label>
        </div>
    </div>

    <iframe id="module-frame" name="module-frame" src="about:blank"></iframe>
</div>

<script>
    async function authenticateAndLoad() {
        const lockScreen = document.getElementById('lock-screen');
        const mainNav = document.getElementById('main-nav');
        const mainHeader = document.getElementById('main-header');
        const frame = document.getElementById('module-frame');
        const title = document.getElementById('main-title');
        
        const urlParams = new URLSearchParams(window.location.search);
        const tlnpKey = urlParams.get('tlnp');

        // If no key at all, show "Access Denied" immediately
        if (!tlnpKey) {
            lockScreen.style.display = 'flex';
            return;
        }

        try {
            const response = await fetch(NEST_ENDPOINTS.franchise.list);
            const data = await response.json();
            const matched = data.find(f => f.access_key === tlnpKey);

            if (matched) {
                const slug = matched.name.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g, '');
                
                localStorage.setItem('nestmind_f_id', matched.id);
                localStorage.setItem('nestmind_f_slug', slug);
                localStorage.setItem('nestmind_f_name', matched.name);
                
                // Success: Show the UI
                mainHeader.style.display = 'block';
                mainNav.style.display = 'flex';
                frame.style.display = 'block';
                title.innerText = matched.name.toUpperCase() + " VAULT";
                
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                // Key was wrong: show Access Denied
                lockScreen.style.display = 'flex';
            }
        } catch (err) {
            console.error("Auth System Error:", err);
            lockScreen.style.display = 'flex';
        }
    }

    function loadModule(url, el) {
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('module-frame').src = url;
    }

    window.onload = authenticateAndLoad;
</script>

</body>
</html>
