<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NestMind Vault</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --nest-blue: #009dff; --nest-dark: #2d3748; --nest-bg: #f0f4f8; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--nest-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            align-items: center; 
        }
        
        .dashboard { 
            width: 100%; 
            max-width: 450px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: #fff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
        }

        .header { 
            background: var(--nest-blue); 
            color: white; 
            padding: 15px; 
            text-align: center; 
        }
        .header h2 { margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        .header p { margin: 4px 0 0; font-size: 11px; opacity: 0.9; font-weight: 600; }

        /* Permanent Navigation Row */
        .menu-nav { 
            display: none; /* Hidden until key is verified */
            padding: 10px; 
            gap: 8px; 
            background: #f8fafc; 
            border-bottom: 1px solid #e2e8f0; 
        }
        
        .nav-item { 
            flex: 1; 
            text-align: center; 
            padding: 12px 0; 
            border: 2px solid #edf2f7; 
            border-radius: 12px; 
            cursor: pointer; 
            background: #fff; 
        }
        .nav-item.active { border-color: var(--nest-blue); background: #ebf8ff; }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 4px; }
        .nav-item label { font-size: 10px; font-weight: 800; text-transform: uppercase; display: block; color: var(--nest-dark); }

        #module-frame { flex-grow: 1; border: none; width: 100%; background: var(--nest-bg); display: none; }

        /* Lock Screen for unauthorized users */
        #lock-screen { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
            text-align: center; 
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h2 id="main-title">NESTMIND VAULT</h2>
        <p id="sub-header">Secure Internal Uploader</p>
    </div>

    <div id="lock-screen">
        <span style="font-size: 50px;">🔒</span>
        <h3 style="color: #cbd5e0;">Access Denied</h3>
        <p style="color: #a0aec0; font-size: 13px;">A valid branch key is required to access the vault.</p>
    </div>

    <div class="menu-nav" id="main-nav">
        <div class="nav-item" onclick="loadModule('upload_student_pictures.html', this)">
            <span>👦</span><label>Students</label>
        </div>
        <div class="nav-item" onclick="loadModule('upload_eod.html', this)">
            <span>📝</span><label>End of Day</label>
        </div>
        <div class="nav-item" onclick="loadModule('upload_receipt.html', this)">
            <span>🧾</span><label>Receipts</label>
        </div>
    </div>

    <iframe id="module-frame" name="module-frame" src="about:blank"></iframe>
</div>

<script>
    async function authenticateAndLoad() {
        const lockScreen = document.getElementById('lock-screen');
        const mainNav = document.getElementById('main-nav');
        const frame = document.getElementById('module-frame');
        const title = document.getElementById('main-title');
        
        // 1. Get key from URL
        const urlParams = new URLSearchParams(window.location.search);
        const tlnpKey = urlParams.get('tlnp');

        if (!tlnpKey) return; // Stay locked if no key

        try {
            // 2. Fetch branches from Xano
            const response = await fetch(NEST_ENDPOINTS.franchise.list);
            const data = await response.json();
            
            // 3. Find the one matching your access_key
            const matched = data.find(f => f.access_key === tlnpKey);

            if (matched) {
                const slug = matched.name.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g, '');
                
                // 4. Save credentials silently
                localStorage.setItem('nestmind_f_id', matched.id);
                localStorage.setItem('nestmind_f_slug', slug);
                localStorage.setItem('nestmind_f_name', matched.name);
                
                // 5. Unlock UI
                lockScreen.style.display = 'none';
                mainNav.style.display = 'flex';
                frame.style.display = 'block';
                title.innerText = matched.name.toUpperCase() + " VAULT";
                
                // 6. Clean URL so they don't see the key anymore
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        } catch (err) {
            console.error("Auth System Error:", err);
        }
    }

    function loadModule(url, el) {
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('module-frame').src = url;
    }

    window.onload = authenticateAndLoad;
</script>

</body>
</html>
