<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind Vault Menu</title>
    
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    
    <style>
        body { 
            padding: 20px 10px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            background: #edf2f7;
        }
        
        .menu-container {
            width: 100%;
            max-width: 500px;
            align-self: flex-start;
            background: white;
            border-radius: var(--nest-radius-lg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4dc3ff, #0095e6);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .menu-list {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 20px;
            text-decoration: none;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .menu-item:active {
            transform: scale(0.98);
            background: #f0f7ff;
        }

        .icon-box {
            font-size: 32px;
            margin-right: 20px;
            background: white;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .nest-label {
            display: block;
            font-weight: 800;
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nest-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            font-weight: 600;
            outline: none;
        }
    </style>
</head>
<body>

<div class="menu-container">
    <div class="header">
        <h2 style="margin:0; text-transform: uppercase; letter-spacing: 2px;">NestMind Vault</h2>
        <p style="margin:8px 0 0; font-size: 14px; opacity: 0.9;">Select Location & Category</p>
    </div>

    <div style="padding: 25px 25px 10px 25px;">
        <label class="nest-label">Current School Location</label>
        <select id="f-select" class="nest-select" onchange="saveSelection(this)">
            <option value="">Loading Schools...</option>
        </select>
    </div>

    <div class="menu-list">
        <a href="upload_student_pictures.html" class="menu-item">
            <div class="icon-box">👦</div>
            <div class="text-box">
                <strong style="display:block; font-size:18px; color: #2d3748;">Student Pictures</strong>
                <span style="font-size:13px; color: #718096;">Photos & Progress Sheets</span>
            </div>
        </a>

        <a href="upload_eod.html" class="menu-item">
            <div class="icon-box">📝</div>
            <div class="text-box">
                <strong style="display:block; font-size:18px; color: #2d3748;">End of Day</strong>
                <span style="font-size:13px; color: #718096;">Daily Branch Reports</span>
            </div>
        </a>

        <a href="upload_receipt.html" class="menu-item">
            <div class="icon-box">🧾</div>
            <div class="text-box">
                <strong style="display:block; font-size:18px; color: #2d3748;">Receipts</strong>
                <span style="font-size:13px; color: #718096;">Expenses & Purchases</span>
            </div>
        </a>
    </div>
</div>

<script>
    async function loadFranchises() {
        const drop = document.getElementById('f-select');
        
        try {
            // Using the endpoint from your api_config.js
            const response = await fetch(NEST_ENDPOINTS.franchise.list);
            const data = await response.json();
            
            drop.innerHTML = '<option value="">Select Location...</option>';
            data.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                // Creating the slug for the S3 folder (e.g., "Sariaya Branch" -> "sariaya")
                opt.dataset.slug = f.name ? f.name.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g, '') : 'unknown';
                opt.textContent = f.name || 'Unnamed Branch';
                drop.appendChild(opt);
            });

            // Restore selection from memory
            const savedId = localStorage.getItem('nestmind_f_id');
            if (savedId) drop.value = savedId;
        } catch (err) {
            drop.innerHTML = '<option>Error loading franchises</option>';
            console.error("API Fetch Error:", err);
        }
    }

    window.onload = loadFranchises;

    function saveSelection(select) {
        const selected = select.selectedOptions[0];
        if (select.value && selected) {
            localStorage.setItem('nestmind_f_id', select.value);
            localStorage.setItem('nestmind_f_slug', selected.dataset.slug);
            localStorage.setItem('nestmind_f_name', selected.textContent);
            console.log("Saved: " + selected.dataset.slug);
        }
    }
</script>

</body>
</html>
