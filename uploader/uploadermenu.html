<div class="nestmind-vault-system">
    <style>
        :root {
            --primary-blue: #4a90e2;
            --deep-blue: #357abd;
            --success-green: #4caf50;
            --error-red: #e74c3c;
            --text-main: #2d3748;
            --text-muted: #718096;
            --bg-light: #f8fafc;
            --border-color: #cbd5e0;
        }

        .nestmind-vault-system {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            max-width: 650px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            overflow: hidden;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
        }

        .vault-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--deep-blue) 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .vault-header h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .vault-header p {
            margin: 10px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .vault-selectors {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            padding: 30px;
            background: var(--bg-light);
            border-bottom: 1px solid #edf2f7;
        }
        .select-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .select-group label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        .vault-selectors select {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            outline: none;
            cursor: pointer;
        }

        .capture-container {
            padding: 60px 30px;
            text-align: center;
        }
        .camera-trigger {
            border: 4px dashed var(--border-color);
            border-radius: 25px;
            padding: 70px 30px;
            cursor: pointer;
            background: #ffffff;
        }
        .camera-trigger:hover {
            border-color: var(--primary-blue);
            background: #f0f7ff;
        }

        #vault-preview-wrap {
            display: none;
            padding: 30px;
        }
        .media-holder {
            width: 100%;
            background: #1a202c;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 25px;
        }
        #preview-display {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
        }

        .vault-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .vault-btn {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-sync { background: var(--primary-blue); color: white; }
        .btn-reset { background: #edf2f7; color: #4a5568; }

        .progress-box {
            margin-bottom: 25px;
            display: none;
        }
        .bar-bg {
            height: 14px;
            background: #edf2f7;
            border-radius: 50px;
            overflow: hidden;
        }
        .bar-fill {
            width: 0%;
            height: 100%;
            background: var(--success-green);
            transition: width 0.4s ease;
        }
        .status-msg {
            margin-top: 12px;
            font-size: 15px;
            font-weight: 700;
        }
    </style>

    <div class="vault-header">
        <h2>NestMind Vault</h2>
        <p>Direct-to-S3 Media Management</p>
    </div>

    <div class="vault-selectors">
        <div class="select-group">
            <label>1. Select School</label>
            <select id="f-select" onchange="fetchStudents(this.value)">
                <option value="">Loading Schools...</option>
            </select>
        </div>
        <div class="select-group">
            <label>2. Select Student</label>
            <select id="s-select" disabled>
                <option value="">Select School First</option>
            </select>
        </div>
    </div>

    <div id="capture-stage" class="capture-container">
        <div class="camera-trigger" onclick="document.getElementById('input-cam').click()">
            <div style="font-size: 60px; margin-bottom: 15px;">📸</div>
            <span>Take Student Photo</span>
            <input type="file" id="input-cam" hidden accept="image/*" capture="environment" onchange="handleFileSelect(this)">
        </div>
    </div>

    <div id="vault-preview-wrap">
        <div class="media-holder">
            <img id="preview-display" src="">
        </div>

        <div class="progress-box" id="ui-progress">
            <div class="bar-bg"><div class="bar-fill" id="ui-bar"></div></div>
            <div class="status-msg" id="ui-status">Initialised.</div>
        </div>

        <div class="vault-actions">
            <button class="vault-btn btn-reset" onclick="resetVault()">Retake</button>
            <button class="vault-btn btn-sync" id="sync-trigger" onclick="runS3Sync()">Sync to Vault</button>
        </div>
    </div>
</div>

<script>
const API_ENDPOINTS = {
    franchise: 'https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise',
    student: 'https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student',
    // Corrected the group ID from "uploader" to "iEHfqd-N" based on your logs
    handshake: 'https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/get_upload_url' 
};

let vaultFile = null;

window.addEventListener('DOMContentLoaded', async () => {
    const fDropdown = document.getElementById('f-select');
    try {
        const res = await fetch(API_ENDPOINTS.franchise);
        const data = await res.json();
        fDropdown.innerHTML = '<option value="">Select Location...</option>';
        data.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.id;
            opt.dataset.slug = item.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            opt.textContent = item.name;
            fDropdown.appendChild(opt);
        });
    } catch (err) {
        fDropdown.innerHTML = '<option>Error loading schools</option>';
    }
});

async function fetchStudents(franchiseId) {
    const sDropdown = document.getElementById('s-select');
    if (!franchiseId) { sDropdown.disabled = true; return; }
    sDropdown.disabled = false;
    sDropdown.innerHTML = '<option>Loading...</option>';
    try {
        const res = await fetch(`${API_ENDPOINTS.student}?franchise_id=${franchiseId}`);
        const data = await res.json();
        sDropdown.innerHTML = '<option value="">Select Student...</option>';
        data.forEach(s => {
            sDropdown.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        });
    } catch (err) {
        sDropdown.innerHTML = '<option>Error</option>';
    }
}

function handleFileSelect(input) {
    if (input.files && input.files[0]) {
        vaultFile = input.files[0];
        document.getElementById('preview-display').src = URL.createObjectURL(vaultFile);
        document.getElementById('capture-stage').style.display = 'none';
        document.getElementById('vault-preview-wrap').style.display = 'block';
    }
}

async function runS3Sync() {
    const fSelect = document.getElementById('f-select');
    const sDropdown = document.getElementById('s-select');
    const studentId = sDropdown.value;
    const studentName = sDropdown.options[sDropdown.selectedIndex].text.replace(/\s+/g, '-').toLowerCase();
    const franchiseSlug = fSelect.selectedOptions[0].dataset.slug;

    if (!fSelect.value || !studentId) return alert("Select School and Student.");

    const btn = document.getElementById('sync-trigger');
    const bar = document.getElementById('ui-bar');
    const status = document.getElementById('ui-status');
    const ui = document.getElementById('ui-progress');

    btn.disabled = true;
    ui.style.display = 'block';
    
    try {
        const timestamp = new Date().getTime();
        // Path: school/student-name/timestamp-filename.jpg
        const fullS3Path = `${franchiseSlug}/${studentName}/${timestamp}-${vaultFile.name}`;
        
        status.innerText = "Authorizing with S3 Vault...";
        bar.style.width = "25%";

        const handshakeResponse = await fetch(API_ENDPOINTS.handshake, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_path: fullS3Path, content_type: vaultFile.type })
        });

        if (!handshakeResponse.ok) throw new Error(`Handshake Failed: ${handshakeResponse.status}`);
        const { upload_url } = await handshakeResponse.json();

        status.innerText = "Syncing Media to Vault...";
        bar.style.width = "65%";
        
        const s3Response = await fetch(upload_url, {
            method: 'PUT',
            headers: { 'Content-Type': vaultFile.type },
            body: vaultFile
        });

        if (s3Response.ok) {
            bar.style.width = "100%";
            status.innerText = "Sync Successful!";
            setTimeout(resetVault, 2000);
        } else {
            throw new Error("S3 Upload Rejected");
        }
    } catch (err) {
        status.innerText = "Sync Error: " + err.message;
        btn.disabled = false;
    }
}

function resetVault() {
    vaultFile = null;
    document.getElementById('input-cam').value = '';
    document.getElementById('capture-stage').style.display = 'block';
    document.getElementById('vault-preview-wrap').style.display = 'none';
    document.getElementById('ui-progress').style.display = 'none';
    document.getElementById('ui-bar').style.width = '0%';
    document.getElementById('sync-trigger').disabled = false;
}
</script>
