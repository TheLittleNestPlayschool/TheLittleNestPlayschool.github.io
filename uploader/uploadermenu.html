<div class="nestmind-vault-system">
    <style>
        :root {
            --primary-blue: #4a90e2;
            --deep-blue: #357abd;
            --success-green: #4caf50;
            --error-red: #e74c3c;
            --text-main: #2d3748;
            --text-muted: #718096;
            --bg-light: #f8fafc;
            --border-color: #cbd5e0;
        }

        .nestmind-vault-system {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            width: 100%;
            max-width: 650px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            overflow: hidden;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
        }

        .vault-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--deep-blue) 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .vault-header h2 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .vault-header p { margin: 10px 0 0; font-size: 13px; opacity: 0.9; }

        .vault-selectors { padding: 25px 30px; background: var(--bg-light); border-bottom: 1px solid #edf2f7; }
        
        /* Menu Styling */
        .menu-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            padding: 20px 30px;
            background: #fff;
        }
        .menu-item {
            padding: 15px 5px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .menu-item span.icon { font-size: 20px; }
        .menu-item.active {
            border-color: var(--primary-blue);
            background: #f0f7ff;
            color: var(--primary-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.2);
        }

        .select-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .select-group label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
        
        select {
            appearance: none;
            background: #fff;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23718096%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        .context-area { padding: 0 30px 20px; min-height: 60px; }
        .hidden { display: none; }

        .capture-container { padding: 40px 30px; text-align: center; }
        .camera-trigger {
            border: 4px dashed var(--border-color);
            border-radius: 20px;
            padding: 50px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .camera-trigger:hover { border-color: var(--primary-blue); background: #f0f7ff; }
        .camera-trigger .main-icon { font-size: 50px; display: block; margin-bottom: 15px; }
        .camera-trigger span { display: block; font-size: 18px; font-weight: 700; }

        #vault-preview-wrap { display: none; padding: 30px; }
        .media-holder { width: 100%; background: #1a202c; border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        #preview-display { width: 100%; max-height: 450px; display: block; object-fit: contain; }

        .vault-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .vault-btn { padding: 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-sync { background: var(--primary-blue); color: white; }
        .btn-reset { background: #edf2f7; color: #4a5568; }

        .progress-box { margin-bottom: 20px; display: none; }
        .bar-bg { height: 12px; background: #edf2f7; border-radius: 10px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: var(--success-green); transition: width 0.4s ease; }
        .status-msg { margin-top: 10px; font-size: 14px; font-weight: 700; text-align: center; }
    </style>

    <div class="vault-header">
        <h2>NestMind Vault</h2>
        <p>Direct-to-S3 Media Management</p>
    </div>

    <div class="vault-selectors">
        <div class="select-group">
            <label>Current School Location</label>
            <select id="f-select" onchange="handleSchoolChange(this.value)">
                <option value="">Loading Schools...</option>
            </select>
        </div>
    </div>

    <div class="menu-container">
        <div class="menu-item" id="m-student" onclick="setMode('student')">
            <span class="icon">👦</span>
            <span>Students</span>
        </div>
        <div class="menu-item" id="m-eod" onclick="setMode('eod')">
            <span class="icon">📅</span>
            <span>End of Day</span>
        </div>
        <div class="menu-item" id="m-receipt" onclick="setMode('receipt')">
            <span class="icon">🧾</span>
            <span>Receipts</span>
        </div>
    </div>

    <div class="context-area">
        <div id="student-logic" class="hidden">
            <div class="select-group">
                <label>Select Student</label>
                <select id="s-select">
                    <option value="">Select School First</option>
                </select>
            </div>
        </div>
    </div>

    <div id="capture-stage" class="capture-container">
        <div class="camera-trigger" onclick="handleTriggerClick()">
            <span class="main-icon" id="trigger-icon">🔒</span>
            <span id="trigger-text">Select Category First</span>
            <input type="file" id="input-cam" hidden accept="image/*" capture="environment" onchange="handleFileSelect(this)">
        </div>
    </div>

    <div id="vault-preview-wrap">
        <div class="media-holder">
            <img id="preview-display" src="" alt="Preview">
        </div>
        <div class="progress-box" id="ui-progress">
            <div class="bar-bg"><div class="bar-fill" id="ui-bar"></div></div>
            <div class="status-msg" id="ui-status">Ready.</div>
        </div>
        <div class="vault-actions">
            <button class="vault-btn btn-reset" onclick="resetVault()">Retake</button>
            <button class="vault-btn btn-sync" id="sync-trigger" onclick="runS3Sync()">Sync to Vault</button>
        </div>
    </div>
</div>

<script>
const API_ENDPOINTS = {
    franchise: 'https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise',
    student: 'https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student',
    parent: 'https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/parent',
    handshake: 'https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/get_upload_url'
};

let vaultFile = null;
let allStudentsRaw = [];
let allParentsRaw = [];
let currentMode = null;

// Initial Load
window.addEventListener('DOMContentLoaded', async () => {
    const fDropdown = document.getElementById('f-select');
    try {
        const [fRes, sRes, pRes] = await Promise.all([
            fetch(API_ENDPOINTS.franchise),
            fetch(API_ENDPOINTS.student),
            fetch(API_ENDPOINTS.parent)
        ]);
        
        const fData = await fRes.json();
        allStudentsRaw = await sRes.json();
        allParentsRaw = await pRes.json();

        fDropdown.innerHTML = '<option value="">Select Location...</option>';
        fData.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.id;
            opt.dataset.slug = item.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            opt.textContent = item.name;
            fDropdown.appendChild(opt);
        });
    } catch (err) {
        fDropdown.innerHTML = '<option>Error connecting to system</option>';
    }
});

function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`m-${mode}`).classList.add('active');
    
    // Toggle Student Dropdown visibility
    const sLogic = document.getElementById('student-logic');
    mode === 'student' ? sLogic.classList.remove('hidden') : sLogic.classList.add('hidden');

    // Update Trigger UI
    const triggerIcon = document.getElementById('trigger-icon');
    const triggerText = document.getElementById('trigger-text');
    
    const config = {
        'student': { icon: '📸', text: 'Take Student Photo' },
        'eod': { icon: '📝', text: 'Capture EOD Report' },
        'receipt': { icon: '🧾', text: 'Capture Receipt' }
    };

    triggerIcon.innerText = config[mode].icon;
    triggerText.innerText = config[mode].text;
}

function handleSchoolChange(franchiseId) {
    const sDropdown = document.getElementById('s-select');
    if (!franchiseId) {
        sDropdown.innerHTML = '<option value="">Select School First</option>';
        return;
    }
    const filtered = allStudentsRaw.filter(s => String(s.franchise_id) === String(franchiseId) && s.is_active);
    sDropdown.innerHTML = filtered.length ? '<option value="">Select Student...</option>' : '<option>No Active Students</option>';
    filtered.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name;
        sDropdown.appendChild(opt);
    });
}

function handleTriggerClick() {
    if (!currentMode) {
        alert("Please select a category (Student, EOD, or Receipt) first.");
        return;
    }
    document.getElementById('input-cam').click();
}

function handleFileSelect(input) {
    if (input.files && input.files[0]) {
        vaultFile = input.files[0];
        document.getElementById('preview-display').src = URL.createObjectURL(vaultFile);
        document.getElementById('capture-stage').style.display = 'none';
        document.getElementById('vault-preview-wrap').style.display = 'block';
    }
}

async function runS3Sync() {
    const fSelect = document.getElementById('f-select');
    const syncBtn = document.getElementById('sync-trigger');
    const bar = document.getElementById('ui-bar');
    const status = document.getElementById('ui-status');
    const ui = document.getElementById('ui-progress');

    if (!fSelect.value) return alert("Select a school location.");
    
    const franchiseSlug = fSelect.selectedOptions[0].dataset.slug;
    let pathPrefix = "";

    // Specific logic for Student pathing
    if (currentMode === 'student') {
        const sId = document.getElementById('s-select').value;
        if (!sId) return alert("Please select a student.");
        const student = allStudentsRaw.find(s => String(s.id) === String(sId));
        const parent = allParentsRaw.find(p => String(p.id) === String(student.parent_id));
        const pFolder = parent ? `${parent.first_name}-${parent.last_name}`.replace(/\s+/g, '-').toLowerCase() : "unassigned";
        pathPrefix = `${franchiseSlug}/students/${pFolder}`;
    } else {
        pathPrefix = `${franchiseSlug}/${currentMode === 'eod' ? 'eod-reports' : 'receipts'}`;
    }

    const timestamp = new Date().getTime();
    const safeName = vaultFile.name.replace(/[^a-z0-9.]/gi, '_').toLowerCase();
    const fullS3Path = `${pathPrefix}/${timestamp}-${safeName}`;

    syncBtn.disabled = true;
    ui.style.display = 'block';
    
    try {
        status.innerText = "Authorizing...";
        bar.style.width = "30%";

        const handshake = await fetch(API_ENDPOINTS.handshake, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_path: fullS3Path, content_type: vaultFile.type })
        });
        const { upload_url } = await handshake.json();

        status.innerText = "Uploading to AWS...";
        bar.style.width = "70%";

        const s3Res = await fetch(upload_url, {
            method: 'PUT',
            headers: { 'Content-Type': vaultFile.type },
            body: vaultFile
        });

        if (s3Res.ok) {
            bar.style.width = "100%";
            status.innerText = "Success! Vault Updated.";
            setTimeout(resetVault, 2000);
        } else {
            throw new Error("AWS Upload Failed");
        }
    } catch (err) {
        status.innerText = "Error: " + err.message;
        syncBtn.disabled = false;
    }
}

function resetVault() {
    vaultFile = null;
    document.getElementById('input-cam').value = '';
    document.getElementById('capture-stage').style.display = 'block';
    document.getElementById('vault-preview-wrap').style.display = 'none';
    document.getElementById('ui-progress').style.display = 'none';
    document.getElementById('sync-trigger').disabled = false;
}
</script>
