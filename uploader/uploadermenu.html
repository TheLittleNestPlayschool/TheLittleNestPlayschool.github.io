<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NestMind Vault</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --nest-blue: #4a90e2; --nest-dark: #2d3748; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Compact Header */
        .header { background: linear-gradient(135deg, var(--nest-blue), #357abd); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header h2 { margin: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .school-info { font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.2); padding: 3px 10px; border-radius: 15px; }

        /* The 3 Choices (Compact Horizontal Row) */
        .menu-nav { background: white; display: flex; padding: 8px; gap: 8px; border-bottom: 1px solid #e2e8f0; }
        .nav-item { 
            flex: 1; text-align: center; padding: 8px 4px; border: 1px solid #edf2f7; 
            border-radius: 8px; cursor: pointer; transition: 0.2s; background: #f8fafc;
            text-decoration: none; color: var(--nest-dark);
        }
        .nav-item.active { background: var(--nest-blue); color: white; border-color: var(--nest-blue); }
        .nav-item span { display: block; font-size: 18px; margin-bottom: 2px; }
        .nav-item label { font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        /* Branch Selector (Thin Strip) */
        .branch-bar { background: #e2e8f0; padding: 5px 15px; display: flex; align-items: center; justify-content: space-between; }
        .branch-bar select { background: transparent; border: none; font-size: 12px; font-weight: 700; color: #4a5568; outline: none; width: 100%; }

        /* The Content Area (Where EOD loads) */
        #module-frame { flex-grow: 1; border: none; width: 100%; background: #f0f4f8; }
    </style>
</head>
<body>

<div class="header">
    <h2>NestMind Vault</h2>
    <div class="school-info" id="school-display">Select Branch</div>
</div>

<div class="branch-bar">
    <select id="f-select" onchange="saveSelection(this)">
        <option value="">Loading Schools...</option>
    </select>
</div>

<div class="menu-nav">
    <div class="nav-item" id="btn-student" onclick="loadModule('upload_student_pictures.html', this)">
        <span>👦</span><label>Students</label>
    </div>
    <div class="nav-item" id="btn-eod" onclick="loadModule('upload_eod.html', this)">
        <span>📝</span><label>EOD</label>
    </div>
    <div class="nav-item" id="btn-receipt" onclick="loadModule('upload_receipt.html', this)">
        <span>🧾</span><label>Receipts</label>
    </div>
</div>

<iframe id="module-frame" src="about:blank"></iframe>

<script>
    async function loadFranchises() {
        const drop = document.getElementById('f-select');
        try {
            const response = await fetch(NEST_ENDPOINTS.franchise.list);
            const data = await response.json();
            drop.innerHTML = '<option value="">Select School Location...</option>';
            data.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.dataset.slug = f.name ? f.name.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g, '') : 'unknown';
                opt.textContent = f.name || 'Unnamed Branch';
                drop.appendChild(opt);
            });
            const savedId = localStorage.getItem('nestmind_f_id');
            if (savedId) {
                drop.value = savedId;
                document.getElementById('school-display').innerText = localStorage.getItem('nestmind_f_name');
            }
        } catch (err) {
            console.error(err);
        }
    }

    function saveSelection(select) {
        const selected = select.selectedOptions[0];
        if (select.value && selected) {
            localStorage.setItem('nestmind_f_id', select.value);
            localStorage.setItem('nestmind_f_slug', selected.dataset.slug);
            localStorage.setItem('nestmind_f_name', selected.textContent);
            document.getElementById('school-display').innerText = selected.textContent;
            
            // Reload the iframe if a module is already open so it gets the new slug
            const frame = document.getElementById('module-frame');
            if(frame.src !== "about:blank") frame.contentWindow.location.reload();
        }
    }

    function loadModule(url, el) {
        // Update UI
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        
        // Load page into iframe
        document.getElementById('module-frame').src = url;
    }

    window.onload = loadFranchises;
</script>

</body>
</html>
