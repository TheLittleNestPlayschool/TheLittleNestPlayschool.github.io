<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NestMind Vault</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --nest-blue: #009dff; --nest-dark: #2d3748; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Compact Blue Header */
        .header { background: var(--nest-blue); color: white; padding: 12px; text-align: center; }
        .header h2 { margin: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        .header p { margin: 2px 0 0; font-size: 10px; opacity: 0.9; }

        /* The Selection Bar (Branch Dropdown) */
        .branch-bar { background: #fff; padding: 10px 15px; border-bottom: 1px solid #e2e8f0; }
        .branch-bar label { display: block; font-size: 9px; font-weight: 800; color: #a0aec0; text-transform: uppercase; margin-bottom: 4px; }
        .branch-bar select { width: 100%; border: 1px solid #cbd5e0; border-radius: 6px; padding: 8px; font-weight: 700; font-size: 14px; color: var(--nest-dark); outline: none; }

        /* Permanent Navigation (The 3 choices) */
        .menu-nav { background: white; display: flex; padding: 10px; gap: 10px; border-bottom: 1px solid #e2e8f0; }
        .nav-item { 
            flex: 1; text-align: center; padding: 10px 5px; border: 1px solid #edf2f7; 
            border-radius: 10px; cursor: pointer; transition: 0.2s; background: #f8fafc;
            color: var(--nest-dark); font-weight: 700;
        }
        .nav-item.active { background: #ebf8ff; border-color: var(--nest-blue); color: var(--nest-blue); }
        .nav-item span { display: block; font-size: 20px; margin-bottom: 4px; }
        .nav-item label { font-size: 10px; text-transform: uppercase; display: block; cursor: pointer; }

        /* The Content Area */
        #module-frame { flex-grow: 1; border: none; width: 100%; background: #f0f4f8; }
    </style>
</head>
<body>

<div class="header">
    <h2>NESTMIND VAULT</h2>
    <p>Select Location & Category</p>
</div>

<div class="branch-bar">
    <label>Current School Location</label>
    <select id="f-select" onchange="saveSelection(this)">
        <option value="">Loading Schools...</option>
    </select>
</div>

<div class="menu-nav">
    <div class="nav-item" onclick="loadModule('upload_student_pictures.html', this)">
        <span>👦</span><label>Students</label>
    </div>
    <div class="nav-item" onclick="loadModule('upload_eod.html', this)">
        <span>📝</span><label>End of Day</label>
    </div>
    <div class="nav-item" onclick="loadModule('upload_receipt.html', this)">
        <span>🧾</span><label>Receipts</label>
    </div>
</div>

<iframe id="module-frame" src="about:blank"></iframe>

<script>
    async function loadFranchises() {
        const drop = document.getElementById('f-select');
        try {
            const response = await fetch(NEST_ENDPOINTS.franchise.list);
            const data = await response.json();
            drop.innerHTML = '<option value="">Select Location...</option>';
            data.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.dataset.slug = f.name ? f.name.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g, '') : 'unknown';
                opt.textContent = f.name || 'Unnamed Branch';
                drop.appendChild(opt);
            });
            const savedId = localStorage.getItem('nestmind_f_id');
            if (savedId) drop.value = savedId;
        } catch (err) { console.error(err); }
    }

    function saveSelection(select) {
        const selected = select.selectedOptions[0];
        if (select.value && selected) {
            localStorage.setItem('nestmind_f_id', select.value);
            localStorage.setItem('nestmind_f_slug', selected.dataset.slug);
            localStorage.setItem('nestmind_f_name', selected.textContent);
            const frame = document.getElementById('module-frame');
            if(frame.src !== "about:blank") frame.contentWindow.location.reload();
        }
    }

    function loadModule(url, el) {
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('module-frame').src = url;
    }

    window.onload = loadFranchises;
</script>
</body>
</html>
