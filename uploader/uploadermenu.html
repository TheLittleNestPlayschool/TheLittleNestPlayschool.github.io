<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind Vault Menu</title>
    <style>
        :root {
            --primary-blue: #4a90e2;
            --deep-blue: #357abd;
            --text-main: #2d3748;
            --text-muted: #718096;
            --bg-light: #f8fafc;
            --border-color: #cbd5e0;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #edf2f7; 
            margin: 0; 
            padding: 20px 10px; 
            display: flex;
            justify-content: center;
        }
        
        .menu-container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .header {
            background: linear-gradient(135deg, var(--primary-blue), var(--deep-blue));
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .school-selection {
            padding: 20px 25px 0 25px;
        }

        .school-selection label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        #f-select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 16px;
            background-color: white;
        }

        .menu-list {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 20px;
            background: var(--bg-light);
            border: 2px solid var(--border-color);
            border-radius: 18px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .menu-item:active {
            transform: scale(0.98);
            background: #eef6ff;
            border-color: var(--primary-blue);
        }

        .icon-box {
            font-size: 32px;
            margin-right: 20px;
            background: white;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .text-box strong {
            display: block;
            font-size: 18px;
            margin-bottom: 2px;
        }

        .text-box span {
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="menu-container">
    <div class="header">
        <h2 style="margin:0; letter-spacing: 1px; text-transform: uppercase;">NestMind Vault</h2>
        <p style="margin:8px 0 0; font-size: 14px; opacity: 0.9;">Select Location & Category</p>
    </div>

    <div class="school-selection">
        <label>Current School Location</label>
        <select id="f-select" onchange="saveSelection(this)">
            <option value="">Loading Schools...</option>
        </select>
    </div>

    <div class="menu-list">
        <a href="upload_student_pictures.html" class="menu-item">
            <div class="icon-box">👦</div>
            <div class="text-box">
                <strong>Student Pictures</strong>
                <span>Photos & Progress Sheets</span>
            </div>
        </a>

        <a href="upload_eod.html" class="menu-item">
            <div class="icon-box">📝</div>
            <div class="text-box">
                <strong>End of Day</strong>
                <span>Daily Branch Reports</span>
            </div>
        </a>

        <a href="upload_receipt.html" class="menu-item">
            <div class="icon-box">🧾</div>
            <div class="text-box">
                <strong>Receipts</strong>
                <span>Expenses & Purchases</span>
            </div>
        </a>
    </div>
</div>

<script>
    const API_F = 'https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise';

    window.onload = async () => {
        try {
            const res = await fetch(API_F);
            const data = await res.json();
            const drop = document.getElementById('f-select');
            drop.innerHTML = '<option value="">Select Location...</option>';
            
            data.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.dataset.slug = f.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                opt.textContent = f.name;
                drop.appendChild(opt);
            });

            // Restore previous selection if it exists
            const savedId = localStorage.getItem('nestmind_f_id');
            if (savedId) drop.value = savedId;
        } catch (e) { console.error("Load error", e); }
    };

    function saveSelection(select) {
        const selected = select.selectedOptions[0];
        if (select.value) {
            localStorage.setItem('nestmind_f_id', select.value);
            localStorage.setItem('nestmind_f_slug', selected.dataset.slug);
            localStorage.setItem('nestmind_f_name', selected.textContent);
        } else {
            localStorage.removeItem('nestmind_f_id');
            localStorage.removeItem('nestmind_f_slug');
            localStorage.removeItem('nestmind_f_name');
        }
    }
</script>

</body>
</html>
