<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOD Module</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --nest-blue: #4a90e2; --success: #2ecc71; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: transparent; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .module-card { 
            width: 100%; 
            max-width: 400px; 
            background: #fff; 
            border-radius: 12px; 
            padding: 12px;
            box-sizing: border-box;
        }

        .camera-box { 
            padding: 25px 10px; 
            text-align: center; 
            border: 2px dashed #cbd5e0; 
            border-radius: 10px; 
            cursor: pointer; 
            background: #f8fafc;
        }

        #preview-wrap { display: none; text-align: center; }
        #preview-img { 
            width: 100%; 
            max-height: 280px; 
            object-fit: contain; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            background: #000; 
        }

        .btn { 
            width: 100%; 
            padding: 14px; 
            border-radius: 8px; 
            border: none; 
            font-weight: 800; 
            font-size: 14px; 
            cursor: pointer; 
            text-transform: uppercase; 
        }
        .btn-sync { background: var(--nest-blue); color: white; }
        .btn-success { background: var(--success); color: white; margin-top: 10px; display: none; }
        .btn-retake { background: #edf2f7; color: #718096; margin-top: 8px; }

        #status-msg { font-size: 13px; font-weight: 800; color: var(--nest-blue); margin-top: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="module-card">
    <div id="capture-stage">
        <div class="camera-box" onclick="document.getElementById('input-cam').click()">
            <span style="font-size: 35px">📸</span>
            <p style="font-weight: 700; margin: 5px 0 0; color: #2d3748;">Tap to Photo EOD</p>
            <input type="file" id="input-cam" hidden accept="image/*" capture="environment" onchange="showPreview(this)">
        </div>
    </div>

    <div id="preview-wrap">
        <img id="preview-img" src="">
        <button type="button" class="btn btn-sync" id="sync-btn" onclick="runSync()">Sync to Vault</button>
        
        <button type="button" class="btn btn-success" id="finish-btn" onclick="location.reload()">
            ✅ Sync Complete - Tap to Continue
        </button>

        <button type="button" id="retake-btn" class="btn btn-retake" onclick="location.reload()">Retake</button>
        <p id="status-msg"></p>
    </div>
</div>

<script>
    function getSlug() { return localStorage.getItem('nestmind_f_slug') || 'unknown'; }

    function showPreview(input) {
        if (input.files && input.files[0]) {
            document.getElementById('preview-img').src = URL.createObjectURL(input.files[0]);
            document.getElementById('capture-stage').style.display = 'none';
            document.getElementById('preview-wrap').style.display = 'block';
        }
    }

    async function runSync() {
        const status = document.getElementById('status-msg');
        const syncBtn = document.getElementById('sync-btn');
        const finishBtn = document.getElementById('finish-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const file = document.getElementById('input-cam').files[0];

        if (!file) return;

        try {
            syncBtn.style.display = 'none';
            retakeBtn.style.display = 'none';
            status.innerText = "SYNCING WITH CLOUD...";

            const ext = file.name.split('.').pop().toLowerCase();
            const fileName = `${getSlug()}/${Date.now()}-eod.${ext}`;

            const formData = new FormData();
            formData.append('file_resource', file);
            formData.append('file_name', fileName);

            const response = await fetch("https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/aws_proxy_upload", {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                status.style.color = "#2ecc71";
                status.innerText = "SUCCESSFULLY VAULTED";
                finishBtn.style.display = 'block';
            } else {
                throw new Error("SYNC FAILED");
            }
        } catch (err) {
            status.style.color = "red";
            status.innerText = "ERROR: " + err.message;
            syncBtn.style.display = 'block';
            retakeBtn.style.display = 'block';
        }
    }
</script>
</body>
</html>
