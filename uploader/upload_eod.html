<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TLNP NestLoad - Uploader</title>
    <link rel="stylesheet" href="../styleup.css">
    <script src="../api_config.js"></script>
    <style>
        .uploader-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .module-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
        }
        #preview-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 14px;
        }
        #preview-img {
            max-width: 100%;
            max-height: 220px;
            object-fit: contain;
            border-radius: 12px;
        }
        .camera-box-large {
            width: 100%;
            max-width: 280px;
            height: 140px;
            border: none;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: transparent;
            margin: 0 auto 14px auto;
        }
        .entry-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .form-group {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 12px;
        }
        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-black);
            text-align: center;
            width: 100%;
        }
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.15);
            background: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-align: center;
            outline: none;
        }
        .btn-add {
            display: block;
            margin: 16px auto 0 auto;
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: var(--light-pink-purple-gradient);
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<div id="app-container">
    <header class="main-header" id="main-header">
        <div class="stats-banner">
            <span class="banner-title">Little Nest Global Network</span>
            <span class="banner-stat"><span class="stat-highlight" id="global-hours-elem">50,000+</span> Learning Hours &amp; Counting!</span>
        </div>
        
        <div class="main-title">
            <span class="brand-title">THE LITTLE NEST PLAYSCHOOL</span>
            <span class="branch-location" id="branch-title-elem">Receipt Uploader</span>
        </div>

        <div id="student-info-banner">
            <span>Payment &amp; Receipt Logging</span>
        </div>
    </header>

    <div id="content-area">
        <div class="uploader-layout">
            <div class="module-box">
                
               <div id="upload-section">
                   <div class="camera-box-large" id="cam-box" onclick="document.getElementById('input-cam').click()">
                       <span style="font-size: 42px; margin-bottom: 6px;">📸</span>
                       <p style="font-weight: 800; margin: 0; font-size: 15px; color: var(--text-black); text-transform: uppercase;">Payment Receipt Picture</p>
                       <input type="file" id="input-cam" hidden accept="image/*" capture="environment" onchange="handleImageSelect(this)">
                   </div>
               </div>

               <div id="preview-container" style="display:none;">
                   <img id="preview-img" src="">
               </div>

               <div id="step-parent" class="entry-form" style="display:none;">
                   <div class="form-group">
                       <label>Select Parent</label>
                       <select id="parent-select" onchange="handleParentChange(this.value)">
                           <option value="">-- Select Parent --</option>
                       </select>
                   </div>
               </div>

               <div id="step-student" class="entry-form" style="display:none;">
                   <div class="form-group">
                       <label>Select Student</label>
                       <select id="student-select" disabled onchange="handleStudentChange(this.value)">
                           <option value="">-- Select Parent First --</option>
                       </select>
                   </div>
               </div>

               <div id="step-details" class="entry-form" style="display:none;">
                   <div class="form-group">
                       <label>Amount (PHP)</label>
                       <input type="number" id="amount-input" placeholder="0">
                   </div>
                   <div class="form-group">
                       <label>Payment Type</label>
                       <select id="payment-type-select" disabled>
                            <option value="">-- Loading --</option>
                       </select>
                   </div>
                   <div class="form-group">
                       <label>Received By</label>
                       <select id="teacher-select" disabled>
                            <option value="">-- Select --</option>
                       </select>
                   </div>
                   
                   <button class="btn-add" onclick="saveSingleRecord()">Save Payment Receipt</button>
               </div>

                <p id="status-msg" style="display:none; margin: 4px 0 0 0; text-align: center; font-weight: 600;"></p>
            </div>
        </div>
    </div>

    <div id="footer-buttons">
        <button onclick="navigateTo('uploadermenu.html')">Back</button>
    </div>
</div>

<script>
    let mediaUrl = "";
    
    const fId = localStorage.getItem('nestmind_f_id') || localStorage.getItem('franchise_id') || localStorage.getItem('locked_franchise_id');
    const fName = localStorage.getItem('nestmind_f_name') || localStorage.getItem('locked_franchise_name');
    const slug = fName ? fName.toLowerCase().replace(/\s+/g, '-') : 'general';

    if (fId) {
        localStorage.setItem('locked_franchise_id', fId);
        if (fName) localStorage.setItem('locked_franchise_name', fName);
    }

    window.onload = function() {
        if (fName) {
            document.getElementById('branch-title-elem').innerText = fName.toUpperCase() + " EOD UPLOADER";
        }
        
        // Load stored global learning hours counter if available
        const savedHours = localStorage.getItem('global_learning_hours');
        if (savedHours) {
            const hoursElem = document.getElementById('global-hours-elem');
            if (hoursElem) {
                hoursElem.innerText = savedHours;
            }
        }
    }

    function navigateTo(page) {
        window.location.href = page + window.location.search;
    }

    async function handleImageSelect(input) {
        if (input.files && input.files[0]) {
            const preview = document.getElementById('preview-img');
            preview.src = URL.createObjectURL(input.files[0]);
            document.getElementById('preview-container').style.display = 'flex';
            document.getElementById('upload-section').style.display = 'none';

            await uploadAndInitialize(input.files[0]);
        }
    }

    async function uploadAndInitialize(fileObj) {
        if (!fId) return alert("Session expired. Please re-login.");
        const status = document.getElementById('status-msg');
        status.style.display = 'block';
        status.innerText = "☁️ Uploading Photo...";
        const formData = new FormData();
        formData.append('file_resource', fileObj);
        formData.append('file_name', `${slug}/eod_${Date.now()}.jpg`);
        formData.append('franchise_id', fId);

        try {
            const upResp = await fetch("https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/aws_proxy_upload", { method: 'POST', body: formData });
            const result = await upResp.json();
            
            mediaUrl = result.ObjectURL || result.access_url || result.url || "";

            if (!mediaUrl) {
                console.error("Could not capture image path string:", result);
                return alert("Image uploaded, but path lookup string failed.");
            }

            await Promise.all([fetchParents(), fetchPaymentTypes()]);
            
            document.getElementById('step-parent').style.display = 'flex';
            status.style.display = 'none';
        } catch (e) { 
            console.error("Upload proxy sequence crashed", e);
            status.style.display = 'block';
            status.innerText = "UPLOAD FAILED."; 
        }
    }

    async function fetchPaymentTypes() {
        const typeSel = document.getElementById('payment-type-select');
        try {
            const resp = await fetch("https://x8ki-letl-twmt.n7.xano.io/api:Hw8UZ2CW/payment_type");
            const data = await resp.json();
            typeSel.innerHTML = '<option value="">-- Select Type --</option>';
            
            if (Array.isArray(data)) {
                data.forEach(t => {
                    const valueText = t.payment_type;
                    if (valueText) {
                        typeSel.innerHTML += `<option value="${valueText}">${valueText}</option>`;
                    }
                });
            }
            typeSel.disabled = false;
        } catch (e) { 
            console.error("Payment type configurations missing", e);
            typeSel.innerHTML = '<option value="">-- Error Loading Types --</option>';
        }
    }

    async function fetchParents() {
        const pSel = document.getElementById('parent-select');
        try {
            const resp = await fetch(`https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/uploader_parent?franchise_id=${fId}`);
            const data = await resp.json();
            pSel.innerHTML = '<option value="">-- Select Parent --</option>';
            data.forEach(p => {
                pSel.innerHTML += `<option value="${p.id}">${p.first_name} ${p.last_name}</option>`;
            });
        } catch (e) { console.error("Parent lookup failed", e); }
    }

    async function handleParentChange(pId) {
        const sSel = document.getElementById('student-select');
        const stepStudent = document.getElementById('step-student');
        const stepDetails = document.getElementById('step-details');
        
        stepStudent.style.display = 'none';
        stepDetails.style.display = 'none';
        sSel.innerHTML = '<option value="">-- Select Student --</option>';
        sSel.disabled = true;

        if (!pId) return;

        try {
            sSel.innerHTML = '<option>Loading Students...</option>';
            const resp = await fetch(`https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/uploader_student?parent_id=${pId}&franchise_id=${fId}`);
            const data = await resp.json();
            sSel.innerHTML = '<option value="">-- Select Student --</option>';
            data.forEach(s => {
                sSel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });
            sSel.disabled = false;
            stepStudent.style.display = 'flex';
        } catch (e) { console.error("Student fetch error"); }
    }

    async function handleStudentChange(sId) {
        const tSel = document.getElementById('teacher-select');
        const stepDetails = document.getElementById('step-details');

        if (!sId) {
            stepDetails.style.display = 'none';
            return;
        }

        try {
            tSel.innerHTML = '<option>Loading Teachers...</option>';
            const resp = await fetch(`https://x8ki-letl-twmt.n7.xano.io/api:xLIeVP2e/uploader_teacher?franchise_id=${fId}`);
            const data = await resp.json();
            
            tSel.innerHTML = '<option value="">-- Select Teacher --</option>';
            data.forEach(t => {
                const fullName = `${t.first_name} ${t.last_name}`;
                tSel.innerHTML += `<option value="${fullName}">${fullName}</option>`;
            });
            tSel.disabled = false;
            stepDetails.style.display = 'flex';
        } catch (e) { console.error("Teacher fetch issue"); }
    }

    async function saveSingleRecord() {
        const pSel = document.getElementById('parent-select');
        const sSel = document.getElementById('student-select');
        const typeSel = document.getElementById('payment-type-select');
        const tSel = document.getElementById('teacher-select');
        const amtInput = document.getElementById('amount-input');
        
        if (!pSel.value || !sSel.value || !amtInput.value || !typeSel.value || !tSel.value) {
            return alert("Complete all fields.");
        }

        const singleRecord = [{
            parent_id: parseInt(pSel.value),
            student_id: parseInt(sSel.value),
            student_name: sSel.options[sSel.selectedIndex].text,
            paymenttype: typeSel.value, 
            amount: parseInt(amtInput.value), 
            received_by: tSel.value,
            paid_by: typeSel.value,
            processed: false
        }];

        const status = document.getElementById('status-msg');
        status.style.display = 'block';
        status.innerText = "🚀 Saving Receipt...";

        try {
            const resp = await fetch("https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/process_eod", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    media_url: mediaUrl, 
                    eod_date: new Date().toISOString().split('T')[0],
                    franchise_id: parseInt(fId),
                    record_list: singleRecord
                })
            });
            if (resp.ok) {
                status.innerText = "✅ Receipt has been uploaded";
                setTimeout(() => location.reload(), 2000);
            } else {
                status.innerText = "❌ SAVE FAILED.";
            }
        } catch (err) {
            status.innerText = "❌ SERVER ERROR.";
        }
    }
</script>
</body>
</html>
