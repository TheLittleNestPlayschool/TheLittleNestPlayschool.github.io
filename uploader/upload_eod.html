<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upload EOD - The Little Nest Playschool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app-container">
    <!-- Header -->
    <header class="main-header">
        <div class="stats-banner">
            <span class="banner-title">Active Network:</span>
            <span class="banner-stat"><span class="stat-highlight">20+</span> Branches</span>
        </div>
        <div class="main-title">
            <span class="brand-title">The Little Nest Playschool</span>
            <span class="branch-location" id="header-branch-name">Branch Portal</span>
        </div>
        <div id="student-info-banner">EOD Report Upload</div>
    </header>

    <!-- Content Area -->
    <main id="content-area">
        <div class="module-box">
            <h3>End of Day Report Upload</h3>
            <p style="margin-bottom: 16px;">Please upload your daily sales receipt or operational summary along with the daily metrics below.</p>
            
            <form id="eodForm" class="entry-form">
                <!-- Image Capture / Upload Section -->
                <div class="form-group">
                    <label>EOD Receipt / Document</label>
                    <div id="preview-container" style="display: none;">
                        <img id="preview-img" src="" alt="Receipt Preview">
                        <button type="button" id="remove-img-btn" style="margin-top: 8px; font-size: 0.8rem; padding: 4px 10px; border-radius: 8px; border: none; background: rgba(0,0,0,0.1); cursor: pointer;">Remove / Retake</button>
                    </div>
                    
                    <div class="camera-box-large" id="upload-trigger-box">
                        <span style="font-size: 2rem; margin-bottom: 8px;">📷</span>
                        <span style="font-weight: 600; font-size: 0.95rem;">Tap to Capture or Upload Receipt</span>
                        <span style="font-size: 0.8rem; opacity: 0.7; margin-top: 4px;">Supports camera snap or photo library</span>
                        <input type="file" id="eod-file-input" accept="image/*" capture="environment" style="display: none;">
                    </div>
                </div>

                <!-- Metrics Entry Fields -->
                <div class="form-group" style="margin-top: 16px;">
                    <label for="collection-amount">Total Collection Amount (PHP)</label>
                    <input type="number" id="collection-amount" placeholder="0.00" step="0.01" required class="login-input" style="background: rgba(255, 255, 255, 0.6);">
                </div>

                <div class="form-group">
                    <label for="enrolled-count">New Enrollments Today</label>
                    <input type="number" id="enrolled-count" placeholder="0" required class="login-input" style="background: rgba(255, 255, 255, 0.6);">
                </div>

                <div class="form-group">
                    <label for="attendance-count">Total Student Attendance</label>
                    <input type="number" id="attendance-count" placeholder="0" required class="login-input" style="background: rgba(255, 255, 255, 0.6);">
                </div>

                <div class="form-group">
                    <label for="eod-notes">Operational Notes / Remarks</label>
                    <textarea id="eod-notes" placeholder="Enter any notes for today..." class="login-input" style="background: rgba(255, 255, 255, 0.6); height: 80px; resize: none;"></textarea>
                </div>

                <button type="submit" class="btn-add" style="width: 100%; margin-top: 16px;">Submit EOD Report</button>
            </form>
        </div>
    </main>

    <!-- Sidebar Gauges (Right) -->
    <aside class="sidebar-right">
        <div class="gauge-column">
            <div class="gauge-wrapper">
                <div class="gauge-circle green" style="--progress: 100%;"></div>
                <span class="gauge-label">Sync Status</span>
            </div>
        </div>
    </aside>

    <!-- Footer Navigation -->
    <nav id="footer-buttons">
        <button onclick="window.location.href='dashboard.html'">Dashboard</button>
        <button onclick="window.location.href='reports.html'">Reports</button>
        <button onclick="window.location.href='settings.html'">Settings</button>
    </nav>
</div>

<script>
    // Handle File Upload Preview Trigger
    const uploadBox = document.getElementById('upload-trigger-box');
    const fileInput = document.getElementById('eod-file-input');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('preview-img');
    const removeImgBtn = document.getElementById('remove-img-btn');

    uploadBox.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                previewImg.src = evt.target.result;
                previewContainer.style.display = 'flex';
                uploadBox.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    });

    removeImgBtn.addEventListener('click', () => {
        fileInput.value = '';
        previewImg.src = '';
        previewContainer.style.display = 'none';
        uploadBox.style.display = 'flex';
    });

    // Form submission handler logic
    document.getElementById('eodForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const collection = document.getElementById('collection-amount').value;
        const enrollments = document.getElementById('enrolled-count').value;
        const attendance = document.getElementById('attendance-count').value;
        const notes = document.getElementById('eod-notes').value;
        
        if (!fileInput.files[0]) {
            alert('Please capture or attach the EOD receipt document before submitting.');
            return;
        }

        // Proceed with processing submission payload
        console.log('Submitting EOD Report:', { collection, enrollments, attendance, notes });
        alert('EOD Report submitted successfully!');
        window.location.href = 'dashboard.html';
    });
</script>

</body>
</html>
