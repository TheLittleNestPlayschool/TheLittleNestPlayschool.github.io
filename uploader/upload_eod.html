<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOD Vault</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --nest-blue: #4a90e2; --nest-dark: #2d3748; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        .vault-container { 
            width: 100%; max-width: 400px; background: #fff; 
            border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            position: relative; min-height: 320px; 
        }
        
        .header { 
            background: linear-gradient(135deg, var(--nest-blue), #357abd); 
            color: white; padding: 15px; text-align: center; 
        }
        .header h2 { margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        
        .school-badge { 
            background: rgba(255, 255, 255, 0.2); padding: 4px 12px; 
            border-radius: 20px; font-size: 12px; font-weight: 700; 
            display: inline-block; margin-top: 5px; 
        }

        .content-area { padding: 15px; }

        .camera-box { 
            padding: 25px 10px; text-align: center; border: 2px dashed #cbd5e0; 
            border-radius: 10px; cursor: pointer; background: #f8fafc;
        }
        .camera-box:active { background: #edf2f7; }

        #preview-wrap { display: none; text-align: center; }
        #preview-img { width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; background: #000; }

        .btn { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            font-weight: 800; font-size: 14px; cursor: pointer; 
            text-transform: uppercase; margin-bottom: 8px;
        }
        .btn-sync { background: var(--nest-blue); color: white; }
        .btn-back { background: #edf2f7; color: #718096; font-size: 12px; }

        #success-screen { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 100; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; text-align: center; 
        }
        #status-msg { font-size: 13px; font-weight: 700; color: var(--nest-blue); margin-top: 10px; }
    </style>
</head>
<body>

<div class="vault-container">
    <div id="success-screen">
        <span style="font-size: 40px;">✅</span>
        <h3 style="color: var(--success); margin: 10px 0;">Synced!</h3>
        <p style="font-size: 13px; color: #718096; margin-bottom: 20px;">EOD report saved to vault.</p>
        <button type="button" class="btn btn-sync" style="background:var(--success)" onclick="window.location.href='uploader_menu.html'">Back to Menu</button>
    </div>

    <div class="header">
        <h2>EOD Vault</h2>
        <div class="school-badge" id="school-display">Loading...</div>
    </div>

    <div class="content-area">
        <div id="capture-stage">
            <div class="camera-box" onclick="document.getElementById('input-cam').click()">
                <span style="font-size: 30px">📸</span>
                <p style="font-weight: 700; margin: 5px 0 0; color: var(--nest-dark);">Tap to Capture Report</p>
                <input type="file" id="input-cam" hidden accept="image/*" capture="environment" onchange="showPreview(this)">
            </div>
            <button type="button" onclick="window.location.href='uploader_menu.html'" class="btn btn-back" style="margin-top:15px;">← Cancel</button>
        </div>

        <div id="preview-wrap">
            <img id="preview-img" src="">
            <button type="button" class="btn btn-sync" id="sync-btn" onclick="runSync()">Upload Report</button>
            <button type="button" class="btn btn-back" onclick="location.reload()">Retake</button>
            <p id="status-msg"></p>
        </div>
    </div>
</div>

<script>
    const currentFSlug = localStorage.getItem('nestmind_f_slug') || 'unknown';
    const currentFName = localStorage.getItem('nestmind_f_name') || 'Branch';

    window.onload = () => {
        document.getElementById('school-display').innerText = currentFName;
    };

    function showPreview(input) {
        if (input.files && input.files[0]) {
            document.getElementById('preview-img').src = URL.createObjectURL(input.files[0]);
            document.getElementById('capture-stage').style.display = 'none';
            document.getElementById('preview-wrap').style.display = 'block';
        }
    }

    async function runSync() {
        const status = document.getElementById('status-msg');
        const syncBtn = document.getElementById('sync-btn');
        const file = document.getElementById('input-cam').files[0];

        if (!file) return;

        try {
            syncBtn.disabled = true;
            status.innerText = "Syncing...";

            const ext = file.name.split('.').pop().toLowerCase();
            const fileName = `${currentFSlug}/${Date.now()}-eod.${ext}`;

            const formData = new FormData();
            formData.append('file_resource', file);
            formData.append('file_name', fileName);

            const response = await fetch("https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/aws_proxy_upload", {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                document.getElementById('success-screen').style.display = 'flex';
            } else {
                throw new Error("Sync Failed");
            }
        } catch (err) {
            status.innerText = err.message;
            syncBtn.disabled = false;
        }
    }
</script>
</body>
</html>
