<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>End of Day Vault</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --primary-blue: #4a90e2; --deep-blue: #357abd; --success-green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: #edf2f7; margin: 0; padding: 10px; }
        .vault-container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; min-height: 450px; }
        .header { background: linear-gradient(135deg, var(--primary-blue), var(--deep-blue)); color: white; padding: 25px; text-align: center; }
        .school-badge { background: rgba(255, 255, 255, 0.2); padding: 6px 18px; border-radius: 50px; font-size: 14px; font-weight: 700; display: inline-block; margin-top: 10px; border: 1px solid rgba(255, 255, 255, 0.3); }
        .camera-box { padding: 40px 20px; text-align: center; border: 3px dashed #cbd5e0; margin: 20px; border-radius: 15px; cursor: pointer; }
        #preview-wrap { display: none; padding: 20px; text-align: center; }
        #preview-img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; text-decoration: none; display: block; box-sizing: border-box; text-align: center; }
        .btn-sync { background: var(--primary-blue); color: white; margin-bottom: 10px; }
        .btn-menu { background: var(--success-green); color: white; margin-top: 20px; }
        .btn-back { background: #eee; color: #666; margin-top: 10px; font-weight: 800; }
        #status-msg { font-weight: 700; color: var(--primary-blue); margin-top: 15px; text-align: center; }
        #success-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="vault-container">
    <div id="success-screen">
        <span style="font-size: 60px;">✅</span>
        <h2 style="color: var(--success-green); margin: 20px 0 10px;">File Successfully Uploaded</h2>
        <p style="color: #666; margin-bottom: 30px;">Your EOD report has been safely synced.</p>
        <a href="uploader_menu.html" class="btn btn-menu">Back to Menu</a>
    </div>

    <div class="header">
        <h2 style="margin:0; text-transform: uppercase;">EOD Report Vault</h2>
        <div class="school-badge" id="school-display">Loading...</div>
    </div>

    <div id="capture-stage">
        <div class="camera-box" onclick="document.getElementById('input-cam').click()">
            <span style="font-size: 40px">📝</span>
            <p style="font-weight: 700; margin: 10px 0 0">Capture EOD Report</p>
            <input type="file" id="input-cam" hidden accept="image/*" capture="environment" onchange="showPreview(this)">
        </div>
        <div style="text-align: center; padding: 0 20px 20px;">
            <a href="uploader_menu.html" class="btn btn-back">← Back to Menu</a>
        </div>
    </div>

    <div id="preview-wrap">
        <img id="preview-img" src="">
        <button class="btn btn-sync" id="sync-btn" onclick="runSync()">Sync EOD to Vault</button>
        <button class="btn btn-back" onclick="location.reload()">Retake Photo</button>
        <p id="status-msg"></p>
    </div>
</div>

<script>
    // MATCHING YOUR MENU'S LOCALSTORAGE KEYS
    const currentFSlug = localStorage.getItem('nestmind_f_slug') || 'unknown';
    const currentFName = localStorage.getItem('nestmind_f_name') || 'Select Branch';

    window.onload = () => {
        document.getElementById('school-display').innerText = currentFName;
    };

    function showPreview(input) {
        if (input.files && input.files[0]) {
            selectedFile = input.files[0];
            document.getElementById('preview-img').src = URL.createObjectURL(selectedFile);
            document.getElementById('capture-stage').style.display = 'none';
            document.getElementById('preview-wrap').style.display = 'block';
        }
    }

    async function runSync() {
        const status = document.getElementById('status-msg');
        const syncBtn = document.getElementById('sync-btn');
        const fileInput = document.getElementById('input-cam');
        const file = fileInput.files[0];

        if (!file) {
            status.innerText = "Error: No file selected.";
            return;
        }

        try {
            syncBtn.disabled = true;
            status.innerText = "Syncing with Vault...";

            const ext = file.name.split('.').pop().toLowerCase();
            // Path: sariaya/123456789-eod.png
            const fileName = `${currentFSlug}/${Date.now()}-eod.${ext}`;

            const formData = new FormData();
            formData.append('file_resource', file);
            formData.append('file_name', fileName);

            const response = await fetch("https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/aws_proxy_upload", {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                document.getElementById('success-screen').style.display = 'flex';
            } else {
                const errData = await response.json();
                throw new Error(errData.message || "Upload Failed");
            }
        } catch (err) {
            status.innerText = "Error: " + err.message;
            syncBtn.disabled = false;
        }
    }
</script>
</body>
</html>
