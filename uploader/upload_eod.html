<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestMind EOD Batch Uploader</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --nest-blue: #4a90e2; --success: #2ecc71; --danger: #e74c3c; --bg-soft: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: transparent; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .module-card { width: 100%; max-width: 450px; background: #fff; border-radius: 12px; padding: 20px; box-sizing: border-box; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .camera-box { padding: 40px 20px; text-align: center; border: 2px dashed #cbd5e0; border-radius: 10px; cursor: pointer; background: var(--bg-soft); }
        #preview-img { width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; background: #000; display: none; }
        .entry-form { display: none; border-top: 2px solid #edf2f7; padding-top: 20px; margin-top: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #4a5568; text-transform: uppercase; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; background: white; }
        select:disabled { background: #f1f5f9; cursor: not-allowed; color: #94a3b8; }
        .basket-wrap { margin-top: 20px; background: var(--bg-soft); border-radius: 8px; padding: 10px; border: 1px solid var(--border); }
        .basket-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .basket-table th { text-align: left; color: #718096; padding: 8px; border-bottom: 2px solid var(--border); font-size: 10px; }
        .basket-table td { padding: 10px 8px; border-bottom: 1px solid #edf2f7; }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-upload { background: var(--nest-blue); color: white; margin-bottom: 10px; }
        .btn-add { background: white; color: var(--nest-blue); border: 2px solid var(--nest-blue); margin-top: 10px; }
        .btn-sync { background: var(--success); color: white; display: none; margin-top: 25px; }
        .btn-del { color: var(--danger); font-size: 18px; cursor: pointer; text-align: center; width: 30px; font-weight: bold; }
        #status-msg { font-size: 11px; font-weight: 800; color: var(--nest-blue); text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="module-card">
    <div id="upload-section">
        <div class="camera-box" id="cam-box" onclick="document.getElementById('input-cam').click()">
            <span style="font-size: 40px">📸</span>
            <p style="font-weight: 800; margin: 10px 0 0; font-size: 14px;">SNAP EOD REPORT</p>
            <input type="file" id="input-cam" hidden accept="image/*" capture="environment" onchange="handleImageSelect(this)">
        </div>
        <img id="preview-img" src="">
        <button class="btn btn-upload" id="upload-btn" style="display:none;" onclick="uploadAndInitialize()">Upload & Continue</button>
    </div>

    <div id="entry-section" class="entry-form">
        <div class="form-group">
            <label>1. Select Parent</label>
            <select id="parent-select" onchange="handleParentChange(this.value)">
                <option value="">-- Select Parent --</option>
            </select>
        </div>
        <div class="form-group">
            <label>2. Select Student</label>
            <select id="student-select" disabled onchange="handleStudentChange(this.value)">
                <option value="">-- Select Parent First --</option>
            </select>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-group">
                <label>Amount (PHP)</label>
                <input type="number" id="amount-input" placeholder="0">
            </div>
            <div class="form-group">
                <label>Received By</label>
                <select id="teacher-select" disabled>
                    <option value="">-- Select Student First --</option>
                </select>
            </div>
        </div>
        <button class="btn btn-add" onclick="addEntryToBasket()">+ Add to List</button>
        <div class="basket-wrap" id="basket-wrap" style="display:none;">
            <table class="basket-table">
                <thead><tr><th>Student</th><th>Amount</th><th></th></tr></thead>
                <tbody id="basket-body"></tbody>
            </table>
        </div>
        <button class="btn btn-sync" id="sync-btn" onclick="syncBatchToXano()">Final Sync</button>
    </div>
    <p id="status-msg"></p>
</div>

<script>
    let mediaUrl = "";
    let basket = [];
    
    // ATIMONAN IDENTITY ENFORCEMENT
    localStorage.setItem('locked_franchise_id', '24');
    localStorage.setItem('locked_franchise_name', 'Atimonan');
    localStorage.setItem('nestmind_f_id', '24');
    localStorage.setItem('nestmind_f_name', 'Atimonan');
    localStorage.setItem('nestmind_f_slug', 'atimonan');

    const fId = 24; 
    const slug = "atimonan";

    function handleImageSelect(input) {
        if (input.files && input.files[0]) {
            const preview = document.getElementById('preview-img');
            preview.src = URL.createObjectURL(input.files[0]);
            preview.style.display = 'block';
            document.getElementById('cam-box').style.display = 'none';
            document.getElementById('upload-btn').style.display = 'block';
        }
    }

    async function uploadAndInitialize() {
        const status = document.getElementById('status-msg');
        status.innerText = "☁️ SAVING PHOTO...";
        const formData = new FormData();
        formData.append('file_resource', document.getElementById('input-cam').files[0]);
        formData.append('file_name', `${slug}/eod_${Date.now()}.jpg`);
        formData.append('franchise_id', fId);

        try {
            const upResp = await fetch("https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/aws_proxy_upload", { method: 'POST', body: formData });
            const result = await upResp.json();
            mediaUrl = result.access_url || result.url || result.x1?.access_url;

            // WATERFALL START: ONLY load parents. No students, No teachers yet.
            await fetchParents();
            
            document.getElementById('upload-btn').style.display = 'none';
            document.getElementById('entry-section').style.display = 'block';
            status.innerText = "PHOTO SAVED. SELECT PARENT.";
        } catch (e) { status.innerText = "UPLOAD FAILED."; }
    }

    async function fetchParents() {
        const pSel = document.getElementById('parent-select');
        try {
            const resp = await fetch(`https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/parent?field_name=franchise_id&field_value=${fId}`);
            const parents = await resp.json();
            pSel.innerHTML = '<option value="">-- Select Parent --</option>';
            parents.forEach(p => {
                pSel.innerHTML += `<option value="${p.id}">${p.first_name} ${p.last_name}</option>`;
            });
        } catch (e) { console.error("Parent lookup failed"); }
    }

    async function handleParentChange(pId) {
        const sSel = document.getElementById('student-select');
        const tSel = document.getElementById('teacher-select');
        
        // Reset and lock downstream fields
        sSel.innerHTML = '<option value="">-- Select Parent First --</option>';
        sSel.disabled = true;
        tSel.innerHTML = '<option value="">-- Select Student First --</option>';
        tSel.disabled = true;

        if (!pId) return;

        // WATERFALL STEP 2: Load students for the chosen parent
        try {
            sSel.innerHTML = '<option>Loading Students...</option>';
            const resp = await fetch(`https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student?field_name=parent_id&field_value=${pId}`);
            const data = await resp.json();
            
            sSel.innerHTML = '<option value="">-- Select Student --</option>';
            data.forEach(s => {
                sSel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });
            sSel.disabled = false;
        } catch (e) { console.error("Student fetch error"); }
    }

    async function handleStudentChange(sId) {
        const tSel = document.getElementById('teacher-select');
        
        if (!sId) {
            tSel.innerHTML = '<option value="">-- Select Student First --</option>';
            tSel.disabled = true;
            return;
        }

        // WATERFALL STEP 3: Load teachers now that identity is established
        try {
            tSel.innerHTML = '<option>Loading Teachers...</option>';
            const resp = await fetch(`https://x8ki-letl-twmt.n7.xano.io/api:xLIeVP2e/teacher?field_name=franchise_id&field_value=${fId}`);
            const data = await resp.json();
            
            tSel.innerHTML = '<option value="">-- Select Teacher --</option>';
            data.forEach(t => {
                const fullName = `${t.first_name} ${t.last_name}`;
                tSel.innerHTML += `<option value="${fullName}">${fullName}</option>`;
            });
            tSel.disabled = false;
        } catch (e) { console.error("Teacher fetch issue"); }
    }

    function addEntryToBasket() {
        const pSel = document.getElementById('parent-select');
        const sSel = document.getElementById('student-select');
        const tSel = document.getElementById('teacher-select');
        const amtInput = document.getElementById('amount-input');
        
        if (!pSel.value || !sSel.value || !amtInput.value || !tSel.value) return alert("Complete all fields.");

        basket.push({
            parent_id: parseInt(pSel.value),
            student_id: parseInt(sSel.value),
            student_name: sSel.options[sSel.selectedIndex].text,
            amount: parseInt(amtInput.value),
            received_by: tSel.value,
            paid_by: pSel.options[pSel.selectedIndex].text,
            processed: false
        });
        
        renderBasket();
        
        // Reset for next entry
        sSel.value = '';
        tSel.value = '';
        tSel.disabled = true;
        amtInput.value = '';
    }

    function renderBasket() {
        const body = document.getElementById('basket-body');
        body.innerHTML = '';
        basket.forEach((item, i) => {
            body.innerHTML += `<tr><td>${item.student_name}</td><td>₱${item.amount.toLocaleString()}</td><td class="btn-del" onclick="basket.splice(${i},1);renderBasket()">✕</td></tr>`;
        });
        document.getElementById('basket-wrap').style.display = basket.length ? 'block' : 'none';
        document.getElementById('sync-btn').style.display = basket.length ? 'block' : 'none';
    }

    async function syncBatchToXano() {
        const status = document.getElementById('status-msg');
        status.innerText = "🚀 SYNCING...";
        const resp = await fetch("https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/process_eod", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                media_url: mediaUrl,
                eod_date: new Date().toISOString().split('T')[0],
                franchise_id: fId,
                record_list: basket
            })
        });
        if (resp.ok) {
            status.innerText = "✅ DONE!";
            setTimeout(() => location.reload(), 2000);
        }
    }
</script>
</body>
</html>
