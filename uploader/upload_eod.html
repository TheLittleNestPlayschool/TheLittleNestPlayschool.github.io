<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>End of Day Vault</title>
    
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: var(--nest-bg); margin: 0; padding: 10px; }
        .vault-container { max-width: 600px; margin: 0 auto; }
        
        .header {
            background: linear-gradient(135deg, var(--nest-teal), var(--nest-teal-dark));
            color: var(--nest-dark);
            padding: 30px 20px;
            text-align: center;
            border-radius: var(--nest-radius-lg) var(--nest-radius-lg) 0 0;
        }

        .school-badge {
            background: rgba(0, 0, 0, 0.1);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 800;
            display: inline-block;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .camera-box {
            padding: 60px 20px;
            text-align: center;
            border: 3px dashed var(--nest-border);
            margin: 20px;
            border-radius: var(--nest-radius-lg);
            cursor: pointer;
            background: white;
        }

        #preview-wrap { display: none; padding: 20px; text-align: center; }
        #preview-img { width: 100%; border-radius: var(--nest-radius-lg); margin-bottom: 20px; box-shadow: var(--nest-shadow); }
        
        .status-area { font-weight: 700; padding: 15px; text-align: center; min-height: 50px; }
    </style>
</head>
<body>

<div class="vault-container nest-card" style="padding:0;">
    <div class="header">
        <h2 class="nest-header" style="margin:0">EOD Report Vault</h2>
        <div class="school-badge" id="school-display">Loading...</div>
    </div>

    <div id="capture-stage">
        <div class="camera-box" onclick="document.getElementById('input-cam').click()">
            <span style="font-size: 50px">📝</span>
            <p class="nest-text-main" style="font-weight: 800; margin: 15px 0 0">CAPTURE DAILY REPORT</p>
            <input type="file" id="input-cam" hidden accept="image/*" capture="environment" onchange="showPreview(this)">
        </div>
        <div style="text-align: center; padding-bottom: 30px;">
            <a href="uploader_menu.html" class="nest-btn nest-btn-outline">← Back to Menu</a>
        </div>
    </div>

    <div id="preview-wrap">
        <img id="preview-img" src="">
        <button class="nest-btn nest-btn-teal" id="sync-btn" style="width:100%" onclick="runSync()">Sync EOD to Vault</button>
        <button class="nest-btn nest-btn-outline" style="width:100%; margin-top:10px;" onclick="resetPage()">Retake Photo</button>
        <div id="status-msg" class="status-area nest-text-muted"></div>
    </div>
</div>

<script>
    // Pull local vars from Menu selection
    const currentFId = localStorage.getItem('nestmind_f_id');
    const currentFSlug = localStorage.getItem('nestmind_f_slug');
    const currentFName = localStorage.getItem('nestmind_f_name');

    let selectedFile = null;

    window.onload = () => {
        if (!currentFId) {
            alert("Please select a school on the menu first.");
            location.href = 'uploader_menu.html';
            return;
        }
        document.getElementById('school-display').innerText = currentFName;
    };

    function showPreview(input) {
        if (input.files && input.files[0]) {
            selectedFile = input.files[0];
            document.getElementById('preview-img').src = URL.createObjectURL(selectedFile);
            document.getElementById('capture-stage').style.display = 'none';
            document.getElementById('preview-wrap').style.display = 'block';
        }
    }

    async function runSync() {
        const status = document.getElementById('status-msg');
        const syncBtn = document.getElementById('sync-btn');
        
        // FOLDER LOGIC: We put the slug in the file_name to create the virtual folder
        const timestamp = new Date().getTime();
        const fileNameWithFolder = `${currentFSlug}/${timestamp}-eod.jpg`;
        
        try {
            syncBtn.disabled = true;
            status.innerText = "Requesting Signed URL...";

            // 1. Get Signed URL from your specific Xano function
            // Note: Update this endpoint if it's different in your api_config.js
            const handshake = await fetch("https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/aws_signer_eod", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file_name: fileNameWithFolder })
            });
            
            const responseData = await handshake.json();
            const uploadUrl = responseData.form_name; // Based on your Xano 'Return As' variable

            status.innerText = "Uploading to S3 Bucket...";

            // 2. Perform the PUT request directly to S3
            const s3Res = await fetch(uploadUrl, {
                method: 'PUT',
                headers: { 'Content-Type': selectedFile.type },
                body: selectedFile
            });

            if (s3Res.ok) {
                status.style.color = "var(--nest-success)";
                status.innerText = "SUCCESS: Vault Updated!";
                setTimeout(() => { location.href = 'uploader_menu.html'; }, 2000);
            } else {
                throw new Error("S3 Upload Failed");
            }
        } catch (err) {
            status.style.color = "var(--nest-danger)";
            status.innerText = "SYNC ERROR: " + err.message;
            syncBtn.disabled = false;
        }
    }

    function resetPage() {
        selectedFile = null;
        document.getElementById('capture-stage').style.display = 'block';
        document.getElementById('preview-wrap').style.display = 'none';
        document.getElementById('status-msg').innerText = "";
    }
</script>

</body>
</html>
