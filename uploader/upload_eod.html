<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOD Module</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --nest-blue: #4a90e2; --success: #2ecc71; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: transparent; 
            margin: 0; padding: 5px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .module-card { 
            width: 100%; max-width: 400px; background: #fff; 
            border-radius: 12px; padding: 10px; box-sizing: border-box;
        }
        .camera-box { 
            padding: 20px 10px; text-align: center; border: 2px dashed #cbd5e0; 
            border-radius: 10px; cursor: pointer; background: #f8fafc;
        }
        #preview-wrap { display: none; text-align: center; }
        #preview-img { 
            width: 100%; max-height: 300px; object-fit: contain; 
            border-radius: 8px; margin-bottom: 10px; background: #000; 
        }
        .btn { 
            width: 100%; padding: 14px; border-radius: 8px; border: none; 
            font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; 
        }
        .btn-sync { background: var(--nest-blue); color: white; }
        .btn-reselect { background: #edf2f7; color: #718096; margin-top: 8px; }
        #status-msg { font-size: 13px; font-weight: 800; color: var(--nest-blue); margin: 10px 0; text-align: center; }
        #success-section { display: none; border-top: 2px solid #f0f4f8; padding-top: 15px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="module-card">
    <div id="capture-stage">
        <div class="camera-box" onclick="document.getElementById('input-cam').click()">
            <span style="font-size: 35px">📸</span>
            <p style="font-weight: 700; margin: 5px 0 0; color: #2d3748; font-size: 14px;">Select EOD report to upload</p>
            <input type="file" id="input-cam" hidden accept="image/*" capture="environment" onchange="showPreview(this)">
        </div>
    </div>

    <div id="preview-wrap">
        <img id="preview-img" src="">
        <button type="button" class="btn btn-sync" id="sync-btn" onclick="runSync()">Upload EOD report</button>
        <button type="button" id="reselect-btn" class="btn btn-reselect" onclick="location.reload()">Reselect Picture</button>
        <p id="status-msg"></p>

        <div id="success-section">
            <h3 style="color: var(--success); margin: 0; font-size: 16px;">✅ EOD Synced</h3>
            <p style="font-size: 12px; color: #718096; margin-top: 5px;">Report is safe in the vault.</p>
        </div>
    </div>
</div>

<script>
    function getSlug() { return localStorage.getItem('nestmind_f_slug') || 'unknown'; }

    function showPreview(input) {
        if (input.files && input.files[0]) {
            document.getElementById('preview-img').src = URL.createObjectURL(input.files[0]);
            document.getElementById('capture-stage').style.display = 'none';
            document.getElementById('preview-wrap').style.display = 'block';
        }
    }

    async function runSync() {
        const status = document.getElementById('status-msg');
        const syncBtn = document.getElementById('sync-btn');
        const reselectBtn = document.getElementById('reselect-btn');
        const successSec = document.getElementById('success-section');
        const file = document.getElementById('input-cam').files[0];

        if (!file) return;

        try {
            syncBtn.style.display = 'none';
            reselectBtn.style.display = 'none';
            status.innerText = "SYNCING WITH CLOUD...";

            const ext = file.name.split('.').pop().toLowerCase();
            const fileName = `${getSlug()}/${Date.now()}-eod.${ext}`;

            const formData = new FormData();
            formData.append('file_resource', file);
            formData.append('file_name', fileName);

            const response = await fetch("https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/aws_proxy_upload", {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                status.style.display = 'none';
                successSec.style.display = 'block';
            } else {
                throw new Error("SYNC FAILED");
            }
        } catch (err) {
            status.style.color = "red";
            status.innerText = "ERROR: " + err.message;
            syncBtn.style.display = 'block';
            reselectBtn.style.display = 'block';
        }
    }
</script>
</body>
</html>
