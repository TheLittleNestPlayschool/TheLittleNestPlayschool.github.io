<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>End of Day Vault</title>
    <link rel="stylesheet" href="../nest_style.css">
    <script src="../api_config.js"></script>
    <style>
        :root { --primary-blue: #4a90e2; --deep-blue: #357abd; }
        body { font-family: 'Segoe UI', sans-serif; background: #edf2f7; margin: 0; padding: 10px; }
        .vault-container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, var(--primary-blue), var(--deep-blue)); color: white; padding: 25px; text-align: center; }
        .camera-box { padding: 40px 20px; text-align: center; border: 3px dashed #cbd5e0; margin: 20px; border-radius: 15px; cursor: pointer; }
        #preview-wrap { display: none; padding: 20px; text-align: center; }
        #preview-img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-sync { background: var(--primary-blue); color: white; margin-bottom: 10px; }
        #status-msg { font-weight: 700; color: var(--primary-blue); margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="vault-container">
    <div class="header">
        <h2 style="margin:0">EOD Report Vault</h2>
        <div class="school-badge" id="school-display" style="background:rgba(255,255,255,0.2); padding:5px 15px; border-radius:20px; display:inline-block; margin-top:10px;">Loading...</div>
    </div>

    <div id="capture-stage">
        <div class="camera-box" onclick="document.getElementById('input-cam').click()">
            <span style="font-size: 40px">📝</span>
            <p style="font-weight: 700; margin: 10px 0 0">Capture EOD Report</p>
            <input type="file" id="input-cam" hidden accept="image/*" capture="environment" onchange="showPreview(this)">
        </div>
    </div>

    <div id="preview-wrap">
        <img id="preview-img" src="">
        <button class="btn btn-sync" id="sync-btn" onclick="runSync()">Sync EOD to Vault</button>
        <button class="btn" style="background:#eee; width:100%; margin-top:10px; border-radius:10px; padding:15px; font-weight:800;" onclick="location.reload()">Retake</button>
        <p id="status-msg"></p>
    </div>
</div>

<script>
    const currentFSlug = localStorage.getItem('nestmind_f_slug');
    const currentFName = localStorage.getItem('nestmind_f_name');
    let selectedFile = null;

    window.onload = () => { document.getElementById('school-display').innerText = currentFName || "Uploader"; };

    function showPreview(input) {
        if (input.files && input.files[0]) {
            selectedFile = input.files[0];
            document.getElementById('preview-img').src = URL.createObjectURL(selectedFile);
            document.getElementById('capture-stage').style.display = 'none';
            document.getElementById('preview-wrap').style.display = 'block';
        }
    }

    async function runSync() {
        const status = document.getElementById('status-msg');
        const syncBtn = document.getElementById('sync-btn');
        if (!selectedFile) return;

        const ext = selectedFile.name.split('.').pop().toLowerCase();
        const fileKey = `${currentFSlug}/${Date.now()}-eod.${ext}`;
        
        try {
            syncBtn.disabled = true;
            status.innerText = "Authorizing...";

            const handshake = await fetch("https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/aws_signer_eod", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file_name: fileKey })
            });

            const responseData = await handshake.json();
            let uploadUrl = responseData.url || responseData.form_name || responseData;

            status.innerText = "Syncing to AWS...";

            // THE PATH-STYLE CONVERSION
            // This forces the URL to match the 'Path-Style' signature that regional buckets often require.
            if (uploadUrl.includes('tlnp-eod.s3.ap-southeast-2.amazonaws.com/')) {
                uploadUrl = uploadUrl.replace('tlnp-eod.s3.ap-southeast-2.amazonaws.com/', 's3.ap-southeast-2.amazonaws.com/tlnp-eod/');
            }

            // Convert to ArrayBuffer to strip any hidden browser headers
            const arrayBuffer = await selectedFile.arrayBuffer();

            const s3Res = await fetch(uploadUrl, {
                method: 'PUT',
                body: arrayBuffer
            });

            if (s3Res.ok) {
                status.innerText = "Success! EOD Synced.";
                setTimeout(() => { location.href = 'uploader_menu.html'; }, 2000);
            } else {
                const s3Err = await s3Res.text();
                console.error("AWS Error:", s3Err);
                status.innerText = "Sync Failed. Check Console.";
                syncBtn.disabled = false;
            }
        } catch (err) {
            status.innerText = "Error: " + err.message;
            syncBtn.disabled = false;
        }
    }
</script>
</body>
</html>
