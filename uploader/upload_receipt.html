<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Vault</title>
    <style>
        :root {
            --primary-blue: #4a90e2;
            --deep-blue: #357abd;
            --text-main: #2d3748;
            --text-muted: #718096;
            --bg-light: #f8fafc;
            --border-color: #cbd5e0;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #edf2f7; margin: 0; padding: 10px; }
        
        .vault-container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header {
            background: linear-gradient(135deg, var(--primary-blue), var(--deep-blue));
            color: white;
            padding: 25px;
            text-align: center;
        }

        .section { padding: 20px; border-bottom: 1px solid #eee; }
        
        label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        
        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid var(--border-color);
            font-size: 16px;
            appearance: none;
            background: #fff url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23718096%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E") no-repeat right 12px center;
            background-size: 16px;
        }

        .camera-box {
            padding: 40px 20px;
            text-align: center;
            border: 3px dashed var(--border-color);
            margin: 20px;
            border-radius: 15px;
            cursor: pointer;
        }

        #preview-wrap { display: none; padding: 20px; text-align: center; }
        #preview-img { width: 100%; border-radius: 10px; margin-bottom: 15px; }

        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-sync { background: var(--primary-blue); color: white; margin-bottom: 10px; }
        .btn-back { background: #eee; color: #666; text-decoration: none; display: inline-block; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="vault-container">
    <div class="header">
        <h2 style="margin:0">Receipt Vault</h2>
        <p style="margin:5px 0 0; font-size: 13px; opacity: 0.8">Upload Expenses & Purchases</p>
    </div>

    <div class="section">
        <label>School Location</label>
        <select id="f-select">
            <option value="">Loading Schools...</option>
        </select>
    </div>

    <div id="capture-stage">
        <div class="camera-box" onclick="document.getElementById('input-cam').click()">
            <span style="font-size: 40px">🧾</span>
            <p style="font-weight: 700; margin: 10px 0 0">Capture Receipt</p>
            <input type="file" id="input-cam" hidden accept="image/*" capture="environment" onchange="showPreview(this)">
        </div>
        <div style="text-align: center; padding-bottom: 20px;">
            <a href="uploader_menu.html" class="btn-back" style="width: auto; padding: 10px 20px;">← Back to Menu</a>
        </div>
    </div>

    <div id="preview-wrap">
        <img id="preview-img" src="">
        <button class="btn btn-sync" id="sync-btn" onclick="runUpload()">Sync Receipt to Vault</button>
        <button class="btn btn-back" onclick="resetPage()">Retake Photo</button>
        <p id="status-msg" style="font-weight: 700; color: var(--primary-blue); margin-top: 15px;"></p>
    </div>
</div>

<script>
    const API = {
        franchise: 'https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise',
        handshake: 'https://x8ki-letl-twmt.n7.xano.io/api:I12II1nL/get_upload_url'
    };

    let selectedFile = null;

    window.onload = async () => {
        try {
            const fRes = await fetch(API.franchise);
            const franchises = await fRes.json();
            const fDrop = document.getElementById('f-select');
            fDrop.innerHTML = '<option value="">Select Location...</option>';
            franchises.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.dataset.slug = f.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                opt.textContent = f.name;
                fDrop.appendChild(opt);
            });
        } catch (e) { alert("Error loading schools."); }
    };

    function showPreview(input) {
        if (input.files && input.files[0]) {
            selectedFile = input.files[0];
            document.getElementById('preview-img').src = URL.createObjectURL(selectedFile);
            document.getElementById('capture-stage').style.display = 'none';
            document.getElementById('preview-wrap').style.display = 'block';
        }
    }

    async function runUpload() {
        const fSelect = document.getElementById('f-select');
        const status = document.getElementById('status-msg');
        
        if (!fSelect.value) return alert("Select a school location.");

        const slug = fSelect.selectedOptions[0].dataset.slug;
        const path = `${slug}/receipts/${Date.now()}-${selectedFile.name.toLowerCase()}`;
        
        try {
            status.innerText = "Authorizing...";
            const res = await fetch(API.handshake, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file_path: path, content_type: selectedFile.type })
            });
            const { upload_url } = await res.json();

            status.innerText = "Syncing to AWS...";
            const s3Res = await fetch(upload_url, {
                method: 'PUT',
                headers: { 'Content-Type': selectedFile.type },
                body: selectedFile
            });

            if (s3Res.ok) {
                status.innerText = "Receipt Successfully Synced!";
                setTimeout(resetPage, 2000);
            }
        } catch (err) { status.innerText = "Sync Failed."; }
    }

    function resetPage() {
        selectedFile = null;
        document.getElementById('capture-stage').style.display = 'block';
        document.getElementById('preview-wrap').style.display = 'none';
        document.getElementById('status-msg').innerText = "";
    }
</script>

</body>
</html>
