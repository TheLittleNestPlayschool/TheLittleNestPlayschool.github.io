<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-slate-100 border-b border-slate-200">
                <th class="p-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Student Name</th>
                <th class="p-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Birth Date</th>
                <th class="p-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Status</th>
                <th class="p-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest text-right">Actions</th>
            </tr>
        </thead>
        <tbody id="student-table-body">
            <tr><td colspan="4" class="p-10 text-center text-slate-400 text-xs italic font-medium uppercase tracking-widest animate-pulse">Synchronizing Student Data...</td></tr>
        </tbody>
    </table>
</div>

<script>
(function() {
    const StudentModule = {
        // Correct API endpoint for students [cite: 2026-02-05]
        API: "https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/student",
        data: [],
        fields: ['name', 'date_of_birth', 'is_active'],

        async init() {
            const fid = localStorage.getItem('locked_franchise_id');
            const tbody = document.getElementById('student-table-body');
            
            if (tbody) tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400 text-xs italic font-bold uppercase tracking-widest animate-pulse">Syncing Database...</td></tr>';

            if (!fid) {
                if (tbody) tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-500 text-xs font-bold uppercase tracking-widest">No Franchise ID Found</td></tr>';
                return;
            }

            try {
                const response = await fetch(`${this.API}?franchise_id=${fid}`);
                if (!response.ok) throw new Error(`API Error: ${response.status}`);
                
                this.data = await response.json();
                this.render();
                this.setupListeners();
            } catch (error) {
                console.error("Student Sync Error:", error);
                if (tbody) tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-500 text-xs font-bold uppercase tracking-widest">Sync Failed</td></tr>';
            }
        },

        render() {
            const tbody = document.getElementById('student-table-body');
            if (!tbody) return;

            const searchTerm = (document.getElementById('student-search')?.value || '').toLowerCase();
            let filtered = this.data.filter(s => (s.name && s.name.toLowerCase().includes(searchTerm)));

            tbody.innerHTML = '';
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-300 text-[10px] font-bold uppercase tracking-widest">No student records.</td></tr>';
                return;
            }

            filtered.forEach((s, idx) => {
                const bg = idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/40';
                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="${bg} border-b border-slate-100 text-xs text-slate-600 hover:bg-slate-50 transition-all group">
                        <td class="p-4 font-bold text-slate-900 text-sm group-hover:text-emerald-600 transition-colors">${s.name}</td>
                        <td class="p-4 text-slate-400 font-mono">${s.date_of_birth || '---'}</td>
                        <td class="p-4">
                            <span class="px-2.5 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter ${s.is_active ? 'bg-emerald-50 text-emerald-600 border border-emerald-200' : 'bg-slate-100 text-slate-400 border border-slate-200'}">
                                ${s.is_active ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td class="p-4 text-right">
                            <button data-id="${s.id}" class="stu-edit-btn px-3 py-1.5 bg-white border border-slate-200 rounded text-[9px] font-bold uppercase hover:text-emerald-600 shadow-sm transition-all">Edit</button>
                        </td>
                    </tr>
                `);
            });

            tbody.querySelectorAll('.stu-edit-btn').forEach(b => {
                b.onclick = () => this.openModal(this.data.find(x => x.id == b.dataset.id));
            });
        },

        setupListeners() {
            const search = document.getElementById('student-search');
            if (search) search.oninput = () => this.render();

            const addBtn = document.getElementById('add-student-btn');
            if (addBtn) addBtn.onclick = () => this.openModal();

            const closeX = document.getElementById('close-stu-x');
            if (closeX) closeX.onclick = () => this.closeModal();
        },

        openModal(s = null) {
            const modal = document.getElementById('student-modal');
            modal.classList.remove('hidden');
            document.getElementById('student-form').reset();
            document.getElementById('s-edit-id').value = s ? s.id : '';

            if(s) {
                this.fields.forEach(f => {
                    const el = document.getElementById('s-' + f);
                    if (el) {
                        if (el.type === 'checkbox') el.checked = s[f];
                        else el.value = s[f] || '';
                    }
                });
            } else {
                document.getElementById('s-is_active').checked = true;
            }
        },

        closeModal() { document.getElementById('student-modal').classList.add('hidden'); }
    };

    // Form Submission
    const form = document.getElementById('student-form');
    if (form) {
        form.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('s-edit-id').value;
            const fid = localStorage.getItem('locked_franchise_id');
            const payload = { franchise_id: parseInt(fid) };
            
            StudentModule.fields.forEach(f => {
                const el = document.getElementById('s-' + f);
                if (el) payload[f] = el.type === 'checkbox' ? el.checked : el.value;
            });

            const res = await fetch(id ? `${StudentModule.API}/${id}` : StudentModule.API, { 
                method: id ? 'PATCH' : 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload) 
            });
            if (res.ok) {
                StudentModule.closeModal();
                StudentModule.init();
            }
        };
    }

    StudentModule.init();
})();
</script>
