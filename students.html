<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <h1 class="text-4xl font-black text-slate-800 tracking-tight">Student Management</h1>
    
    <div class="flex flex-wrap gap-3 w-full md:w-auto">
        <div class="relative flex-1 md:w-64">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </span>
            <input type="text" id="search-input" oninput="renderTable()" placeholder="Search Name or Parent..." 
                class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl font-bold text-xs outline-none focus:ring-2 focus:ring-[#00d1b2] transition-all">
        </div>

        <select id="sort-control" onchange="renderTable()" class="bg-white border border-slate-200 px-4 py-3 rounded-xl font-bold text-[10px] text-slate-500 uppercase tracking-widest outline-none focus:ring-2 focus:ring-[#00d1b2]">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="student_asc">Student A-Z</option>
            <option value="parent_asc">Parent A-Z</option>
        </select>
        
        <button onclick="openStudentModal()" class="bg-[#00d1b2] hover:bg-[#00bfa5] text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg flex items-center gap-2 text-xs uppercase tracking-widest">
            <span>+</span> NEW STUDENT
        </button>
    </div>
</div>

<div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-slate-50 border-b border-slate-100">
                <th class="p-4 text-[9px] font-black text-slate-400 uppercase tracking-widest">Student & Bio</th>
                <th class="p-4 text-[9px] font-black text-slate-400 uppercase tracking-widest">Parent & Address</th>
                <th class="p-4 text-[9px] font-black text-slate-400 uppercase tracking-widest text-center">Age & DOB</th>
                <th class="p-4 text-[9px] font-black text-slate-400 uppercase tracking-widest text-center">Session & Start</th>
                <th class="p-4 text-[9px] font-black text-slate-400 uppercase tracking-widest text-right">Actions</th>
            </tr>
        </thead>
        <tbody id="student-table-body">
            <tr><td colspan="5" class="p-20 text-center text-slate-400 italic font-bold">Synchronizing with NestMind...</td></tr>
        </tbody>
    </table>
</div>

<div id="student-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden border border-slate-200">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h2 id="modal-title" class="text-2xl font-black text-slate-800 tracking-tight">Student Profile</h2>
            <button onclick="closeStudentModal()" class="text-slate-400 hover:text-slate-600 font-bold text-2xl">&times;</button>
        </div>
        <form id="student-form" class="p-8 space-y-4 max-h-[80vh] overflow-y-auto">
            <input type="hidden" id="edit-student-id">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Full Legal Name</label>
                    <input type="text" id="name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-[#00d1b2]">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Preferred Name</label>
                    <input type="text" id="preferred_name" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Date of Birth</label>
                    <input type="date" id="date_of_birth" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Gender</label>
                    <select id="gender" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nationality</label>
                    <input type="text" id="nationality" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Parent / Guardian</label>
                    <select id="parent_id" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                        <option value="">-- Choose Parent --</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Primary Language</label>
                    <input type="text" id="primary_language" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Enrolled Date</label>
                    <input type="date" id="enrolled_date" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Start Date</label>
                    <input type="date" id="start_date" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Assigned Session</label>
                    <select id="session_enrolled" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                        <option value="0">No Session Assigned</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Home Address</label>
                <textarea id="home_address" rows="2" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none"></textarea>
            </div>

            <div class="pt-4 flex gap-3">
                <button type="button" onclick="closeStudentModal()" class="flex-1 p-4 bg-slate-100 text-slate-500 rounded-xl font-bold hover:bg-slate-200 transition-all uppercase text-xs tracking-widest">Cancel</button>
                <button type="submit" class="flex-1 p-4 bg-[#00d1b2] text-white rounded-xl font-black hover:bg-[#00bfa5] transition-all uppercase text-xs tracking-widest shadow-lg shadow-[#00d1b2]/20">Save Record</button>
            </div>
        </form>
    </div>
</div>

<script>
    const STUDENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student";
    const PARENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/parent";
    const SESSION_API = "https://x8ki-letl-twmt.n7.xano.io/api:mUsV7Zqx/session";
    
    let parentCache = {};
    let sessionCache = {};
    let currentStudents = [];

    function calculateAge(dob) {
        if (!dob) return '---';
        const birthDate = new Date(dob);
        const ageDate = new Date(Date.now() - birthDate.getTime());
        return Math.abs(ageDate.getUTCFullYear() - 1970);
    }

    async function fetchStudents() {
        const fid = localStorage.getItem('locked_franchise_id');
        if(!fid) return;

        try {
            const [pRes, sessRes, sRes] = await Promise.all([
                fetch(`${PARENT_API}?franchise_id=${fid}`),
                fetch(`${SESSION_API}?franchise_id=${fid}`),
                fetch(`${STUDENT_API}?franchise_id=${fid}`)
            ]);

            if (pRes.ok) {
                const parents = await pRes.json();
                const pSelect = document.getElementById('parent_id');
                pSelect.innerHTML = '<option value="">-- Choose Parent --</option>';
                parents.forEach(p => {
                    parentCache[p.id] = `${p.first_name} ${p.last_name}`;
                    pSelect.insertAdjacentHTML('beforeend', `<option value="${p.id}">${p.first_name} ${p.last_name}</option>`);
                });
            }

            if (sessRes.ok) {
                const sessions = await sessRes.json();
                const sSelect = document.getElementById('session_enrolled');
                sSelect.innerHTML = '<option value="0">No Session Assigned</option>';
                sessions.forEach(s => {
                    sessionCache[s.id] = s.name;
                    sSelect.insertAdjacentHTML('beforeend', `<option value="${s.id}">${s.name}</option>`);
                });
            }

            if (sRes.ok) {
                currentStudents = await sRes.json();
                renderTable();
            }
        } catch (e) { 
            console.error("Xano Sync Error", e);
            document.getElementById('student-table-body').innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-500 font-bold">Failed to sync with Xano database.</td></tr>';
        }
    }

    function renderTable() {
        const tbody = document.getElementById('student-table-body');
        const sortType = document.getElementById('sort-control').value;
        const searchTerm = document.getElementById('search-input').value.toLowerCase();
        
        // Filter Logic
        let filtered = currentStudents.filter(s => {
            const parentName = (parentCache[s.parent_id] || '').toLowerCase();
            return s.name.toLowerCase().includes(searchTerm) || 
                   (s.preferred_name || '').toLowerCase().includes(searchTerm) ||
                   parentName.includes(searchTerm);
        });

        // Sort Logic
        if (sortType === 'newest') filtered.sort((a, b) => b.created_at - a.created_at);
        if (sortType === 'oldest') filtered.sort((a, b) => a.created_at - b.created_at);
        if (sortType === 'student_asc') filtered.sort((a, b) => a.name.localeCompare(b.name));
        if (sortType === 'parent_asc') {
            filtered.sort((a, b) => {
                const pA = parentCache[a.parent_id] || '';
                const pB = parentCache[b.parent_id] || '';
                return pA.localeCompare(pB);
            });
        }

        tbody.innerHTML = '';
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-slate-300 font-bold">No students found.</td></tr>';
            return;
        }

        filtered.forEach(s => {
            const age = calculateAge(s.date_of_birth);
            const sessionName = sessionCache[s.session_enrolled] || 'Unassigned';
            
            tbody.insertAdjacentHTML('beforeend', `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td class="p-4">
                        <div class="text-sm font-black text-slate-800">${s.name}</div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase italic">"${s.preferred_name || 'N/A'}" • ${s.gender || '---'}</div>
                        <div class="text-[9px] text-[#00d1b2] font-black uppercase tracking-tighter">${s.nationality || ''}</div>
                    </td>
                    <td class="p-4">
                        <div class="text-sm font-bold text-slate-700">${parentCache[s.parent_id] || '---'}</div>
                        <div class="text-[10px] text-slate-400 font-medium truncate max-w-[150px]">${s.home_address || 'No Address'}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase">${s.primary_language || ''}</div>
                    </td>
                    <td class="p-4 text-center">
                        <div class="text-[11px] text-slate-800 font-black uppercase">${age} yrs old</div>
                        <div class="text-[9px] text-slate-400 font-medium italic">DOB: ${s.date_of_birth || '---'}</div>
                        <div class="text-[9px] text-slate-400 font-medium">ENR: ${s.enrolled_date || '---'}</div>
                    </td>
                    <td class="p-4 text-center">
                        <div class="inline-block px-2 py-0.5 rounded-md text-[9px] font-black uppercase ${s.is_active ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}">
                            ${s.is_active ? 'Active' : 'Inactive'}
                        </div>
                        <div class="text-[10px] text-slate-800 font-black mt-1 uppercase tracking-tight">${sessionName}</div>
                        <div class="text-[9px] text-slate-400 font-medium">START: ${s.start_date || '---'}</div>
                    </td>
                    <td class="p-4 text-right space-x-1">
                        <button onclick='editStudent(${JSON.stringify(s).replace(/'/g, "&apos;")})' class="text-[9px] font-black text-slate-400 hover:text-slate-800 border border-slate-200 px-2 py-1.5 rounded-lg transition-all uppercase tracking-widest">Edit</button>
                        <button onclick="deleteStudent(${s.id})" class="text-[9px] font-black text-red-400 hover:text-red-600 border border-red-500/10 px-2 py-1.5 rounded-lg transition-all uppercase tracking-widest">Del</button>
                    </td>
                </tr>
            `);
        });
    }

    async function deleteStudent(id) {
        if (!confirm("Permanently delete this student record?")) return;
        await fetch(`${STUDENT_API}/${id}`, { method: 'DELETE' });
        fetchStudents();
    }

    function openStudentModal(s = null) {
        document.getElementById('student-modal').classList.remove('hidden');
        const form = document.getElementById('student-form');
        form.reset();
        document.getElementById('edit-student-id').value = s ? s.id : '';

        if (s) {
            document.getElementById('modal-title').innerText = "Edit Student Profile";
            const fields = ['name', 'preferred_name', 'date_of_birth', 'gender', 'nationality', 'parent_id', 'primary_language', 'enrolled_date', 'start_date', 'session_enrolled', 'home_address'];
            fields.forEach(field => {
                const el = document.getElementById(field);
                if(el) el.value = s[field] || (field === 'session_enrolled' ? '0' : '');
            });
        } else {
            document.getElementById('modal-title').innerText = "Register New Student";
        }
    }

    function closeStudentModal() { document.getElementById('student-modal').classList.add('hidden'); }

    document.getElementById('student-form').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-student-id').value;
        const fid = localStorage.getItem('locked_franchise_id');
        
        const payload = {
            franchise_id: parseInt(fid),
            is_active: true,
            name: document.getElementById('name').value,
            preferred_name: document.getElementById('preferred_name').value,
            date_of_birth: document.getElementById('date_of_birth').value,
            gender: document.getElementById('gender').value,
            nationality: document.getElementById('nationality').value,
            parent_id: parseInt(document.getElementById('parent_id').value),
            primary_language: document.getElementById('primary_language').value,
            enrolled_date: document.getElementById('enrolled_date').value,
            start_date: document.getElementById('start_date').value,
            session_enrolled: parseInt(document.getElementById('session_enrolled').value) || 0,
            home_address: document.getElementById('home_address').value
        };

        const method = id ? 'PATCH' : 'POST';
        const url = id ? `${STUDENT_API}/${id}` : STUDENT_API;
        
        const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        if (res.ok) { closeStudentModal(); fetchStudents(); }
    };

    function editStudent(s) { openStudentModal(s); }
    fetchStudents();
</script>
