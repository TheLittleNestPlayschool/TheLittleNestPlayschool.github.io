<div class="flex justify-between items-center mb-8">
    <h1 class="text-4xl font-black text-slate-800 tracking-tight">Student Management</h1>
    <button onclick="openStudentModal()" class="bg-[#00d1b2] hover:bg-[#00bfa5] text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg flex items-center gap-2">
        <span>+</span> NEW STUDENT
    </button>
</div>

<div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-slate-50 border-b border-slate-100">
                <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">ID</th>
                <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Student Name</th>
                <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Parent / Guardian</th>
                <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Date of Birth</th>
                <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Management</th>
            </tr>
        </thead>
        <tbody id="student-table-body">
            <tr><td colspan="5" class="p-20 text-center text-slate-400 italic font-bold">Initializing Directory...</td></tr>
        </tbody>
    </table>
</div>

<div id="student-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-200">
        <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h2 id="modal-title" class="text-2xl font-black text-slate-800 tracking-tight">Register New Student</h2>
            <button onclick="closeStudentModal()" class="text-slate-400 hover:text-slate-600 font-bold text-2xl">&times;</button>
        </div>
        <form id="student-form" class="p-8 space-y-4">
            <input type="hidden" id="edit-student-id">
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Student Full Name</label>
                <input type="text" id="student_name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:outline-none focus:ring-2 focus:ring-[#00d1b2]">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Date of Birth</label>
                    <input type="date" id="dob" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:outline-none focus:ring-2 focus:ring-[#00d1b2]">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Select Parent</label>
                    <select id="parent_id" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:outline-none focus:ring-2 focus:ring-[#00d1b2]">
                        <option value="">-- Choose Parent --</option>
                    </select>
                </div>
            </div>
            <div class="pt-4 flex gap-3">
                <button type="button" onclick="closeStudentModal()" class="flex-1 p-4 bg-slate-100 text-slate-500 rounded-xl font-bold hover:bg-slate-200 transition-all uppercase text-xs tracking-widest">Cancel</button>
                <button type="submit" class="flex-1 p-4 bg-[#00d1b2] text-white rounded-xl font-black hover:bg-[#00bfa5] transition-all uppercase text-xs tracking-widest shadow-lg shadow-[#00d1b2]/20">Save Record</button>
            </div>
        </form>
    </div>
</div>

<script>
    const STUDENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/student";
    const PARENT_API = "https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx/parent";
    let parentCache = {};

    async function fetchStudents() {
        const fid = localStorage.getItem('locked_franchise_id');
        const tbody = document.getElementById('student-table-body');
        if(!fid) return;

        try {
            // Fetch parents first for the name mapping
            const pRes = await fetch(`${PARENT_API}?franchise_id=${fid}`);
            const parents = await pRes.json();
            const pSelect = document.getElementById('parent_id');
            pSelect.innerHTML = '<option value="">-- Choose Parent --</option>';
            
            parents.forEach(p => {
                parentCache[p.id] = `${p.first_name} ${p.last_name}`;
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.innerText = `${p.first_name} ${p.last_name}`;
                pSelect.appendChild(opt);
            });

            // Fetch students [cite: 2026-02-05]
            const sRes = await fetch(`${STUDENT_API}?franchise_id=${fid}`);
            const students = await sRes.json();
            tbody.innerHTML = '';

            students.forEach(s => {
                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                        <td class="p-5 text-sm font-bold text-slate-400">#${s.id}</td>
                        <td class="p-5 text-sm font-black text-slate-800">${s.name}</td>
                        <td class="p-5">
                            <div class="text-sm font-bold text-[#00d1b2]">${parentCache[s.parent_id] || 'Unassigned'}</div>
                        </td>
                        <td class="p-5 text-sm text-slate-500 font-medium italic">${s.date_of_birth || '---'}</td>
                        <td class="p-5 text-right">
                            <button onclick="editStudent(${JSON.stringify(s).replace(/"/g, '&quot;')})" class="text-[10px] font-black text-slate-400 hover:text-slate-800 border border-slate-200 px-3 py-1.5 rounded-lg transition-all uppercase">Edit Profile</button>
                        </td>
                    </tr>
                `);
            });
        } catch (e) { tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-500 font-bold">Xano Connection Failed.</td></tr>'; }
    }

    function openStudentModal(student = null) {
        const modal = document.getElementById('student-modal');
        const form = document.getElementById('student-form');
        const title = document.getElementById('modal-title');
        form.reset();
        document.getElementById('edit-student-id').value = '';

        if (student) {
            title.innerText = "Edit Student Profile";
            document.getElementById('edit-student-id').value = student.id;
            document.getElementById('student_name').value = student.name;
            document.getElementById('dob').value = student.date_of_birth;
            document.getElementById('parent_id').value = student.parent_id;
        } else {
            title.innerText = "Register New Student";
        }
        modal.classList.remove('hidden');
    }

    function closeStudentModal() { document.getElementById('student-modal').classList.add('hidden'); }

    document.getElementById('student-form').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-student-id').value;
        const fid = localStorage.getItem('locked_franchise_id');
        
        const payload = {
            name: document.getElementById('student_name').value,
            date_of_birth: document.getElementById('dob').value,
            parent_id: parseInt(document.getElementById('parent_id').value),
            franchise_id: parseInt(fid),
            is_active: true
        };

        const url = id ? `${STUDENT_API}/${id}` : STUDENT_API;
        const method = id ? 'PATCH' : 'POST';

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                closeStudentModal();
                fetchStudents();
            }
        } catch (e) { alert("Save failed."); }
    };

    function editStudent(s) { openStudentModal(s); }

    fetchStudents();
</script>
