<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Student Roster</h1>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Franchise Management System</p>
    </div>
    
    <div class="flex flex-wrap gap-2 w-full md:w-auto">
        <input type="text" id="student-search" placeholder="Search students..." 
            class="pl-4 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-xs outline-none focus:border-teal-500 shadow-sm w-full md:w-64 transition-all">

        <button id="add-student-btn" class="bg-teal-500 hover:bg-teal-600 text-white px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase tracking-wider shadow-md">
            + ENROLL STUDENT
        </button>
    </div>
</div>

<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-slate-50 border-b border-slate-200">
                <th colspan="4" class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Student Directory (Full Profiles)</th>
            </tr>
        </thead>
        <tbody id="student-table-body">
            <tr><td colspan="4" class="p-10 text-center text-slate-400 text-xs italic font-bold uppercase tracking-widest animate-pulse">Syncing NestMind Database...</td></tr>
        </tbody>
    </table>
</div>

<div id="student-modal" class="hidden fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden border border-slate-200">
        <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <div>
                <h2 id="s-modal-title" class="text-sm font-black text-slate-800 uppercase tracking-tight">Student Profile</h2>
                <p class="text-[9px] text-teal-600 font-bold uppercase tracking-widest">Enrollment Details</p>
            </div>
            <button id="close-s-modal-x" class="text-slate-400 hover:text-slate-900 text-3xl font-light">&times;</button>
        </div>
        
        <form id="student-form" class="p-6">
            <input type="hidden" id="s-edit-id">
            
            <div id="student-fields-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-4 max-h-[60vh] overflow-y-auto pr-4 custom-scrollbar">
                </div>

            <div class="flex gap-3 pt-6 border-t border-slate-100 mt-6">
                <button type="button" id="cancel-s-modal-btn" class="px-8 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-[10px] uppercase hover:bg-slate-200 transition-all">Discard</button>
                <button type="submit" class="flex-1 py-3 bg-teal-500 text-white rounded-xl font-bold text-[10px] uppercase shadow-lg hover:bg-teal-600 transition-all">
                    Save Record
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const StudentModule = {
        data: [],
        schema: null,

        async init() {
            if (!window.NEST_SCHEMA) await this.loadScript('/schema_config.js');
            if (!window.NEST_ENDPOINTS) await this.loadScript('/api_config.js');
            
            this.schema = window.NEST_SCHEMA.student;
            this.buildFormUI(); 

            const fid = localStorage.getItem('locked_franchise_id');
            if (!fid) return;

            try {
                const response = await fetch(`${window.NEST_ENDPOINTS.student.list}?franchise_id=${fid}`);
                this.data = await response.json();
                this.render();
                this.setupListeners();
            } catch (err) {
                console.error("Student Fetch Error:", err);
            }
        },

        buildFormUI() {
            const grid = document.getElementById('student-fields-grid');
            grid.innerHTML = '';
            let currentSection = "";

            this.schema.fields.forEach(f => {
                if (f.id === 'id' || f.hidden) return;

                if (f.section && f.section !== currentSection) {
                    currentSection = f.section;
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="col-span-full mt-6 mb-2 border-b border-slate-100 pb-1">
                            <span class="text-[10px] font-black text-teal-600 uppercase tracking-widest">${currentSection}</span>
                        </div>
                    `);
                }

                const spanClass = f.width === 'full' ? 'col-span-full' : 'col-span-1';
                const readonly = f.readonly ? 'readonly' : '';
                const bgClass = f.readonly ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-50';

                let inputHTML = '';
                if (f.type === 'bool') {
                    inputHTML = `
                        <div class="flex items-center gap-3 p-3 bg-slate-50 border border-slate-200 rounded-lg">
                            <input type="checkbox" id="${f.id}" class="w-4 h-4 accent-teal-500">
                            <span class="text-[10px] font-bold text-slate-500 uppercase">Active Status</span>
                        </div>`;
                } else {
                    inputHTML = `<input type="${f.type === 'epochms' ? 'text' : f.type}" id="${f.id}" ${readonly} class="w-full p-3 ${bgClass} border border-slate-200 rounded-lg text-xs focus:ring-2 focus:ring-teal-500 outline-none transition-all">`;
                }

                grid.insertAdjacentHTML('beforeend', `
                    <div class="${spanClass}">
                        <label class="text-[9px] text-slate-400 block uppercase font-black mb-1.5 ml-1 tracking-wider">${f.label}</label>
                        ${inputHTML}
                    </div>
                `);
            });
        },

        render() {
            const tbody = document.getElementById('student-table-body');
            const search = (document.getElementById('student-search')?.value || '').toLowerCase();
            let filtered = this.data.filter(s => (s.name && s.name.toLowerCase().includes(search)));

            tbody.innerHTML = '';
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-300 text-[10px] font-black uppercase tracking-widest">No Student Records Found.</td></tr>';
                return;
            }

            filtered.forEach((s, idx) => {
                const bg = idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/40';
                
                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="${bg} border-b border-slate-100 group hover:bg-slate-50 transition-all">
                        <td colspan="4" class="p-6">
                            <div class="flex flex-col lg:flex-row justify-between gap-8">
                                
                                <div class="flex-1 min-w-[250px]">
                                    <div class="flex items-center gap-3 mb-3">
                                        <h3 class="font-black text-slate-900 text-base uppercase tracking-tight">${s.name}</h3>
                                        <span class="px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-tighter ${s.is_active ? 'bg-teal-50 text-teal-600 border border-teal-200' : 'bg-slate-100 text-slate-400 border border-slate-200'}">
                                            ${s.is_active ? 'Active' : 'Inactive'}
                                        </span>
                                    </div>
                                    <div class="grid grid-cols-2 gap-y-3 gap-x-4">
                                        <div>
                                            <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest mb-0.5">Preferred Name</p>
                                            <p class="text-[11px] font-bold text-slate-700 uppercase">${s.preferred_name || '---'}</p>
                                        </div>
                                        <div>
                                            <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest mb-0.5">Gender</p>
                                            <p class="text-[11px] font-bold text-slate-700 uppercase">${s.gender || '---'}</p>
                                        </div>
                                        <div>
                                            <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest mb-0.5">Birth Date</p>
                                            <p class="text-[11px] font-mono font-bold text-slate-600">${s.date_of_birth || '---'}</p>
                                        </div>
                                        <div>
                                            <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest mb-0.5">Nationality</p>
                                            <p class="text-[11px] font-bold text-slate-700 uppercase">${s.nationality || '---'}</p>
                                        </div>
                                    </div>
                                </div>

                                <div class="flex-1 border-l border-slate-100 pl-8">
                                    <div class="grid grid-cols-2 gap-y-3 gap-x-4">
                                        <div>
                                            <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest mb-0.5">Session Enrolled</p>
                                            <p class="text-[11px] font-bold text-teal-600 uppercase italic">Session ID: #${s.session_enrolled || '---'}</p>
                                        </div>
                                        <div>
                                            <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest mb-0.5">Primary Language</p>
                                            <p class="text-[11px] font-bold text-slate-700 uppercase">${s.primary_language || '---'}</p>
                                        </div>
                                        <div class="col-span-2">
                                            <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest mb-0.5">Home Address</p>
                                            <p class="text-[11px] font-bold text-slate-700 uppercase leading-tight">${s.home_address || 'No Address Recorded'}</p>
                                        </div>
                                    </div>
                                </div>

                                <div class="flex-none w-52 border-l border-slate-100 pl-8 flex flex-col justify-between">
                                    <div>
                                        <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest mb-2 text-right">NestMind Record Links</p>
                                        <div class="flex justify-end gap-2">
                                            <div class="text-right">
                                                <p class="text-[7px] text-slate-300 font-black uppercase">Parent ID</p>
                                                <p class="text-[10px] font-mono font-bold text-slate-500">#P-${s.parent_id}</p>
                                            </div>
                                            <div class="text-right border-l border-slate-100 pl-2">
                                                <p class="text-[7px] text-slate-300 font-black uppercase">Franchise</p>
                                                <p class="text-[10px] font-mono font-bold text-slate-500">#F-${s.franchise_id}</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="flex flex-col gap-2 mt-6">
                                        <button data-id="${s.id}" class="student-edit-btn w-full py-2.5 bg-white border border-slate-200 rounded-xl text-slate-600 hover:text-teal-600 hover:border-teal-300 hover:shadow-sm transition-all uppercase font-black text-[9px]">Edit Record</button>
                                        <button data-id="${s.id}" class="student-delete-btn w-full py-2.5 bg-red-50 text-red-400 hover:bg-red-500 hover:text-white rounded-xl transition-all uppercase font-black text-[9px]">Remove</button>
                                    </div>
                                </div>

                            </div>
                        </td>
                    </tr>
                `);
            });

            tbody.querySelectorAll('.student-edit-btn').forEach(b => b.onclick = () => this.openModal(this.data.find(x => x.id == b.dataset.id)));
            tbody.querySelectorAll('.student-delete-btn').forEach(b => b.onclick = () => this.deleteRecord(b.dataset.id));
        },

        async deleteRecord(id) {
            if (!confirm("Confirm permanent removal?")) return;
            try {
                const res = await fetch(`${window.NEST_ENDPOINTS.student.list}/${id}`, { method: 'DELETE' });
                if (res.ok) this.init();
            } catch (err) { console.error("Delete Error:", err); }
        },

        openModal(s = null) {
            document.getElementById('student-modal').classList.remove('hidden');
            document.getElementById('student-form').reset();
            document.getElementById('s-edit-id').value = s ? s.id : '';

            document.getElementById('s-modal-title').innerText = s ? 'Update Student Record' : 'Enroll New Student';

            this.schema.fields.forEach(f => {
                const el = document.getElementById(f.id);
                if (el) {
                    if (f.type === 'bool') el.checked = s ? !!s[f.id] : (f.default ?? true);
                    else el.value = s ? (s[f.id] || '') : '';
                }
            });
        },

        closeModal() { document.getElementById('student-modal').classList.add('hidden'); },

        setupListeners() {
            document.getElementById('student-search').oninput = () => this.render();
            document.getElementById('add-student-btn').onclick = () => this.openModal();
            document.getElementById('close-s-modal-x').onclick = () => this.closeModal();
            document.getElementById('cancel-s-modal-btn').onclick = () => this.closeModal();

            document.getElementById('student-form').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('s-edit-id').value;
                const payload = { franchise_id: parseInt(localStorage.getItem('locked_franchise_id')) };
                
                this.schema.fields.forEach(f => {
                    const el = document.getElementById(f.id);
                    if (el && f.id !== 'id' && !f.readonly) {
                        payload[f.id] = (f.type === 'bool') ? el.checked : el.value;
                        if (f.type === 'int') payload[f.id] = parseInt(el.value);
                    }
                });

                const url = id ? `${window.NEST_ENDPOINTS.student.list}/${id}` : window.NEST_ENDPOINTS.student.list;
                const res = await fetch(url, { 
                    method: id ? 'PATCH' : 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (res.ok) { this.closeModal(); this.init(); }
            };
        },

        async loadScript(src) {
            return new Promise(resolve => {
                const s = document.createElement('script'); s.src = src; s.onload = resolve;
                s.onerror = () => { s.src = src.replace('/', ''); s.onload = resolve; };
                document.head.appendChild(s);
            });
        }
    };

    StudentModule.init();
})();
</script>
