<link rel="stylesheet" href="../nest_style.css">

<style>
    .btn-nest-teal { background: var(--nest-teal); color: #fff; }
    .btn-nest-teal:hover { opacity: 0.9; }
    .text-nest-dark { color: var(--nest-dark); }
    .text-nest-teal { color: var(--nest-teal); }
    .border-nest-teal { border-color: var(--nest-teal); }
</style>

<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
    <div>
        <h1 class="text-xl font-black text-nest-dark uppercase tracking-tight">Student Roster</h1>
        <p id="student-subheader" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Loading NestMind Database...</p>
    </div>
    
    <div class="flex flex-wrap gap-2 w-full md:w-auto">
        <select id="student-sort" class="pl-3 pr-8 py-2 bg-slate-100 border-none rounded-lg text-[10px] font-black uppercase outline-none focus:ring-2 focus:ring-[var(--nest-teal)] transition-all cursor-pointer">
            <option value="name">Sort: Name (A-Z)</option>
            <option value="franchise">Sort: Branch Location</option>
            <option value="status">Sort: Enrollment Status</option>
        </select>

        <input type="text" id="student-search" placeholder="Search students..." 
            class="pl-4 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-xs outline-none focus:border-[var(--nest-teal)] shadow-sm w-full md:w-64 transition-all font-bold">
    </div>
</div>

<div class="grid grid-cols-12 px-5 mb-2 text-[8px] font-black text-slate-400 uppercase tracking-widest hidden md:grid">
    <div class="col-span-3">Student & Branch</div>
    <div class="col-span-3">Parent / Guardian</div>
    <div class="col-span-3">Assigned Session</div>
    <div class="col-span-1 text-center">Status</div>
    <div class="col-span-2 text-right">Actions</div>
</div>

<div id="student-list-container" class="space-y-2">
    <div class="p-10 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest animate-pulse">
        Synchronizing Database...
    </div>
</div>

<div id="student-modal" class="hidden fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl overflow-hidden border border-slate-200">
        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <div>
                <h2 class="text-xs font-black text-nest-dark uppercase">Update Student Profile</h2>
                <p id="modal-branch-label" class="text-[8px] text-nest-teal font-bold uppercase tracking-widest"></p>
            </div>
            <button id="close-s-modal-x" class="text-slate-400 hover:text-nest-dark text-2xl">&times;</button>
        </div>
        
        <form id="student-form" class="p-6">
            <input type="hidden" id="s-edit-id">
            <div id="student-fields-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-3 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
            </div>

            <div class="flex gap-3 pt-6 border-t border-slate-100 mt-6">
                <button type="button" id="cancel-s-modal-btn" class="px-6 py-2.5 bg-slate-100 text-slate-500 rounded-lg font-bold text-[9px] uppercase hover:bg-slate-200 transition-all">Discard</button>
                <button type="submit" class="flex-1 py-2.5 btn-nest-teal rounded-lg font-bold text-[9px] uppercase shadow-lg">
                    Update Record
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const StudentModule = {
        data: [],
        parents: [],
        sessions: [],
        franchises: {},
        schema: null,

        async init() {
            if (!window.NEST_SCHEMA) await this.loadScript('../schema_config.js');
            if (!window.NEST_ENDPOINTS) await this.loadScript('../api_config.js');
            if (!window.SecurityManager) await this.loadScript('../security.js');
            
            this.schema = window.NEST_SCHEMA.student;
            const isSuper = SecurityManager.isHeadOffice();
            const branchName = localStorage.getItem('locked_franchise_name') || 'Main';
            const accessKey = SecurityManager.getAccessKey();

            let authQuery = isSuper 
                ? `?access_key=${accessKey}` 
                : `?franchise_id=${localStorage.getItem('locked_franchise_id')}&access_key=${accessKey}`;

            document.getElementById('student-subheader').innerText = isSuper 
                ? "Global Network Records • Master View" 
                : `Active Enrollment Directory • ${branchName}`;
            
            document.getElementById('modal-branch-label').innerText = isSuper 
                ? "Global Administration Mode" 
                : `${branchName} Branch Records`;

            try {
                // Fetch Core Data + Franchises if HO
                const requests = [
                    fetch(`${window.NEST_ENDPOINTS.student.list}${authQuery}`),
                    fetch(`${window.NEST_ENDPOINTS.parent.list}${authQuery}`),
                    fetch(`${window.NEST_ENDPOINTS.session.list}${authQuery}`)
                ];
                if (isSuper) requests.push(fetch(`${window.NEST_ENDPOINTS.franchise.list}?access_key=${accessKey}`));

                const responses = await Promise.all(requests);
                const [sRaw, pRaw, sessRaw] = await Promise.all([responses[0].json(), responses[1].json(), responses[2].json()]);
                
                if (isSuper) {
                    const fRaw = await responses[3].json();
                    (Array.isArray(fRaw) ? fRaw : fRaw.items || []).forEach(f => { this.franchises[f.id] = f.name; });
                }

                this.data = Array.isArray(sRaw) ? sRaw : (sRaw.items || sRaw.data || []);
                this.parents = Array.isArray(pRaw) ? pRaw : (pRaw.items || pRaw.data || []);
                this.sessions = Array.isArray(sessRaw) ? sessRaw : (sessRaw.items || sessRaw.data || []);
                
                this.buildFormUI(); 
                this.render();
                this.setupListeners();
            } catch (err) {
                console.error("Data Sync Error:", err);
            }
        },

        formatEpoch(ms) {
            if (!ms) return '---';
            const d = new Date(ms);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        },

        buildFormUI() {
            const grid = document.getElementById('student-fields-grid');
            grid.innerHTML = '';
            let currentSection = "";

            this.schema.fields.forEach(f => {
                if (f.id === 'id' || f.id === 'franchise_id' || f.hidden) return;
                if (f.section && f.section !== currentSection) {
                    currentSection = f.section;
                    grid.insertAdjacentHTML('beforeend', `<div class="col-span-full mt-4 mb-1 border-b border-slate-100 pb-1"><span class="text-[8px] font-black text-nest-teal uppercase tracking-widest">${currentSection}</span></div>`);
                }

                const spanClass = f.width === 'full' ? 'col-span-full' : 'col-span-1';
                let inputHTML = '';

                if (f.id === 'parent_id') {
                    inputHTML = `<select id="parent_id" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-[11px] outline-none font-bold uppercase">
                        <option value="">Select Parent</option>
                        ${this.parents.map(p => `<option value="${p.id}">${p.first_name} ${p.last_name}</option>`).join('')}
                    </select>`;
                } else if (f.id === 'session_enrolled') {
                    inputHTML = `<select id="session_enrolled" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-[11px] outline-none font-bold uppercase">
                        <option value="">Select Session</option>
                        ${this.sessions.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
                    </select>`;
                } else if (f.type === 'bool') {
                    inputHTML = `<div class="flex items-center gap-3 p-2 bg-slate-50 border border-slate-200 rounded-lg"><input type="checkbox" id="${f.id}" class="w-3.5 h-3.5 accent-[var(--nest-teal)]"><span class="text-[9px] font-bold text-slate-500 uppercase">${f.label} Status</span></div>`;
                } else {
                    const readonly = f.readonly ? 'readonly' : '';
                    inputHTML = `<input type="${f.type === 'epochms' ? 'text' : f.type}" id="${f.id}" ${readonly} class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-[11px] outline-none font-bold ${f.readonly ? 'text-slate-400' : ''}">`;
                }

                grid.insertAdjacentHTML('beforeend', `<div class="${spanClass}"><label class="text-[8px] text-slate-400 block uppercase font-black mb-1 ml-1 tracking-wider">${f.label}</label>${inputHTML}</div>`);
            });
        },

        render() {
            const container = document.getElementById('student-list-container');
            const search = (document.getElementById('student-search')?.value || '').toLowerCase();
            const sortType = document.getElementById('student-sort').value;
            const isSuper = SecurityManager.isHeadOffice();
            
            let filtered = this.data.filter(s => (s.name && s.name.toLowerCase().includes(search)));

            filtered.sort((a, b) => {
                if (sortType === 'franchise') return (a.franchise_id || 0) - (b.franchise_id || 0) || a.name.localeCompare(b.name);
                if (sortType === 'status') return (b.is_active === a.is_active) ? a.name.localeCompare(b.name) : (b.is_active ? 1 : -1);
                return a.name.localeCompare(b.name);
            });

            container.innerHTML = '';
            if (filtered.length === 0) {
                container.innerHTML = '<div class="p-10 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest">No matching student records.</div>';
                return;
            }

            filtered.forEach(s => {
                const parent = this.parents.find(p => p.id === s.parent_id);
                const parentDisplay = parent ? `${parent.last_name}, ${parent.first_name}` : `ID: ${s.parent_id}`;
                const session = this.sessions.find(sess => sess.id === s.session_enrolled);
                const sessionDisplay = session ? session.name : `---`;
                const branchBadge = isSuper ? `<span class="px-1.5 py-0.5 rounded bg-nest-dark text-white text-[7px] font-black uppercase ml-1" style="background: var(--nest-dark)">${this.franchises[s.franchise_id] || 'BRANCH ' + s.franchise_id}</span>` : '';

                container.insertAdjacentHTML('beforeend', `
                    <div class="bg-white border border-slate-200 rounded-lg shadow-sm hover:border-[var(--nest-teal)] transition-all px-4 py-2">
                        <div class="grid grid-cols-1 md:grid-cols-12 items-center gap-4">
                            <div class="col-span-3">
                                <div class="text-[11px] font-black text-nest-dark uppercase leading-none">${s.name} ${branchBadge}</div>
                                <div class="text-[9px] text-slate-400 font-bold uppercase mt-0.5">${s.date_of_birth || 'No DOB'}</div>
                            </div>
                            <div class="col-span-3">
                                <div class="text-[10px] text-slate-600 font-bold uppercase">${parentDisplay}</div>
                            </div>
                            <div class="col-span-3">
                                <div class="text-[10px] font-black text-nest-teal uppercase">${sessionDisplay}</div>
                            </div>
                            <div class="col-span-1 text-center">
                                <span class="px-2 py-0.5 rounded text-[7px] font-black uppercase border ${s.is_active ? 'bg-teal-50 text-nest-teal border-teal-100' : 'bg-red-50 text-red-600 border-red-100'}" ${s.is_active ? 'style="color: var(--nest-teal); border-color: var(--nest-teal); opacity: 0.8;"' : ''}>
                                    ${s.is_active ? 'Active' : 'Arch'}
                                </span>
                            </div>
                            <div class="col-span-2 text-right flex justify-end gap-2">
                                <button data-id="${s.id}" class="student-edit-btn px-3 py-1 bg-slate-50 border border-slate-200 rounded text-[8px] font-black text-slate-600 hover:bg-nest-dark hover:text-white transition-all uppercase">Edit</button>
                                <button data-id="${s.id}" class="student-delete-btn px-3 py-1 bg-red-50 border border-red-100 rounded text-[8px] font-black text-red-600 hover:bg-red-600 hover:text-white transition-all uppercase">Delete</button>
                            </div>
                        </div>
                    </div>
                `);
            });

            container.querySelectorAll('.student-edit-btn').forEach(b => b.onclick = () => this.openModal(this.data.find(x => x.id == b.dataset.id)));
            container.querySelectorAll('.student-delete-btn').forEach(b => b.onclick = () => this.deleteRecord(b.dataset.id));
        },

        async deleteRecord(id) {
            if (!confirm("Permanently remove this student record?")) return;
            const accessKey = SecurityManager.getAccessKey();
            try {
                const res = await fetch(`${window.NEST_ENDPOINTS.student.list}/${id}?access_key=${accessKey}`, { method: 'DELETE' });
                if (res.ok) this.init();
            } catch (err) { console.error("Delete Error:", err); }
        },

        openModal(s) {
            document.getElementById('student-modal').classList.remove('hidden');
            document.getElementById('student-form').reset();
            document.getElementById('s-edit-id').value = s.id;
            this.schema.fields.forEach(f => {
                const el = document.getElementById(f.id);
                if (el) {
                    if (f.id === 'created_at') el.value = this.formatEpoch(s.created_at);
                    else if (f.type === 'bool') el.checked = !!s[f.id];
                    else el.value = s[f.id] || '';
                }
            });
        },

        closeModal() { document.getElementById('student-modal').classList.add('hidden'); },

        setupListeners() {
            document.getElementById('student-search').oninput = () => this.render();
            document.getElementById('student-sort').onchange = () => this.render();
            document.getElementById('close-s-modal-x').onclick = () => this.closeModal();
            document.getElementById('cancel-s-modal-btn').onclick = () => this.closeModal();

            document.getElementById('student-form').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('s-edit-id').value;
                const accessKey = SecurityManager.getAccessKey();
                const payload = {};
                this.schema.fields.forEach(f => {
                    const el = document.getElementById(f.id);
                    if (el && f.id !== 'id' && f.id !== 'franchise_id' && !f.readonly) {
                        payload[f.id] = (f.type === 'bool') ? el.checked : el.value;
                        if (f.type === 'int' || f.id === 'parent_id' || f.id === 'session_enrolled') {
                            payload[f.id] = el.value ? parseInt(el.value) : null;
                        }
                    }
                });

                const res = await fetch(`${window.NEST_ENDPOINTS.student.list}/${id}?access_key=${accessKey}`, { 
                    method: 'PATCH', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                if (res.ok) { this.closeModal(); this.init(); }
            };
        },

        async loadScript(src) {
            return new Promise(resolve => {
                const s = document.createElement('script'); s.src = src; s.onload = resolve;
                s.onerror = () => { 
                    const fallback = src.replace('../', '');
                    const s2 = document.createElement('script'); s2.src = fallback; s2.onload = resolve;
                    document.head.appendChild(s2);
                };
                document.head.appendChild(s);
            });
        }
    };
    StudentModule.init();
})();
</script>
