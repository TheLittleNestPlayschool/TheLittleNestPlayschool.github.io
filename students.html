<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
        <h1 class="text-2xl font-bold text-emerald-500 uppercase tracking-tight">Student Roster</h1>
        <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Franchise Management System</p>
    </div>
    
    <div class="flex flex-wrap gap-2 w-full md:w-auto">
        <input type="text" id="student-search" placeholder="Search students..." 
            class="pl-4 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-xs outline-none focus:border-slate-500 shadow-sm w-full md:w-64">

        <button id="add-student-btn" class="bg-[#1e293b] hover:bg-slate-900 text-white px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase tracking-wider shadow-md">
            + ENROLL STUDENT
        </button>
    </div>
</div>

<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-slate-100 border-b border-slate-200">
                <th class="p-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Student Name</th>
                <th class="p-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Birth Date</th>
                <th class="p-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Status</th>
                <th class="p-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest text-right">Actions</th>
            </tr>
        </thead>
        <tbody id="student-table-body">
            <tr><td colspan="4" class="p-10 text-center text-slate-400 text-xs italic font-medium uppercase tracking-widest animate-pulse">Syncing NestMind Database...</td></tr>
        </tbody>
    </table>
</div>

<div id="student-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden border border-slate-300">
        <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
            <div>
                <h2 id="s-modal-title" class="text-sm font-bold text-slate-800 uppercase">Student Profile</h2>
                <p class="text-[9px] text-slate-400 uppercase tracking-tighter">Enter legal enrollment details</p>
            </div>
            <button id="close-s-modal-x" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
        </div>
        
        <form id="student-form" class="p-6 space-y-4">
            <input type="hidden" id="s-edit-id">
            <input type="hidden" id="s-franchise-id">
            
            <div>
                <label class="text-[9px] text-slate-500 block uppercase font-bold mb-1">Full Name</label>
                <input type="text" id="name" required class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded text-xs focus:ring-1 focus:ring-emerald-500 outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] text-slate-500 block uppercase font-bold mb-1">Date of Birth</label>
                    <input type="date" id="date_of_birth" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded text-xs focus:ring-1 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="text-[9px] text-slate-500 block uppercase font-bold mb-1">Status</label>
                    <div class="flex items-center mt-2">
                        <input type="checkbox" id="student_active" class="w-4 h-4 rounded border-slate-300 text-emerald-500 focus:ring-emerald-500 mr-2">
                        <span class="text-[10px] font-bold text-slate-700 uppercase">Currently Enrolled</span>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 pt-6 border-t border-slate-100">
                <button type="button" id="cancel-s-modal-btn" class="px-6 py-2.5 bg-slate-100 text-slate-500 rounded-lg font-bold text-[10px] uppercase hover:bg-slate-200 transition-all">Cancel</button>
                <button type="submit" class="flex-1 py-2.5 bg-[#1e293b] text-white rounded-lg font-bold text-[10px] uppercase shadow-lg hover:bg-black transition-all">
                    Save Student Record
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const StudentModule = {
        API: "https://x8ki-letl-twmt.n7.xano.io/api:iEHfqd-N/student",
        data: [],

        async init() {
            const fid = localStorage.getItem('locked_franchise_id');
            const tbody = document.getElementById('student-table-body');
            this.data = [];
            if (tbody) tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400 text-xs italic font-bold uppercase tracking-widest animate-pulse">Syncing Students...</td></tr>';
            if (!fid) return;

            try {
                const response = await fetch(`${this.API}?franchise_id=${fid}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                this.data = await response.json();
                this.render();
                this.setupListeners();
            } catch (error) {
                console.error("Student Sync Error:", error);
                if (tbody) tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-500 text-xs font-bold uppercase tracking-widest font-black">SYNC FAILED: Verify API Group iEHfqd-N</td></tr>';
            }
        },

        render() {
            const tbody = document.getElementById('student-table-body');
            if (!tbody) return;
            const search = (document.getElementById('student-search')?.value || '').toLowerCase();
            let filtered = this.data.filter(s => (s.name && s.name.toLowerCase().includes(search)));

            tbody.innerHTML = '';
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-300 text-[10px] font-bold uppercase tracking-widest">No Student Records Found.</td></tr>';
                return;
            }

            filtered.forEach((s, idx) => {
                const bg = idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/40';
                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="${bg} border-b border-slate-100 text-xs text-slate-600 hover:bg-slate-50 transition-all group">
                        <td class="p-4">
                            <div class="font-bold text-slate-900 text-sm group-hover:text-emerald-600 transition-colors uppercase">${s.name}</div>
                            <div class="text-[9px] text-slate-400 mt-0.5 uppercase tracking-tighter">ID: #ST-${s.id}</div>
                        </td>
                        <td class="p-4 text-[10px] font-mono font-bold text-slate-500">${s.date_of_birth || '---'}</td>
                        <td class="p-4">
                            <span class="px-2.5 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter ${s.is_active ? 'bg-emerald-50 text-emerald-600 border border-emerald-200' : 'bg-slate-100 text-slate-400 border border-slate-200'}">
                                ${s.is_active ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td class="p-4 text-right">
                            <button data-id="${s.id}" class="student-edit-btn px-3 py-1.5 bg-white border border-slate-200 rounded text-slate-500 hover:text-emerald-600 transition-all uppercase font-bold text-[9px]">Edit</button>
                        </td>
                    </tr>
                `);
            });

            tbody.querySelectorAll('.student-edit-btn').forEach(b => b.onclick = () => this.openModal(this.data.find(x => x.id == b.dataset.id)));
        },

        setupListeners() {
            document.getElementById('student-search').oninput = () => this.render();
            document.getElementById('add-student-btn').onclick = () => this.openModal();
            document.getElementById('close-s-modal-x').onclick = () => this.closeModal();
            document.getElementById('cancel-s-modal-btn').onclick = () => this.closeModal();
        },

        openModal(s = null) {
            const modal = document.getElementById('student-modal');
            modal.classList.remove('hidden');
            document.getElementById('student-form').reset();
            document.getElementById('s-edit-id').value = s ? s.id : '';
            document.getElementById('s-franchise-id').value = localStorage.getItem('locked_franchise_id');
            document.getElementById('s-modal-title').innerText = s ? 'Update Student Record' : 'Enroll New Student';

            if(s) {
                document.getElementById('name').value = s.name || '';
                document.getElementById('date_of_birth').value = s.date_of_birth || '';
                document.getElementById('student_active').checked = s.is_active;
            } else {
                document.getElementById('student_active').checked = true;
            }
        },

        closeModal() { document.getElementById('student-modal').classList.add('hidden'); }
    };

    document.getElementById('student-form').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('s-edit-id').value;
        const fid = document.getElementById('s-franchise-id').value;
        const payload = { 
            franchise_id: parseInt(fid),
            name: document.getElementById('name').value,
            date_of_birth: document.getElementById('date_of_birth').value,
            is_active: document.getElementById('student_active').checked
        };

        const res = await fetch(id ? `${StudentModule.API}/${id}` : StudentModule.API, { 
            method: id ? 'PATCH' : 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify(payload) 
        });
        if (res.ok) {
            StudentModule.closeModal();
            StudentModule.init();
        }
    };
    StudentModule.init();
})();
</script>
