<style>
    /* Direct visual match to Parent Directory styles */
    .student-card { transition: all 0.3s ease; }
    .student-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    .status-pill { padding: 4px 12px; border-radius: 9999px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    .active-bg { background-color: #ecfdf5; color: #059669; border: 1px solid #d1fae5; }
    .inactive-bg { background-color: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
</style>

<div class="max-w-7xl mx-auto p-2">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
        <div class="text-left">
            <h1 class="text-5xl font-black text-slate-800 tracking-tighter">Student Management</h1>
            <p class="text-slate-400 font-medium mt-1">Enrollment, records, and academic status tracking.</p>
        </div>
        <button onclick="openStudentModal()" class="bg-[#00d1b2] hover:bg-[#00bfa5] text-white px-8 py-4 rounded-2xl font-black transition-all shadow-lg flex items-center gap-3">
            <span class="text-xl">+</span> NEW STUDENT
        </button>
    </div>

    <div class="bg-white rounded-[2rem] border border-slate-200 shadow-xl shadow-slate-200/50 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50/50 border-b border-slate-100">
                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">ID</th>
                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Student Name</th>
                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Parent / Guardian</th>
                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Date of Birth</th>
                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Status</th>
                    <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Management</th>
                </tr>
            </thead>
            <tbody id="student-table-body" class="divide-y divide-slate-50">
                <tr><td colspan="6" class="p-24 text-center"><div class="animate-pulse text-slate-300 font-black text-xl italic tracking-tighter">SYNCHRONIZING RECORDS...</div></td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="student-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-xl overflow-hidden border border-white/20 transform transition-all">
        <div class="p-10 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <div>
                <h2 id="modal-title" class="text-3xl font-black text-slate-800 tracking-tighter">Register Student</h2>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Student Profile Details</p>
            </div>
            <button onclick="closeStudentModal()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white border border-slate-200 text-slate-400 hover:text-red-500 transition-all font-bold text-2xl">&times;</button>
        </div>
        <form id="student-form" class="p-10 space-y-6">
            <input type="hidden" id="edit-student-id">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Student Full Name</label>
                <input type="text" id="student_name" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-[#00d1b2]">
            </div>
            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Birth Date</label>
                    <input type="date" id="dob" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Assign Parent</label>
                    <select id="parent_select" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold outline-none">
                        <option value="">-- Select Parent --</option>
                    </select>
                </div>
            </div>
            <div class="pt-6 flex gap-4">
                <button type="button" onclick="closeStudentModal()" class="flex-1 p-5 bg-slate-100 text-slate-500 rounded-2xl font-black uppercase text-xs tracking-widest">Cancel</button>
                <button type="submit" class="flex-1 p-5 bg-[#0b0f1a] text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">Save Student</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_BASE = "https://x8ki-letl-twmt.n7.xano.io/api:8Je8Zszx";
    const STUDENT_API = `${API_BASE}/student`;
    const PARENT_API = `${API_BASE}/parent`;

    let parentStore = {};

    async function loadData() {
        const fid = localStorage.getItem('locked_franchise_id');
        const tbody = document.getElementById('student-table-body');
        
        try {
            // Fetch Parents for name mapping
            const pRes = await fetch(`${PARENT_API}?franchise_id=${fid}`);
            const parents = await pRes.json();
            const pSelect = document.getElementById('parent_select');
            pSelect.innerHTML = '<option value="">-- Select Parent --</option>';
            
            parents.forEach(p => {
                parentStore[p.id] = `${p.first_name} ${p.last_name}`;
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.innerText = `${p.first_name} ${p.last_name}`;
                pSelect.appendChild(opt);
            });

            // Fetch Students [cite: 2026-02-05]
            const sRes = await fetch(`${STUDENT_API}?franchise_id=${fid}`);
            const students = await sRes.json();
            
            tbody.innerHTML = '';
            students.forEach(s => {
                const bday = s.date_of_birth ? new Date(s.date_of_birth).toLocaleDateString() : '---';
                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-slate-50/80 transition-all border-b border-slate-50">
                        <td class="p-6 text-sm font-bold text-slate-400">#${s.id}</td>
                        <td class="p-6 text-sm font-black text-slate-800">${s.name}</td>
                        <td class="p-6 text-sm font-bold text-[#00d1b2]">${parentStore[s.parent_id] || '---'}</td>
                        <td class="p-6 text-center text-sm font-bold text-slate-500 italic">${bday}</td>
                        <td class="p-6 text-center">
                            <span class="status-pill ${s.is_active ? 'active-bg' : 'inactive-bg'}">${s.is_active ? 'Active' : 'Inactive'}</span>
                        </td>
                        <td class="p-6 text-right">
                            <button onclick='openStudentModal(${JSON.stringify(s)})' class="bg-white border border-slate-200 text-slate-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:border-slate-800 hover:text-slate-800 transition-all">Edit Profile</button>
                        </td>
                    </tr>
                `);
            });
        } catch (e) { 
            tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-red-500 font-bold">Failed to synchronize with Xano.</td></tr>'; 
        }
    }

    function openStudentModal(s = null) {
        document.getElementById('student-modal').classList.remove('hidden');
        if(s) {
            document.getElementById('edit-student-id').value = s.id;
            document.getElementById('student_name').value = s.name;
            document.getElementById('dob').value = s.date_of_birth ? s.date_of_birth.split('T')[0] : '';
            document.getElementById('parent_select').value = s.parent_id;
        }
    }

    function closeStudentModal() { document.getElementById('student-modal').classList.add('hidden'); }

    document.getElementById('student-form').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-student-id').value;
        const payload = {
            name: document.getElementById('student_name').value,
            date_of_birth: document.getElementById('dob').value,
            parent_id: parseInt(document.getElementById('parent_select').value),
            franchise_id: parseInt(localStorage.getItem('locked_franchise_id')),
            is_active: true
        };
        const method = id ? 'PATCH' : 'POST';
        const url = id ? `${STUDENT_API}/${id}` : STUDENT_API;
        await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        closeStudentModal();
        loadData();
    };

    loadData();
</script>
