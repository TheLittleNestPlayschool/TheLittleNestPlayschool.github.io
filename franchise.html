<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
    <h1 class="module-title">Franchise Manager</h1>
    <button onclick="openNewFranchiseModal()" class="btn-main" style="background:#00d1b2; color:#1a1a1a; border:none; padding:10px 20px; cursor:pointer; font-weight:bold; border-radius:4px;">+ NEW FRANCHISE</button>
</div>

<div id="franchise-container">
    <div style="text-align:center; padding:50px; border:1px solid #eee; border-radius: 8px;">Syncing Franchise Data...</div>
</div>

<div id="modal-franchise" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:99999; justify-content:center; align-items:center;">
    <div style="background:white; width:1000px; border-radius:8px; display:flex; flex-direction:column; max-height:95vh;">
        <div style="padding:20px; border-bottom:1px solid #eee; background:#f9f9f9;">
            <h3 style="margin:0;">Franchise Profile Editor</h3>
        </div>
        <div style="padding:25px; overflow-y:auto; flex-grow:1;">
            <input type="hidden" id="f-id">
            <h4 style="border-bottom:2px solid #00d1b2; padding-bottom:5px; margin-top:0;">1. Franchise & Brand Information</h4>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin-bottom:25px;">
               <div style="grid-column: span 2;"><label>Franchise Name</label><input type="text" id="f-name"></div>
               <div><label>Status</label>
                   <select id="f-status">
                       <option value="active">active</option>
                       <option value="on_hold">on_hold</option>
                       <option value="closed">closed</option>
                       <option value="pending_opening">pending_opening</option>
                   </select>
               </div>
               <div style="grid-column: span 2;"><label>Full Address</label><input type="text" id="f-address"></div>
               <div><label>Opening Date</label><input type="date" id="f-opening_date"></div>
               <div><label>Main Phone</label><input type="text" id="f-phone_number"></div>
               <div><label>Franchise Email</label><input type="email" id="f-franchise_email"></div>
               <div><label>Royalty Rate (%)</label><input type="number" id="f-royalty_rate" step="0.01"></div>
               <div><label>Business Tax ID</label><input type="text" id="f-business_tax_id"></div>
            </div>
            <h4 style="border-bottom:2px solid #00d1b2; padding-bottom:5px;">2. Owners & Contact Info</h4>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px;">
               <div><label>Owner 1 Name</label><input type="text" id="f-owner_1_name"></div>
               <div><label>Owner 1 Phone</label><input type="text" id="f-owner_1_phone"></div>
               <div><label>Owner 1 Email</label><input type="email" id="f-owner_1_email"></div>
               <div><label>Owner 2 Name</label><input type="text" id="f-owner_2_name"></div>
               <div><label>Owner 2 Phone</label><input type="text" id="f-owner_2_phone"></div>
               <div><label>Owner 2 Email</label><input type="email" id="f-owner_2_email"></div>
            </div>
            <h4 style="border-bottom:2px solid #00d1b2; padding-bottom:5px; margin-top:15px;">3. Social Media & Notes</h4>
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:15px;">
               <div><label>FB</label><input type="text" id="f-social_fb"></div>
               <div><label>IG</label><input type="text" id="f-social_ig"></div>
               <div><label>LI</label><input type="text" id="f-social_li"></div>
               <div><label>TikTok</label><input type="text" id="f-social_tiktok"></div>
            </div>
            <label style="margin-top:10px;">Internal Notes</label>
            <textarea id="f-internal_notes" style="width:100%; height:60px; border:1px solid #ccc; border-radius:4px;"></textarea>
        </div>
        <div style="padding:20px; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:12px; background:#f9f9f9;">
            <button onclick="document.getElementById('modal-franchise').style.display='none'">CANCEL</button>
            <button onclick="submitFranchise()" class="btn-main" style="background:#00d1b2; color:#1a1a1a; border:none; padding:10px 25px; cursor:pointer; font-weight:bold; border-radius:4px; text-transform:uppercase; font-size:0.75rem;">SAVE RECORD</button>
        </div>
    </div>
</div>

<script>
    const F_API = 'https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/franchise';

    async function loadFranchises() {
        const container = document.getElementById('franchise-container');
        try {
            const res = await fetch(F_API + '?t=' + Date.now());
            const data = await res.json();
            let list = Array.isArray(data) ? data : (data.items || []);
            
            if (list.length === 0) {
               container.innerHTML = '<div style="text-align:center; padding:50px; border:1px solid #eee; border-radius: 8px;">No Records Found.</div>';
               return;
            }

           list.sort((a, b) => a.id - b.id);
           container.innerHTML = list.map(f => `
               <div class="card" style="background:#fff; border:1px solid #eee; border-radius:8px; padding:20px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.05);">
                   <div style="display: flex; justify-content: space-between; border-bottom: 2px solid #00d1b2; padding-bottom: 10px; margin-bottom: 15px;">
                       <h2 style="margin:0; font-size:1.2rem; font-family: Georgia, serif; color: #1a365d;">${f.name || 'N/A'}</h2>
                       <div style="display:flex; gap:10px; align-items:center;">
                           <span style="font-weight:900; color:#00d1b2; text-transform:uppercase; font-size:0.75rem;">${(f.status || '').replace('_',' ')}</span>
                           <button onclick="editFranchise(${f.id})" style="color:blue; border:1px solid blue; background:none; cursor:pointer; font-weight:bold; border-radius:4px; padding:2px 8px; font-size:0.7rem;">EDIT</button>
                           <button onclick="deleteFranchise(${f.id})" style="color:red; border:1px solid red; background:none; cursor:pointer; font-weight:bold; border-radius:4px; padding:2px 8px; font-size:0.7rem;">DEL</button>
                       </div>
                   </div>

                   <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:20px; font-size:0.8rem;">
                       <div>
                           <label style="color:#999; font-weight:800; font-size:0.6rem; display:block; text-transform:uppercase;">Location & Contact</label>
                           <strong>Addr:</strong> ${f.address || 'N/A'}<br>
                           <strong>Phone:</strong> ${f.phone_number || 'N/A'}<br>
                           <strong>Email:</strong> ${f.franchise_email || 'N/A'}
                       </div>

                       <div>
                           <label style="color:#999; font-weight:800; font-size:0.6rem; display:block; text-transform:uppercase;">Owners</label>
                           <strong>Owner 1:</strong> ${f.owner_1_name || 'N/A'}<br>
                           <span style="font-size:0.7rem; color:#666;">${f.owner_1_phone || 'N/A'} | ${f.owner_1_email || 'N/A'}</span><br>
                           <strong>Owner 2:</strong> ${f.owner_2_name || 'N/A'}<br>
                           <span style="font-size:0.7rem; color:#666;">${f.owner_2_phone || 'N/A'} | ${f.owner_2_email || 'N/A'}</span>
                       </div>

                       <div>
                           <label style="color:#999; font-weight:800; font-size:0.6rem; display:block; text-transform:uppercase;">Business Info</label>
                           <strong>Opened:</strong> ${f.opening_date || 'N/A'}<br>
                           <strong>Royalty:</strong> ${f.royalty_rate}%<br>
                           <strong>Tax ID:</strong> ${f.business_tax_id || 'N/A'}
                       </div>

                       <div>
                           <label style="color:#999; font-weight:800; font-size:0.6rem; display:block; text-transform:uppercase;">Social & Notes</label>
                           <strong>FB:</strong> ${f.social_fb || '-'}<br>
                           <strong>IG:</strong> ${f.social_ig || '-'}<br>
                           <strong>Notes:</strong> ${f.internal_notes || 'None'}
                       </div>
                   </div>
               </div>`).join('');
            
        } catch(e) { container.innerHTML = "Error: " + e.message; }
    }

    async function editFranchise(id) {
        try {
            const res = await fetch(`${F_API}/${id}`);
            const data = await res.json();
            const f = data.result1 || data;

            document.getElementById('f-id').value = f.id;
            document.getElementById('f-name').value = f.name || "";
            document.getElementById('f-address').value = f.address || "";
            document.getElementById('f-phone_number').value = f.phone_number || "";
            document.getElementById('f-royalty_rate').value = f.royalty_rate || 0;
            document.getElementById('f-owner_1_name').value = f.owner_1_name || "";
            document.getElementById('f-owner_1_phone').value = f.owner_1_phone || "";
            document.getElementById('f-owner_1_email').value = f.owner_1_email || "";
            document.getElementById('f-owner_2_name').value = f.owner_2_name || "";
            document.getElementById('f-owner_2_phone').value = f.owner_2_phone || "";
            document.getElementById('f-owner_2_email').value = f.owner_2_email || "";
            document.getElementById('f-franchise_email').value = f.franchise_email || "";
            document.getElementById('f-status').value = f.status || "active";
            document.getElementById('f-opening_date').value = f.opening_date || "";
            document.getElementById('f-business_tax_id').value = f.business_tax_id || "";
            document.getElementById('f-internal_notes').value = f.internal_notes || "";
            document.getElementById('f-social_fb').value = f.social_fb || "";
            document.getElementById('f-social_ig').value = f.social_ig || "";
            document.getElementById('f-social_li').value = f.social_li || "";
            document.getElementById('f-social_tiktok').value = f.social_tiktok || "";

            document.getElementById('modal-franchise').style.display = 'flex';
        } catch (e) { console.error("Edit load failed:", e); }
    }

    async function submitFranchise() {
        const id = document.getElementById('f-id').value;
        const opDate = document.getElementById('f-opening_date').value;
        
        const payload = {
            name: document.getElementById('f-name').value,
            address: document.getElementById('f-address').value,
            phone_number: document.getElementById('f-phone_number').value,
            royalty_rate: parseFloat(document.getElementById('f-royalty_rate').value) || 0,
            owner_1_name: document.getElementById('f-owner_1_name').value,
            owner_1_phone: document.getElementById('f-owner_1_phone').value,
            owner_1_email: document.getElementById('f-owner_1_email').value,
            owner_2_name: document.getElementById('f-owner_2_name').value,
            owner_2_phone: document.getElementById('f-owner_2_phone').value,
            owner_2_email: document.getElementById('f-owner_2_email').value,
            franchise_email: document.getElementById('f-franchise_email').value,
            status: document.getElementById('f-status').value,
            opening_date: opDate === "" ? null : opDate, 
            business_tax_id: document.getElementById('f-business_tax_id').value,
            internal_notes: document.getElementById('f-internal_notes').value,
            social_fb: document.getElementById('f-social_fb').value,
            social_ig: document.getElementById('f-social_ig').value,
            social_li: document.getElementById('f-social_li').value,
            social_tiktok: document.getElementById('f-social_tiktok').value
        };

        try {
            const res = await fetch(id ? `${F_API}/${id}` : F_API, {
                method: id ? 'PATCH' : 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            if (res.ok) {
               document.getElementById('modal-franchise').style.display = 'none';
               loadFranchises();
            } else {
                alert("Save Failed.");
            }
        } catch (err) { console.error("Save failed:", err); }
    }

    async function deleteFranchise(id) {
       if(confirm("Permanent Delete?")) {
            await fetch(`${F_API}/${id}`, { method: 'DELETE' });
            loadFranchises();
        }
    }

    function openNewFranchiseModal() {
        document.getElementById('f-id').value = "";
        document.querySelectorAll('#modal-franchise input, #modal-franchise select, #modal-franchise textarea').forEach(i => i.value = "");
        document.getElementById('f-status').value = "active";
        document.getElementById('modal-franchise').style.display = 'flex';
    }

    loadFranchises();
</script>
