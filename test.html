<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Animation UI</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: sans-serif;
    background: linear-gradient(to bottom, #b4bce0, #ffffff);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .mobile-frame {
    width: 375px;
    height: 750px;
    background: white;
    border-radius: 40px;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  }

  @keyframes float {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
    100% { transform: translateY(0px) rotate(0deg); }
  }

  .shape { 
    position: absolute; 
    animation: float 7s ease-in-out infinite;
    opacity: 0.8;
  }

  /* 3 Circles */
  .circle { border-radius: 50%; }
  .c1 { width: 60px; height: 60px; background: #e62e53; top: 80px; left: 20px; }
  .c2 { width: 100px; height: 100px; background: #a3a3c2; top: 150px; right: 20px; }
  .c3 { width: 70px; height: 70px; background: #c09cfb; top: 300px; left: 100px; }

  /* 2 Squares */
  .s1 { width: 80px; height: 80px; background: #4ecdc4; top: 120px; left: 100px; }
  .s2 { width: 50px; height: 50px; background: #ffbe0b; top: 400px; right: 50px; }

  /* 2 Triangles */
  .t1 { width: 0; height: 0; border-left: 50px solid transparent; border-right: 50px solid transparent; border-bottom: 80px solid #fb6f92; top: 200px; left: 20px; }
  .t2 { width: 0; height: 0; border-left: 40px solid transparent; border-right: 40px solid transparent; border-bottom: 60px solid #8338ec; top: 450px; left: 20px; }

  /* 2 Rectangles */
  .r1 { width: 120px; height: 60px; background: #3a86ff; top: 250px; right: 10px; }
  .r2 { width: 60px; height: 100px; background: #ff9e00; top: 350px; left: 10px; }

  /* 1 Hexagon */
  .h1 { width: 100px; height: 55px; background: #ff006e; position: absolute; top: 500px; right: 80px; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }

  .content { position: relative; z-index: 10; margin-top: 400px; }
</style>
</head>
<body>

<div class="mobile-frame">
  <div class="shape circle c1"></div>
  <div class="shape circle c2"></div>
  <div class="shape circle c3"></div>
  <div class="shape s1"></div>
  <div class="shape s2"></div>
  <div class="shape t1"></div>
  <div class="shape t2"></div>
  <div class="shape r1"></div>
  <div class="shape r2"></div>
  <div class="shape h1"></div>

  <div class="content">
    <h3>SPEEDSPRINT</h3>
    <h1>Together, <br>we can.</h1>
  </div>
</div>

</body>
</html>
