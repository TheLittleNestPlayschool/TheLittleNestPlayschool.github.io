<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeedSprint UI</title>
<style>
  body { 
    margin: 0; padding: 0; font-family: 'Inter', sans-serif;
    background: linear-gradient(to bottom, #b4bce0, #ffffff);
    height: 100vh; display: flex; justify-content: center; align-items: center;
  }
  .mobile-frame {
    width: 375px; height: 750px; background: white; border-radius: 40px;
    padding: 40px 25px; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  }
  
  /* Circular Elements */
  .circle { position: absolute; border-radius: 50%; overflow: hidden; background-size: cover; background-position: center; }
  
  /* Positioning based on the new screenshot */
  .logo-circle { width: 60px; height: 60px; background-color: #e62e53; top: 120px; left: 40px; }
  .shoe-circle { width: 130px; height: 130px; background-image: url('shoe.jpg'); top: 120px; right: 40px; }
  .runner-circle { width: 100px; height: 100px; background-image: url('runner.jpg'); top: 230px; right: 20px; z-index: 3; }
  .track-violet { width: 250px; height: 250px; background-image: url('track-violet.jpg'); top: 250px; left: -20px; z-index: 2; }
  .track-red { width: 300px; height: 300px; background-image: url('track-red.jpg'); top: 350px; right: -60px; z-index: 1; }

  .content { position: absolute; bottom: 80px; left: 30px; right: 30px; }
  h3 { font-size: 11px; letter-spacing: 2px; color: #333; margin-bottom: 8px; text-transform: uppercase; }
  h1 { font-size: 42px; line-height: 1.1; margin-bottom: 40px; font-weight: 700; color: #000; }
  
  .btn {
    display: block; width: 100%; padding: 18px; border-radius: 14px;
    text-align: center; text-decoration: none; font-weight: 600; margin-bottom: 12px;
  }
  .btn-primary { background: #e62e53; color: white; }
  .btn-secondary { background: #f4f4f4; color: #333; }
</style>
</head>
<body>

<div class="mobile-frame">
  <div class="circle logo-circle"></div>
  <div class="circle shoe-circle"></div>
  <div class="circle runner-circle"></div>
  <div class="circle track-violet"></div>
  <div class="circle track-red"></div>

  <div class="content">
    <h3>SPEEDSPRINT</h3>
    <h1>Together, <br>we can.</h1>
    <a href="#" class="btn btn-primary">Sign up</a>
    <a href="#" class="btn btn-secondary">Log in</a>
  </div>
</div>

</body>
</html>
