<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Mobile UI</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom, #b4bce0, #ffffff);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .mobile-frame {
    width: 375px;
    height: 750px;
    background: white;
    border-radius: 40px;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  }

  /* Decorative Circles with Animation */
  @keyframes float {
    0% { transform: translateY(0px) translateX(0px); }
    50% { transform: translateY(-20px) translateX(10px); }
    100% { transform: translateY(0px) translateX(0px); }
  }

  .circle { 
    position: absolute; 
    border-radius: 50%; 
    overflow: hidden; 
    background-size: cover;
    background-position: center;
    animation: float 6s ease-in-out infinite;
    /* Placeholder colors if no images are loaded */
    border: 2px solid rgba(255,255,255,0.5);
  }

  /* Positioning and Specifics */
  .c1 { width: 60px; height: 60px; background-color: #e62e53; top: 100px; left: 30px; animation-duration: 7s; }
  .c2 { width: 150px; height: 150px; background-color: #a3a3c2; top: 80px; right: 20px; animation-duration: 9s; animation-delay: 1s; }
  .c3 { width: 220px; height: 220px; background-color: #c09cfb; top: 200px; left: -20px; animation-duration: 8s; animation-delay: 2s; }
  .c4 { width: 100px; height: 100px; background-color: #e62e53; top: 200px; right: 20px; animation-duration: 6s; }
  .c5 { width: 250px; height: 250px; background-color: #d62d51; top: 350px; right: -50px; animation-duration: 10s; animation-delay: 1.5s; }

  .content { position: relative; z-index: 10; margin-top: 400px; }
  h3 { font-size: 14px; letter-spacing: 1px; color: #333; margin-bottom: 10px; text-transform: uppercase; }
  h1 { font-size: 48px; line-height: 1.1; margin-bottom: 30px; }
  
  .btn {
    display: block;
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    text-decoration: none;
    font-weight: bold;
    margin-bottom: 10px;
    transition: transform 0.2s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #e62e53; color: white; }
  .btn-secondary { background: #f0f0f0; color: #333; }
</style>
</head>
<body>

<div class="mobile-frame">
  <!-- To add images, add: style="background-image: url('your-image.jpg');" to these divs -->
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>
  <div class="circle c4"></div>
  <div class="circle c5"></div>

  <div class="content">
    <h3>SPEEDSPRINT</h3>
    <h1>Together, <br>we can.</h1>
    <a href="#" class="btn btn-primary">Sign up</a>
    <a href="#" class="btn btn-secondary">Log in</a>
  </div>
</div>

</body>
</html>
