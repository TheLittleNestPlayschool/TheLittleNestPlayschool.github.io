<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeedSprint UI</title>
<style>
  body {
    margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #b4bce0, #ffffff);
    height: 100vh; display: flex; justify-content: center; align-items: center;
  }
  .mobile-frame {
    width: 375px; height: 750px; background: white; border-radius: 40px;
    padding: 40px 20px; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  }
  
  /* Circular Elements */
  .circle { position: absolute; border-radius: 50%; overflow: hidden; background-size: cover; background-position: center; }
  
  /* Brand Logo Circle */
  .logo-circle { width: 60px; height: 60px; background-color: #e62e53; top: 100px; left: 30px; }
  
  /* Violet Circle (People on track) */
  .violet-circle { width: 250px; height: 250px; background-image: url('image2.jpg'); top: 220px; left: 50px; z-index: 2; }
  
  /* Red Circle (Track lines) */
  .red-circle { width: 280px; height: 280px; background-image: url('image4.png'); top: 320px; right: -50px; z-index: 1; }

  .content { position: absolute; bottom: 100px; left: 20px; right: 20px; z-index: 10; }
  h3 { font-size: 12px; letter-spacing: 1.5px; color: #333; margin-bottom: 10px; text-transform: uppercase; }
  h1 { font-size: 42px; line-height: 1.1; margin-bottom: 30px; font-weight: 700; }
  
  .btn {
    display: block; width: 100%; padding: 16px; border-radius: 12px;
    text-align: center; text-decoration: none; font-weight: bold; margin-bottom: 12px;
  }
  .btn-primary { background: #e62e53; color: white; }
  .btn-secondary { background: #f0f0f0; color: #333; }
</style>
</head>
<body>

<div class="mobile-frame">
  <!-- Brand logo circle -->
  <div class="circle logo-circle"></div>
  
  <!-- Violet circle (people) and Red circle (track lines) -->
  <div class="circle violet-circle"></div>
  <div class="circle red-circle"></div>

  <div class="content">
    <h3>SPEEDSPRINT</h3>
    <h1>Together, <br>we can.</h1>
    <a href="#" class="btn btn-primary">Sign up</a>
    <a href="#" class="btn btn-secondary">Log in</a>
  </div>
</div>

</body>
</html>
