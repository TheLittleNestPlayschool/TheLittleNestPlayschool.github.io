<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static Circles UI</title>
<style>
  body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #e0e0e0; }
  .mobile-frame {
    width: 375px; height: 750px; background: white; border-radius: 40px;
    position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  }
  .circle { 
    position: absolute; border-radius: 50%; background-size: cover; background-position: center;
    border: 2px solid rgba(255,255,255,0.5);
  }
  .content { position: absolute; bottom: 50px; left: 20px; right: 20px; z-index: 10; }
  h3 { font-size: 14px; color: #333; margin-bottom: 10px; text-transform: uppercase; }
  h1 { font-size: 48px; line-height: 1.1; margin-bottom: 30px; }
</style>
</head>
<body>

<div class="mobile-frame">
  <!-- Static circles with fixed positions -->
  <div class="circle" style="width:100px; height:100px; top:50px; left:50px; background-image:url('image 1.webp');"></div>
  <div class="circle" style="width:120px; height:120px; top:100px; right:30px; background-image:url('image2.jpg');"></div>
  <div class="circle" style="width:90px; height:90px; top:200px; left:120px; background-image:url('image3.jpg');"></div>
  <div class="circle" style="width:110px; height:110px; top:250px; left:30px; background-image:url('image4.png');"></div>
  <div class="circle" style="width:95px; height:95px; top:320px; right:80px; background-color:#c09cfb;"></div>

  <div class="content">
    <h3>SPEEDSPRINT</h3>
    <h1>Together, <br>we can.</h1>
  </div>
</div>

</body>
</html>
