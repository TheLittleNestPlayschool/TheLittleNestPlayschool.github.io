<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncing Circles UI</title>
<style>
  body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #e0e0e0; }
  .mobile-frame {
    width: 375px; height: 750px; background: white; border-radius: 40px;
    position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
  }
  .circle { 
    position: absolute; border-radius: 50%; background-size: cover; background-position: center;
    border: 2px solid rgba(255,255,255,0.5);
  }
  .content { position: absolute; bottom: 50px; left: 20px; right: 20px; z-index: 10; }
  h3 { font-size: 14px; color: #333; margin-bottom: 10px; text-transform: uppercase; }
  h1 { font-size: 48px; line-height: 1.1; margin-bottom: 30px; }
</style>
</head>
<body>

<div class="mobile-frame" id="container">
  <!-- Added all 5 circles -->
  <div class="circle" style="width:80px; height:80px; z-index:1;"></div>
  <div class="circle" style="width:90px; height:90px; z-index:2;"></div>
  <div class="circle" style="width:70px; height:70px; z-index:3;"></div>
  <div class="circle" style="width:100px; height:100px; z-index:4;"></div>
  <div class="circle" style="width:85px; height:85px; z-index:5;"></div>

  <div class="content">
    <h3>SPEEDSPRINT</h3>
    <h1>Together, <br>we can.</h1>
  </div>
</div>

<script>
  const circles = document.querySelectorAll('.circle');
  const containerW = 375;
  const containerH = 750 * 0.75; 

  let props = Array.from(circles).map(c => ({
    el: c,
    x: Math.random() * (containerW - 80),
    y: Math.random() * (containerH - 80),
    vx: (Math.random() - 0.5) * 6,
    vy: (Math.random() - 0.5) * 6,
    r: c.offsetWidth / 2
  }));

  function move() {
    props.forEach((p, i) => {
      p.x += p.vx; p.y += p.vy;
      
      // Strict boundary check - reset if trapped
      if (p.x < 0) { p.x = 0; p.vx *= -1; }
      if (p.x > containerW - p.r * 2) { p.x = containerW - p.r * 2; p.vx *= -1; }
      if (p.y < 0) { p.y = 0; p.vy *= -1; }
      if (p.y > containerH - p.r * 2) { p.y = containerH - p.r * 2; p.vy *= -1; }

      // Collision Detection
      props.forEach((p2, j) => {
        if (i !== j) {
          let dx = (p.x + p.r) - (p2.x + p2.r);
          let dy = (p.y + p.r) - (p2.y + p2.r);
          if (Math.sqrt(dx*dx + dy*dy) < p.r + p2.r) {
            p.vx *= -1; p.vy *= -1;
          }
        }
      });
      p.el.style.left = p.x + 'px';
      p.el.style.top = p.y + 'px';
    });
    requestAnimationFrame(move);
  }
  move();
</script>
</body>
</html>
