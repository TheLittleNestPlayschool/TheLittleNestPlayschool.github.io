<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Corporate Dashboard | The Little Nest</title>
    <style>
        html, body { margin: 0; padding: 0; background: #f4f4f4; font-family: 'Inter', sans-serif; font-size: 15px; }
        .admin-sidebar { width: 250px; height: 100vh; background: #1a1a1a; position: fixed; left: 0; top: 0; padding: 0; z-index: 10000; }
        .main-content { margin-left: 250px; padding: 0; width: calc(100% - 250px); height: 100vh; background: #fff; box-sizing: border-box; overflow: hidden; position: relative; }
        .hub-frame { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <div class="admin-sidebar" id="nav-placeholder"></div>

    <main class="main-content" id="dashboard-content">
        <iframe id="main-frame" class="hub-frame" src="about:blank"></iframe>
    </main>

    <script>
        // 1. Load the sidebar menu
        fetch('enginemenu.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
                
                // 2. AUTO-LOAD the Corporate Dashboard immediately after menu loads
                loadFrame('corporate_dashboard.html', 'Corporate Dashboard');
            });

        function resetDashboard() {
            // Pointing Home back to the Corporate Dashboard for this specific portal
            loadFrame('corporate_dashboard.html', 'Corporate Dashboard');
        }

        function loadFrame(url, name) {
            const indicator = document.getElementById('screen-name');
            if(indicator) indicator.textContent = name;
            
            const frame = document.getElementById('main-frame');

            // Hard reset the frame source
            frame.src = 'about:blank';

            // CACHE-BUSTER: Force the browser to grab the latest version
            setTimeout(() => {
                // Check if URL already has parameters
                const separator = url.includes('?') ? '&' : '?';
                frame.src = url + separator + 'v=' + Date.now();
            }, 10);
        }
    </script>
</body>
</html>
