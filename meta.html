<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest - Sales Sidebar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* PREMIUM STEEL BLUE & RICH SLATE PALETTE - DARK MODE */
            --bg-dark: #0B0F19;         /* Rich Slate Black Background */
            --panel-dark: #131A26;      /* Deep Charcoal Panel Surface */
            --accent-primary: #4682B4;  /* Premium Steel Blue Accent */
            --accent-hover: #5C93C4;    /* Vibrant Slate Blue for Hover */
            --text-main: #F8FAFC;       /* Off-White High Readability Text */
            --text-muted: #94A3B8;      /* Balanced Slate Muted Gray */
            --border-color: #232E41;    /* Deep Slate Border Lines */
        }

        body.light-mode {
            /* MODERN STEEL BLUE & SLATE PALETTE - LIGHT MODE */
            --bg-dark: #F1F5F9;         /* Soft Cool Gray Background */
            --panel-dark: #FFFFFF;      /* Clean Pure White Surfaces */
            --accent-primary: #2C5E8A;  /* Deep Steel Blue for Light Mode */
            --accent-hover: #1E4263;    /* Dark Navy for Light Mode Hover */
            --text-main: #0F172A;       /* Near-Black Text for Elite Readability */
            --text-muted: #64748B;      /* Solid Slate Gray for Labels */
            --border-color: #CBD5E1;    /* Clean Gray Border Lines */
        }

        /* Readability overrides for light mode */
        body.light-mode .script-box { background-color: #F8FAFC; color: #0F172A; border-color: #CBD5E1; }
        body.light-mode .notes-box { background-color: #F1F5F9; color: #334155; border-color: #CBD5E1; }
        body.light-mode .intent-header { color: #0F172A; }
        body.light-mode .intent-body { background-color: rgba(44, 94, 138, 0.04); }
        body.light-mode .intent-item.active .intent-header { background-color: rgba(44, 94, 138, 0.08); }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 12px;
            max-width: 400px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: background 0.3s;
        }

        .controls-container {
            background-color: var(--panel-dark);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        select, input {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        select:focus, input:focus {
            border-color: var(--accent-primary);
        }

        .playbook-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 2px;
        }

        .intent-item {
            background-color: var(--panel-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .intent-header {
            padding: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            line-height: 1.4;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .intent-header:hover {
            background-color: rgba(70, 130, 180, 0.08);
        }

        .intent-item.active {
            border-color: var(--accent-primary);
        }

        .intent-item.active .intent-header {
            background-color: rgba(70, 130, 180, 0.12);
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
        }

        .intent-body {
            display: none; 
            padding: 12px;
            background-color: rgba(70, 130, 180, 0.03);
            flex-direction: column;
            gap: 12px;
        }

        .intent-item.active .intent-body {
            display: flex;
        }

        .notes-box {
            background-color: var(--panel-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.4;
            font-style: italic;
        }

        .script-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .script-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .script-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .copy-btn {
            background-color: var(--accent-primary);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .copy-btn:hover {
            background-color: var(--accent-hover);
        }

        .script-box {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            font-size: 12.5px;
            line-height: 1.5;
            white-space: pre-wrap;
            color: var(--text-main);
            height: 120px;
            overflow-y: auto; 
        }

        .script-box::-webkit-scrollbar {
            width: 6px;
        }

        .script-box::-webkit-scrollbar-track {
            background: var(--bg-dark);
            border-radius: 4px;
        }

        .script-box::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .script-box::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        .franchise-meta-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 12px;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }

        .meta-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .meta-val {
            color: var(--text-main);
            text-align: right;
            max-width: 65%;
            word-break: break-word;
        }

        /* SCROLLABLE INDEX CONFIGURATION */
        .master-scroll-container {
            max-height: 520px;
            overflow-y: auto;
            padding-right: 4px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .master-scroll-container::-webkit-scrollbar {
            width: 4px;
        }
        .master-scroll-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }
        .master-index-card {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .master-index-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }
        .master-index-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2px;
        }
        .master-index-section-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--accent-primary);
        }
        .master-index-text-block {
            font-size: 12px;
            line-height: 1.4;
            color: var(--text-main);
            white-space: pre-wrap;
            background-color: var(--bg-dark);
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.03);
            margin-top: 4px;
        }
        .master-index-keywords-text {
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <label for="branchSelect">Active Branch</label>
            <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:16px;">🌙</button>
        </div>
        <div class="input-group">
            <select id="branchSelect">
                <option value="">Loading workspace po...</option>
            </select>
        </div>
        <div class="input-group">
            <label for="searchInput">Search Keywords</label>
            <input type="text" id="searchInput" placeholder="Type keyword (e.g. tuition, saan, slots)..." autofocus>
        </div>
    </div>

    <div class="playbook-container" id="playbookContainer">
        
        <div id="dynamicIntentsContainer" style="display: flex; flex-direction: column; gap: 8px;"></div>

        <div class="intent-item" id="franchiseMetaPanel" onclick="toggleAccordion(this)">
            <div class="intent-header" style="color: var(--accent-primary);">
                <span>ℹ️ Branch Reference Data</span>
                <span class="chevron">▶</span>
            </div>
            <div class="intent-body" onclick="event.stopPropagation();">
                <div class="franchise-meta-grid" id="metaFieldsDisplay">
                    <div style="color: var(--text-muted); font-style: italic;">Select a branch to pull details...</div>
                </div>
            </div>
        </div>

        <div class="intent-item" id="masterQuestionsPanel" onclick="toggleAccordion(this)">
            <div class="intent-header" style="color: var(--accent-primary);">
                <span>📋 Master Questions Index</span>
                <span class="chevron">▶</span>
            </div>
            <div class="intent-body" onclick="event.stopPropagation();">
                <div class="master-scroll-container" id="masterIntentsDisplay">
                    <div style="color: var(--text-muted); font-style: italic;">Loading questions index...</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_ENDPOINT_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/meta_franchise_id';
        const TRACK_COPY_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/track_copy';
        
        let masterFranchiseCache = [];
        let masterPlaybookCache = [];
        let currentlySelectedBranch = null;

        const SEARCH_EXCLUSION_LIST = new Set([
            'of', 'if', 'the', 'and', 'is', 'in', 'to', 'sa', 'po', 'mam', 'sir', 'at'
        ]);

        const branchSelect = document.getElementById('branchSelect');
        const searchInput = document.getElementById('searchInput');
        const dynamicIntentsContainer = document.getElementById('dynamicIntentsContainer');
        const metaFieldsDisplay = document.getElementById('metaFieldsDisplay');
        const masterIntentsDisplay = document.getElementById('masterIntentsDisplay');

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const btn = document.querySelector('[onclick="toggleTheme()"]');
            btn.innerText = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        }

        async function bootstrapWorkspace() {
            try {
                const response = await fetch(`${API_ENDPOINT_URL}?franchise_id=24`);
                if (!response.ok) throw new Error(`HTTP Status Error: ${response.status}`);
                
                const payload = await response.json();
                
                masterFranchiseCache = payload.franchise_list || [];
                masterPlaybookCache = payload.playbook_list || [];
                
                branchSelect.innerHTML = '';
                masterFranchiseCache.forEach(branch => {
                    const option = document.createElement('option');
                    option.value = branch.id;
                    option.text = branch.name;
                    branchSelect.appendChild(option);
                });

                handleBranchChange();

            } catch (err) {
                console.error("Workspace download failed:", err);
                branchSelect.innerHTML = '<option value="">Error loading system po</option>';
            }
        }

        function handleBranchChange() {
            const selectedId = parseInt(branchSelect.value);
            if (!selectedId) return;

            currentlySelectedBranch = masterFranchiseCache.find(b => b.id === selectedId);

            if (currentlySelectedBranch) {
                let htmlContent = '';
                for (const [key, value] of Object.entries(currentlySelectedBranch)) {
                    if (key === 'id' || key === 'created_at') continue;
                    
                    const cleanLabel = key.replace(/_/g, ' ').toUpperCase();
                    const cleanValue = value !== null && value !== '' ? value : 'Not set';

                    htmlContent += `
                        <div class="meta-row">
                            <span class="meta-label">${cleanLabel}</span>
                            <span class="meta-val">${cleanValue}</span>
                        </div>
                    `;
                }
                metaFieldsDisplay.innerHTML = htmlContent;
            }

            filterAndRenderPlaybook(searchInput.value);
            renderMasterQuestionsIndex();
        }

        function renderMasterQuestionsIndex() {
            if (!masterPlaybookCache || masterPlaybookCache.length === 0) {
                masterIntentsDisplay.innerHTML = `<div style="color: var(--text-muted); font-style: italic;">No questions found inside the database.</div>`;
                return;
            }

            let htmlContent = '';
            masterPlaybookCache.forEach(intent => {
                const keywords = intent.search_keywords || 'None mapped';
                const adminNotes = intent.admin_action_notes || 'Follow standard presentation rules.';
                
                const taglishParsed = parseScriptPlaceholders(intent.taglish_format, currentlySelectedBranch);
                const englishParsed = intent.english_format ? parseScriptPlaceholders(intent.english_format, currentlySelectedBranch) : 'Not available';

                htmlContent += `
                    <div class="master-index-card">
                        <div class="master-index-title">🔹 ${intent.question_label}</div>
                        
                        <div>
                            <div class="master-index-section-header">
                                <span class="master-index-section-label">Keywords</span>
                            </div>
                            <div class="master-index-keywords-text">${keywords}</div>
                        </div>

                        <div>
                            <div class="master-index-section-header">
                                <span class="master-index-section-label">Admin Action Strategy</span>
                            </div>
                            <div class="master-index-text-block" style="font-style: italic; color: var(--text-muted); font-size:11px;">${adminNotes}</div>
                        </div>

                        <div>
                            <div class="master-index-section-header">
                                <span class="master-index-section-label">✨ Taglish Template</span>
                                <button class="copy-btn" onclick="copyMasterListText('master-taglish-${intent.id}', this, ${intent.id}, 'taglish')">Copy</button>
                            </div>
                            <div class="master-index-text-block" id="master-taglish-${intent.id}">${taglishParsed}</div>
                        </div>

                        <div>
                            <div class="master-index-section-header">
                                <span class="master-index-section-label">🌐 English Template</span>
                                ${intent.english_format ? `<button class="copy-btn" onclick="copyMasterListText('master-english-${intent.id}', this, ${intent.id}, 'english')">Copy</button>` : ''}
                            </div>
                            <div class="master-index-text-block" id="master-english-${intent.id}">${englishParsed}</div>
                        </div>
                    </div>
                `;
            });
            masterIntentsDisplay.innerHTML = htmlContent;
        }

        function parseScriptPlaceholders(templateText, branchData) {
            if (!templateText) return "";
            if (!branchData) return templateText;

            let parsedText = templateText;
            
            const textReplacements = {
                '%name%': branchData.name || 'Branch',
                '%branch_name%': branchData.name || 'Branch',
                '%session_length%': branchData.session_length || '',
                '%tuition_fee%': branchData.tuition_fee !== undefined ? branchData.tuition_fee : '0',
                '%address%': (branchData.address || "").trim(),
                '%landmarks%': (branchData.landmarks || "").trim(),
                '%google_maps_link%': branchData.google_maps_link || '',
                '%schedule_details%': branchData.schedule_details || '',
                '%branch_phone%': branchData.branch_phone || '',
                '%special_needs_schedule%': branchData.special_needs_schedule || '',
                '%tuition_fee_special%': branchData.tuition_fee_special !== undefined ? branchData.tuition_fee_special : '0'
            };

            for (const [placeholder, value] of Object.entries(textReplacements)) {
                const regex = new RegExp(placeholder, 'g');
                parsedText = parsedText.replace(regex, value);
            }

            return parsedText.trim();
        }

        function filterAndRenderPlaybook(keywordQuery) {
            dynamicIntentsContainer.innerHTML = "";

            const cleanQuery = keywordQuery.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?\u2031]/g, " ").trim();
            
            if (cleanQuery === "") {
                return;
            }

            const searchWordsArr = cleanQuery.split(/\s+/)
                .filter(word => word.length > 0 && !SEARCH_EXCLUSION_LIST.has(word));

            if (searchWordsArr.length === 0) {
                return;
            }

            const matchedIntents = masterPlaybookCache.filter(intent => {
                const labelStack = (intent.question_label || '').toLowerCase();
                const keywordStack = (intent.search_keywords || '').toLowerCase();
                const searchHaystack = `${labelStack} ${keywordStack}`;
                
                return searchWordsArr.every(word => {
                    const wordRegex = new RegExp('\\b' + word + '\\b', 'i');
                    return wordRegex.test(searchHaystack);
                });
            });

            if (matchedIntents.length === 0) {
                dynamicIntentsContainer.innerHTML = `<div style="padding: 16px; text-align: center; color: var(--text-muted); font-size: 13px;">No matching sales playbook items found po...</div>`;
                return;
            }

            renderCardsList(matchedIntents);
        }

        function renderCardsList(intents) {
            intents.forEach((intent) => {
                const shouldBeOpen = false; 
                const activeStateClass = shouldBeOpen ? "active" : "";
                const initialChevron = shouldBeOpen ? "▼" : "▶";

                const formattedTaglish = parseScriptPlaceholders(intent.taglish_format, currentlySelectedBranch);
                const formattedEnglish = intent.english_format ? parseScriptPlaceholders(intent.english_format, currentlySelectedBranch) : '';

                const accordionHtml = `
                    <div class="intent-item ${activeStateClass}" onclick="toggleAccordion(this)">
                        <div class="intent-header">
                            <span>${intent.question_label}</span>
                            <span class="chevron">${initialChevron}</span>
                        </div>
                        <div class="intent-body" onclick="event.stopPropagation();">
                            <div class="notes-box">
                                ${intent.admin_action_notes || 'Follow standard workflow presentation rules.'}
                            </div>
                            
                            <div class="script-wrapper">
                                <div class="script-meta">
                                    <span class="script-label">✨ Taglish</span>
                                    <button class="copy-btn" onclick="copyText('taglish-${intent.id}', ${intent.id}, 'taglish')">Copy</button>
                                </div>
                                <div class="script-box" id="taglish-${intent.id}">${formattedTaglish}</div>
                            </div>

                            ${intent.english_format ? `
                            <div class="script-wrapper">
                                <div class="script-meta">
                                    <span class="script-label">🌐 English</span>
                                    <button class="copy-btn" onclick="copyText('english-${intent.id}', ${intent.id}, 'english')">Copy</button>
                                </div>
                                <div class="script-box" id="english-${intent.id}">${formattedEnglish}</div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                dynamicIntentsContainer.insertAdjacentHTML('beforeend', accordionHtml);
            });
        }

        function toggleAccordion(element) {
            const allItems = document.querySelectorAll('.intent-item');
            allItems.forEach(item => {
                if (item !== element) {
                    item.classList.remove('active');
                    const chevron = item.querySelector('.chevron');
                    if (chevron) chevron.innerText = '▶';
                }
            });

            element.classList.toggle('active');
            const currentChevron = element.querySelector('.chevron');
            if (currentChevron) {
                currentChevron.innerText = element.classList.contains('active') ? '▼' : '▶';
            }
        }

        async function sendAnalyticsTracking(intentId, languageType) {
            try {
                fetch(TRACK_COPY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        intent_type: intentId,
                        language_type: languageType
                    })
                });
            } catch (err) {
                console.error("Analytics tracking failed:", err);
            }
        }

        function copyText(elementId, intentId, languageType) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text);
            
            sendAnalyticsTracking(intentId, languageType);
            
            const btn = document.querySelector(`[onclick="copyText('${elementId}', ${intentId}, '${languageType}')"]`);
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.backgroundColor = "#1E4263";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = "var(--accent-primary)";
            }, 1000);
        }

        function copyMasterListText(elementId, btnElement, intentId, languageType) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text);
            
            sendAnalyticsTracking(intentId, languageType);
            
            const originalText = btnElement.innerText;
            btnElement.innerText = "Copied!";
            btnElement.style.backgroundColor = "#1E4263";
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.style.backgroundColor = "var(--accent-primary)";
            }, 1000);
        }

        searchInput.addEventListener('input', (e) => {
            filterAndRenderPlaybook(e.target.value);
        });

        branchSelect.addEventListener('change', handleBranchChange);
        window.addEventListener('DOMContentLoaded', bootstrapWorkspace);
    </script>
</body>
</html>
