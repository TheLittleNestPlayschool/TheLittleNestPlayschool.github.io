<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest - Sales Sidebar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0F172A;
            --panel-dark: #1E293B;
            --teal-primary: #0D9488;
            --teal-hover: #115E59;
            --teal-light: #CCFBF1;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border-color: #334155;
            --notes-bg: rgba(234, 179, 8, 0.1);
            --notes-border: rgba(234, 179, 8, 0.3);
            --notes-text: #FDE047;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 12px;
            /* Narrow, fixed width optimized for side-by-side window multitasking */
            max-width: 400px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Compact Header Controls */
        .controls-container {
            background-color: var(--panel-dark);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        select, input {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        select:focus, input:focus {
            border-color: var(--teal-primary);
        }

        /* Vertical Accordion List Workspace */
        .playbook-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 2px;
        }

        /* Accordion Item Wrapper */
        .intent-item {
            background-color: var(--panel-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        /* Clickable Header */
        .intent-header {
            padding: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            line-height: 1.4;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .intent-header:hover {
            background-color: rgba(13, 148, 136, 0.08);
        }

        .intent-item.active {
            border-color: var(--teal-primary);
        }

        .intent-item.active .intent-header {
            background-color: rgba(13, 148, 136, 0.15);
            color: white;
            border-bottom: 1px solid var(--border-color);
        }

        /* Expandable Content Body */
        .intent-body {
            display: none; 
            padding: 12px;
            background-color: rgba(15, 23, 42, 0.4);
            flex-direction: column;
            gap: 12px;
        }

        .intent-item.active .intent-body {
            display: flex;
        }

        /* Condensed Admin Context Alerts */
        .notes-box {
            background-color: var(--notes-bg);
            border: 1px solid var(--notes-border);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 11px;
            color: var(--notes-text);
            line-height: 1.4;
        }

        /* Script Output Containers */
        .script-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .script-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .script-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--teal-primary);
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .copy-btn {
            background-color: var(--teal-primary);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .copy-btn:hover {
            background-color: var(--teal-hover);
        }

        .script-box {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            font-size: 12.5px;
            line-height: 1.5;
            white-space: pre-wrap;
            color: #E2E8F0;
            
            /* Fixed internal height constraints with custom scroll styling */
            height: 120px;
            overflow-y: auto; 
        }

        /* Sleek custom scrollbars for the inner script windows */
        .script-box::-webkit-scrollbar {
            width: 6px;
        }

        .script-box::-webkit-scrollbar-track {
            background: var(--bg-dark);
            border-radius: 4px;
        }

        .script-box::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .script-box::-webkit-scrollbar-thumb:hover {
            background: var(--teal-primary);
        }
    </style>
</head>
<body>

    <!-- Header Control Configuration Panel -->
    <div class="controls-container">
        <div class="input-group">
            <label for="branchSelect">Active Branch</label>
            <select id="branchSelect">
                <!-- Dropdown items dynamically sync with franchise table IDs -->
                <option value="1">Atimonan</option>
            </select>
        </div>
        <div class="input-group">
            <label for="searchInput">Search Keywords</label>
            <input type="text" id="searchInput" placeholder="Type keyword (e.g. tuition, saan, slots)...">
        </div>
    </div>

    <!-- Main Sidebar Vertical Stack Container -->
    <div class="playbook-container" id="playbookContainer">
        <!-- Javascript automatically injects matching master rows here -->
    </div>

    <script>
        // Configuration: Change this to your live Xano base URL string
        const XANO_API_URL = 'https://YOUR_XANO_API_BASE_URL/api:playbook/search';

        const branchSelect = document.getElementById('branchSelect');
        const searchInput = document.getElementById('searchInput');
        const playbookContainer = document.getElementById('playbookContainer');
        let searchTimeout;

        // Query Xano Backend and repaint the interface cards
        async function loadPlaybook() {
            const franchiseId = branchSelect.value;
            const searchQuery = searchInput.value.trim();

            try {
                let url = `${XANO_API_URL}?franchise_id=${franchiseId}`;
                if (searchQuery) {
                    url += `&search_query=${encodeURIComponent(searchQuery)}`;
                }

                const response = await fetch(url);
                const data = await response.json();

                playbookContainer.innerHTML = '';

                if (data.length === 0) {
                    playbookContainer.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted); font-size:13px;">No matching intents found po.</div>';
                    return;
                }

                data.forEach((intent) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'intent-item';
                    itemDiv.id = `intent-${intent.id}`;
                    
                    itemDiv.innerHTML = `
                        <div class="intent-header" onclick="toggleAccordion(this.parentElement)">
                            <span>${intent.question_label}</span>
                            <span class="chevron">▶</span>
                        </div>
                        <div class="intent-body" onclick="event.stopPropagation();">
                            ${intent.admin_action_notes ? `
                                <div class="notes-box">
                                    <strong>Admin Rule:</strong> ${intent.admin_action_notes}
                                </div>
                            ` : ''}
                            
                            <div class="script-wrapper">
                                <div class="script-meta">
                                    <span class="script-label">✨ Taglish</span>
                                    <button class="copy-btn" onclick="copyText('taglish-${intent.id}')">Copy</button>
                                </div>
                                <div class="script-box" id="taglish-${intent.id}">${intent.taglish_format}</div>
                            </div>

                            <div class="script-wrapper">
                                <div class="script-meta">
                                    <span class="script-label">🌐 English</span>
                                    <button class="copy-btn" onclick="copyText('english-${intent.id}')">Copy</button>
                                </div>
                                <div class="script-box" id="english-${intent.id}">${intent.english_format}</div>
                            </div>
                        </div>
                    `;
                    playbookContainer.appendChild(itemDiv);
                });

            } catch (error) {
                console.error("Xano Fetch Error:", error);
                playbookContainer.innerHTML = '<div style="text-align:center; padding:20px; color:#EF4444; font-size:13px;">Error connecting to backend server po.</div>';
            }
        }

        // Toggles active card open and snaps others shut to protect vertical room
        function toggleAccordion(element) {
            const allItems = document.querySelectorAll('.intent-item');
            allItems.forEach(item => {
                if (item !== element) {
                    item.classList.remove('active');
                    const chevron = item.querySelector('.chevron');
                    if (chevron) chevron.innerText = '▶';
                }
            });

            element.classList.toggle('active');
            const currentChevron = element.querySelector('.chevron');
            if (currentChevron) {
                currentChevron.innerText = element.classList.contains('active') ? '▼' : '▶';
            }
        }

        // Copy mechanism with high-speed color feedback
        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text);
            
            const btn = document.querySelector(`[onclick="copyText('${elementId}')"]`);
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.backgroundColor = "#047857";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = "var(--teal-primary)";
            }, 1000);
        }

        // Search inputs setup with 250ms debouncing delay
        branchSelect.addEventListener('change', loadPlaybook);
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadPlaybook, 250); 
        });

        // Load initially when ready
        window.addEventListener('DOMContentLoaded', loadPlaybook);
    </script>
</body>
</html>
