<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest - Sales Sidebar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0F172A;
            --panel-dark: #1E293B;
            --teal-primary: #0D9488;
            --teal-hover: #115E59;
            --teal-light: #CCFBF1;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border-color: #334155;
            --notes-bg: rgba(234, 179, 8, 0.1);
            --notes-border: rgba(234, 179, 8, 0.3);
            --notes-text: #FDE047;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 12px;
            max-width: 400px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .controls-container {
            background-color: var(--panel-dark);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        select, input {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        select:focus, input:focus {
            border-color: var(--teal-primary);
        }

        .playbook-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 2px;
        }

        .intent-item {
            background-color: var(--panel-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .intent-header {
            padding: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            line-height: 1.4;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .intent-header:hover {
            background-color: rgba(13, 148, 136, 0.08);
        }

        .intent-item.active {
            border-color: var(--teal-primary);
        }

        .intent-item.active .intent-header {
            background-color: rgba(13, 148, 136, 0.15);
            color: white;
            border-bottom: 1px solid var(--border-color);
        }

        .intent-body {
            display: none; 
            padding: 12px;
            background-color: rgba(15, 23, 42, 0.4);
            flex-direction: column;
            gap: 12px;
        }

        .intent-item.active .intent-body {
            display: flex;
        }

        .notes-box {
            background-color: var(--notes-bg);
            border: 1px solid var(--notes-border);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 11px;
            color: var(--notes-text);
            line-height: 1.4;
        }

        .script-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .script-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .script-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--teal-primary);
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .copy-btn {
            background-color: var(--teal-primary);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .copy-btn:hover {
            background-color: var(--teal-hover);
        }

        .script-box {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            font-size: 12.5px;
            line-height: 1.5;
            white-space: pre-wrap;
            color: #E2E8F0;
            height: 120px;
            overflow-y: auto; 
        }

        .script-box::-webkit-scrollbar {
            width: 6px;
        }

        .script-box::-webkit-scrollbar-track {
            background: var(--bg-dark);
            border-radius: 4px;
        }

        .script-box::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .script-box::-webkit-scrollbar-thumb:hover {
            background: var(--teal-primary);
        }

        .franchise-meta-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 12px;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }

        .meta-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .meta-val {
            color: #E2E8F0;
            text-align: right;
            max-width: 65%;
            word-break: break-word;
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <div class="input-group">
            <label for="branchSelect">Active Branch</label>
            <select id="branchSelect">
                <option value="">Loading workspace po...</option>
            </select>
        </div>
        <div class="input-group">
            <label for="searchInput">Search Keywords</label>
            <input type="text" id="searchInput" placeholder="Type keyword (e.g. tuition, saan, slots)..." autofocus>
        </div>
    </div>

    <div class="playbook-container" id="playbookContainer">
        
        <div id="dynamicIntentsContainer" style="display: flex; flex-direction: column; gap: 8px;"></div>

        <div class="intent-item" id="franchiseMetaPanel" onclick="toggleAccordion(this)">
            <div class="intent-header" style="color: var(--teal-primary);">
                <span>ℹ️ Branch Reference Data</span>
                <span class="chevron">▶</span>
            </div>
            <div class="intent-body" onclick="event.stopPropagation();">
                <div class="franchise-meta-grid" id="metaFieldsDisplay">
                    <div style="color: var(--text-muted); font-style: italic;">Select a branch to pull details...</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_ENDPOINT_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:mXEfdJlg/meta_franchise_id';
        
        let masterFranchiseCache = [];
        let masterPlaybookCache = [];
        let currentlySelectedBranch = null;

        const branchSelect = document.getElementById('branchSelect');
        const searchInput = document.getElementById('searchInput');
        const dynamicIntentsContainer = document.getElementById('dynamicIntentsContainer');
        const metaFieldsDisplay = document.getElementById('metaFieldsDisplay');

        async function bootstrapWorkspace() {
            try {
                const response = await fetch(`${API_ENDPOINT_URL}?franchise_id=24`);
                if (!response.ok) throw new Error(`HTTP Status Error: ${response.status}`);
                
                const payload = await response.json();
                
                masterFranchiseCache = payload.franchise_list || [];
                masterPlaybookCache = payload.playbook_list || [];
                
                branchSelect.innerHTML = '';
                masterFranchiseCache.forEach(branch => {
                    const option = document.createElement('option');
                    option.value = branch.id;
                    option.text = branch.name;
                    branchSelect.appendChild(option);
                });

                handleBranchChange();

            } catch (err) {
                console.error("Workspace download failed:", err);
                branchSelect.innerHTML = '<option value="">Error loading system po</option>';
            }
        }

        function handleBranchChange() {
            const selectedId = parseInt(branchSelect.value);
            if (!selectedId) return;

            currentlySelectedBranch = masterFranchiseCache.find(b => b.id === selectedId);

            if (currentlySelectedBranch) {
                let htmlContent = '';
                for (const [key, value] of Object.entries(currentlySelectedBranch)) {
                    if (key === 'id' || key === 'created_at') continue;
                    
                    const cleanLabel = key.replace(/_/g, ' ').toUpperCase();
                    const cleanValue = value !== null && value !== '' ? value : 'Not set';

                    htmlContent += `
                        <div class="meta-row">
                            <span class="meta-label">${cleanLabel}</span>
                            <span class="meta-val">${cleanValue}</span>
                        </div>
                    `;
                }
                metaFieldsDisplay.innerHTML = htmlContent;
            }

            filterAndRenderPlaybook(searchInput.value);
        }

        function parseScriptPlaceholders(templateText, branchData) {
            if (!templateText) return "";
            if (!branchData) return templateText;

            let parsedText = templateText;
            
            const textReplacements = {
                '%branch_name%': branchData.name || 'Branch',
                '%tuition_fee%': branchData.tuition_fee !== undefined ? branchData.tuition_fee : '0',
                '%address%': branchData.address || branchData.landmarks || 'our location',
                '%landmarks%': branchData.landmarks || 'local landmarks',
                '%google_maps_link%': branchData.google_maps_link || '',
                '%schedule_details%': branchData.schedule_details || '',
                '%branch_phone%': branchData.branch_phone || '',
                '%special_needs_schedule%': branchData.special_needs_schedule || '',
                '%tuition_fee_special%': branchData.tuition_fee_special !== undefined ? branchData.tuition_fee_special : '0'
            };

            for (const [placeholder, value] of Object.entries(textReplacements)) {
                const regex = new RegExp(placeholder, 'g');
                parsedText = parsedText.replace(regex, value);
            }

            return parsedText;
        }

        function filterAndRenderPlaybook(keywordQuery) {
            dynamicIntentsContainer.innerHTML = "";

            const cleanQuery = keywordQuery.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?\u2031]/g, " ").trim();
            
            if (cleanQuery === "") {
                return;
            }

            // Word Splitting Tokenization Engine
            const searchWordsArr = cleanQuery.split(/\s+/).filter(w => w.length > 1);

            if (searchWordsArr.length === 0) {
                return;
            }

            const matchedIntents = masterPlaybookCache.filter(intent => {
                const searchHaystack = `${intent.question_label || ''} ${intent.search_keywords || ''}`.toLowerCase();
                // Verifies if standalone parsed search words exist in our fields stack
                return searchWordsArr.some(word => searchHaystack.includes(word));
            });

            if (matchedIntents.length === 0) {
                dynamicIntentsContainer.innerHTML = `<div style="padding: 16px; text-align: center; color: var(--text-muted); font-size: 13px;">No matching sales playbook items found po...</div>`;
                return;
            }

            renderCardsList(matchedIntents);
        }

        function renderCardsList(intents) {
            intents.forEach((intent) => {
                // Keep all filtered output cards collapsed initially for scannability
                const shouldBeOpen = false; 
                const activeStateClass = shouldBeOpen ? "active" : "";
                const initialChevron = shouldBeOpen ? "▼" : "▶";

                const formattedTaglish = parseScriptPlaceholders(intent.taglish_format, currentlySelectedBranch);
                const formattedEnglish = parseScriptPlaceholders(intent.english_format, currentlySelectedBranch);

                const accordionHtml = `
                    <div class="intent-item ${activeStateClass}" onclick="toggleAccordion(this)">
                        <div class="intent-header">
                            <span>${intent.question_label}</span>
                            <span class="chevron">${initialChevron}</span>
                        </div>
                        <div class="intent-body" onclick="event.stopPropagation();">
                            <div class="notes-box">
                                <strong>Admin Rule:</strong> ${intent.admin_action_notes || 'Follow standard workflow presentation rules.'}
                            </div>
                            
                            <div class="script-wrapper">
                                <div class="script-meta">
                                    <span class="script-label">✨ Taglish</span>
                                    <button class="copy-btn" onclick="copyText('taglish-${intent.id}')">Copy</button>
                                </div>
                                <div class="script-box" id="taglish-${intent.id}">${formattedTaglish}</div>
                            </div>

                            ${intent.english_format ? `
                            <div class="script-wrapper">
                                <div class="script-meta">
                                    <span class="script-label">🌐 English</span>
                                    <button class="copy-btn" onclick="copyText('english-${intent.id}')">Copy</button>
                                </div>
                                <div class="script-box" id="english-${intent.id}">${formattedEnglish}</div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                dynamicIntentsContainer.insertAdjacentHTML('beforeend', accordionHtml);
            });
        }

        function toggleAccordion(element) {
            const allItems = document.querySelectorAll('.intent-item');
            allItems.forEach(item => {
                if (item !== element) {
                    item.classList.remove('active');
                    const chevron = item.querySelector('.chevron');
                    if (chevron) chevron.innerText = '▶';
                }
            });

            element.classList.toggle('active');
            const currentChevron = element.querySelector('.chevron');
            if (currentChevron) {
                currentChevron.innerText = element.classList.contains('active') ? '▼' : '▶';
            }
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text);
            
            const btn = document.querySelector(`[onclick="copyText('${elementId}')"]`);
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.backgroundColor = "#047857";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = "var(--teal-primary)";
            }, 1000);
        }

        searchInput.addEventListener('input', (e) => {
            filterAndRenderPlaybook(e.target.value);
        });

        branchSelect.addEventListener('change', handleBranchChange);
        window.addEventListener('DOMContentLoaded', bootstrapWorkspace);
    </script>
</body>
</html>
