<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<div class="bg-transparent p-4 font-['Inter',_sans-serif]">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Forms Vault</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Administrative & Operational Assets</p>
        </div>
        <div class="flex items-center gap-3">
            <button id="bulk-download-btn" disabled class="bg-slate-200 text-slate-400 px-4 py-2 rounded-lg text-[10px] font-extrabold uppercase tracking-widest border border-slate-200 transition-all cursor-not-allowed">
                Download Selected (<span id="selected-count">0</span>)
            </button>
            <div class="bg-slate-100 px-3 py-1.5 rounded-lg text-[10px] font-extrabold text-slate-500 uppercase tracking-widest border border-slate-200">
                Library Mode
            </div>
        </div>
    </div>

    <div id="forms-list-container" class="space-y-4">
        <div id="sync-status" class="p-20 text-center text-slate-400 text-xs italic font-bold uppercase tracking-widest animate-pulse">
            Synchronizing Forms...
        </div>
    </div>
</div>

<script>
(function() {
    const FormsVaultModule = {
        data: [],
        selectedIds: new Set(),
        retries: 0,

        async init() {
            if (!window.NEST_SCHEMA) await this.loadScript('schema_config.js');
            if (!window.NEST_ENDPOINTS) await this.loadScript('api_config.js');
            
            const endpoints = window.NEST_ENDPOINTS;
            
            // Expected mapping in api_config.js: window.NEST_ENDPOINTS.forms.list
            if (!endpoints || !endpoints.forms || !endpoints.forms.list) {
                if (this.retries < 10) {
                    this.retries++;
                    setTimeout(() => this.init(), 500);
                } else {
                    document.getElementById('sync-status').innerHTML = "Error: API Config mapping mismatch (forms.list).";
                }
                return;
            }

            try {
                const response = await fetch(`${endpoints.forms.list}?t=${Date.now()}`);
                if (!response.ok) throw new Error("Sync Failed");
                
                const rawData = await response.json();
                this.data = Array.isArray(rawData) ? rawData : (rawData.items || []);
                
                this.render();
            } catch (err) {
                console.error("Forms Fetch Error:", err);
                document.getElementById('forms-list-container').innerHTML = `
                    <div class="p-8 text-center bg-red-50 text-red-500 rounded-xl font-bold text-xs uppercase tracking-widest">
                        Sync Failed • Check Xano Connection
                    </div>`;
            }
        },

        render() {
            const container = document.getElementById('forms-list-container');
            if (this.data.length === 0) {
                container.innerHTML = `<div class="p-20 text-center text-slate-400 text-xs font-bold uppercase border-2 border-dashed border-slate-100 rounded-2xl">No documents found in the vault</div>`;
                return;
            }

            container.innerHTML = this.data.map(f => `
                <div class="bg-white border border-slate-200 rounded-2xl p-5 flex items-center hover:border-teal-400 transition-all shadow-sm group">
                    <div class="mr-4">
                        <input type="checkbox" 
                               class="form-checkbox w-5 h-5 rounded border-slate-300 text-teal-500 focus:ring-teal-500 transition-all cursor-pointer" 
                               onchange="window.FormsVaultToggleSelection(${f.id}, this.checked)">
                    </div>
                    <div class="flex-1">
                        <h3 class="text-sm font-black text-slate-800 uppercase tracking-tight">${f.form_name}</h3>
                        <p class="text-[11px] text-slate-500 font-medium mt-1 leading-relaxed">${f.form_description || 'Verified Document'}</p>
                    </div>
                    <div class="flex items-center gap-10 ml-auto text-right">
                        <div>
                            <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Type</p>
                            <p class="text-[10px] font-bold text-slate-700 uppercase">PDF Asset</p>
                        </div>
                        <div class="flex items-center gap-2 pl-6 border-l border-slate-100 min-w-[90px] justify-end">
                            <div class="w-1.5 h-1.5 rounded-full bg-teal-500"></div>
                            <span class="text-[9px] font-black uppercase tracking-widest text-teal-500">
                                Available
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
        },

        toggleSelection(id, isChecked) {
            if (isChecked) this.selectedIds.add(id);
            else this.selectedIds.delete(id);
            
            const btn = document.getElementById('bulk-download-btn');
            const countLabel = document.getElementById('selected-count');
            const count = this.selectedIds.size;

            countLabel.innerText = count;
            if (count > 0) {
                btn.disabled = false;
                btn.className = "bg-teal-500 text-white px-4 py-2 rounded-lg text-[10px] font-extrabold uppercase tracking-widest shadow-md hover:bg-teal-600 transition-all cursor-pointer";
            } else {
                btn.disabled = true;
                btn.className = "bg-slate-200 text-slate-400 px-4 py-2 rounded-lg text-[10px] font-extrabold uppercase tracking-widest border border-slate-200 transition-all cursor-not-allowed";
            }
        },

        async downloadSelected() {
            const btn = document.getElementById('bulk-download-btn');
            const originalText = btn.innerHTML;
            btn.innerText = "SIGNING ASSETS...";
            
            try {
                const response = await fetch(window.NEST_ENDPOINTS.forms.get_bulk_forms, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ form_ids: Array.from(this.selectedIds) })
                });
                
                const signedUrls = await response.json();
                
                // Trigger downloads
                signedUrls.forEach((url, index) => {
                    setTimeout(() => {
                        const link = document.createElement('a');
                        link.href = url;
                        link.setAttribute('download', '');
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }, index * 500); // Stagger to prevent browser block
                });

                btn.innerText = "SUCCESS";
                setTimeout(() => { btn.innerHTML = originalText; }, 2000);
            } catch (err) {
                console.error("Bulk Download Error:", err);
                btn.innerText = "FETCH ERROR";
            }
        },

        async loadScript(src) {
            return new Promise(resolve => {
                const s = document.createElement('script'); 
                s.src = src; 
                s.onload = resolve;
                s.onerror = () => {
                    const fallback = document.createElement('script');
                    fallback.src = src.replace('/', ''); 
                    fallback.onload = resolve;
                    document.head.appendChild(fallback);
                };
                document.head.appendChild(s);
            });
        }
    };

    // Global hook for the checkbox onchange
    window.FormsVaultToggleSelection = (id, checked) => FormsVaultModule.toggleSelection(id, checked);
    
    document.getElementById('bulk-download-btn').onclick = () => FormsVaultModule.downloadSelected();

    FormsVaultModule.init();
})();
</script>
