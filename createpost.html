<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Posting Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 40px; }
        .card { 
            width: 300px; background: white; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; 
            display: flex; flex-direction: column;
        }
        .container { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .card-content { padding: 15px; word-wrap: break-word; }
        .card img { width: 100%; display: block; }
        input[type="number"], input[type="file"] { width: 100%; margin: 10px 0; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #4a90e2; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #357abd; }
        #status { margin-top: 15px; font-size: 0.9em; color: #555; }
        h3 { margin: 0 0 10px 0; }
        /* Grid Styles */
        #scheduleGridContainer { margin-top: 20px; background: white; padding: 20px; border-radius: 8px; overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; font-size: 0.85em; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
    </style>
</head>
<body>

    <h1>Google Posting Engine</h1>
    <button id="authBtn" style="background-color: #db4437;">Connect Google Business</button>

    <div class="card" style="padding: 20px; margin-top: 20px; width: 350px;">
        <h3>Manual Upload & Link</h3>
        <label>Post Record ID:</label>
        <input type="number" id="manualPostId" placeholder="e.g. 3">
        <input type="file" id="imageInput" accept="image/*">
        <button id="uploadBtn" onclick="uploadImage()">Upload & Link</button>
        <div id="status"></div>
    </div>

    <hr style="margin: 40px 0;">

    <h2>Content Preview</h2>
    <button onclick="loadPreview()">Refresh Preview</button>
    <div id="postCardContainer" class="container"></div>

    <hr style="margin: 40px 0;">

    <h2>30-Day Master Schedule</h2>
    <button onclick="loadScheduleGrid()">Refresh Schedule Grid</button>
    <div id="scheduleGridContainer"></div>

    <script>
        // GOOGLE AUTH LOGIC
        document.getElementById('authBtn').addEventListener('click', async () => {
            const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:WmBkvZnb/google/auth_url');
            const data = await response.json();
            const authUrl = data.Response; 
            
            if (authUrl) {
                window.location.href = authUrl;
            } else {
                console.error("Could not find auth URL in response", data);
            }
        });

        // CLIENT-SIDE RESIZER (1080px Width)
        async function resizeImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const TARGET_WIDTH = 1080;
                        const scaleFactor = TARGET_WIDTH / img.width;
                        
                        canvas.width = TARGET_WIDTH;
                        canvas.height = img.height * scaleFactor;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name.split('.')[0] + ".webp", { type: 'image/webp' }));
                        }, 'image/webp', 0.85);
                    };
                };
            });
        }

        // UPLOAD LOGIC
        async function uploadImage() {
            const fileInput = document.getElementById('imageInput');
            const postId = document.getElementById('manualPostId').value;
            if (!postId || !fileInput.files[0]) return alert("Please enter ID and select a file.");

            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerText = "Processing...";
            
            const resizedFile = await resizeImage(fileInput.files[0]);
            
            const formData = new FormData();
            formData.append('file_resource', resizedFile);
            formData.append('file_name', resizedFile.name);
            formData.append('post_content_id', postId);

            try {
                const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:zS4wKXR6/post_image_upload', {
                    method: 'POST',
                    body: formData
                });
                status.innerText = response.ok ? "✅ Upload complete!" : "❌ Upload failed.";
            } catch (error) {
                status.innerText = "❌ Error occurred.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Upload & Link";
            }
        }

        // PREVIEW LOGIC
        async function loadPreview() {
            const container = document.getElementById('postCardContainer');
            container.innerHTML = "Loading...";

            try {
                const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:WmBkvZnb/build_posts');
                const posts = await response.json();
                container.innerHTML = ""; 

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const formattedText = post.final_text ? post.final_text.replace(/\\n/g, '<br>') : "";

                    card.innerHTML = `
                        <img src="${post.media}" onerror="this.style.display='none'">
                        <div class="card-content">
                            <h3>${post.franchise_name || 'No Franchise'}</h3>
                            <p>${formattedText}</p>
                            <small><strong>Scheduled:</strong> ${post.display_date || 'N/A'}</small>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = "Error loading preview.";
            }
        }

        // MASTER SCHEDULE GRID LOGIC
        async function loadScheduleGrid() {
            const container = document.getElementById('scheduleGridContainer');
            container.innerHTML = "Loading schedule...";

            // Placeholder for your grid rendering logic
            // You can now use the 'posts' data structure from the build_posts endpoint 
            // or fetch from a dedicated post_schedule endpoint.
            container.innerHTML = "Grid interface initialized. Ready for drag-and-drop implementation.";
        }
    </script>
</body>
</html>
