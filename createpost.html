<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Posting Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 40px; }
        .card { 
            width: 300px; background: white; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; 
            transition: transform 0.2s;
        }
        .container { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        input[type="number"], input[type="file"] { width: 100%; margin: 10px 0; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #4a90e2; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #357abd; }
        #status { margin-top: 15px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>

    <h1>Google Posting Engine</h1>
    <button style="background-color: #db4437;" onclick="connectGoogle()">Connect Google Business</button>

    <div class="card" style="padding: 20px; margin-top: 20px; width: 350px;">
        <h3>Manual Upload & Link</h3>
        <label>Post Record ID:</label>
        <input type="number" id="manualPostId" placeholder="e.g. 3">
        <input type="file" id="imageInput" accept="image/*">
        <button id="uploadBtn" onclick="uploadImage()">Upload & Link</button>
        <div id="status"></div>
    </div>

    <hr style="margin: 40px 0;">

    <h2>Content Preview</h2>
    <button onclick="loadPreview()">Refresh Preview</button>
    <div id="postCardContainer" class="container"></div>

    <script>
        // UPLOAD LOGIC
        async function uploadImage() {
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('status');
            const postId = document.getElementById('manualPostId').value;
            const file = document.getElementById('imageInput').files[0];

            if (!postId || !file) return alert("Please enter ID and select a file.");

            btn.disabled = true;
            btn.innerText = "Uploading...";
            
            const formData = new FormData();
            formData.append('file_resource', file);
            formData.append('file_name', file.name);
            formData.append('post_content_id', postId);

            try {
                const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:zS4wKXR6/post_image_upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    status.innerText = "✅ Upload complete!";
                } else {
                    status.innerText = "❌ Upload failed.";
                }
            } catch (error) {
                status.innerText = "❌ Error occurred.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Upload & Link";
            }
        }

        // PREVIEW LOGIC
        async function loadPreview() {
            const container = document.getElementById('postCardContainer');
            container.innerHTML = "Loading...";

            try {
                // Using the specific endpoint provided
                const response = await fetch('https://x8ki-letl-twmt.n7.xano.io/api:WmBkvZnb/build_posts');
                const posts = await response.json();
                
                container.innerHTML = ""; 

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${post.media_url}" style="width:100%; height:150px; object-fit:cover;">
                        <div style="padding: 15px;">
                            <h3>${post.title}</h3>
                            <p>${post.description_template}</p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = "Error loading preview. Check the console.";
                console.error("Preview failed:", error);
            }
        }

        function connectGoogle() { 
            // Existing logic
        }
    </script>
</body>
</html>
