<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest - MetaNotice Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* PREMIUM STEEL BLUE & RICH SLATE PALETTE - DARK MODE */
            --bg-dark: #0B0F19;         /* Rich Slate Black Background */
            --panel-dark: #131A26;      /* Deep Charcoal Panel Surface */
            --accent-primary: #4682B4;  /* Premium Steel Blue Accent */
            --accent-hover: #5C93C4;    /* Vibrant Slate Blue for Hover */
            --text-main: #F8FAFC;       /* Off-White High Readability Text */
            --text-muted: #94A3B8;      /* Balanced Slate Muted Gray */
            --border-color: #232E41;    /* Deep Slate Border Lines */
            
            /* NOTIFICATION SPECIFIC SYSTEM COLORS */
            --timer-green: #10B981;     /* Neon Green for Fresh Messages */
            --warning-red: #EF4444;     /* Deep Red for Safety Net & Long Waits */
        }

        body.light-mode {
            /* MODERN STEEL BLUE & SLATE PALETTE - LIGHT MODE */
            --bg-dark: #F1F5F9;         /* Soft Cool Gray Background */
            --panel-dark: #FFFFFF;      /* Clean Pure White Surfaces */
            --accent-primary: #2C5E8A;  /* Deep Steel Blue for Light Mode */
            --accent-hover: #1E4263;    /* Dark Navy for Light Mode Hover */
            --text-main: #0F172A;       /* Near-Black Text for Elite Readability */
            --text-muted: #64748B;      /* Solid Slate Gray for Labels */
            --border-color: #CBD5E1;    /* Clean Gray Border Lines */
        }

        /* Readability overrides for light mode elements */
        body.light-mode .notice-card { background-color: var(--panel-dark); }
        body.light-mode .branch-chip { background-color: #E2E8F0; }
        body.light-mode .branch-chip.active { background-color: rgba(44, 94, 138, 0.15); }
        body.light-mode .branch-chip.unattended-chip { background-color: rgba(239, 68, 68, 0.1); color: #B91C1C; }
        body.light-mode .accordion-header { background-color: rgba(44, 94, 138, 0.04); }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 4px;              
            display: flex;
            flex-direction: column;
            
            width: 100%;
            height: 100vh;             
            max-height: 100vh;         
            
            overflow: hidden;
            transition: background 0.3s;
        }

        /* UTILITY CLASS FOR GATEKEEPER DISPLAY LOGIC */
        .hidden {
            display: none !important;
        }

        /* TOP OPERATOR BAR */
        .operator-panel {
            background-color: var(--panel-dark);
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        .operator-controls-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .operator-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .operator-select {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
            width: 150px;
        }

        .theme-toggle-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            user-select: none;
        }

        /* MIDDLE LIVE NOTIFICATION STREAM */
        .stream-container {
            flex: 1;                    
            min-height: 0;              
            overflow-y: auto;           
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 6px;
            padding-right: 2px;
        }

        .stream-container::-webkit-scrollbar {
            width: 3px;
        }
        .stream-container::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        .stream-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 1px;
        }

        /* ULTRA HIGH-DENSITY CARD STRIP */
        .notice-card {
            background-color: var(--panel-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center; 
            gap: 8px;
            min-height: 48px;
            flex-shrink: 0;             
        }

        .notice-content {
            display: flex;
            flex-direction: column;
            gap: 1px;
            overflow: hidden;
            flex: 1;
        }

        .notice-line1 {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .branch-tag {
            font-size: 11.5px;
            font-weight: 700;
            color: var(--text-main);
        }

        .live-timer {
            font-size: 9.5px;
            font-weight: 600;
            color: var(--timer-green);
            background-color: rgba(16, 185, 129, 0.1);
            padding: 0px 4px;
            border-radius: 3px;
        }

        .live-timer.stale {
            color: var(--warning-red);
            background-color: rgba(239, 68, 68, 0.1);
        }

        /* STRICT SINGLE LINE WITH ELLIPSIS OVERFLOW */
        .notice-line2 {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;        
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* COMPACTED ACTION BUTTON PANEL */
        .notice-actions {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
        }

        .btn-action {
            background-color: var(--accent-primary);
            color: white;
            border: none;
            padding: 3px 6px;          
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
        }
        .btn-action:hover { 
            background-color: var(--accent-hover); 
        }

        /* BOTTOM ANCHOR PANEL CONSOLE */
        .bottom-anchor {
            background-color: var(--panel-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;             
            margin-top: auto;           
            max-height: 50%;
        }

        /* INTERACTIVE CHIPS COLLAPSIBLE CONTAINER */
        .collapsible-chips-panel {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            background-color: rgba(0, 0, 0, 0.1);
        }

        .accordion-header {
            padding: 6px 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            background-color: rgba(255, 255, 255, 0.01);
        }

        .accordion-header:hover {
            background-color: rgba(70, 130, 180, 0.04);
        }

        .chevron {
            font-size: 8px;
            color: var(--accent-primary);
            transition: transform 0.2s ease;
        }

        .collapsible-chips-panel.active .chevron {
            transform: rotate(90deg); 
        }

        .accordion-body {
            display: none; 
            padding: 6px;
            border-top: 1px solid var(--border-color);
        }

        .collapsible-chips-panel.active .accordion-body {
            display: block; 
        }

        /* GRID-CONTAINER SHARED CLASS RULES */
        .chips-container {
            max-height: 220px;         
            overflow-y: auto;
            padding-right: 2px;
        }

        .chips-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .branch-chip {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 2px 6px;
            border-radius: 4px;        
            font-size: 10px;
            font-weight: 500;
            user-select: none;
            white-space: nowrap;
        }

        /* TRACKED SELECTION STATES */
        .tracked-chip {
            cursor: pointer;
            transition: all 0.2s;
        }
        .tracked-chip:hover {
            border-color: var(--accent-primary);
            color: var(--text-main);
        }
        .tracked-chip.active {
            background-color: rgba(70, 130, 180, 0.15);
            border-color: var(--accent-primary);
            color: var(--text-main);
            font-weight: 600;
        }

        /* UNATTENDED GRID CHIPS */
        .unattended-chip {
            background-color: rgba(239, 68, 68, 0.04);
            border-color: rgba(239, 68, 68, 0.2);
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <div class="operator-panel">
        <div class="operator-controls-left">
            <span class="operator-label">Active Operator:</span>
            <select class="operator-select" id="operatorSelect">
                <option value="">Loading staff rows po...</option>
            </select>
        </div>
        <button class="theme-toggle-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="stream-container hidden" id="noticeStream"></div>

    <div class="bottom-anchor hidden" id="bottomConsole">
        
        <label class="operator-label" style="color: var(--warning-red);" id="unattendedHeaderLabel">⚠️ Unattended Branches</label>
        <div class="chips-container" style="max-height: 48px; margin-bottom: 2px;">
            <div class="chips-wrap" id="unattendedChipsDisplay"></div>
        </div>

        <div class="collapsible-chips-panel" id="chipsAccordion">
            <div class="accordion-header" onclick="toggleChipsAccordion()">
                <span class="operator-label" style="margin-bottom:0; cursor:pointer;" id="trackedHeaderLabel">My Tracked Feeds</span>
                <span class="chevron">▶</span>
            </div>
            <div class="accordion-body">
                <div class="chips-container">
                    <div class="chips-wrap" id="branchChipsDisplay"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // FIXED PRODUCTION CONFIGURATION ENDPOINTS
        const XANO_OPERATORS_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:YLM1xvBg/get_admin_names'; 
        const XANO_SHIFTS_LOAD_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:YLM1xvBg/get_admin_active_shifts';
        const XANO_FRANCHISES_LOAD_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:YLM1xvBg/get_active_franchises';
        const XANO_TOGGLE_SHIFT_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:YLM1xvBg/toggle_admin_shift';
        const XANO_UNATTENDED_LOAD_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:YLM1xvBg/get_unattended_franchises';
        
        // RECEPTION DATABASE QUEUE STREAM PATHWAY
        const XANO_MESSAGES_STREAM_URL = 'https://x8ki-letl-twmt.n7.xano.io/api:iB-rBShc/message_raw';

        const operatorSelect = document.getElementById('operatorSelect');
        const chipsAccordion = document.getElementById('chipsAccordion');
        const noticeStream = document.getElementById('noticeStream');
        const bottomConsole = document.getElementById('bottomConsole');
        const branchChipsDisplay = document.getElementById('branchChipsDisplay');
        const unattendedChipsDisplay = document.getElementById('unattendedChipsDisplay');
        const trackedHeaderLabel = document.getElementById('trackedHeaderLabel');
        const unattendedHeaderLabel = document.getElementById('unattendedHeaderLabel');

        // Global State Trackers
        let masterFranchiseList = [];
        let operatorActiveShiftIds = new Set();
        let globalUnattendedIds = new Set();
        
        // Array Core Notification Engine State Mappings
        let liveNotifications = [];
        let dataPollerTimer = null;
        let uiClockTimer = null;

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const btn = document.querySelector('.theme-toggle-btn');
            btn.innerText = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        }

        function toggleChipsAccordion() {
            chipsAccordion.classList.toggle('active');
        }

        /**
         * Core Visibility & Refresh Logic Triggered on Selection Changes
         */
        async function handleOperatorSelectionChange() {
            const selectedAdminId = operatorSelect.value;
            
            // Clean shutdown of old polling timer loops
            if (dataPollerTimer) clearInterval(dataPollerTimer);
            if (uiClockTimer) clearInterval(uiClockTimer);
            dataPollerTimer = null;
            uiClockTimer = null;
            liveNotifications = [];
            noticeStream.innerHTML = '';
            
            if (selectedAdminId && selectedAdminId.trim() !== "") {
                await refreshOperatorShiftState(selectedAdminId);
                
                noticeStream.classList.remove('hidden');
                bottomConsole.remove('hidden'); 
                
                // Fetch layout array data immediately, then poll row changes every 5 seconds
                await syncNotificationsArray();
                dataPollerTimer = setInterval(syncNotificationsArray, 5000);
                
                // Keep front clock strings ticking every second without running API queries
                uiClockTimer = setInterval(renderNotificationCards, 1000);
            } else {
                noticeStream.classList.add('hidden');
                bottomConsole.classList.add('hidden'); 
            }
        }

        operatorSelect.addEventListener('change', handleOperatorSelectionChange);

        /**
         * Fetch active mapping paths from your Xano endpoints
         */
        async function refreshOperatorShiftState(adminId) {
            try {
                const [shiftsResponse, unattendedResponse] = await Promise.all([
                    fetch(`${XANO_SHIFTS_LOAD_URL}?admin_id=${adminId}`),
                    fetch(XANO_UNATTENDED_LOAD_URL)
                ]);

                if (!shiftsResponse.ok || !unattendedResponse.ok) throw new Error('Failed to pull shift metrics.');
                
                const activeShiftsArray = await shiftsResponse.json();
                const unattendedRawData = await unattendedResponse.json();
                
                // RESTORED TO ORIGINAL ID LOOKUPS: Map pure franchise ID numbers to match your original grid system
                operatorActiveShiftIds = new Set(activeShiftsArray.map(item => {
                    if (item && typeof item === 'object') {
                        return Number(item.franchise_id || item.franchise || item.id);
                    }
                    return Number(item);
                }).filter(val => !isNaN(val)));
                
                globalUnattendedIds = new Set(unattendedRawData.map(item => {
                    if (item === null || item === undefined) return null;
                    return typeof item === 'object' ? Number(item.id) : Number(item);
                }).filter(val => val !== null && !isNaN(val)));
                
                renderAllBranchPanels(adminId);
            } catch (err) {
                console.error("Shift tracking synchronizer fault:", err);
            }
        }

        /**
         * ARRAY SYNC: Pulls raw Xano table rows and updates local notification arrays
         */
        async function syncNotificationsArray() {
            if (!operatorSelect.value) return;
            try {
                const response = await fetch(`${XANO_MESSAGES_STREAM_URL}?is_processed=false`);
                if (!response.ok) throw new Error('Could not pull unprocessed records.');
                
                const dbRecords = await response.json();
                
                // Track matching branches using the numeric franchise ID match path
                liveNotifications = dbRecords.filter(msg => {
                    const branchMatch = masterFranchiseList.find(f => String(f.facebook_page_id) === String(msg.facebook_page_id));
                    return branchMatch && operatorActiveShiftIds.has(Number(branchMatch.id));
                });
                
                renderNotificationCards();
            } catch (err) {
                console.error("Array sync routine dropped:", err);
            }
        }

        /**
         * UI RENDER LOOP: Loops through arrays, handles time equations, and prints out card items
         */
        function renderNotificationCards() {
            noticeStream.innerHTML = '';
            
            const totalAlerts = liveNotifications.length;
            const now = Date.now();
            
            // Track how many items currently inside our array contain elapsed wait metrics over 10 minutes
            const staleCount = liveNotifications.filter(msg => {
                const elapsedMs = now - Number(msg.received_at || msg.created_at);
                return elapsedMs >= 600000;
            }).length;

            // Update panel header string states dynamically
            trackedHeaderLabel.textContent = `My Tracked Feeds (${totalAlerts})`;
            unattendedHeaderLabel.textContent = `⚠️ Unattended Branches [Stale Feeds: ${staleCount}]`;

            if (totalAlerts === 0) {
                noticeStream.innerHTML = `
                    <div style="display:flex; align-items:center; justify-content:center; height:100%; font-size:12px; color:var(--text-muted); font-weight:500;">
                        No active notifications in your tracked feeds po.
                    </div>`;
                return;
            }

            // Map grid boxes directly from array state indices
            liveNotifications.forEach((msg, index) => {
                const branchMatch = masterFranchiseList.find(f => String(f.facebook_page_id) === String(msg.facebook_page_id));
                const branchName = branchMatch ? branchMatch.name : 'Unknown Location';
                const contentBody = msg.payload?.body || msg.payload || 'Empty message content...';
                
                // Calculate incremental ticking seconds 
                const elapsedMs = now - Number(msg.received_at || msg.created_at);
                const totalSeconds = Math.floor(elapsedMs / 1000);
                const displayMins = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
                const displaySecs = String(totalSeconds % 60).padStart(2, '0');
                
                const isStale = totalSeconds >= 600; // 10 minute escalation border

                const card = document.createElement('div');
                card.className = 'notice-card';
                card.innerHTML = `
                    <div class="notice-content">
                        <div class="notice-line1">
                            <span class="branch-tag">📍 ${branchName}</span>
                            <span class="live-timer ${isStale ? 'stale' : ''}">${displayMins}:${displaySecs}</span>
                        </div>
                        <div class="notice-line2">${contentBody}</div>
                    </div>
                    <div class="notice-actions">
                        <button class="btn-action" onclick="dispatchCardAction(${index}, ${msg.id}, 'goto', '${msg.conversation_id || msg.sender_external_id}')">Goto</button>
                        <button class="btn-action" onclick="dispatchCardAction(${index}, ${msg.id}, 'done')">Done</button>
                    </div>
                `;
                noticeStream.appendChild(card);
            });
        }

        /**
         * BUTTON HANDLER: Splices items from your array instantly, then sends back a quiet background database call
         */
        async function dispatchCardAction(arrayIndex, databaseId, actionType, conversationId = '') {
            // OPTIMISTIC LAYOUT UPDATE: Splicing drops card immediately with zero interface latency masking
            liveNotifications.splice(arrayIndex, 1);
            renderNotificationCards();

            if (actionType === 'goto') {
                console.log(`Navigating view focus straight onto target thread: ${conversationId}`);
            }

            // Run table line processing update quietly on background threads
            try {
                await fetch(`${XANO_MESSAGES_STREAM_URL}/${databaseId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_processed: true })
                });
            } catch (err) {
                console.error("Failed to sync processed flag state back to database row po:", err);
            }
        }

        /**
         * Generates and maps chip nodes to matching tracking views
         */
        function renderAllBranchPanels(adminId) {
            branchChipsDisplay.innerHTML = '';
            unattendedChipsDisplay.innerHTML = '';

            if (masterFranchiseList.length === 0) {
                branchChipsDisplay.innerHTML = '<span style="font-size: 10px; color: var(--text-muted);">No locations registered.</span>';
                return;
            }

            masterFranchiseList.forEach(branch => {
                if (!branch || !branch.id) return;
                
                const branchIdNum = Number(branch.id);
                const isTrackedByMe = operatorActiveShiftIds.has(branchIdNum);
                const isGloballyUnattended = globalUnattendedIds.has(branchIdNum);

                // 1. Build Interactive Chip under "My Tracked Feeds"
                const trackedChip = document.createElement('div');
                trackedChip.className = `branch-chip tracked-chip ${isTrackedByMe ? 'active' : ''}`;
                trackedChip.textContent = branch.name;
                
                trackedChip.addEventListener('click', () => handleShiftToggleOperation(adminId, branch.id, trackedChip));
                branchChipsDisplay.appendChild(trackedChip);

                // 2. Build Unattended Static Chip if left completely unassigned globally
                if (isGloballyUnattended) {
                    const unattendedChip = document.createElement('div');
                    unattendedChip.className = 'branch-chip unattended-chip';
                    unattendedChip.textContent = branch.name;
                    unattendedChipsDisplay.appendChild(unattendedChip);
                }
            });
            
            // Sync dynamic tracking list headers immediately
            trackedHeaderLabel.textContent = `My Tracked Feeds (${operatorActiveShiftIds.size})`;
        }

        /**
         * Dispatches real-time structural inversions back to Xano function stacks
         */
        async function handleShiftToggleOperation(adminId, franchiseId, chipElement) {
            const wasActive = chipElement.classList.contains('active');
            const franchiseIdNum = Number(franchiseId);

            if (wasActive) {
                chipElement.classList.remove('active');
                operatorActiveShiftIds.delete(franchiseIdNum);
                globalUnattendedIds.add(franchiseIdNum);
            } else {
                chipElement.classList.add('active');
                operatorActiveShiftIds.add(franchiseIdNum);
                globalUnattendedIds.delete(franchiseIdNum);
            }
            
            renderAllBranchPanels(adminId);
            
            // Hot reload notification filters immediately upon shift checking changes
            syncNotificationsArray();

            try {
                const response = await fetch(XANO_TOGGLE_SHIFT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        admin_id: Number(adminId),
                        franchise_id: franchiseIdNum
                    })
                });

                if (!response.ok) throw new Error('Transaction process rollback response.');
                
                const freshUnattendedRes = await fetch(XANO_UNATTENDED_LOAD_URL);
                if (freshUnattendedRes.ok) {
                    const freshUnattendedData = await freshUnattendedRes.json();
                    globalUnattendedIds = new Set(freshUnattendedData.map(item => {
                        if (item === null || item === undefined) return null;
                        return typeof item === 'object' ? Number(item.id) : Number(item);
                    }).filter(val => val !== null && !isNaN(val)));
                    renderAllBranchPanels(adminId);
                }

            } catch (err) {
                console.error("Database connection synchronization failure, running hard data reversion loop:", err);
                if (wasActive) {
                    operatorActiveShiftIds.add(franchiseIdNum);
                    globalUnattendedIds.delete(franchiseIdNum);
                } else {
                    operatorActiveShiftIds.delete(franchiseIdNum);
                    globalUnattendedIds.add(franchiseIdNum);
                }
                renderAllBranchPanels(adminId);
                syncNotificationsArray();
                alert('Network connection transaction interrupted. Shift state mutation dropped.');
            }
        }

        /**
         * Master system startup pipeline loaders
         */
        async function loadSystemDashboardContext() {
            try {
                const opResponse = await fetch(XANO_OPERATORS_URL);
                if (!opResponse.ok) throw new Error(`Operator HTTP Error: ${opResponse.status}`);
                
                const rawOpData = await opResponse.json();
                
                let admins = [];
                if (Array.isArray(rawOpData)) {
                    admins = rawOpData;
                } else if (rawOpData && Array.isArray(rawOpData.admin_name)) {
                    admins = rawOpData.admin_name;
                } else if (rawOpData && typeof rawOpData === 'object') {
                    const structuralKey = Object.keys(rawOpData).find(key => Array.isArray(rawOpData[key]));
                    admins = structuralKey ? rawOpData[structuralKey] : [];
                }

                operatorSelect.innerHTML = '<option value="">Select your name po...</option>';
                
                if (admins.length === 0) {
                    operatorSelect.innerHTML = '<option value="">No admins found in DB</option>';
                } else {
                    admins.forEach(admin => {
                        const option = document.createElement('option');
                        option.value = admin.id || admin.admin_id;   
                        option.text = admin.name || admin.admin_name || admin.field_value;   
                        operatorSelect.appendChild(option);
                    });
                }

                const franchiseResponse = await fetch(XANO_FRANCHISES_LOAD_URL);
                if (franchiseResponse.ok) {
                    masterFranchiseList = await franchiseResponse.json();
                }

                if (operatorSelect.value && operatorSelect.value.trim() !== "") {
                    await handleOperatorSelectionChange();
                }

            } catch (err) {
                console.error("Fatal operational stack initial configuration failure:", err);
                operatorSelect.innerHTML = '<option value="">Error loading staff po</option>';
            }
        }

        window.addEventListener('DOMContentLoaded', loadSystemDashboardContext);
    </script>
</body>
</html>
