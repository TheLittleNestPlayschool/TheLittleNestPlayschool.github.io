<script>
    function navTo(file, title) {
        // Update local label
        const screenNameEl = document.getElementById('screen-name');
        if (screenNameEl) screenNameEl.innerText = title;

        // Call the parent dashboard's loadFrame
        if (window.parent && typeof window.parent.loadFrame === 'function') {
            window.parent.loadFrame(file, title);
        } else {
            console.error("Dashboard core (parent.loadFrame) not detected.");
        }
    }
</script>
