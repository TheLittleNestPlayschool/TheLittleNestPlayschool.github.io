<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest Intelligence Hub</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: #f4f7f6; overflow: hidden; }
        
        /* Dark Sidebar Shell */
        #nav-placeholder {
            width: 260px;
            background: #1a1a1a;
            color: #ccc;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
            border-right: 1px solid #333;
        }

        /* Main Content Area */
        #content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* Home Screen Styling */
        #home-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            background: white;
            text-align: center;
        }

        #home-screen h1 {
            font-family: Georgia, serif;
            color: #1a365d;
            font-size: 2.5rem;
        }
    </style>
</head>
<body>

    <div id="nav-placeholder">
        <div style="padding: 20px; text-align: center; color: #555;">Loading Menu...</div>
    </div>

    <div id="content-area">
        <div id="home-screen">
            <h1>The Little Nest Intelligence Hub</h1>
        </div>
        <iframe id="main-frame" style="display:none;"></iframe>
    </div>

    <script>
        // 1. Load the menu from the same folder
        fetch('enginemenu.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('nav-placeholder').innerHTML = html;
            })
            .catch(err => console.error("Menu load failed:", err));

        /**
         * 2. The Engine: loadFrame
         * This handles the switching between the Home screen and the manager files.
         */
        function loadFrame(url, name) {
            const home = document.getElementById('home-screen');
            const frame = document.getElementById('main-frame');
            const screenLabel = document.getElementById('screen-name');

            // Update the menu indicator if it exists
            if (screenLabel) screenLabel.innerText = name;

            // Hide home, show iframe
            home.style.display = 'none';
            frame.style.display = 'block';
            
            // Set source (URL already includes '../' from the menu)
            frame.src = url;
        }

        /**
         * 3. Reset to Home
         */
        function resetDashboard() {
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('main-frame').style.display = 'none';
            document.getElementById('main-frame').src = '';
            if (document.getElementById('screen-name')) {
                document.getElementById('screen-name').innerText = 'Home';
            }
        }
    </script>
</body>
</html>
