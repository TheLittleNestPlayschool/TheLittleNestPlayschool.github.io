<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest | Parent Hub</title>
    <style>
        /* matching the clean, dark sidebar style you liked */
        html, body { margin: 0; padding: 0; background: #fdfbf7; font-family: 'Inter', sans-serif; }
        
        .admin-sidebar { 
            width: 250px; 
            height: 100vh; 
            background: #1a1a1a; 
            color: #fff; 
            position: fixed; 
            left: 0; 
            top: 0; 
            z-index: 10000; 
            overflow-y: auto; 
            border-right: 1px solid #333; 
        }

        .main-content { 
            margin-left: 250px; 
            padding: 30px; 
            width: calc(100% - 250px); 
            min-height: 100vh; 
            background: #fff; 
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #content-inner { width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <main class="main-content" id="dashboard-content">
        <div id="content-inner" style="margin-top: 15vh;">
            <h1 style="color: #5D4037;">The Little Nest Parent Hub</h1>
            <p style="color: #8D6E63;">Please select a game or activity from the menu to begin.</p>
        </div>
    </main>

    <script>
        // Load the sidebar menu
        window.onload = function() {
            fetch('parentsmenu.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('nav-placeholder').innerHTML = data;
                });
        };

        // Function to load the game into the dashboard
        async function loadFrame(url, name) {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = '<div style="padding:40px;">Opening ' + name + '...</div>';
            
            try {
                const response = await fetch(url + '?v=' + Math.floor(Math.random() * 999999));
                const html = await response.text();
                container.innerHTML = html;

                // This part makes sure the game logic actually runs
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

            } catch (e) {
                container.innerHTML = '<h2>Error loading ' + name + '</h2>';
            }
        }
    </script>
</body>
</html>
