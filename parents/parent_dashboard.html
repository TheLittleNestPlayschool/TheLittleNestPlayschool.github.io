<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Nest | Parent Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #fdfbf7; 
            font-family: 'Inter', sans-serif; 
            color: #5D4037;
        }

        /* Sidebar Styling */
        .parent-sidebar { 
            width: 260px; 
            height: 100vh; 
            background: #5D4037; 
            color: #fff; 
            position: fixed; 
            left: 0; 
            top: 0; 
            z-index: 1000; 
            overflow-y: auto; 
            border-right: 1px solid rgba(255,255,255,0.1); 
        }

        /* Main Viewport */
        .main-content { 
            margin-left: 260px; 
            padding: 40px; 
            width: calc(100% - 260px); 
            min-height: 100vh; 
            box-sizing: border-box; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #content-inner {
            width: 100%;
            max-width: 1000px;
            text-align: center;
        }

        .loading-state {
            font-style: italic;
            color: #8D6E63;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <main class="main-content" id="dashboard-content">
        <div id="content-inner">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">The Little Nest Parent Hub</h1>
            <p style="font-size: 1.1rem; color: #8D6E63;">Welcome to NestMind. Please select a game or lesson from the menu.</p>
            <hr style="border: 0; border-top: 2px solid #E0E0E0; margin: 40px 0;">
        </div>
    </main>

    <script>
        // Load the Sidebar Menu automatically
        window.onload = function() {
            fetch('parentsmenu.html')
                .then(response => {
                    if (!response.ok) throw new Error('Menu not found');
                    return response.text();
                })
                .then(data => {
                    document.getElementById('nav-placeholder').innerHTML = data;
                })
                .catch(err => console.error('Error loading menu:', err));
        };

        // Standard function to load games/modules into the main area
        async function loadFrame(url, name) {
            const container = document.getElementById('dashboard-content');
            
            // Show loading state
            container.innerHTML = `<div class="loading-state">Opening ${name}...</div>`;
            
            try {
                // Fetch with a cache-buster to ensure fresh game code
                const response = await fetch(url + '?v=' + Date.now());
                const html = await response.text();
                
                // Inject the HTML
                container.innerHTML = html;

                // CRITICAL: Manually find and re-run all scripts in the loaded HTML
                // This is required because innerHTML doesn't execute <script> tags
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    // Copy attributes (src, type, etc)
                    Array.from(oldScript.attributes).forEach(attr => {
                        newScript.setAttribute(attr.name, attr.value);
                    });
                    // Copy the script content
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    // Replace the old non-working script with the new working one
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

            } catch (e) {
                console.error('Module Load Error:', e);
                container.innerHTML = `
                    <div style="text-align:center; padding:50px;">
                        <h2 style="color:#C62828;">Oops! Error loading ${name}</h2>
                        <p>Please make sure ${url} exists in the /parents/ folder.</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
