<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<script src="api_config.js"></script>
<script src="schema_config.js"></script>

<div class="flex min-h-screen bg-[#f8fafc] font-['Inter',_sans-serif]">
    <div class="flex-1 p-12 overflow-y-auto">
        
        <div class="flex justify-between items-start mb-12">
            <div>
                <h1 class="text-5xl font-[900] text-[#0f172a] tracking-tighter uppercase italic leading-none">Teacher Management</h1>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mt-3">Faculty & Staff Records • Central Office</p>
            </div>
            <div class="flex gap-4">
                <input type="text" id="teacher-search" onkeyup="filterTeachers()" placeholder="Search staff, roles, or phone..." 
                    class="px-8 py-4 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500 outline-none w-[400px] bg-white font-bold shadow-sm">
                <button onclick="toggleModal('register-modal', true)" class="bg-[#4f46e5] hover:bg-[#4338ca] text-white px-8 py-4 rounded-xl font-[900] text-sm transition-all uppercase tracking-widest shadow-lg shadow-indigo-100">
                    + Register Teacher
                </button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-6 mb-12">
            <div class="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Total Faculty</p>
                <h2 id="stat-count" class="text-5xl font-[900] text-slate-800 tracking-tighter italic">--</h2>
            </div>
            <div class="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Branch Daily Payroll</p>
                <h2 id="stat-payroll" class="text-5xl font-[900] text-[#10b981] tracking-tighter italic">₱0</h2>
            </div>
            <div class="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Branch Lock Status</p>
                <h2 id="header-franchise-name" class="text-[2.5rem] font-[900] text-[#4f46e5] tracking-tighter uppercase italic">--</h2>
            </div>
        </div>

        <div id="teacher-list" class="space-y-6 pb-20">
            <div class="py-40 text-center text-slate-300 font-black uppercase italic tracking-widest text-2xl opacity-50">Syncing NestMind Database...</div>
        </div>
    </div>
</div>

<div id="register-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] hidden items-center justify-center p-6">
    <div class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl overflow-hidden font-['Inter']">
        <div class="p-10 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <div>
                <h2 class="text-3xl font-[900] text-slate-900 tracking-tighter uppercase italic">Register Faculty</h2>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-1">NestMind Administrative Record</p>
            </div>
            <button onclick="toggleModal('register-modal', false)" class="text-slate-300 hover:text-red-500 text-3xl font-black transition-all">×</button>
        </div>
        <form id="teacher-form" class="p-10 space-y-6">
            <div class="grid grid-cols-2 gap-6">
                <input type="text" name="name" placeholder="Full Legal Name" required class="w-full px-8 py-5 rounded-2xl bg-slate-50 border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="text" name="phone" placeholder="Contact Phone" required class="w-full px-8 py-5 rounded-2xl bg-slate-50 border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div class="grid grid-cols-2 gap-6">
                <input type="number" name="daily_pay" placeholder="Daily Rate (PHP)" required class="w-full px-8 py-5 rounded-2xl bg-slate-50 border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="text" name="tin_number" placeholder="TIN Number" class="w-full px-8 py-5 rounded-2xl bg-slate-50 border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-[#4f46e5] text-white py-6 rounded-2xl font-black uppercase tracking-[0.2em] hover:bg-[#4338ca] transition-all shadow-xl shadow-indigo-100">Complete Registration</button>
        </form>
    </div>
</div>

<script>
    let allTeachers = [];
    // 2. GET FRANCHISE CONTEXT
    const activeFranchiseId = localStorage.getItem('locked_franchise_id');
    const activeFranchiseName = localStorage.getItem('locked_franchise_name') || 'Main Office';

    async function init() {
        document.getElementById('header-franchise-name').innerText = activeFranchiseName;
        
        // 3. CHECK FOR CONFIG LOADED
        if (typeof API_CONFIG === 'undefined') {
            document.getElementById('teacher-list').innerHTML = `<p class="text-red-500 font-black uppercase text-center py-20 italic">Critical Error: api_config.js not loaded.</p>`;
            return;
        }
        await fetchTeachers();
    }

    async function fetchTeachers() {
        try {
            const res = await fetch(API_CONFIG.teacher.list);
            const data = await res.json();

            // 4. FILTER BY FRANCHISE ID
            allTeachers = data.filter(t => t.franchise_id == activeFranchiseId);
            
            document.getElementById('stat-count').innerText = allTeachers.length;
            const dailySum = allTeachers.reduce((acc, curr) => acc + (parseFloat(curr.daily_pay) || 0), 0);
            document.getElementById('stat-payroll').innerText = "₱" + dailySum.toLocaleString();

            render(allTeachers);
        } catch (e) {
            console.error(e);
            document.getElementById('teacher-list').innerHTML = `<p class="text-red-500 font-black uppercase text-center py-20 italic">Sync Failure: Check Xano API connectivity.</p>`;
        }
    }

    function render(list) {
        const container = document.getElementById('teacher-list');
        if (!list.length) {
            container.innerHTML = `<div class="bg-white p-24 rounded-[3rem] border-2 border-dashed border-slate-100 text-center text-slate-300 font-black uppercase italic tracking-widest text-2xl opacity-40">No Records Detected for ${activeFranchiseName}</div>`;
            return;
        }

        container.innerHTML = list.map(t => `
            <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm p-10 group relative">
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Teacher / Staff</p>
                        <h3 class="text-3xl font-[900] text-[#0f172a] tracking-tighter uppercase italic leading-none group-hover:text-[#4f46e5] transition-colors">${t.name}</h3>
                        <p class="text-xs font-black text-[#4f46e5] uppercase tracking-widest pt-1">${t.phone || '000-0000'}</p>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <div class="flex gap-2 mb-4">
                            <span class="px-3 py-1 bg-emerald-50 text-emerald-600 text-[9px] font-black rounded-md border border-emerald-100 uppercase tracking-widest italic">Active</span>
                            <button class="px-4 py-2 border border-slate-200 text-[9px] font-black text-slate-500 rounded-lg uppercase tracking-widest shadow-sm">Edit</button>
                            <button class="px-4 py-2 bg-red-50 text-red-500 text-[9px] font-black rounded-lg uppercase tracking-widest shadow-sm">Delete</button>
                        </div>
                        <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest leading-none">Hired Since</p>
                        <p class="text-xs font-bold text-slate-800 italic">${new Date(t.created_at).toLocaleDateString()}</p>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-10 mt-10 pt-8 border-t border-slate-50">
                    <div class="col-span-4 space-y-4">
                        <p class="text-[10px] font-black text-[#4f46e5] uppercase tracking-widest italic">Employment Details</p>
                        <div class="flex justify-between py-1 border-b border-slate-50 text-[9px] font-black text-slate-400 uppercase italic">
                            <span>TIN Number:</span>
                            <span class="text-slate-800">${t.tin_number || 'N/A'}</span>
                        </div>
                        <div class="flex justify-between items-center text-[9px] font-black text-slate-400 uppercase italic">
                            <span>Daily Pay:</span>
                            <span class="text-xl font-[900] text-[#0f172a] italic tracking-tighter">₱${t.daily_pay || '0'}</span>
                        </div>
                    </div>
                    <div class="col-span-3 border-l border-slate-50 pl-10">
                        <p class="text-[10px] font-black text-[#4f46e5] uppercase tracking-widest italic mb-4">Internal Assignment</p>
                        <p class="text-[11px] font-[900] text-slate-800 uppercase tracking-tighter italic">Franchise ID: ${t.franchise_id}</p>
                        <p class="text-[10px] font-bold text-slate-400 uppercase italic">Role ID: ${t.my_type_id || '4'}</p>
                    </div>
                    <div class="col-span-5 bg-slate-50/50 p-6 rounded-[1.5rem] border border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Notes</p>
                        <p class="text-[10px] italic font-bold text-slate-500 italic leading-relaxed">"${t.notes || 'No employee notes.'}"</p>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
    function filterTeachers() {
        const val = document.getElementById('teacher-search').value.toLowerCase();
        const filtered = allTeachers.filter(t => t.name.toLowerCase().includes(val) || (t.phone && t.phone.includes(val)));
        render(filtered);
    }
    init();
</script>
