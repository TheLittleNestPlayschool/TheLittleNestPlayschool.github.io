<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Teacher Management</h1>
        <p id="branch-display" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Faculty Records • Syncing...</p>
    </div>
    
    <div class="flex flex-wrap gap-2 w-full md:w-auto">
        <input type="text" id="teacher-search" placeholder="Search faculty..." 
            class="pl-4 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-xs outline-none focus:border-teal-500 shadow-sm w-full md:w-64 transition-all">
        
        <button id="add-teacher-btn" class="bg-slate-100 hover:bg-slate-200 text-slate-500 px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase tracking-wider shadow-sm border border-slate-200">
            + REGISTER TEACHER
        </button>
    </div>
</div>

<div id="teacher-list-container" class="space-y-6">
    <div class="p-20 text-center text-slate-400 text-xs italic font-bold uppercase tracking-widest animate-pulse">
        Syncing Faculty Records...
    </div>
</div>

<div id="teacher-modal" class="hidden fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden border border-slate-200">
        <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <div>
                <h2 id="t-modal-title" class="text-sm font-black text-slate-800 uppercase">Update Faculty Profile</h2>
                <p id="modal-branch-title" class="text-[9px] text-teal-600 font-bold uppercase tracking-widest"></p>
            </div>
            <button id="close-modal-x" class="text-slate-400 hover:text-slate-900 text-3xl font-light">&times;</button>
        </div>
        
        <form id="teacher-form" class="p-6">
            <input type="hidden" id="t-edit-id">
            <input type="hidden" id="franchise_id">
            <input type="hidden" id="user_id">
            
            <div id="dynamic-fields-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-4 max-h-[60vh] overflow-y-auto pr-4 custom-scrollbar">
                </div>

            <div class="flex gap-3 pt-6 border-t border-slate-100 mt-6">
                <button type="button" id="cancel-modal-btn" class="px-8 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-[10px] uppercase hover:bg-slate-200 transition-all">Discard</button>
                <button type="submit" class="flex-1 py-3 bg-teal-500 text-white rounded-xl font-bold text-[10px] uppercase shadow-lg hover:bg-teal-600 transition-all">
                    Update Record
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const TeacherModule = {
        data: [],
        schema: null,

        async init() {
            if (!window.NEST_SCHEMA) await this.loadScript('/schema_config.js');
            if (!window.NEST_ENDPOINTS) await this.loadScript('/api_config.js');
            
            this.schema = window.NEST_SCHEMA.teacher;
            this.buildFormUI(); 
            
            const fid = localStorage.getItem('locked_franchise_id');
            const fname = localStorage.getItem('locked_franchise_name') || 'Sariaya';
            
            document.getElementById('branch-display').innerText = `Faculty Records • ${fname} Branch`;
            document.getElementById('modal-branch-title').innerText = `${fname} Branch`;

            if (!fid) {
                document.getElementById('teacher-list-container').innerHTML = `<div class="p-20 text-center text-red-500 font-black uppercase text-xs">No Franchise Locked</div>`;
                return;
            }

            try {
                const response = await fetch(`${window.NEST_ENDPOINTS.teacher.list}?franchise_id=${fid}`);
                this.data = await response.json();
                this.render(); 
                this.setupListeners();
            } catch (err) { console.error("Fetch Error:", err); }
        },

        formatDate(epoch) {
            if (!epoch) return '---';
            return new Date(epoch).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        },

        buildFormUI() {
            const grid = document.getElementById('dynamic-fields-grid');
            grid.innerHTML = '';
            let currentSection = "";

            this.schema.fields.forEach(f => {
                if (['id', 'franchise_id', 'user_id'].includes(f.id) || f.hidden) return;

                if (f.section && f.section !== currentSection) {
                    currentSection = f.section;
                    grid.insertAdjacentHTML('beforeend', `
                        <div class="col-span-full mt-6 mb-2 border-b border-slate-100 pb-1">
                            <span class="text-[10px] font-black text-teal-600 uppercase tracking-widest">${currentSection}</span>
                        </div>
                    `);
                }

                const spanClass = f.width === 'full' || f.type === 'textarea' ? 'col-span-full' : 'col-span-1';
                const bgClass = f.readonly ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-50';

                let inputHTML = '';
                if (f.type === 'textarea') {
                    inputHTML = `<textarea id="${f.id}" rows="2" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-xs outline-none focus:ring-2 focus:ring-teal-500"></textarea>`;
                } else if (f.type === 'bool' || f.type === 'checkbox') {
                    inputHTML = `
                        <div class="flex items-center gap-3 p-3 bg-slate-50 border border-slate-200 rounded-lg">
                            <input type="checkbox" id="${f.id}" class="w-4 h-4 accent-teal-500">
                            <span class="text-[10px] font-bold text-slate-500 uppercase">${f.label}</span>
                        </div>`;
                } else {
                    inputHTML = `<input type="${f.type}" id="${f.id}" ${f.readonly ? 'readonly' : ''} class="w-full p-3 ${bgClass} border border-slate-200 rounded-lg text-xs outline-none focus:ring-2 focus:ring-teal-500">`;
                }

                grid.insertAdjacentHTML('beforeend', `<div class="${spanClass}"><label class="text-[9px] text-slate-400 block uppercase font-black mb-1.5 ml-1 tracking-wider">${f.label}</label>${inputHTML}</div>`);
            });
        },

        render() {
            const container = document.getElementById('teacher-list-container');
            const search = (document.getElementById('teacher-search')?.value || '').toLowerCase();
            const currentFid = parseInt(localStorage.getItem('locked_franchise_id'));
            const currentFname = localStorage.getItem('locked_franchise_name');

            let filtered = this.data.filter(t => parseInt(t.franchise_id) === currentFid && 
                Object.values(t).some(val => String(val).toLowerCase().includes(search)));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-20 text-center text-slate-300 font-bold uppercase text-[10px]">No records found.</div>`;
                return;
            }

            container.innerHTML = '';
            filtered.forEach(t => {
                container.insertAdjacentHTML('beforeend', `
                    <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden hover:border-teal-400 transition-all">
                        <div class="bg-slate-50/80 p-5 flex flex-wrap items-center justify-between gap-6 border-b border-slate-100">
                            <div>
                                <span class="text-[9px] text-teal-600 font-black uppercase block tracking-tighter">${currentFname} Branch</span>
                                <span class="text-sm font-black text-slate-900 uppercase">${t.first_name || ''} ${t.last_name || ''}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase border ${t.is_active ? 'bg-teal-50 text-teal-600 border-teal-100' : 'bg-red-50 text-red-600 border-red-100'}">
                                    ${t.is_active ? 'Active' : 'Inactive'}
                                </span>
                                <button data-id="${t.id}" class="t-edit-btn px-4 py-2 bg-white border border-slate-300 rounded-lg text-[10px] font-black hover:text-teal-600 transition-all uppercase">Edit</button>
                                <button data-id="${t.id}" class="t-delete-btn px-4 py-2 bg-red-50 border border-red-100 rounded-lg text-red-500 text-[10px] font-black hover:bg-red-500 hover:text-white transition-all uppercase">Delete</button>
                            </div>
                        </div>

                        <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-8 bg-white">
                            <div class="space-y-4">
                                <h4 class="text-[10px] font-black text-slate-300 uppercase tracking-widest border-b border-slate-50 pb-2">Location & Contact</h4>
                                <div class="grid grid-cols-1 gap-3">
                                    <div><span class="text-[8px] font-black text-slate-400 uppercase block">Phone Contact</span><span class="text-[11px] font-bold text-slate-700">${t.phone || '---'}</span></div>
                                    <div><span class="text-[8px] font-black text-slate-400 uppercase block">Email Address</span><span class="text-[11px] font-bold text-slate-700">${t.email || '---'}</span></div>
                                    <div><span class="text-[8px] font-black text-slate-400 uppercase block">Full Address</span><span class="text-[11px] font-bold text-slate-700 leading-relaxed">${t.address || ''}, ${t.barangay || ''}, ${t.city || ''}</span></div>
                                </div>
                            </div>

                            <div class="space-y-4">
                                <h4 class="text-[10px] font-black text-slate-300 uppercase tracking-widest border-b border-slate-50 pb-2">Financial & IDs</h4>
                                <div class="grid grid-cols-2 gap-3">
                                    <div><span class="text-[8px] font-black text-slate-400 uppercase block">Daily Pay</span><span class="text-[11px] font-bold text-teal-600">₱${t.daily_pay || '0'}</span></div>
                                    <div><span class="text-[8px] font-black text-slate-400 uppercase block">TIN Number</span><span class="text-[11px] font-bold text-slate-700">${t.tin_number || '---'}</span></div>
                                    <div><span class="text-[8px] font-black text-slate-400 uppercase block">System Registration</span><span class="text-[11px] font-bold text-slate-700">${this.formatDate(t.created_at)}</span></div>
                                </div>
                            </div>

                            <div class="space-y-4">
                                <h4 class="text-[10px] font-black text-slate-300 uppercase tracking-widest border-b border-slate-50 pb-2">Service Lifecycle</h4>
                                <div class="grid grid-cols-2 gap-3">
                                    <div><span class="text-[8px] font-black text-slate-400 uppercase block">Start Date</span><span class="text-[11px] font-bold text-slate-700">${t.start_date || '---'}</span></div>
                                    <div><span class="text-[8px] font-black text-slate-400 uppercase block">Last Day</span><span class="text-[11px] font-bold text-slate-700">${t.last_day || '---'}</span></div>
                                    <div class="col-span-full"><span class="text-[8px] font-black text-slate-400 uppercase block">Inactivation History</span><span class="text-[11px] italic text-slate-500">${t.inactivation_notes || 'No notes.'}</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            });

            container.querySelectorAll('.t-edit-btn').forEach(b => b.onclick = () => this.openModal(this.data.find(x => x.id == b.dataset.id)));
            container.querySelectorAll('.t-delete-btn').forEach(b => b.onclick = () => this.deleteRecord(b.dataset.id));
        },

        async deleteRecord(id) {
            if (!confirm("Confirm removal?")) return;
            try {
                const res = await fetch(`${window.NEST_ENDPOINTS.teacher.list}/${id}`, { method: 'DELETE' });
                if (res.ok) this.init();
            } catch (err) { console.error(err); }
        },

        openModal(t) {
            if (!t) return;
            document.getElementById('teacher-modal').classList.remove('hidden');
            document.getElementById('teacher-form').reset();
            document.getElementById('t-edit-id').value = t.id;
            document.getElementById('franchise_id').value = t.franchise_id;
            document.getElementById('user_id').value = t.user_id || '';
            
            this.schema.fields.forEach(f => {
                const el = document.getElementById(f.id);
                if (el && !['id', 'franchise_id', 'user_id'].includes(f.id)) {
                    if (f.type === 'bool' || f.type === 'checkbox') el.checked = !!t[f.id];
                    else el.value = t[f.id] || '';
                }
            });
        },

        closeModal() { document.getElementById('teacher-modal').classList.add('hidden'); },

        setupListeners() {
            document.getElementById('teacher-search').oninput = () => this.render();
            document.getElementById('add-teacher-btn').onclick = () => alert("Contact head office to add a teacher");
            document.getElementById('close-modal-x').onclick = () => this.closeModal();
            document.getElementById('cancel-modal-btn').onclick = () => this.closeModal();

            document.getElementById('teacher-form').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('t-edit-id').value;
                if (!id) return;

                const payload = { 
                    franchise_id: parseInt(document.getElementById('franchise_id').value),
                    user_id: document.getElementById('user_id').value ? parseInt(document.getElementById('user_id').value) : null
                };
                
                this.schema.fields.forEach(f => {
                    const el = document.getElementById(f.id);
                    if (el && !['id', 'franchise_id', 'user_id'].includes(f.id)) {
                        payload[f.id] = (f.type === 'bool' || f.type === 'checkbox') ? el.checked : el.value;
                    }
                });

                const res = await fetch(`${window.NEST_ENDPOINTS.teacher.list}/${id}`, { 
                    method: 'PATCH', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                if (res.ok) { this.closeModal(); this.init(); }
            };
        },

        async loadScript(src) {
            return new Promise(resolve => {
                const s = document.createElement('script'); s.src = src; s.onload = resolve;
                s.onerror = () => { s.src = src.replace('/', ''); s.onload = resolve; };
                document.head.appendChild(s);
            });
        }
    };
    TeacherModule.init();
})();
</script>
