<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<script src="api_config.js"></script>
<script src="schema_config.js"></script>

<div class="flex min-h-screen bg-[#f8fafc] font-['Inter',_sans-serif]">
    
    <div class="w-72 bg-[#0f172a] text-slate-400 p-6 flex flex-col gap-8 flex-shrink-0">
        <div class="flex items-center gap-3 px-2">
            <div class="w-8 h-8 bg-emerald-400 rounded-lg"></div>
            <span class="text-white font-bold text-xl tracking-tighter">NestMind</span>
        </div>

        <div class="bg-slate-800/50 rounded-2xl p-6 border border-slate-700/50 text-center">
            <p class="text-[10px] font-black uppercase tracking-[0.2em] mb-1">Identity Lock</p>
            <h3 id="sidebar-franchise-name" class="text-white font-black text-xl italic uppercase">--</h3>
            <p class="text-[10px] mt-2 flex items-center justify-center gap-1">
                <span class="w-1 h-1 rounded-full bg-emerald-400"></span> Teachers
            </p>
        </div>

        <nav class="space-y-1">
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-4 px-2">Management</p>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all text-sm font-bold italic">📊 Performance</a>
            <a href="parents.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all text-sm font-bold italic">👥 Parents</a>
            <a href="teacher_v2.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-600 text-white shadow-lg shadow-indigo-500/20 text-sm font-bold italic">🧑‍🏫 Teachers</a>
            
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mt-8 mb-4 px-2">Academic DNA</p>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all text-sm font-bold italic">✨ New Enrollment</a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all text-sm font-bold italic">🏫 Students</a>
        </nav>
    </div>

    <div class="flex-1 p-12 overflow-y-auto">
        <div class="flex justify-between items-start mb-12">
            <div>
                <h1 class="text-4xl font-[900] text-slate-900 tracking-tighter uppercase italic leading-none">Teacher Management</h1>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-2 italic">Faculty & Staff Records • Central Office</p>
            </div>
            <div class="flex gap-4">
                <input type="text" id="teacher-search" onkeyup="filterTeachers()" placeholder="Search staff, roles, or phone..." 
                    class="px-6 py-4 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500 outline-none w-80 bg-white font-semibold shadow-sm">
                <button onclick="toggleModal('register-modal', true)" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-xl font-black text-sm transition-all uppercase tracking-widest shadow-lg shadow-indigo-200">
                    + Register Teacher
                </button>
            </div>
        </div>

        <div id="teacher-list" class="space-y-6">
            <div class="py-40 text-center text-slate-300 font-black uppercase italic tracking-widest">Initialising Faculty Dossier...</div>
        </div>
    </div>
</div>

<div id="register-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] hidden items-center justify-center p-6">
    <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h2 class="text-2xl font-black text-slate-900 tracking-tighter uppercase italic">Register New Faculty</h2>
            <button onclick="toggleModal('register-modal', false)" class="text-slate-300 hover:text-red-500 text-2xl font-black transition-colors">×</button>
        </div>
        <form id="teacher-form" class="p-8 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" name="name" placeholder="Full Legal Name" required class="w-full px-6 py-4 rounded-xl bg-slate-50 border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="text" name="phone" placeholder="Contact Phone" required class="w-full px-6 py-4 rounded-xl bg-slate-50 border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" name="daily_pay" placeholder="Daily Rate (PHP)" required class="w-full px-6 py-4 rounded-xl bg-slate-50 border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="text" name="tin_number" placeholder="TIN Number" class="w-full px-6 py-4 rounded-xl bg-slate-50 border-none text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-xl font-black uppercase tracking-widest hover:bg-indigo-700 transition-all shadow-lg">Complete Registration</button>
        </form>
    </div>
</div>

<script>
    let allTeachers = [];
    // Identify local franchise
    const activeFranchiseId = localStorage.getItem('locked_franchise_id');
    const activeFranchiseName = localStorage.getItem('locked_franchise_name') || 'Main Office';

    async function init() {
        document.getElementById('sidebar-franchise-name').innerText = activeFranchiseName;
        
        // Final guard to ensure API_CONFIG is ready before execution
        if (typeof API_CONFIG === 'undefined') {
            document.getElementById('teacher-list').innerHTML = `<p class="text-red-500 font-black uppercase text-center py-20 italic tracking-tighter">Critical Error: api_config.js Not Loaded.</p>`;
            return;
        }
        await fetchTeachers();
    }

    async function fetchTeachers() {
        try {
            // Read from Xano via central config
            const res = await fetch(API_CONFIG.teacher.list);
            const data = await res.json();

            // Filter to current branch
            allTeachers = data.filter(t => t.franchise_id == activeFranchiseId);
            render(allTeachers);
        } catch (e) {
            console.error(e);
            document.getElementById('teacher-list').innerHTML = `<p class="text-red-500 font-black uppercase text-center py-20 italic">Sync Failure: Check API Connection</p>`;
        }
    }

    function render(list) {
        const container = document.getElementById('teacher-list');
        if (!list.length) {
            container.innerHTML = `<div class="bg-white p-20 rounded-3xl border border-dashed border-slate-200 text-center text-slate-300 font-black uppercase italic tracking-widest text-xl">No Records for ${activeFranchiseName}</div>`;
            return;
        }

        container.innerHTML = list.map(t => `
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-10 hover:border-indigo-100 transition-all group">
                <div class="flex justify-between items-start">
                    <div class="space-y-1">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Teacher / Staff</p>
                        <h3 class="text-2xl font-black text-slate-900 tracking-tighter uppercase italic">${t.name}</h3>
                        <p class="text-xs font-black text-indigo-600 uppercase tracking-widest">${t.phone || 'No Contact'}</p>
                    </div>
                    <div class="text-right">
                        <div class="flex gap-2 mb-4 justify-end">
                            <span class="px-3 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-black rounded-lg uppercase tracking-widest border border-emerald-100">Active</span>
                            <button class="px-4 py-1.5 border border-slate-200 text-[10px] font-black text-slate-500 rounded-lg hover:bg-slate-50 uppercase tracking-widest transition-all">Edit</button>
                            <button class="px-4 py-1.5 bg-red-50 text-red-500 text-[10px] font-black rounded-lg hover:bg-red-500 hover:text-white transition-all uppercase tracking-widest">Delete</button>
                        </div>
                        <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Hired Since</p>
                        <p class="text-xs font-bold text-slate-800 italic">${new Date(t.created_at).toLocaleDateString()}</p>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-8 mt-10 pt-8 border-t border-slate-50">
                    <div class="col-span-4">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 italic text-indigo-600">Employment Details</p>
                        <div class="flex justify-between text-xs py-1 border-b border-slate-50">
                            <span class="font-bold text-slate-400 uppercase tracking-widest text-[9px]">TIN Number:</span>
                            <span class="font-black text-slate-800">${t.tin_number || 'N/A'}</span>
                        </div>
                        <div class="flex justify-between text-xs py-2">
                            <span class="font-bold text-slate-400 uppercase tracking-widest text-[9px]">Daily Pay:</span>
                            <span class="font-black text-slate-900 italic">₱${t.daily_pay || '0'}</span>
                        </div>
                    </div>
                    <div class="col-span-3">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 italic text-indigo-600">Internal Assignment</p>
                        <p class="text-[10px] font-black text-slate-900 uppercase">Franchise ID: ${t.franchise_id}</p>
                        <p class="text-[9px] font-bold text-slate-400 uppercase mt-1 italic">Role ID: ${t.my_type_id || '4'}</p>
                    </div>
                    <div class="col-span-5 bg-slate-50/50 p-4 rounded-xl">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 italic">Notes</p>
                        <p class="text-[10px] italic font-bold text-slate-500 leading-relaxed italic">"${t.notes || 'No administrative notes recorded.'}"</p>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
    function filterTeachers() {
        const val = document.getElementById('teacher-search').value.toLowerCase();
        const filtered = allTeachers.filter(t => t.name.toLowerCase().includes(val) || (t.phone && t.phone.includes(val)));
        render(filtered);
    }
    init();
</script>
