<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<script src="api_config.js"></script>

<div class="p-10 max-w-[1600px] mx-auto font-['Inter',_sans-serif]">
    <div class="flex justify-between items-end mb-12">
        <div class="space-y-2">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <span class="text-white font-black text-xl">N</span>
                </div>
                <h1 class="text-5xl font-[900] tracking-tighter uppercase italic text-slate-900 leading-none">Teacher Management</h1>
            </div>
            <div class="flex items-center gap-4 pl-1">
                <span class="flex items-center gap-1.5 px-3 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-black rounded-full border border-emerald-100 uppercase tracking-widest">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    Systems Active
                </span>
                <p class="text-slate-400 font-bold text-xs tracking-[0.2em] uppercase">Faculty Records & Payroll Intelligence</p>
            </div>
        </div>

        <div class="flex gap-4 items-center">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-300 group-focus-within:text-indigo-500 transition-colors text-xl">🔍</div>
                <input type="text" id="teacher-search" onkeyup="filterTeachers()" placeholder="Search staff, roles, or phone..." 
                    class="pl-14 pr-8 py-5 rounded-[2rem] border-2 border-slate-100 text-sm focus:border-indigo-500 focus:ring-0 outline-none w-[450px] shadow-sm bg-white font-semibold transition-all placeholder:text-slate-300">
            </div>
            <button onclick="toggleModal('register-modal', true)" class="bg-[#0f172a] hover:bg-black hover:scale-[1.02] active:scale-95 text-white px-10 py-5 rounded-[2rem] font-900 text-sm transition-all flex items-center gap-3 shadow-2xl shadow-slate-200 uppercase tracking-[0.1em]">
                <span>+</span> Register Teacher
            </button>
        </div>
    </div>

    <div class="grid grid-cols-4 gap-8 mb-12">
        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden group hover:border-indigo-500/20 transition-all">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-2">Total Faculty</p>
            <h2 id="stat-count" class="text-5xl font-[900] text-slate-800 tracking-tighter italic">--</h2>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm group hover:border-emerald-500/20 transition-all">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-2">Branch Daily Payroll</p>
            <h2 id="stat-payroll" class="text-5xl font-[900] text-emerald-500 tracking-tighter italic">₱0</h2>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-2">Branch Lock Status</p>
            <h2 id="active-branch-label" class="text-2xl font-[900] text-indigo-600 tracking-tighter uppercase mt-2 italic">--</h2>
        </div>
    </div>

    <div id="teacher-list" class="grid grid-cols-1 gap-8">
        <div class="flex flex-col items-center justify-center py-60 text-slate-400 bg-white rounded-[4rem] border-2 border-dashed border-slate-100 shadow-inner">
            <p class="font-black text-2xl uppercase tracking-widest italic opacity-40">Authenticating Faculty Data...</p>
        </div>
    </div>
</div>

<div id="register-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] hidden items-center justify-center p-6">
    <div class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl overflow-hidden">
        <div class="p-10 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <div>
                <h2 class="text-3xl font-black text-slate-900 tracking-tighter uppercase italic">Register New Faculty</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Manual Entry Protocol • NestMind Admin</p>
            </div>
            <button onclick="toggleModal('register-modal', false)" class="w-12 h-12 rounded-2xl hover:bg-red-50 hover:text-red-500 text-slate-300 transition-all flex items-center justify-center text-2xl font-black">×</button>
        </div>
        <form id="teacher-form" class="p-10 space-y-6">
            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Full Legal Name</label>
                    <input type="text" name="name" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-sm">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Contact Phone</label>
                    <input type="text" name="phone" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-sm">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Daily Rate (PHP)</label>
                    <input type="number" name="daily_pay" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-sm" placeholder="0.00">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">TIN Number</label>
                    <input type="text" name="tin_number" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-sm">
                </div>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black uppercase tracking-[0.2em] shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">Complete Registration</button>
        </form>
    </div>
</div>

<script>
    let allTeachers = [];
    const activeFranchiseId = localStorage.getItem('locked_franchise_id');
    const activeFranchiseName = localStorage.getItem('locked_franchise_name') || 'Main Office';

    async function init() {
        document.getElementById('active-branch-label').innerText = activeFranchiseName;
        await fetchTeachers();
    }

    async function fetchTeachers() {
        const container = document.getElementById('teacher-list');
        const countEl = document.getElementById('stat-count');
        const payrollEl = document.getElementById('stat-payroll');

        try {
            // USING THE EXTERNAL CONFIG OBJECT
            const res = await fetch(API_CONFIG.teacher.list);
            const data = await res.json();

            // FILTER: ONLY SHOW RECORDS FOR THIS FRANCHISE ID
            allTeachers = data.filter(t => t.franchise_id == activeFranchiseId);
            
            countEl.innerText = allTeachers.length;
            const dailySum = allTeachers.reduce((acc, curr) => acc + (parseFloat(curr.daily_pay) || 0), 0);
            payrollEl.innerText = "₱" + dailySum.toLocaleString();

            render(allTeachers);
        } catch (e) {
            container.innerHTML = `<div class="p-20 text-red-500 bg-white rounded-[3rem] border-2 border-red-50 font-black uppercase italic tracking-tighter text-center">Sync Failure: ${e.message}</div>`;
        }
    }

    function render(list) {
        const container = document.getElementById('teacher-list');
        if (!list.length) {
            container.innerHTML = `<div class="bg-white p-40 rounded-[4rem] border-2 border-dashed border-slate-100 text-center text-slate-200 font-[900] uppercase italic tracking-tighter text-4xl opacity-40">No Records Detected</div>`;
            return;
        }

        container.innerHTML = list.map(t => `
            <div class="bg-white rounded-[3.5rem] border border-slate-100 shadow-sm p-12 hover:shadow-2xl transition-all duration-500 relative group overflow-hidden">
                <div class="absolute top-0 right-0 w-48 h-48 bg-slate-50/50 rounded-bl-[6rem] -mr-12 -mt-12 group-hover:bg-indigo-500/5 transition-all"></div>
                <div class="flex justify-between items-center relative z-10">
                    <div class="flex gap-10 items-center">
                        <div class="w-24 h-24 bg-white rounded-[2rem] flex items-center justify-center text-5xl shadow-2xl shadow-slate-200 border border-slate-50 group-hover:rotate-6 transition-transform duration-500">🧑‍🏫</div>
                        <div class="space-y-1">
                            <div class="flex items-center gap-3">
                                <span class="px-3 py-0.5 bg-indigo-50 text-indigo-500 text-[9px] font-black rounded-md uppercase tracking-[0.2em] border border-indigo-100">Permanent Faculty</span>
                                <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest italic">ID: #${t.id}</span>
                            </div>
                            <h3 class="font-[900] text-slate-900 text-4xl tracking-tighter leading-none italic group-hover:text-indigo-600 transition-colors">${t.name}</h3>
                            <div class="flex gap-8 pt-2">
                                <p class="text-xs font-bold text-slate-500 italic lowercase">${t.email || 'pending_email'}</p>
                                <p class="text-xs font-black text-indigo-600 tracking-widest uppercase">${t.phone || '000-0000'}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button class="px-8 py-4 bg-slate-900 text-white rounded-[1.5rem] text-[10px] font-black uppercase tracking-[0.2em] shadow-xl hover:bg-indigo-600 transition-all">Update File</button>
                        <button class="w-14 h-14 bg-red-50 text-red-500 rounded-[1.5rem] flex items-center justify-center text-xl hover:bg-red-500 hover:text-white transition-all shadow-sm">🗑</button>
                    </div>
                </div>
                <div class="grid grid-cols-12 gap-12 mt-12 pt-12 border-t border-slate-50 relative z-10">
                    <div class="col-span-4 space-y-4">
                        <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4">Financials</p>
                        <div class="flex justify-between items-center bg-slate-50/50 p-4 rounded-2xl">
                            <span class="text-[10px] font-black text-slate-400 uppercase italic">Daily Compensation</span>
                            <span class="text-2xl font-[900] text-emerald-600 tracking-tighter italic">₱${t.daily_pay || '0'}</span>
                        </div>
                        <div class="flex justify-between items-center px-4">
                            <span class="text-[10px] font-black text-slate-300 uppercase italic">TIN Record</span>
                            <span class="text-[11px] font-black text-slate-800 tracking-widest">${t.tin_number || 'REQUIRED'}</span>
                        </div>
                    </div>
                    <div class="col-span-3 border-l border-slate-50 pl-12">
                        <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4">Deployment</p>
                        <div class="space-y-3">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-slate-300 uppercase italic">Franchise ID</span>
                                <span class="text-xs font-black text-indigo-600 mt-1">NEST-${t.franchise_id}</span>
                            </div>
                            <div class="flex flex-col pt-2">
                                <span class="text-[10px] font-black text-slate-300 uppercase italic">Hiring Timestamp</span>
                                <span class="text-xs font-bold text-slate-500 mt-1">${new Date(t.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-span-5 relative">
                        <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4">Personnel Notes</p>
                        <div class="bg-indigo-50/20 p-6 rounded-[2rem] border border-indigo-100/30 italic text-[11px] text-slate-500 font-bold leading-relaxed shadow-inner">
                            "${t.notes || 'Personnel dossier verified. No additional flags recorded.'}"
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
    function filterTeachers() {
        const val = document.getElementById('teacher-search').value.toLowerCase();
        const filtered = allTeachers.filter(t => t.name.toLowerCase().includes(val) || (t.phone && t.phone.includes(val)));
        render(filtered);
    }
    init();
</script>
