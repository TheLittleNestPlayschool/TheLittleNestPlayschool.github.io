<style>
    /* Zebra striping for 3-column grid */
    #session-grid > div:nth-child(6n+4),
    #session-grid > div:nth-child(6n+5),
    #session-grid > div:nth-child(6n+6) {
        background-color: #f8fafc !important; /* slate-50 */
    }
    
    .session-vault-item:hover {
        background-color: #f1f5f9 !important; /* slate-100 */
    }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
</style>

<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Curriculum Vault</h1>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Session Downloads • Linear Progression</p>
    </div>
    
    <div class="flex flex-wrap gap-2 w-full md:w-auto">
        <div class="flex items-center gap-2 bg-white border border-slate-300 rounded-lg p-1 shadow-sm w-full md:w-auto">
            <label class="flex items-center gap-1.5 px-3 py-1 bg-slate-50 rounded-md cursor-pointer hover:bg-slate-100 transition-all border border-slate-200">
                <input type="checkbox" id="vault-select-all" class="w-3.5 h-3.5 accent-teal-500">
                <span class="text-[10px] font-black text-slate-700 uppercase">All</span>
            </label>

            <input type="text" id="vault-search" placeholder="Search sessions..." 
                class="pl-2 pr-2 py-1.5 text-xs outline-none w-32 md:w-48 bg-transparent">
            
            <select id="vault-sort" class="py-1.5 px-2 bg-slate-50 border-l border-slate-200 text-[10px] font-bold text-slate-600 outline-none rounded-r-md">
                <option value="num_asc">1 → 300</option>
                <option value="num_desc">300 → 1</option>
                <option value="newest">Newest</option>
                <option value="alpha">A-Z</option>
            </select>
        </div>

        <button id="vault-download-btn" disabled class="bg-slate-300 text-white px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase tracking-wider shadow-md cursor-not-allowed">
            Download (<span id="vault-selected-count">0</span>)
        </button>
    </div>
</div>

<div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
    <div id="session-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-0 max-h-[70vh] overflow-y-auto custom-scrollbar">
        <div class="col-span-full p-20 text-center text-slate-400 text-xs italic font-bold uppercase tracking-widest animate-pulse">
            Syncing NestMind Database...
        </div>
    </div>
</div>

<script>
(function() {
    const SessionModule = {
        data: [],
        endpoint: 'https://x8ki-letl-twmt.n7.xano.io/api:joVisOhQ/session_details',
        bulkEndpoint: 'https://x8ki-letl-twmt.n7.xano.io/api:joVisOhQ/get_bulk_sessions',

        async init() {
            try {
                const response = await fetch(this.endpoint);
                this.data = await response.json();
                this.render();
                this.setupListeners();
            } catch (err) {
                console.error("Vault Fetch Error:", err);
                document.getElementById('session-grid').innerHTML = '<div class="col-span-full p-10 text-center text-red-400 font-bold uppercase text-[10px]">Connection Error</div>';
            }
        },

        render() {
            const container = document.getElementById('session-grid');
            const search = (document.getElementById('vault-search')?.value || '').toLowerCase();
            const sortVal = document.getElementById('vault-sort')?.value || 'num_asc';
            
            let filtered = this.data.filter(s => 
                (s.session_description || '').toLowerCase().includes(search) || 
                s.session_num.toString().includes(search)
            );

            filtered.sort((a, b) => {
                if (sortVal === 'num_asc') return a.session_num - b.session_num;
                if (sortVal === 'num_desc') return b.session_num - a.session_num;
                if (sortVal === 'newest') return b.id - a.id;
                if (sortVal === 'alpha') return (a.session_description || '').localeCompare(b.session_description || '');
                return 0;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="col-span-full p-20 text-center text-slate-400 font-bold uppercase text-[10px]">No sessions found</div>';
                return;
            }

            container.innerHTML = filtered.map(s => `
                <div class="session-vault-item flex items-start gap-3 p-4 border-b border-r border-slate-100 transition-all bg-white">
                    <input type="checkbox" class="session-row-check w-4 h-4 mt-0.5 accent-teal-500 cursor-pointer" value="${s.id}">
                    <div class="min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-black text-teal-600 bg-teal-50 px-1.5 py-0.5 rounded border border-teal-100 uppercase tracking-tighter">Session ${s.session_num}</span>
                        </div>
                        <p class="text-[11px] text-slate-600 font-medium leading-snug line-clamp-2" title="${s.session_description || ''}">
                            ${s.session_description || 'No description provided.'}
                        </p>
                    </div>
                </div>
            `).join('');

            this.updateDownloadUI();
        },

        setupListeners() {
            const searchInput = document.getElementById('vault-search');
            const sortSelect = document.getElementById('vault-sort');
            const selectAll = document.getElementById('vault-select-all');
            const grid = document.getElementById('session-grid');
            const downloadBtn = document.getElementById('vault-download-btn');

            searchInput.oninput = () => this.render();
            sortSelect.onchange = () => this.render();
            
            selectAll.onchange = (e) => {
                const checks = document.querySelectorAll('.session-row-check');
                checks.forEach(cb => cb.checked = e.target.checked);
                this.updateDownloadUI();
            };

            grid.onchange = (e) => {
                if (e.target.classList.contains('session-row-check')) {
                    this.updateDownloadUI();
                }
            };

            downloadBtn.onclick = async () => {
                const selectedIds = Array.from(document.querySelectorAll('.session-row-check:checked')).map(cb => parseInt(cb.value));
                
                downloadBtn.innerText = "Processing...";
                downloadBtn.disabled = true;

                try {
                    const response = await fetch(this.bulkEndpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ session_id: selectedIds })
                    });

                    const links = await response.json();

                    if (links && Array.isArray(links)) {
                        links.forEach((url, index) => {
                            if (url) {
                                setTimeout(() => {
                                    const a = document.createElement('a');
                                    a.href = url;
                                    a.setAttribute('download', ''); 
                                    document.body.appendChild(a);
                                    a.click();
                                    document.body.removeChild(a);
                                }, index * 250); 
                            }
                        });
                    }
                } catch (err) {
                    console.error("Bulk Download Error:", err);
                    alert("Download failed. Please check connection.");
                } finally {
                    this.updateDownloadUI();
                }
            };
        },

        updateDownloadUI() {
            const checked = document.querySelectorAll('.session-row-check:checked');
            const btn = document.getElementById('vault-download-btn');
            const counter = document.getElementById('vault-selected-count');
            const selectAll = document.getElementById('vault-select-all');
            const allChecks = document.querySelectorAll('.session-row-check');

            counter.innerText = checked.length;
            btn.innerText = `Download (${checked.length})`;
            
            if (checked.length > 0) {
                btn.disabled = false;
                btn.className = "bg-teal-500 hover:bg-teal-600 text-white px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase tracking-wider shadow-md cursor-pointer";
            } else {
                btn.disabled = true;
                btn.className = "bg-slate-300 text-white px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase tracking-wider shadow-md cursor-not-allowed";
            }

            if (allChecks.length > 0) {
                selectAll.checked = (checked.length === allChecks.length);
            }
        }
    };

    const tabObserver = new MutationObserver((mutations, obs) => {
        if (document.getElementById('session-grid')) {
            SessionModule.init();
            obs.disconnect(); 
        }
    });

    tabObserver.observe(document.body, { childList: true, subtree: true });

    if (document.getElementById('session-grid')) SessionModule.init();
})();
</script>
