<style>
    .vault-card { transition: all 0.2s ease; border: 1px solid #e2e8f0; }
    .vault-card:hover { transform: translateY(-2px); border-color: #00d1b2; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    /* Zebra striping for the list view */
    #session-grid > div:nth-child(6n+4), #session-grid > div:nth-child(6n+5), #session-grid > div:nth-child(6n+6) { background-color: #f8fafc !important; }
    .session-vault-item:hover { background-color: #f1f5f9 !important; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    #vault-progress-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
</style>

<div id="vault-progress-overlay">
    <div class="bg-white rounded-xl p-8 max-w-md w-full shadow-2xl text-center">
        <h2 class="text-sm font-black uppercase tracking-widest text-slate-400 mb-2">NestMind Download Manager</h2>
        <p id="progress-status" class="text-xs font-bold text-slate-600 uppercase mb-6">Preparing files...</p>
        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-4">
            <div id="progress-bar" class="bg-teal-500 h-full w-0 transition-all duration-300"></div>
        </div>
        <div id="file-list-debug" class="text-[10px] font-mono text-slate-400 bg-slate-50 p-3 rounded border border-slate-100 text-left max-h-32 overflow-y-auto custom-scrollbar mb-2"></div>
        <p class="text-[9px] text-amber-600 font-bold uppercase italic">Please do not close this window until complete.</p>
    </div>
</div>

<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
        <div class="flex items-center gap-2 mb-1">
            <button id="vault-back-btn" onclick="SessionModule.goBack()" class="hidden hover:bg-slate-200 p-1 rounded-md transition-colors">⬅️</button>
            <h1 id="vault-title" class="text-2xl font-black text-slate-800 uppercase tracking-tight">Resource Vault</h1>
        </div>
        <p id="vault-subtitle" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Select a category to begin</p>
    </div>
    
    <div id="vault-controls" class="hidden flex flex-wrap gap-2 w-full md:w-auto">
        <div class="flex items-center gap-2 bg-white border border-slate-300 rounded-lg p-1 shadow-sm w-full md:w-auto">
            <label class="flex items-center gap-1.5 px-3 py-1 bg-slate-50 rounded-md cursor-pointer hover:bg-slate-100 transition-all border border-slate-200">
                <input type="checkbox" id="vault-select-all" class="w-3.5 h-3.5 accent-teal-500">
                <span class="text-[10px] font-black text-slate-700 uppercase">All</span>
            </label>
            <input type="text" id="vault-search" placeholder="Search files..." class="pl-2 pr-2 py-1.5 text-xs outline-none w-32 md:w-48 bg-transparent">
        </div>
        <button id="vault-download-btn" disabled class="bg-slate-300 text-white px-5 py-2 rounded-lg font-bold transition-all text-xs uppercase tracking-wider shadow-md cursor-not-allowed">
            Download (<span id="vault-selected-count">0</span>)
        </button>
    </div>
</div>

<div id="vault-main-container" class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden min-h-[400px]">
    <div id="session-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-0 max-h-[70vh] overflow-y-auto custom-scrollbar">
        </div>
</div>

<script>
(function() {
    const SessionModule = {
        sessionData: [],
        formData: [],
        currentView: 'root', 
        currentListType: null,
        endpoints: {
            sessions: 'https://x8ki-letl-twmt.n7.xano.io/api:joVisOhQ/session_details',
            forms: 'https://x8ki-letl-twmt.n7.xano.io/api:didN9vp2/forms_details',
            bulk_sessions: 'https://x8ki-letl-twmt.n7.xano.io/api:joVisOhQ/get_bulk_sessions',
            bulk_forms: 'https://x8ki-letl-twmt.n7.xano.io/api:didN9vp2/get_bulk_forms'
        },

        async init() {
            // Fix variable mismatch for Calbayog/Atimonan
            const correctName = localStorage.getItem('locked_franchise_name');
            if (correctName) {
                localStorage.setItem('nestmind_f_name', correctName);
            }

            try {
                const [sRes, fRes] = await Promise.all([
                    fetch(this.endpoints.sessions),
                    fetch(this.endpoints.forms)
                ]);

                const sData = await sRes.json();
                const fData = await fRes.json();

                // Safety: Convert to array if Xano returns error objects
                this.sessionData = Array.isArray(sData) ? sData : (sData.items || []);
                this.formData = Array.isArray(fData) ? fData : (fData.items || []);

                this.renderRoot();
                this.setupListeners();
            } catch (err) {
                console.error("Vault Sync Error:", err);
                document.getElementById('session-grid').innerHTML = '<div class="col-span-full p-10 text-center text-red-400 font-bold uppercase text-[10px]">Sync Error: Check API Endpoints</div>';
            }
        },

        renderRoot() {
            this.currentView = 'root';
            this.currentListType = null;
            document.getElementById('vault-back-btn').classList.add('hidden');
            document.getElementById('vault-controls').classList.add('hidden');
            document.getElementById('vault-title').innerText = "Resource Vault";
            const container = document.getElementById('session-grid');
            container.className = "grid grid-cols-1 md:grid-cols-3 gap-6 p-8";
            container.innerHTML = `
                <div onclick="SessionModule.showCurriculumBlocks()" class="vault-card cursor-pointer bg-slate-50 p-8 rounded-2xl text-center">
                    <div class="text-4xl mb-4">📚</div>
                    <h3 class="font-black text-slate-800 uppercase">Curriculum</h3>
                    <p class="text-[10px] text-slate-400 font-bold">Sessions 1 - 300</p>
                </div>
                <div onclick="SessionModule.showList('summer')" class="vault-card cursor-pointer bg-slate-50 p-8 rounded-2xl text-center">
                    <div class="text-4xl mb-4">☀️</div>
                    <h3 class="font-black text-slate-800 uppercase">Summer Program</h3>
                    <p class="text-[10px] text-slate-400 font-bold">Sessions S1 - S20</p>
                </div>
                <div onclick="SessionModule.showList('forms')" class="vault-card cursor-pointer bg-slate-50 p-8 rounded-2xl text-center">
                    <div class="text-4xl mb-4">📂</div>
                    <h3 class="font-black text-slate-800 uppercase">Admin Forms</h3>
                    <p class="text-[10px] text-slate-400 font-bold">Operations & HR</p>
                </div>`;
        },

        showCurriculumBlocks() {
            this.currentView = 'curriculum_blocks';
            document.getElementById('vault-back-btn').classList.remove('hidden');
            document.getElementById('vault-title').innerText = "Curriculum Blocks";
            const container = document.getElementById('session-grid');
            container.className = "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 p-8";
            let html = '';
            for(let i=0; i < 300; i += 20) {
                const start = i+1, end = i+20;
                html += `<div onclick="SessionModule.showList('block', ${start}, ${end})" class="vault-card cursor-pointer bg-white p-4 rounded-xl text-center border border-slate-200">
                    <div class="text-xl mb-2">📦</div><h4 class="text-[11px] font-black uppercase">Block</h4><p class="text-[10px] text-teal-600 font-bold">${start}-${end}</p></div>`;
            }
            container.innerHTML = html;
        },

        showList(type, start, end) {
            this.currentView = 'list';
            this.currentListType = type;
            document.getElementById('vault-back-btn').classList.remove('hidden');
            document.getElementById('vault-controls').classList.remove('hidden');
            
            const container = document.getElementById('session-grid');
            container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-0 max-h-[70vh] overflow-y-auto custom-scrollbar";
            
            let list = [], title = "";
            const search = (document.getElementById('vault-search')?.value || '').toLowerCase();

            if (type === 'block') {
                title = `Sessions ${start}-${end}`;
                list = this.sessionData.filter(s => s.session_num >= start && s.session_num <= end && !s.session_num.toString().startsWith('S'));
            } else if (type === 'summer') {
                title = "Summer Program";
                list = this.sessionData.filter(s => s.session_num.toString().startsWith('S'));
            } else if (type === 'forms') {
                title = "Admin Forms";
                list = this.formData;
            }

            // Fixed: Safety check for non-array responses
            if (!Array.isArray(list)) list = [];

            list = list.filter(item => {
                const text = type === 'forms' ? (item.form_description || '') : (item.session_description || '');
                const num = type === 'forms' ? '' : (item.session_num ? item.session_num.toString() : '');
                return text.toLowerCase().includes(search) || num.includes(search);
            });

            document.getElementById('vault-title').innerText = title;

            if (list.length === 0) {
                container.innerHTML = `<div class="col-span-full p-12 text-center text-slate-400 font-bold uppercase text-[10px]">No matches found</div>`;
                return;
            }

            container.innerHTML = list.map(item => {
                const label = type === 'forms' ? 'FORM' : (item.session_num.toString().startsWith('S') ? 'SUMMER' : 'SESSION');
                const numDisplay = type === 'forms' ? item.id : item.session_num;
                const desc = type === 'forms' ? item.form_description : item.session_description;

                return `
                <div class="session-vault-item flex items-start gap-3 p-4 border-b border-r border-slate-100 transition-all bg-white">
                    <input type="checkbox" class="session-row-check w-4 h-4 mt-0.5 accent-teal-500 cursor-pointer" value="${item.id}">
                    <div class="min-w-0">
                        <span class="text-[10px] font-black text-teal-600 bg-teal-50 px-1.5 py-0.5 rounded border border-teal-100 uppercase">${label} ${numDisplay}</span>
                        <p class="text-[11px] text-slate-600 font-medium line-clamp-2 mt-1">${desc || 'No description'}</p>
                    </div>
                </div>`;
            }).join('');
            this.updateDownloadUI();
        },

        goBack() {
            if (this.currentView === 'list' && this.currentListType === 'block') this.showCurriculumBlocks();
            else this.renderRoot();
        },

        setupListeners() {
            document.getElementById('vault-search').oninput = () => {
                const title = document.getElementById('vault-title').innerText;
                const range = title.match(/\d+-\d+/);
                if (range) {
                    const parts = range[0].split('-');
                    this.showList('block', parseInt(parts[0]), parseInt(parts[1]));
                } else if (title.includes('Summer')) {
                    this.showList('summer');
                } else if (title.includes('Admin')) {
                    this.showList('forms');
                }
            };

            document.getElementById('vault-select-all').onchange = (e) => {
                document.querySelectorAll('.session-row-check').forEach(cb => cb.checked = e.target.checked);
                this.updateDownloadUI();
            };

            document.getElementById('session-grid').onchange = (e) => {
                if(e.target.classList.contains('session-row-check')) this.updateDownloadUI();
            };

            document.getElementById('vault-download-btn').onclick = () => this.handleDownload();
        },

        async handleDownload() {
            const selectedIds = Array.from(document.querySelectorAll('.session-row-check:checked')).map(cb => parseInt(cb.value));
            const overlay = document.getElementById('vault-progress-overlay');
            const statusText = document.getElementById('progress-status');
            const fileList = document.getElementById('file-list-debug');
            const progressBar = document.getElementById('progress-bar');

            overlay.style.display = 'flex';
            fileList.innerHTML = "";
            
            try {
                const isFormView = this.currentListType === 'forms';
                const endpoint = isFormView ? this.endpoints.bulk_forms : this.endpoints.bulk_sessions;
                
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        session_id: selectedIds,
                        vault_type: isFormView ? 'forms-vault' : 'tlnp-sessions' 
                    })
                });
                
                const finalLinks = await res.json();
                if(!Array.isArray(finalLinks)) throw new Error("API returned no download links");

                for (let i = 0; i < finalLinks.length; i++) {
                    const url = typeof finalLinks[i] === 'object' ? finalLinks[i].url : finalLinks[i];
                    const fileName = decodeURIComponent(url.split('/').pop().split('?')[0]);
                    
                    statusText.innerText = `Downloading ${i + 1} of ${finalLinks.length}`;
                    progressBar.style.width = `${((i + 1) / finalLinks.length) * 100}%`;
                    fileList.innerHTML += `<div class="mb-1">✓ ${fileName}</div>`;
                    fileList.scrollTop = fileList.scrollHeight;

                    const a = document.createElement('a');
                    a.href = url;
                    a.setAttribute('download', fileName);
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    await new Promise(r => setTimeout(r, 800));
                }
                statusText.innerText = "Complete!";
                setTimeout(() => { 
                    overlay.style.display = 'none'; 
                    document.getElementById('vault-select-all').checked = false;
                    document.querySelectorAll('.session-row-check').forEach(cb => cb.checked = false);
                    this.updateDownloadUI();
                }, 1500);
            } catch (e) { 
                statusText.innerText = "Download Failed";
                console.error(e);
            }
        },

        updateDownloadUI() {
            const checked = document.querySelectorAll('.session-row-check:checked');
            const allChecks = document.querySelectorAll('.session-row-check');
            const btn = document.getElementById('vault-download-btn');
            
            document.getElementById('vault-selected-count').innerText = checked.length;
            btn.disabled = checked.length === 0;
            btn.className = checked.length > 0 ? "bg-teal-500 text-white px-5 py-2 rounded-lg font-bold cursor-pointer text-xs uppercase" : "bg-slate-300 text-white px-5 py-2 rounded-lg font-bold cursor-not-allowed text-xs uppercase";
            
            if (allChecks.length > 0) {
                document.getElementById('vault-select-all').checked = (checked.length === allChecks.length);
            }
        }
    };

    window.SessionModule = SessionModule;
    window.onload = () => SessionModule.init();
    // Safety for dynamic module loading
    SessionModule.init();
})();
</script>
