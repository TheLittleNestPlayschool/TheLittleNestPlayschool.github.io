<div class="vault-container" style="padding: 25px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); font-family: 'Inter', sans-serif;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #f0f0f0; padding-bottom: 20px;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <span style="font-size: 24px;">📁</span>
            <h3 style="margin: 0; color: #2c3e50; font-weight: 600;">Session Download Vault</h3>
        </div>
        <button id="vaultDownloadBtn" style="padding: 12px 24px; background-color: #00b894; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;" disabled>
            Download Selected (<span id="vaultSelectedCount">0</span>)
        </button>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="background-color: #f8f9fa;">
                    <th style="padding: 15px; width: 50px; border-bottom: 2px solid #edf2f7;">
                        <input type="checkbox" id="vaultSelectAll" style="transform: scale(1.3); cursor: pointer;">
                    </th>
                    <th style="padding: 15px; border-bottom: 2px solid #edf2f7; color: #7f8c8d; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">No.</th>
                    <th style="padding: 15px; border-bottom: 2px solid #edf2f7; color: #7f8c8d; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">Lesson Name</th>
                    <th style="padding: 15px; border-bottom: 2px solid #edf2f7; color: #7f8c8d; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">Worksheet / Plan</th>
                </tr>
            </thead>
            <tbody id="vaultTableBody">
                <tr>
                    <td colspan="4" style="text-align: center; padding: 40px; color: #95a5a6;">Loading available sessions...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const vaultMaster = document.getElementById('vaultSelectAll');
    const vaultBtn = document.getElementById('vaultDownloadBtn');
    const vaultCounter = document.getElementById('vaultSelectedCount');
    const vaultTable = document.getElementById('vaultTableBody');

    // 1. POPULATE DATA FROM XANO
    async function populateSessionVault() {
        try {
            // Replace this URL with your actual Xano API Endpoint for session_details
            const response = await fetch('https://your-xano-instance.com/api:your-api/session_details');
            const sessions = await response.json();
            
            vaultTable.innerHTML = ''; 

            if (sessions.length === 0) {
                vaultTable.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">No sessions found.</td></tr>';
                return;
            }

            sessions.forEach(session => {
                const row = `
                    <tr style="border-bottom: 1px solid #f1f1f1; transition: background 0.2s;">
                        <td style="padding: 15px; text-align: center;">
                            <input type="checkbox" class="session-row-check" value="${session.id}" style="transform: scale(1.2); cursor: pointer;">
                        </td>
                        <td style="padding: 15px; font-weight: 700; color: #2d3436;">
                            ${session.session_num}
                        </td>
                        <td style="padding: 15px; color: #2d3436; font-weight: 500;">
                            ${session.session_lesson_name}
                        </td>
                        <td style="padding: 15px; color: #636e72;">
                            ${session.worksheet_plan_name || '<span style="color:#dfe6e9;">—</span>'}
                        </td>
                    </tr>
                `;
                vaultTable.insertAdjacentHTML('beforeend', row);
            });

        } catch (error) {
            console.error("Vault Load Error:", error);
            vaultTable.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; color:#d63031;">Unable to connect to the session vault.</td></tr>';
        }
    }

    // 2. SELECT ALL LOGIC
    vaultMaster.addEventListener('change', function() {
        const checkboxes = document.querySelectorAll('.session-row-check');
        checkboxes.forEach(cb => cb.checked = this.checked);
        updateVaultUI();
    });

    // 3. INDIVIDUAL SELECTION LOGIC (Event Delegation)
    vaultTable.addEventListener('change', function(e) {
        if (e.target.classList.contains('session-row-check')) {
            updateVaultUI();
        }
    });

    // 4. UI UPDATER (Button state and Count)
    function updateVaultUI() {
        const checked = document.querySelectorAll('.session-row-check:checked');
        vaultBtn.disabled = checked.length === 0;
        vaultCounter.textContent = checked.length;
        
        // Visual hover for button
        vaultBtn.style.backgroundColor = checked.length > 0 ? "#00b894" : "#dfe6e9";
        
        const all = document.querySelectorAll('.session-row-check');
        vaultMaster.checked = (checked.length === all.length && all.length > 0);
    }

    // 5. DOWNLOAD PLACEHOLDER
    vaultBtn.addEventListener('click', function() {
        const selectedIds = Array.from(document.querySelectorAll('.session-row-check:checked'))
                                 .map(cb => cb.value);

        // This is where we will trigger the Xano API in the next step
        alert("Preparing download for " + selectedIds.length + " selected items.");
        console.log("IDs to fetch from Xano:", selectedIds);
    });

    // Initialize the list
    populateSessionVault();
</script>
